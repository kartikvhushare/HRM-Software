  closeModal();
  // Local deletion
  sel.forEach(k=>catMap[k].local());
  // Supabase deletion in background
  await Promise.allSettled(
    sel.map(k=>sb.from(catMap[k].table).delete().neq('id','00000000-0000-0000-0000-000000000000').then(()=>{}).catch(()=>{}))
  );
  log(fullName(me()),'Cleared data',labels);
  toast('Deleted: '+sel.length+' categor'+(sel.length===1?'y':'ies')+'','ok');
  saveDB();S.route='dashboard';render();
};

let _ns=null;
async function _loadNS(){
  if(_ns)return _ns;
  try{const r=localStorage.getItem(NS_LS);if(r)_ns={..._nsDefault(),...JSON.parse(r)};}catch(e){}
  if(!_ns)_ns=_nsDefault();
  try{const{data,error:wsErr}=await sb.from('workspace_settings').select('value').eq('key','notification_settings').single();
      if(wsErr&&(wsErr.code==='42P01'||wsErr.message?.includes('does not exist'))){console.warn('workspace_settings table missing — using defaults');return _ns;}
    if(data?.value){
      const saved=data.value;
      _ns={..._nsDefault(),...saved};
      // Deep-merge templates — spread would overwrite entire templates obj with saved one, which is correct
      // but if saved has no templates key at all, restore empty object
      if(!_ns.templates)_ns.templates={};
      localStorage.setItem(NS_LS,JSON.stringify(_ns));
    }}catch(e){}
  return _ns;
}
async function _saveNS(){
  if(!_ns)return;
  localStorage.setItem(NS_LS,JSON.stringify(_ns));
  try{await sb.from('workspace_settings').upsert({key:'notification_settings',value:_ns,updated_at:new Date().toISOString()},{onConflict:'key'});}catch(e){console.warn('NS sync:',e.message);}
}

// ── Resolve template variables ──
function _fillTemplate(str, vars){
  return str.replace(/\{\{(\w+)\}\}/g,(_,k)=>vars[k]||'');
}

// ── Render plain text body as HTML — {{action_url}} line becomes a CTA button ──
function _bodyToHtml(fromName, bodyText, actionUrl=''){
  const safeName=String(fromName||'Bridge').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
  const rawLines = bodyText.split('\n').map(l=>l.trim());
  // ctaUrl is passed in as 3rd arg — already the resolved URL
  let ctaUrl = actionUrl||'';
  // Strip: the {{action_url}} placeholder, the resolved URL itself (already a button), and any bare https line
  const lines = rawLines
    .filter(l=>l!=='{{action_url}}' && l!==ctaUrl && !/^https?:\/\//.test(l))
    .map(l=>l.replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])));
  const ctaLabel=ctaUrl.includes('approvals')?'View Approvals'
    :ctaUrl.includes('mychecklists')?'Open My Checklists'
    :ctaUrl.includes('notifications')?'View Notifications'
    :ctaUrl.includes('settings')?'Open Settings'
    :ctaUrl.includes('analytics')?'View Analytics'
    :ctaUrl.includes('leave')?'View Leave'
    :ctaUrl.includes('attendance')?'View Attendance'
    :'Open Bridge';
  return`<!DOCTYPE html><html><body style="margin:0;padding:0;background:#F7F6F2;font-family:sans-serif">
  <div style="max-width:520px;margin:32px auto;background:#fff;border-radius:16px;border:1px solid #ECEDF0;overflow:hidden">
    <div style="background:#15171C;padding:20px 28px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:#0E9F6E;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff">B</div>
      <span style="font-weight:700;font-size:16px;color:#fff">${safeName}</span>
    </div>
    <div style="padding:28px">
      ${lines.filter(Boolean).map((l,i)=>i===0
        ?`<p style="font-size:15px;color:#374151;margin:0 0 16px">${l}</p>`
        :`<p style="font-size:14px;color:#6B7280;margin:0 0 8px;line-height:1.6">${l}</p>`
      ).join('')}
      ${ctaUrl?`<div style="margin-top:24px">
        <a href="${ctaUrl}" style="display:inline-block;background:#15171C;color:#fff;font-weight:700;font-size:14px;padding:12px 24px;border-radius:10px;text-decoration:none">${ctaLabel} →</a>
        <p style="margin:10px 0 0;font-size:11px;color:#B8B5AC">Or copy: ${ctaUrl}</p>
      </div>`:''}
    </div>
    <div style="padding:16px 28px;background:#F9F8F5;border-top:1px solid #ECEDF0;font-size:11px;color:#9CA3AF">
      ${safeName} · Automated notification · Do not reply
    </div>
  </div></body></html>`;
}

// ── sendEmail: FAST — calls edge function directly, no queue, no extra DB round trip ──
async function sendEmail(eventType, userId, vars){
  const user = userId ? uById(userId) : null;
  if(!user?.email){console.warn('sendEmail: no email for user',userId);return;}
  // Requirement #4: per-user opt-out — skip if this user has email notifications turned off.
  if(user.emailEnabled===false){console.log('sendEmail: user opted out of emails',userId);return;}
  if(!_ns) await _loadNS();
  if(!_ns.email_enabled) return;
  if(_ns['email_'+eventType]===false) return;
  // Build app URL from current window location
  const appUrl = window.location.origin;
  // Each event type links to the most relevant page
  const routeMap = {
    checklist_assigned:'mychecklists',
    submission_late:'teamview', submission_approved:'mychecklists',
    submission_rejected:'mychecklists', approval_requested:'approvals',
    approval_decided:'approvals', feedback_received:'notifications',
    deadline_reminder:'mychecklists', escalation:'tickets', announcement:'announcements',
    // HRM: approval-needed → approvals; everything else for the employee → leave page.
    hrm_leave_submitted:'approvals', hrm_leave_escalated:'approvals',
    hrm_leave_approved:'leave', hrm_leave_rejected:'leave', hrm_comp_off:'leave',
    hrm_late:'attendance', hrm_early:'attendance', hrm_auto_closed:'attendance',
  };
  const actionUrl = appUrl + '/#' + (routeMap[eventType]||'');
  const allVars = {user_name:fullName(user), from_name:_ns.email_from_name||'Bridge', app_url:appUrl, action_url:actionUrl, ...vars};
  const defaults = _defaultTemplates();
  const tpl = {
    subject:(_ns.templates?.[eventType]?.subject)||defaults[eventType]?.subject||eventType,
    body:   (_ns.templates?.[eventType]?.body)   ||defaults[eventType]?.body   ||'',
  };
  const subject  = _fillTemplate(tpl.subject, allVars);
  const bodyHtml = _bodyToHtml(_ns.email_from_name, _fillTemplate(tpl.body, allVars), actionUrl);
  sb.functions.invoke('send-notification',{body:{
    to:user.email, from_name:_ns.email_from_name||'Bridge', subject, html:bodyHtml,
  }}).catch(e=>console.warn('sendEmail invoke failed:',e.message));
}


function _nsTogRow(key,label,desc){
  const on=_ns?(_ns[key]!==false):true;
  return`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #F5F4F0">
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;color:#15171C">${label}</div>
      ${desc?`<div style="font-size:11px;color:#B8B5AC;margin-top:1px">${desc}</div>`:''}
    </div>
    <button role="switch" aria-checked="${on?'true':'false'}" aria-label="${esc(label)}" class="tog ${on?'on':'off'}" onclick="App._nsTog(this,'${key}')"><span></span></button>
  </div>`;}
App._nsTog=async(btn,key)=>{
  if(!_ns)_ns=_nsDefault();
  const nowOn=btn.classList.contains('off');
  btn.classList.toggle('on',nowOn);btn.classList.toggle('off',!nowOn);
  btn.setAttribute('aria-checked',nowOn?'true':'false');
  _ns[key]=nowOn;await _saveNS();
};
App._nsSaveEmail=async()=>{
  if(!_ns)_ns=_nsDefault();
  const name=($('#ns-from-name')?.value||'').trim();
  const addr=($('#ns-from-addr')?.value||'').trim();
  const mins=parseInt($('#ns-reminder-mins')?.value||'15',10)||15;
  if(!addr){toast('Enter a from email address','err');return;}
  if(!addr.includes('@')){toast('Enter a valid email address','err');return;}
  _ns.email_from_name=name||'Bridge';_ns.email_from_address=addr;
  _ns.email_reminder_minutes=Math.max(5,Math.min(120,mins));
  await _saveNS();toast('Saved');
};
App._testEmail=async()=>{
  if(!_ns) await _loadNS();
  const u=me();
  if(!u?.email){toast('Your user profile has no email address','err');return;}
  const btn=document.getElementById('ns-test-btn');
  if(btn){btn.disabled=true;btn.textContent='Sending…';}
  try{
    const appUrl=window.location.origin;
    const {error}=await sb.functions.invoke('send-notification',{body:{
      to: u.email,
      from_name: _ns.email_from_name||'Bridge',
      subject: '✅ Bridge test email',
      html: _bodyToHtml(_ns.email_from_name||'Bridge',
        'Hi '+u.firstName+',\n\nThis is a test email from Bridge.\n\nIf you received this, your email setup is working correctly. SMTP is connected and emails will be delivered to users based on their profile email address.',
        appUrl+'/#mychecklists'),
    }});
    if(error)throw new Error(error.message||'Function error');
    toast('Test email sent to '+u.email+'','ok');
  }catch(e){
    toast('Failed: '+e.message,'err');
    console.error('Test email error:',e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Send test email';}
  }
};

App._exportCSV=()=>{
  let subs=DB.submissions;if(!isAdmin()){const _sc=_reportScopeIds();subs=subs.filter(s=>_sc.has(s.userId));}
  const f=S.filters;const fArr=k=>Array.isArray(f[k])?f[k]:(f[k]?[f[k]]:[]);
  if(fArr('users').length)subs=subs.filter(s=>fArr('users').includes(s.userId));
  if(fArr('deps').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return fArr('deps').includes(c?.department);});
  if(fArr('locs').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return fArr('locs').some(l=>(c?.locationIds||[]).includes(l));});
  if(fArr('stats').length)subs=subs.filter(s=>fArr('stats').includes(s.status));
  if(f.dr1)subs=subs.filter(s=>s.date>=f.dr1);if(f.dr2)subs=subs.filter(s=>s.date<=f.dr2);
  const summaryRows=[['#','User','Email','Phone','Department','Position','Checklist','Dept','Location(s)','Date','Status','Submitted At','Edit Count','Pending Approval','Compliance','Escalations']];
  subs.forEach((s,i)=>{const u=uById(s.userId),c=clById(s.checklistId);if(!u)return;if(!c&&!s.checklistDeleted)return;const clName=c?c.name:'[Deleted checklist]';const clDept=c?c.department||'':'';const clLocs=c?(c.locationIds||[]).map(id=>DB.locations.find(l=>l.id===id)?.name||'').join('; '):'';const _escN=(c&&(c.questionIds||[]).length)?_subEscalationCount(c,s):0;const _compTxt=(c&&(c.questionIds||[]).length)?(_escN>0?'Non-compliant':'Compliant'):'N/A';summaryRows.push([i+1,fullName(u),u.email||'',u.phone||'',u.department||'',u.position||'',clName,clDept,clLocs,s.date,s.status,s.submittedAt?new Date(s.submittedAt).toLocaleString('en-GB'):'',s.editCount||0,s.status==='Pending Approval'?'Yes':'No',_compTxt,_escN]);});
  // Also export question responses as a second sheet
  const qRows=[['Sub #','User','Email','Checklist','Date','Status','Question','Response','Comment','Escalated']];
  subs.forEach((s,si)=>{const u=uById(s.userId),c=clById(s.checklistId);if(!u)return;(s.questionResponses||[]).forEach((qr,qi)=>{const q=(DB.questions||[]).find(x=>x.id===qr.questionId);const _esc=(c&&q&&_qrEscalates(c,q,qr))?'Yes':'';qRows.push([si+1,fullName(u),u.email||'',c?c.name:'[Deleted]',s.date,s.status,q?q.text:'Q'+(qi+1),qr.response!==null&&qr.response!==undefined?String(qr.response):'',qr.comment||'',_esc]);});});
  const all=[...summaryRows,[],['=== QUESTION RESPONSES (one row per response) ==='],[],...qRows];
  const csv=all.map(r=>r.map(v=>{let cell=String(v??'');
    // Neutralize CSV formula injection: cells that begin with = + - @ (or tab/CR)
    // are prefixed with a single quote so spreadsheet apps treat them as text.
    if(/^[=+\-@\t\r]/.test(cell))cell="'"+cell;
    return '"'+cell.replace(/"/g,'""')+'"';}).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download='bridge_export_'+todayISO()+'.csv';a.click();
  toast('Exported '+subs.length+' submissions ('+(qRows.length-1)+' question responses)');
};

/* ── Date helpers ── */
function _isoAdd(iso,days){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+days);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _addMonths(iso,n){const d=new Date(iso+'T00:00:00');d.setMonth(d.getMonth()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _monthsBetween(a,b){if(!a||!b)return 0;const d1=new Date(a+'T00:00:00'),d2=new Date(b+'T00:00:00');let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());if(d2.getDate()<d1.getDate())m--;return Math.max(0,m);}
function _r2(n){return Math.round(n*100)/100;}

/* ── Leave-year id for a user (calendar | anniversary) ── */
function _leaveYearOf(u,iso){
  iso=iso||todayISO();
  // H1: derive basis from the USER'S OWN profile, not the globally active profile.
  const basis=(DB.hrmConfig?.profiles?.[userProfileId(u)]?.leaveYearBasis)||'calendar';
  if(basis==='anniversary'&&u?.hrm?.joiningDate){
    const j=new Date(u.hrm.joiningDate+'T00:00:00');const d=new Date(iso+'T00:00:00');
    let y=d.getFullYear();const annThis=new Date(y,j.getMonth(),j.getDate());
    if(d<annThis)y--;
    return y+'-anniv';
  }
  return iso.slice(0,4);
}
/* ── First calendar date of the user's current leave year (L7: carry-over expiry anchor). ── */
function _leaveYearStart(u,iso){
  iso=iso||todayISO();
  const basis=(DB.hrmConfig?.profiles?.[userProfileId(u)]?.leaveYearBasis)||'calendar';
  if(basis==='anniversary'&&u?.hrm?.joiningDate){
    const j=new Date(u.hrm.joiningDate+'T00:00:00');const d=new Date(iso+'T00:00:00');
    let y=d.getFullYear();const annThis=new Date(y,j.getMonth(),j.getDate());
    if(d<annThis)y--;
    return y+'-'+String(j.getMonth()+1).padStart(2,'0')+'-'+String(j.getDate()).padStart(2,'0');
  }
  return iso.slice(0,4)+'-01-01';
}

/* ── Lookups ── */
const ltById=id=>(DB.leaveTypes||[]).find(t=>t.id===id);
function _typesFor(profileId){return (DB.leaveTypes||[]).filter(t=>t.profileId===profileId);}

/* ── Balance ledger (create-if-missing) ── */
function _balanceFor(userId,leaveTypeId,leaveYear){
  const u=uById(userId);
  leaveYear=leaveYear||_leaveYearOf(u,todayISO());
  let b=(DB.leaveBalances||[]).find(x=>x.userId===userId&&x.leaveTypeId===leaveTypeId&&x.leaveYear===leaveYear);
  if(!b){
    // LV-8: fixed-entitlement (non-accruing) PAID types — birthday/parental/bereavement/study, etc. — carry
    //   their whole allowance in lt.entitlement with accrualPerMonth:0. Seed the new row's `entitled` from it so
    //   they are usable; accruing types (accrualPerMonth>0) still start at 0 and grow via _runMonthlyAccrual.
    //   Comp-off is HR-ledger only (never balance-row based). Unpaid types stay 0 (they bypass the ledger anyway).
    const lt=ltById(leaveTypeId);
    const seedEnt=(lt&&!_isCompOffLt(lt)&&lt.unpaid!==true&&(lt.accrualPerMonth||0)<=0&&(lt.entitlement||0)>0)?_r2(lt.entitlement):0;
    b={id:uid('lb'),userId,leaveTypeId,leaveYear,entitled:seedEnt,accrued:0,carriedIn:0,carriedExpiry:null,used:0,pending:0,lastAccruedMonth:null};DB.leaveBalances.push(b);
  }
  return b;
}
/* L8: read-only balance lookup — never pushes a row into DB.leaveBalances (use on render/analytics paths). */
function _balanceReadonly(userId,leaveTypeId,leaveYear){
  const u=uById(userId);
  leaveYear=leaveYear||_leaveYearOf(u,todayISO());
  const found=(DB.leaveBalances||[]).find(x=>x.userId===userId&&x.leaveTypeId===leaveTypeId&&x.leaveYear===leaveYear);
  if(found)return found;
  // LV-8: mirror _balanceFor's fixed-entitlement seeding in the read-only default so preview/render show the
  //   real usable balance for non-accruing paid types BEFORE the first row is materialized. Never pushes a row.
  const lt=ltById(leaveTypeId);
  const seedEnt=(lt&&!_isCompOffLt(lt)&&lt.unpaid!==true&&(lt.accrualPerMonth||0)<=0&&(lt.entitlement||0)>0)?_r2(lt.entitlement):0;
  return {id:null,userId,leaveTypeId,leaveYear,entitled:seedEnt,accrued:0,carriedIn:0,carriedExpiry:null,used:0,pending:0,lastAccruedMonth:null};
}
function _balRemaining(b){
  if(!b)return 0;
  let carried=b.carriedIn||0;
  if(b.carriedExpiry&&todayISO()>b.carriedExpiry)carried=0;
  return _r2((b.entitled||0)+carried-(b.used||0)-(b.pending||0));
}
/* §3a: comp-off REMAINING from the dedicated ledger (u.hrm.compOff).
   Each positive grant honors its OWN expiry (expired grants drop out); negative removals always apply.
   Independent of carry-over's carriedExpiry. */
function _compOffRemaining(userId){
  const u=uById(userId);const led=u?.hrm?.compOff;if(!Array.isArray(led))return 0;
  const today=todayISO();
  let total=0;
  led.forEach(e=>{
    const d=Number(e.days)||0;
    if(d>=0){ if(e.expiry&&today>e.expiry)return; total+=d; }   // grant expired → drops out
    else total+=d;                                              // removal always applies
  });
  return _r2(Math.max(0,total));
}
const _isCompOffLt=lt=>!!lt&&lt.key==='compoff';
/* Remaining days for a user+leaveType — comp-off reads the dedicated ledger; everything else the balance row. */
function _ltRemaining(userId,lt,leaveYear){
  if(_isCompOffLt(lt))return _compOffRemaining(userId);
  return _balRemaining(_balanceReadonly(userId,lt.id,leaveYear));
}

/* ── Working-day deduction (exclude off-days + public holidays) ── */
function _workingDaysBetween(userId,start,end,halfDay){
  const u=uById(userId);if(!u)return 0;
  const off=new Set(u.hrm?.schedule?.offDays||[]);
  const prof=userProfileId(u);
  const hols=new Set((DB.holidays||[]).filter(h=>h.profileId===prof).map(h=>h.date));
  let count=0,d=start;
  let guard=0;
  while(d<=end&&guard++<1000){
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    if(!off.has(dow)&&!hols.has(d))count++;
    d=_isoAdd(d,1);
  }
  if(halfDay&&count>0)count-=0.5;
  return _r2(count);
}

/* ── Worked-hours / late / early computation ── */
function computeHours(rec){
  if(rec.inMin==null)return 0;
  // L3: an auto-closed (forgotten clock-out) record must NOT book a full ~15h day into payroll.
  // Cap worked hours at the user's scheduled shift length instead of running to midnight.
  if(rec.autoClosed){
    const u=uById(rec.userId);const sh=Number(u?.hrm?.schedule?.hours);
    return _r2(sh>0?sh:0);
  }
  let out=rec.outMin;
  if(out==null)return 0;
  // LV-5: a genuine clock-out earlier than clock-in is an OVERNIGHT shift (e.g. 22:00→06:00).
  //   Add a full day so it books (out+1440)-in (=8h), instead of clamping to midnight (=2h).
  //   Auto-closed records never reach here (they return the capped scheduled hours above).
  if(out<rec.inMin)out+=1440;
  return _r2((out-rec.inMin)/60);
}
function _applyFlags(rec){
  const u=uById(rec.userId);if(!u)return;
  _ensureHrm(u); // L2: guard against an unmigrated user with no u.hrm.schedule
  const s=u.hrm?.schedule||{in:'09:00',out:'18:00'};const grace=userProfile(u).grace??15; // LV-6: user's profile, not global
  const flags=new Set((rec.flags||[]).filter(f=>f==='auto-closed'||f==='forgot-clockout'||f==='outside-geofence'||f==='fence-changed')); // H4: preserve fence-changed
  const sIn=hm2m(s.in),sOut=hm2m(s.out),overnight=sOut<sIn; // H3: 22:00→06:00 crosses midnight
  // H3: mirror computeHours' overnight handling — measure late/early INSIDE the actual shift window.
  //   For an overnight shift, a clock-in in the small hours (well below sIn) and a clock-out after
  //   midnight (below sOut at face value) are normalized by +1440 so the comparison stays in-window.
  let inM=rec.inMin,outM=rec.outMin;
  if(overnight){
    if(inM!=null&&inM<sOut)inM+=1440;   // in punched after midnight → next-day minute
    const sOutAdj=sOut+1440;            // shift end is on the following day
    if(outM!=null&&outM<sIn)outM+=1440; // out punched after midnight → next-day minute
    if(inM!=null&&inM>sIn+grace)flags.add('late');
    if(outM!=null&&!rec.autoClosed&&outM<sOutAdj-grace)flags.add('early');
  }else{
    if(inM!=null&&inM>sIn+grace)flags.add('late');
    if(outM!=null&&!rec.autoClosed&&outM<sOut-grace)flags.add('early');
  }
  rec.flags=[...flags];
}
function attFor(userId,date){return (DB.attendance||[]).find(a=>a.userId===userId&&a.date===date);}

/* ── Geofence (Haversine, meters) ── */
function _distM(lat1,lng1,lat2,lng2){
  const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── Auto clock-out (lazy: boot + visibility regain). True midnight close needs a backend cron — deferred. ── */
function _runAutoClose(){
  const today=todayISO();let changed=false;
  (DB.attendance||[]).forEach(rec=>{
    if(rec.clockIn&&!rec.clockOut&&rec.date<today){
      const at=userProfile(uById(rec.userId)).autoCloseAt||'00:00'; // LV-6: user's profile, not global
      rec.clockOut=rec.date+'T'+at+':00';
      rec.outMin=hm2m(at);
      rec.autoClosed=true;rec.status='AutoClosed';
      rec.hours=computeHours(rec);
      const fl=new Set(rec.flags||[]);fl.add('auto-closed');fl.add('forgot-clockout');rec.flags=[...fl];
      if(_hnp('inapp_hrm_missed_clockout'))_hrmNotify(rec.userId,'⏱ Your '+fmtD(rec.date)+' clock-out was auto-closed at midnight (you forgot to clock out).','attendance');
      if(_hnpEmail('email_hrm_missed_clockout'))queueEmail('hrm_auto_closed',rec.userId,null,rec.date,{user_name:fullName(uById(rec.userId)),date:fmtD(rec.date)});
      changed=true;
    }
  });
  if(changed)saveDB();
}

/* ── Monthly pro-rated accrual (guarded by lastAccruedMonth) ── */
function _runMonthlyAccrual(){
  const ym=todayISO().slice(0,7);let changed=false;
  DB.users.filter(u=>u.status==='Active'&&u.hrm?.joiningDate).forEach(u=>{
    const serviceMonths=_monthsBetween(u.hrm.joiningDate,todayISO());
    const prof=userProfileId(u);
    _ensureHrm(u);const marks=u.hrm.accrualMarks;
    _typesFor(prof).filter(lt=>lt.enabled&&(lt.accrualPerMonth||0)>0).forEach(lt=>{
      // LV-7: idempotency is keyed per (user,leaveType,calendar month) GLOBALLY via u.hrm.accrualMarks,
      //   so an anniversary leave-year rollover (which creates a fresh row with lastAccruedMonth:null)
      //   can no longer make the rollover month accrue twice.
      if(marks[lt.id]===ym)return;
      const b=_balanceFor(u.id,lt.id,_leaveYearOf(u,todayISO()));
      if(lt.eligibilityMonths&&serviceMonths<lt.eligibilityMonths){marks[lt.id]=ym;b.lastAccruedMonth=ym;changed=true;return;}
      let base=lt.accrualPerMonth;
      if(lt.key==='annual'){if(serviceMonths<6)base=0;else if(serviceMonths<12)base=HRM_ANNUAL_MID;else base=lt.accrualPerMonth;}
      const ww=u.hrm.schedule?.workWeek||5;
      const prorate=ww===6?HRM_SIXDAY_PRORATE:1;
      let add=_r2(base*prorate);
      // M3: track the ACCRUED portion separately so maxPerYear caps only accruals,
      // never manual grants / comp-off that also live in b.entitled.
      const prevAccrued=b.accrued||0;
      let nextAccrued=_r2(prevAccrued+add);
      if(lt.maxPerYear&&nextAccrued>lt.maxPerYear){nextAccrued=lt.maxPerYear;add=_r2(nextAccrued-prevAccrued);}
      if(add>0){b.accrued=nextAccrued;b.entitled=_r2((b.entitled||0)+add);}
      marks[lt.id]=ym;b.lastAccruedMonth=ym;changed=true;
    });
  });
  if(changed)saveDB();
}

/* ── Carry-over + expiry (lazy at year rollover) ── */
function _runCarryOver(){
  const today=todayISO();let changed=false;
  DB.users.filter(u=>u.hrm).forEach(u=>{
    const curYear=_leaveYearOf(u,today);
    _typesFor(userProfileId(u)).forEach(lt=>{
      // find prior-year balances for this user/type that haven't been carried yet
      (DB.leaveBalances||[]).filter(b=>b.userId===u.id&&b.leaveTypeId===lt.id&&b.leaveYear!==curYear&&!b._carried).forEach(prev=>{
        if(!lt.carryOver?.enabled)return; // leave unmarked → enabling carry-over later retro-applies
        prev._carried=true;changed=true;
        const carry=Math.min(_balRemaining(prev),lt.carryOver.maxDays||0);
        if(carry<=0)return;
        const nb=_balanceFor(u.id,lt.id,curYear);
        nb.carriedIn=_r2((nb.carriedIn||0)+carry);
        if(lt.carryOver.expiryMonths)nb.carriedExpiry=_addMonths(_leaveYearStart(u,today),lt.carryOver.expiryMonths); // L7: anchor to leave-year start, not Jan-1
      });
    });
  });
  if(changed)saveDB();
}

/* ── Birthday gating ── */
function _birthdayOk(u,startISO){
  if(!u?.hrm?.dob)return false;
  return new Date(u.hrm.dob+'T00:00:00').getMonth()===new Date(startISO+'T00:00:00').getMonth();
}

/* ── Boot init (idempotent) ── */
function _hrmInit(){
  _seedProfiles();
  _seedRoleProfiles();
  DB.hrmConfig.locationGeo=DB.hrmConfig.locationGeo||{}; // per-location geofence store; synced via hrm_config.location_geo
  Object.keys(DB.hrmConfig.profiles||{}).forEach(_seedLeaveTypes);
  DB.users.forEach(_ensureHrm);
  _runAutoClose();
  _runMonthlyAccrual();
  _runCarryOver();
  saveDB();
}

/* ── Attendance status colors ── */
const ATT_COLOR={Present:'#10B981',Absent:'#F43F5E',Leave:'#8B5CF6',HalfDay:'#F59E0B',OffDay:'#9CA3AF',Holiday:'#0EA5E9',AutoClosed:'#EAB308',LeavePending:'#FBBF24'};
const ATT_LABEL={Present:'Present',Absent:'Absent',Leave:'On leave',HalfDay:'Half-day',OffDay:'Off-day',Holiday:'Public holiday',AutoClosed:'Auto-closed',LeavePending:'Leave (pending)'};
// Soft tint + readable ink per status — gives the attendance calendar a calm heatmap look
// instead of a wall of saturated colour. Present stays solid (it's the positive signal).
const ATT_SOFT={Present:'#10B981',Absent:'#FDECEC',Leave:'#F1ECFE',HalfDay:'#FEF4E5',OffDay:'#F1F3F6',Holiday:'#E7F5FC',AutoClosed:'#FEF8E6',LeavePending:'#FEF6E0'};
const ATT_INK={Present:'#FFFFFF',Absent:'#C1362B',Leave:'#5B2DBE',HalfDay:'#92560A',OffDay:'#7A8395',Holiday:'#075985',AutoClosed:'#866207',LeavePending:'#946112'};
function _m2hm(m){if(m==null)return'—';m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

/* Compute the display status for a user on a date (no record = derive off/holiday/absent/leave) */
function _dayStatus(userId,date){
  const rec=attFor(userId,date);
  if(rec)return rec;
  const u=uById(userId);if(!u)return null;
  const off=new Set(u.hrm?.schedule?.offDays||[]);
  const dow=DAYS3[new Date(date+'T00:00:00').getDay()];
  const prof=userProfileId(u);
  const hol=(DB.holidays||[]).find(h=>h.profileId===prof&&h.date===date);
  // leave approved covering this date?
  const lv=(DB.leaveRequests||[]).find(r=>r.userId===userId&&r.status==='Approved'&&r.start<=date&&r.end>=date);
  // Bug 6: also surface PENDING (applied, not-yet-approved) leaves in a distinct amber state so the
  //   employee sees their applied leave on the calendar before it is approved.
  const pend=lv?null:(DB.leaveRequests||[]).find(r=>r.userId===userId&&r.status==='Pending'&&r.start<=date&&r.end>=date);
  if(hol)return{virtual:true,status:'Holiday',date,note:hol.name};
  if(off.has(dow))return{virtual:true,status:'OffDay',date};
  if(lv){const lt=ltById(lv.leaveTypeId);return{virtual:true,status:lv.halfDay?'HalfDay':'Leave',date,leaveType:lv.leaveTypeId,note:lt?lt.name:''};}
  if(pend){const lt=ltById(pend.leaveTypeId);return{virtual:true,status:'LeavePending',date,leaveType:pend.leaveTypeId,note:(lt?lt.name:'Leave')+' — pending approval'};}
  if(date<todayISO())return{virtual:true,status:'Absent',date};
  return null;
}

/* ── Resolve the geofence a user must satisfy to clock in.
   The fence lives ONLY on the user's assigned Location (DB.hrmConfig.locationGeo[locId]).
   Returns:
     {lat,lng,radius}  → an ACTIVE fence the GPS must satisfy.
     {misconfigured:true,reason} → assigned location exists but its geo is off/missing lat-lng.
     null              → user has no assigned location at all.
   Bug 1: the legacy profile-office fallback (activeProfile().office) is REMOVED — it was dead
   (seeded enabled:false and never written by saveHrmConfig) and silently bypassed the fence. ── */
function _activeGeofence(u){
  if(!u)return null;
  const locId=u.hrm?.locationId;
  if(locId){
    const g=(DB.hrmConfig?.locationGeo||{})[locId];
    if(g&&g.enabled&&g.lat!=null&&g.lng!=null)return{lat:g.lat,lng:g.lng,radius:g.radius||200};
    // Assigned to a location whose fence is disabled or missing coordinates → misconfigured,
    // NOT "no fence". Fail-closed treats this as a block (HR thinks it's enforced).
    return{misconfigured:true,reason:locId};
  }
  return null;
}

/* ════════ CLOCK IN / OUT ════════ */
// Shared FAIL-CLOSED geofence gate for clock-in AND clock-out (Bug 1, binding decision #3).
// Resolves the active geofence from the user's assigned Location. Behaviour:
//   • no assigned location            → BLOCK ("No office location configured — contact HR")
//   • assigned but fence misconfigured → BLOCK ("No office location configured — contact HR")
//   • fence active, GPS unavailable/denied/timeout → BLOCK (can't confirm location)
//   • GPS accuracy worse than the radius → BLOCK (a low-accuracy fix can falsely fall inside)
//   • GPS inside the radius           → onPass(geo)
// `verb` ('in'/'out') only swaps the wording.
// H4: `lenient` (clock-OUT after a real clock-in) NEVER traps the user. A mid-shift geofence change
//   (HR disables/blanks/deletes the location after clock-in) must not block the out-punch and force a
//   corrupted auto-close. In lenient mode a null/misconfigured fence is allowed (geo:null), and any GPS
//   failure/timeout is allowed too; the fence is still enforced only when it IS active AND GPS resolves
//   to a trustworthy in/outside answer. Clock-IN stays strictly fail-closed (lenient=false).
function _withGeofence(verb,onPass,lenient,retryFn){
  const gf=_activeGeofence(me());
  const word='clock '+verb;
  // W1.6: a non-lenient (clock-in) geofence failure should offer a Retry affordance that re-runs the
  // punch, instead of being a dead-end. `retryFn` is a JS string (e.g. "App.clockIn()") rendered into
  // a toast-with-action button. Falls back to a plain toast when no retry was provided.
  const _fail=(m)=>{if(retryFn&&!lenient)toastAction(m,'err',{label:'Retry',fn:retryFn,ms:8000});else toast(m,'err');};
  // Fail-closed (clock-in): no fence at all, or a misconfigured one, blocks the punch.
  if(!gf||gf.misconfigured){
    if(lenient){onPass(null);return;} // H4: fence changed mid-shift — let the user clock out
    toast('No office location configured — contact HR','err');return;
  }
  if(!navigator.geolocation){
    if(lenient){onPass(null);return;}
    _fail('Can\'t confirm your location to '+word+' — enable location access');return;
  }
  toast('Checking location…');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const radius=gf.radius||200;
      // Accuracy floor: a fix whose ± error exceeds the fence radius can't be trusted to be inside.
      if(pos.coords.accuracy!=null&&pos.coords.accuracy>radius){
        if(lenient){onPass(null);return;} // H4: don't trap a legitimate clock-out on a poor fix
        _fail('Can\'t confirm your location accurately enough to '+word+' (±'+Math.round(pos.coords.accuracy)+'m) — try again outdoors');return;
      }
      const d=_distM(pos.coords.latitude,pos.coords.longitude,gf.lat,gf.lng);
      if(d<=radius){onPass({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy});}
      else{_fail('You must be inside the office area to '+word+' ('+Math.round(d)+'m away)');}
    },
    ()=>{
      if(lenient){onPass(null);return;} // H4: GPS denied/unavailable on clock-out — never trap
      _fail('Can\'t confirm your location to '+word+' — enable location access');
    },
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}
App.clockIn=()=>{
  const uId=S.uid,date=todayISO();
  // LV-2: only an ACTUAL clock-in (clockIn/inMin set) means "already clocked in today".
  //   A pre-written Leave/HalfDay record (clockIn:null/inMin:null) must NOT block clock-in — on a
  //   half-day-leave day the worked half is still clocked, and a cancelled-leave day must be clockable.
  const existing=attFor(uId,date);
  if(existing&&(existing.clockIn!=null||existing.inMin!=null)){toast('Already clocked in today','warn');return;}
  const _record=(geo)=>{
    // L1: `date` & `inMin` are LOCAL (todayISO/nowHM); all hours/late math uses these local *Min values.
    // `clockIn` ISO is a UTC display/audit stamp only — never used for hours math (no functional change).
    const m=nowHM();
    let rec=existing;
    if(rec){
      // Merge the clock-in onto the existing Leave/HalfDay row rather than creating a duplicate.
      rec.clockIn=new Date().toISOString();rec.inMin=m;rec.clockOut=null;rec.outMin=null;rec.hours=null;
      rec.inGeo=geo;rec.autoClosed=false;
      // Keep HalfDay status for a half-day-leave day (worked half); a leftover full-Leave row becomes Present.
      if(rec.status!=='HalfDay')rec.status='Present';
    }else{
      rec={id:_attId(uId,date),userId:uId,date,clockIn:new Date().toISOString(),clockOut:null,inMin:m,outMin:null,hours:null,status:'Present',leaveType:null,flags:[],inGeo:geo,autoClosed:false,note:'',createdAt:new Date().toISOString()}; // M5: deterministic id
      DB.attendance.unshift(rec);
    }
    _applyFlags(rec);
    saveDB();
    if(rec.flags.includes('late')&&_hnp('inapp_hrm_late'))_hrmNotify(uId,'⚠️ You clocked in late at '+_m2hm(m)+' on '+fmtD(date)+'.','attendance');
    if(rec.flags.includes('late')&&_hnpEmail('email_hrm_late'))queueEmail('hrm_late',uId,null,date,{user_name:fullName(uById(uId)),date:fmtD(date),time:_m2hm(m)});
    toast('Clocked in at '+_m2hm(m)+'');rr();
  };
  _withGeofence('in',_record,false,'App.clockIn()'); // W1.6: geofence-fail → Retry affordance
};
App.clockOut=()=>{
  const uId=S.uid,date=todayISO();
  const rec=attFor(uId,date);
  // LV-2: a pre-written Leave/HalfDay row (no actual clock-in) is not "clocked in" — require a real clock-in.
  if(!rec||(rec.clockIn==null&&rec.inMin==null)){toast('Clock in first','warn');return;}
  if(rec.clockOut){toast('Already clocked out','warn');return;}
  // H4: lenient gate — a real clock-in already exists, so a mid-shift geofence change must never trap
  //   the out-punch (which would force a corrupted auto-close). Fence still enforced when active+GPS ok.
  _withGeofence('out',(geo)=>{
    const m=nowHM();
    rec.clockOut=new Date().toISOString();rec.outMin=m;rec.hours=computeHours(rec);
    if(geo)rec.outGeo=geo;
    else{rec.outGeo=null;if(!(rec.flags||[]).includes('fence-changed'))rec.flags=[...(rec.flags||[]),'fence-changed'];} // H4 audit
    _applyFlags(rec);saveDB();
    if(rec.flags.includes('early'))_hrmNotify(uId,'⚠️ You clocked out early at '+_m2hm(m)+' on '+fmtD(date)+'.','attendance');
    toast('Clocked out — '+rec.hours+'h worked');rr();
  },true); // H4: lenient — a real clock-in exists, never trap the out-punch on a mid-shift fence change
};

function _clockWidget(){
  const date=todayISO();const rec=attFor(S.uid,date);const u=me();
  const sched=u.hrm?.schedule||{};
  // Clock-out reminder (in-app, lazy)
  if(rec&&rec.clockIn&&!rec.clockOut&&nowHM()>hm2m(sched.out)+(userProfile(u).grace??15)){ // LV-6: user's profile
    if(!rec._remNotified){rec._remNotified=true;_hrmNotify(S.uid,'🔔 Don\'t forget to clock out — your shift ended at '+(sched.out||'18:00')+'.','attendance');saveDB();}
  }
  const nowTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  // LV-2: a record that exists but has no actual clock-in (a pre-written Leave/HalfDay row) must still
  //   show the Clock In button so the worked (half-)day can be clocked.
  const _clockedIn=rec&&(rec.clockIn!=null||rec.inMin!=null);
  const actBtn=(label,onclick,variant)=>`<button onclick="${onclick}" class="ui-btn ui-btn-${variant}" style="font-size:15px;font-weight:700;padding:14px 30px;min-height:52px;border-radius:14px;flex:1 1 200px;max-width:280px">${ic('clock','w-5 h-5')}${label}</button>`;
  const tile=(ico,ibg,iink)=>`<div style="width:56px;height:56px;border-radius:16px;background:${ibg};color:${iink};display:grid;place-items:center;flex-shrink:0">${ic(ico,'w-7 h-7')}</div>`;
  let left,right,accent='var(--c-brand)';
  if(!_clockedIn){
    left=`${tile('clock','var(--c-brand-soft)','var(--c-brand-ink)')}<div style="min-width:0"><div class="fd" style="font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1">${nowTime}</div><p style="font-size:13px;color:var(--c-text-2);margin-top:5px">${rec&&rec.status==='HalfDay'?'Half-day · ':''}Shift ${sched.in||'09:00'}–${sched.out||'18:00'} · ${sched.hours||9}h</p></div>`;
    right=actBtn('Clock In',"App.clockIn()",'brand');
  }else if(!rec.clockOut){
    accent='var(--c-ink)';
    left=`${tile('clock','var(--c-success-soft)','var(--c-success-ink)')}<div style="min-width:0"><div class="fd" style="font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1">${nowTime}</div><p style="font-size:13px;color:var(--c-text-2);margin-top:5px">On shift since <strong style="color:var(--c-text)">${_m2hm(rec.inMin)}</strong>${rec.flags.includes('late')?' · Late':''}</p></div>`;
    right=actBtn('Clock Out',"App.clockOut()",'primary');
  }else{
    accent='var(--c-success)';
    left=`${tile('approve','var(--c-success-soft)','var(--c-success)')}<div style="min-width:0"><div class="fd" style="font-size:19px;font-weight:800;color:var(--c-success-ink)">Shift complete</div><div style="font-size:13px;color:var(--c-text-2);margin-top:4px">${_m2hm(rec.inMin)} → ${_m2hm(rec.outMin)} · <strong style="color:var(--c-text)">${rec.hours}h</strong>${rec.autoClosed?' '+badge('Auto-closed','warn'):''}${rec.flags.includes('late')?' '+badge('Late in','danger'):''}${rec.flags.includes('early')?' '+badge('Early out','warn'):''}</div></div>`;
    right='';
  }
  return `<div class="ui-card" style="padding:20px 24px;margin-bottom:18px;border-left:4px solid ${accent};display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:18px;min-width:0;flex:1 1 240px">${left}</div>${right}</div>`;
}


/* Month-grid attendance calendar for a user */
function _attCalendar(userId,ym){
  ym=ym||todayISO().slice(0,7);
  const[y,mo]=ym.split('-').map(Number);
  const first=new Date(y,mo-1,1),firstDow=first.getDay();
  const days=new Date(y,mo,0).getDate();
  let cells='';
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const date=ym+'-'+String(d).padStart(2,'0');
    const st=_dayStatus(userId,date);
    const bg=st?(ATT_SOFT[st.status]||'#F6F7F8'):'#F8F9FB';
    const txt=st?(ATT_INK[st.status]||'#7A8395'):'#B6BDC9';
    const isT=date===todayISO();
    const tip=st?(ATT_LABEL[st.status]+(st.note?' — '+st.note:'')+(st.hours?(' ('+st.hours+'h)'):'')):'';
    cells+=`<div onclick="App._attDay('${userId}','${date}')" title="${esc(tip)}" style="aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;cursor:pointer;background:${bg};color:${txt};border:${isT?'2px solid var(--c-ink)':'1px solid transparent'};transition:transform .1s" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='none'">${d}</div>`;
  }
  const monName=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const prevYm=_ymShift(ym,-1),nextYm=_ymShift(ym,1);
  const legend=Object.keys(ATT_COLOR).map(k=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6B7280"><span style="width:10px;height:10px;border-radius:3px;background:${ATT_COLOR[k]}"></span>${ATT_LABEL[k]}</span>`).join('');
  return `<div style="background:#fff;border-radius:20px;border:1px solid #ECEDF0;padding:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="S.filters.attYm='${prevYm}';rr()" style="width:32px;height:32px;border-radius:9px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center"><span style="transform:rotate(180deg)">${ic('chevR','w-4 h-4')}</span></button>
      <div class="fd" style="font-weight:800;font-size:15px">${monName}</div>
      <button onclick="S.filters.attYm='${nextYm}';rr()" style="width:32px;height:32px;border-radius:9px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center">${ic('chevR','w-4 h-4')}</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:10px;font-weight:800;color:#B8B5AC">${d}</div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${cells}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #F3F4F6">${legend}</div>
  </div>`;
}
function _ymShift(ym,n){const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

/* §6 — Day detail modal: clock-in/out, hours, status, flags, notes for one user/day. */
App._attDay=(userId,date)=>{
  // Scope: own day always; others only within attendance scope.
  if(userId!==S.uid&&!(can('attendance','view')&&scopeFilter('attendance')(userId))){toast('Not allowed','err');return;}
  const u=uById(userId);if(!u)return;
  const st=_dayStatus(userId,date);
  const status=st?st.status:'—';
  const col=ATT_COLOR[status]||'#9CA3AF';
  const label=ATT_LABEL[status]||status;
  const rec=st&&!st.virtual?st:null; // a real attendance record (has in/out)
  const row=(k,v)=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F3F4F6"><span style="font-size:12px;font-weight:600;color:#9CA3AF">'+k+'</span><span style="font-size:14px;font-weight:700;color:#15171C">'+v+'</span></div>';
  const flags=(rec&&(rec.flags||[]).length)?(rec.flags||[]).map(f=>'<span style="display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:#FEF2F2;color:#B91C1C;margin-right:4px">'+esc(f)+'</span>').join(''):'';
  let body='';
  if(rec){
    body=row('Clock in',_m2hm(rec.inMin))
      +row('Clock out',_m2hm(rec.outMin))
      +row('Hours worked',rec.hours!=null?rec.hours+'h':'—')
      +(rec.autoClosed?row('Note','<span style="color:#B45309">Auto-closed</span>'):'')
      +(flags?'<div style="padding:10px 0"><div style="font-size:12px;font-weight:600;color:#9CA3AF;margin-bottom:6px">Flags</div>'+flags+'</div>':'')
      +(rec.note?row('Note',esc(rec.note)):'');
  }else if(st){
    body=row('Clock in','—')+row('Clock out','—')+row('Hours worked','—')
      +(st.note?row('Details',esc(st.note)):'');
  }else{
    body='<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:18px">No record for this day.</p>';
  }
  openModal('<div style="padding:20px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    +'<h2 style="font-size:18px;font-weight:800;font-family:var(--font-display)">'+fmtD(date)+'</h2>'
    +'<button onclick="App.closeModal()" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;border:none;background:transparent;cursor:pointer;color:#9CA3AF">'+ic('x')+'</button></div>'
    +'<p style="font-size:12px;color:#9CA3AF;margin-bottom:12px">'+esc(fullName(u))+(userId===S.uid?' (me)':'')+'</p>'
    +'<div style="margin-bottom:12px"><span style="font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;background:'+col+'22;color:'+col+'">'+esc(label)+'</span></div>'
    +body
    +'</div>','max-w-sm');
};

function _isMgrApprover(r){if(r.userId===S.uid)return false;const emp=uById(r.userId);if(!emp)return false;return isAdmin()||emp.managerId===S.uid||_underOn(r.userId,S.uid,r.start);}

/* ════════ DYNAMIC APPROVAL FLOWS (§2) — frontend-only ════════ */
// A flow is an ordered array of stage objects:
//   {id, type:'manager'}                          → the requester's date-aware manager
//   {id, type:'role', role:'hr'}                  → any active HR user (Super Admin excluded from queue but universal approver)
//   {id, type:'user', userId:'<id>'}             → a specific named approver
// Back-compat: old `prof.approvalChain=['manager','hr']` is migrated on read by _normalizeFlow().
function _stageLabel(stage){
  if(!stage)return '';
  if(stage.type==='manager')return 'Manager';
  if(stage.type==='role')return (stage.role==='hr')?'HR':esc(stage.role||'Role');
  if(stage.type==='user'){const u=uById(stage.userId);return u?fullName(u):'Specific person';}
  return '';
}
// Migrate a profile's legacy approvalChain → approvalFlow shape (idempotent, non-mutating return).
function _normalizeFlow(prof){
  if(prof&&Array.isArray(prof.approvalFlow)&&prof.approvalFlow.length)return prof.approvalFlow;
  const chain=(prof&&Array.isArray(prof.approvalChain)&&prof.approvalChain.length)?prof.approvalChain:['manager','hr'];
  return chain.map((s,i)=>s==='manager'?{id:'st'+i,type:'manager'}:{id:'st'+i,type:'role',role:'hr'});
}
// Resolve the active flow for a request: per-leave-type override (lt.approvalFlow) → profile flow.
function _flowFor(req){
  const lt=req&&req.leaveTypeId?ltById(req.leaveTypeId):null;
  if(lt&&Array.isArray(lt.approvalFlow)&&lt.approvalFlow.length)return lt.approvalFlow;
  const emp=req?uById(req.userId):null;
  const prof=DB.hrmConfig?.profiles?.[userProfileId(emp)]||activeProfile();
  return _normalizeFlow(prof);
}
// The stage object for stage N of a request (uses the snapshot stored at submit time when present).
function _reqFlow(req){return (Array.isArray(req.flow)&&req.flow.length)?req.flow:_flowFor(req);}
function _reqStage(req){const f=_reqFlow(req);const i=(req.stageIndex!=null)?req.stageIndex:0;return f[i]||null;}
// Returns a PURE predicate(userId)=>boolean: "is this user a designated approver for `stage` of `req`?"
// (Data-only — used both for notification fan-out and for action gating. Super Admin's universal
//  approver power is applied separately in _canActOn, never baked into this predicate.)
function _stageApprover(req,stageIndexOrStage){
  let stage=stageIndexOrStage;
  if(typeof stageIndexOrStage==='number'){const f=_reqFlow(req);stage=f[stageIndexOrStage]||null;}
  if(!stage)return ()=>false;
  // C1: manager stage = ANY active manager in the requester's upward chain (restores skip-level/ancestor
  //   approval and avoids stranding when the direct manager is inactive/deleted). Mirrors the old
  //   _isMgrApprover (_underOn). Valid approver ⇔ requester is in the approver's subtree on req.start.
  if(stage.type==='manager')return id=>{const a=uById(id);if(!a||a.status!=='Active')return false;return _underOn(req.userId,id,req.start);};
  if(stage.type==='user')return id=>!!stage.userId&&id===stage.userId;
  if(stage.type==='role'&&stage.role==='hr')return id=>!!(uById(id)?.hrm?.isHR)&&uById(id)?.role!=='Admin';
  return ()=>false;
}
// Can the CURRENT user act on the current stage of req? (permission + stage match; Admin universal; never own request)
function _canActOn(req){
  if(req.userId===S.uid)return false; // M7 self-approval guard
  if(isAdmin())return true; // RESOLVED: Super Admin is a universal approver at every stage
  // H2: a user explicitly named/resolved as THIS stage's approver is authorized for this stage by
  //   definition — evaluate the stage predicate BEFORE the global approve permission so a plain
  //   employee picked as a "Specific person" / manager-chain approver can act (only on this stage).
  if(_stageApprover(req,(req.stageIndex!=null?req.stageIndex:0))(S.uid))return true;
  if(!can('leaveRequests','approve'))return false;
  // LV-3: stranded escalation — when a stage has NO active resolvable approver, let an active HR user
  //   clear it too (Super Admin already can via isAdmin above) so the flow can't permanently strand.
  if(me()?.hrm?.isHR&&_stageStranded(req))return true;
  return false;
}
// Classify a pending request's current stage for the two-tab UI: manager-type → 'manager' tab, else → 'hr' tab.
function _stageTab(req){const st=_reqStage(req);return (st&&st.type==='manager')?'manager':'hr';}
// LV-3: a stage is STRANDED when no ACTIVE, non-Super-Admin user can satisfy its approver predicate
//   (role:'hr' with no active HR; user:'<id>' pointing at a missing/inactive user; a manager stage whose
//   whole upward chain is inactive/deleted). Such requests are invisible to everyone except a Super Admin,
//   so we surface them in the HR/Admin queue with a clear "needs admin" label instead of silently stranding.
function _stageStranded(req){
  if(!req||req.status!=='Pending')return false;
  const pred=_stageApprover(req,(req.stageIndex!=null?req.stageIndex:0));
  return !(DB.users||[]).some(x=>x.status==='Active'&&x.role!=='Admin'&&pred(x.id));
}
// Bug 5 (binding decision #5): terminal escalation fallback. When a stage's approver predicate
//   matches ZERO active users, route the request to all active HR users AND all active Admins
//   (never the submitter), set req.needsAdmin so the UI labels it, and notify them. Returns the
//   number of fallback approvers reached — 0 means NOBODY can act (caller hard-toasts the submitter).
function _escalateStranded(req,msg){
  const submitterId=req.userId;
  const fallback=(DB.users||[]).filter(x=>x.status==='Active'&&x.id!==submitterId&&(x.role==='Admin'||x.hrm?.isHR===true));
  if(fallback.length){
    req.needsAdmin=true;
    if(_hnp('inapp_hrm_leave_submitted'))fallback.forEach(a=>_hrmNotify(a.id,msg,'leave'));
    // C3: email HR/Admin the escalation with structured detail (gated by the approval-routing email toggle).
    if(_hnpEmail('email_hrm_leave_submitted')){const _emp=uById(submitterId),_lt=ltById(req.leaveTypeId);fallback.forEach(a=>queueEmail('hrm_leave_escalated',a.id,null,req.start,{user_name:fullName(_emp),leave_type:_lt?_lt.name:'leave',start_date:fmtD(req.start),end_date:fmtD(req.end),working_days:req.workingDays+(req.workingDays===1?' day':' days')}));}
  }
  return fallback.length;
}

// ── B3: UNIFIED APPROVALS INBOX (Approach B = view layer) ─────────────────────────────
// Read-only adapter: reads pending/decided items from each EXISTING approval source and
// normalises them to a common shape. Decisions still route back to the NATIVE handlers
// (decideLeave / _decideApprove / _decideReject) so all reservation/notify/escalation
// logic is preserved. NO table migration. Scope mirrors each source's own visibility, so
// the inbox never widens what the user can already see/act on.
// Normalised item: {id,type,requestedBy,assignedTo,subject,payload,status,decidedBy,
//   decidedAt,location,dept,_src:{coll,id}}  where type ∈ leave|submission|edit|document|
//   onboarding. (document/onboarding are wired-but-empty until those flows are built.)
function _approvalInbox(){
  const items=[];
  // (a) LEAVE — same gate the leave manager/HR tabs use (_canActOn, plus stranded for HR/Admin).
  const _canSeeStranded=isAdmin()||(can('leaveRequests','approve')&&!!me()?.hrm?.isHR);
  (DB.leaveRequests||[]).forEach(r=>{
    const pending=r.status==='Pending';
    const actionable=_canActOn(r)||(_canSeeStranded&&_stageStranded(r)&&r.userId!==S.uid);
    // Decided rows: surface the ones this user decided (mgr/hr decision recorded) or, for
    // elevated users, the ones in their scope — keep it conservative: only show decided
    // leave the actor could have acted on (same predicate, status relaxed).
    if(pending){if(!actionable)return;}
    else{ if(!(isAdmin()||((can('leaveRequests','approve'))&&me()?.hrm?.isHR)||(r.mgrAt&&_stageApprover(r,0)(S.uid)) ))return; }
    const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);
    items.push({
      id:'lv-'+r.id, type:'leave', requestedBy:r.userId, assignedTo:null,
      subject:(lt?lt.name:'Leave')+' · '+fmtD(r.start)+'→'+fmtD(r.end)+' ('+r.workingDays+'d)',
      payload:r, status:r.status, decidedBy:null,
      decidedAt:(r.hrAt||r.mgrAt||null),
      location:emp?.location||'', dept:emp?.department||'',
      _src:{coll:'leaveRequests',id:r.id}
    });
  });
  // (b) SUBMISSION + EDIT approvals — same scope as approvalsPage (3661): admin sees all,
  //     others see their subTree + own.
  const _apprScope=isAdmin()?(DB.approvals||[]):(DB.approvals||[]).filter(a=>subTree(S.uid).some(u=>u.id===a.requesterId)||a.requesterId===S.uid);
  _apprScope.forEach(a=>{
    const u=uById(a.requesterId);if(!u)return;
    const c=clById(a.checklistId);
    const isEdit=a.type==='Edit Request';
    // Normalise the native statuses: 'Used' (resubmitted edit) reads as Approved for filtering.
    const st=a.status==='Used'?'Approved':a.status;
    items.push({
      id:'ap-'+a.id, type:isEdit?'edit':'submission', requestedBy:a.requesterId, assignedTo:u.managerId||null,
      subject:(c?.name||'Checklist')+(a.date?' · '+fmtD(a.date):''),
      payload:a, status:st, decidedBy:null, decidedAt:null,
      location:u.location||'', dept:u.department||'',
      _src:{coll:'approvals',id:a.id}
    });
  });
  // (c) DOCUMENT approvals — only flagged org docs (approvalStatus set) enter the inbox. Pending
  //     rows are visible to org-doc approvers (not the uploader); decided rows surface to the same
  //     pool plus the uploader (read-only). Legacy docs (approvalStatus null) never appear.
  const _canApprDoc=can('documentsOrg','approve');
  (DB.documents||[]).forEach(d=>{
    if(!d.approvalStatus)return; // legacy / no-approval docs
    const up=uById(d.uploadedBy);
    const st=d.approvalStatus==='approved'?'Approved':d.approvalStatus==='rejected'?'Rejected':'Pending';
    const isApprover=_canApprDoc&&d.uploadedBy!==S.uid;
    if(st==='Pending'){if(!isApprover)return;}            // pending → approvers only
    else{if(!isApprover&&d.uploadedBy!==S.uid)return;}     // decided → approver pool + the uploader
    items.push({
      id:'doc-'+d.id, type:'document', requestedBy:d.uploadedBy, assignedTo:d.approverId||null,
      subject:d.name+' · '+(up?fullName(up):(d.uploaderName||'Unknown')),
      payload:{...d,createdAt:d.uploadedAt}, status:st,
      decidedBy:d.decidedBy||null, decidedAt:d.decidedAt||null,
      location:up?.hrm?.locationId||'', dept:up?.department||'',
      _src:{coll:'documents',id:d.id}
    });
  });
  // (e) OVERTIME — pending entries for people in my overtime scope (approve = pay by default;
  //     open the Overtime page for the time-in-lieu option).
  if(can('overtime','approve')){
    const fOT=scopeFilter('overtime');
    (DB.overtime||[]).forEach(o=>{
      if(o.userId===S.uid)return;
      const st=o.status==='Approved'?'Approved':o.status==='Rejected'?'Rejected':'Pending';
      if(st==='Pending'&&!fOT(o.userId))return;
      if(st!=='Pending'&&o.decidedBy!==S.uid&&!fOT(o.userId))return;
      const u=uById(o.userId);
      items.push({id:'ot-'+o.id,type:'overtime',requestedBy:o.userId,assignedTo:null,
        subject:(u?fullName(u):'—')+' · '+o.hours+'h on '+fmtS(o.date),

// B1: resolve the DISPLAY NAMES of the active users who can approve stage `i` of `req` (reuses the
//   same _stageApprover predicate so the names can never drift from who can actually act). Excludes the
//   requester and inactive/Super-Admin users; returns a short, human label like "Priya" / "HR team".
function _stageApproverNames(req,i){
  const f=_reqFlow(req);const stage=f[i]||null;if(!stage)return '';
  if(stage.type==='user'){const u=uById(stage.userId);return u?fullName(u):'(unassigned)';}
  const pred=_stageApprover(req,i);
  const names=(DB.users||[]).filter(x=>x.status==='Active'&&x.role!=='Admin'&&x.id!==req.userId&&pred(x.id)).map(fullName);
  if(!names.length)return stage.type==='role'?'HR team':'(no approver)';

// B1: compact approval-progress strip shown to the APPLICANT on their own leave card. Walks the request's
//   snapshot flow and classifies each stage as done / current / upcoming / rejected, naming the approver(s).
function _leaveChainView(r){
  const flow=_reqFlow(r);if(!Array.isArray(flow)||!flow.length)return '';
  const curIdx=(r.stageIndex!=null?r.stageIndex:0);
  const rejected=r.status==='Rejected', approved=r.status==='Approved';
  const rows=flow.map((stage,i)=>{
    const label=_stageLabel(stage)||'Stage';
    let state,icon,col,note='';
    if(rejected&&i===curIdx){state='rejected';icon=ic('x','w-3.5 h-3.5');col='#DC2626';}
    else if(approved||i<curIdx){state='done';icon=ic('check','w-3.5 h-3.5');col='#059669';}
    else if(i===curIdx&&r.status==='Pending'){state='current';icon='●';col='#D97706';}
    else{state='upcoming';icon='○';col='#9CA3AF';}
    // Per-stage note (manager note on the manager-type stage, HR note otherwise) for done/rejected stages.
    const sNote=(stage.type==='manager')?r.mgrNote:r.hrNote;
    if((state==='done'||state==='rejected')&&sNote)note=`<div style="font-size:11px;color:#6B7280;margin-top:1px">“${esc(sNote)}”</div>`;
    const names=_stageApproverNames(r,i);
    const suffix=state==='current'?` — pending on ${esc(names)}`
      :state==='upcoming'?` — upcoming${r.needsAdmin&&i===curIdx?'':''}`
      :state==='rejected'?` — rejected`
      :` — approved`;
    return `<div style="display:flex;gap:8px;align-items:flex-start;padding:3px 0">
      <span style="color:${col};font-weight:800;line-height:1.5;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:16px;height:21px">${icon}</span>
      <div style="min-width:0"><span style="font-size:12px;font-weight:700;color:#374151">Stage ${i+1} · ${esc(label)}${names&&state!=='current'?` (${esc(names)})`:''}</span><span style="font-size:12px;color:${col};font-weight:600">${suffix}</span>${note}</div>
    </div>`;
  }).join('');
  // Escalation banner: a pending request with no resolvable approver was routed to HR/Admins.
  const escal=(r.status==='Pending'&&r.needsAdmin)?`<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#B45309;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:5px 8px;margin-top:6px">${ic('alert','w-3.5 h-3.5')}Escalated to HR / Admin — no designated approver for this stage.</div>`:'';
  // Final summary line.
  let fin='';
  if(approved){const last=flow[flow.length-1];const who=_stageApproverNames(r,flow.length-1);const at=r.hrAt||r.mgrAt;
    fin=`<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#059669;margin-top:6px">${ic('check','w-3.5 h-3.5')}Approved${who?(' by '+esc(who)):''}${at?(' on '+fmtD(at.slice(0,10))):''}</div>`;}
  else if(rejected){const who=_stageApproverNames(r,curIdx);const at=r.hrAt||r.mgrAt;
    fin=`<div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#DC2626;margin-top:6px">${ic('x','w-3.5 h-3.5')}Rejected${who?(' by '+esc(who)):''}${at?(' on '+fmtD(at.slice(0,10))):''}</div>`;}
  return `<div style="margin-top:8px;border-top:1px solid #F3F4F6;padding-top:8px">${rows}${escal}${fin}</div>`;
}

App.applyLeave=()=>{
  const u=me();const prof=userProfileId(u);
  // §3a: comp-off is HR-controlled (granted/removed by HR only) — never employee-applicable.
  const types=_typesFor(prof).filter(t=>t.enabled).filter(t=>!_isCompOffLt(t)).filter(t=>!t.birthdayMonthOnly||u.hrm?.dob);

  // Bug 4 (binding decision #2): the leave START date must be TODAY — no backdating, no future

    const hb=$('#lv-half');if(hb&&!halfOk&&hb.classList.contains('on')){hb.classList.remove('on');hb.classList.add('off');hb.setAttribute('aria-checked','false');}
    const half=halfOk&&togV('lv-half');

    if(!start||!end||end<start){$('#lv-preview').textContent='Select a valid date range.';return;}
    const wd=_workingDaysBetween(u.id,start,end,half&&start===end);
    const b=_balanceReadonly(u.id,tId,_leaveYearOf(u,start));const rem=_balRemaining(b);

App.submitLeave=()=>{
  const u=me();const tId=$('#lv-type')?.value;const lt=ltById(tId);if(!lt){toast('Pick a type','err');return;}
  if(_isCompOffLt(lt)){toast('Comp-off is granted by HR and cannot be applied for','err');return;} // §3a defense-in-depth
  const start=$('#lv-start')?.value,end=$('#lv-end')?.value;const half=togV('lv-half');const reason=($('#lv-reason')?.value||'').trim();
  if(!start||!end||end<start){toast('Invalid date range','err');return;}
  // Bug 4 (binding decision #2): leave START must be today — block backdated and future starts.
  //   Multi-day leave starting today is still allowed (end >= start, enforced above).
  const _today=todayISO();
  if(start<_today){toast('You cannot apply for leave that started in the past','err');return;}
  if(start>_today){toast('Leave must start today — future start dates are not allowed','err');return;}
  // O8: a leave longer than the attendance/working-day guard (400 days) would write only partially.
  if(_isoAdd(start,400)<=end){toast('Leave range is too long — please split it into shorter requests','err');return;}
  if(lt.birthdayMonthOnly&&!_birthdayOk(u,start)){toast('Birthday leave only valid in your birthday month','err');return;}
  // M1: half-day applies to a single date only — never silently drop the toggle on a range.
  if(half&&start!==end){toast('Half-day only for a single date','err');return;}
  // M6: enforce HR's per-type half-day toggle — reject a half-day on a type HR marked half-day-disallowed.
  if(half&&lt.halfDayAllowed===false){toast('Half-day is not allowed for '+lt.name,'err');return;}
  const halfDay=half&&start===end;
  // M4: a range that crosses a leave-year boundary mis-allocates the balance charge → reject with a clear message.
  if(_leaveYearOf(u,start)!==_leaveYearOf(u,end)){toast('Leave cannot span two leave-years — split into separate requests','err');return;}
  const wd=_workingDaysBetween(u.id,start,end,halfDay);
  if(wd<=0){toast('Selected range has no working days','err');return;}
  // M6: block overlap with any existing non-Rejected request for the same user.
  if((DB.leaveRequests||[]).some(r=>r.userId===u.id&&r.status!=='Rejected'&&r.status!=='Cancelled'&&!(r.end<start||r.start>end))){toast('You already have a leave request overlapping these dates','err');return;}
  // LV-1: "unpaid" is an explicit TYPE property (lt.unpaid===true), NOT the presence of an unpaid PAY-TIER.
  //   paidTiers.unpaid describes a pay tier within an otherwise-tracked entitlement (e.g. sick 15/30/45),
  //   so keying off it made every sick request bypass the ledger. Only genuinely-unpaid types skip the balance.
  const isUnpaid=lt.unpaid===true||lt.key==='hajj';
  // M2: use the READ-ONLY balance for the sufficiency check so no orphan DB.leaveBalances row is
  //   persisted when a later validation (oncePerEmployment / no-approver) aborts. The row is only
  //   materialized via _balanceFor right before the reservation, after ALL validation passes.
  const bRO=_balanceReadonly(u.id,tId,_leaveYearOf(u,start));
  if(wd>_balRemaining(bRO)&&!isUnpaid){toast('Not enough balance ('+_balRemaining(bRO)+' remaining)','err');return;}
  // M6: enforce HR's per-year cap for this type. used+pending+this request must not exceed maxPerYear.
  if(lt.maxPerYear!=null&&((bRO.used||0)+(bRO.pending||0)+wd>lt.maxPerYear)){
    toast(lt.name+' is capped at '+lt.maxPerYear+' day'+(lt.maxPerYear===1?'':'s')+' per year','err');return;}
  // M5: once-per-employment keyed on the semantic leave key (e.g. 'hajj'), not a single type-row id.
  if(lt.oncePerEmployment&&(DB.leaveRequests||[]).some(r=>{const rl=ltById(r.leaveTypeId);return r.userId===u.id&&r.status!=='Rejected'&&r.status!=='Cancelled'&&rl&&rl.key===lt.key;})){toast('This leave can only be taken once per employment','err');return;}
  // §2: snapshot the active flow at submit so later edits to the flow can't strand in-flight requests.
  const flow=_flowFor({userId:u.id,leaveTypeId:tId,start});
  const firstStage=flow[0]||{type:'manager'};
  // DATA-2: persist the resolved leave-year ON the request so the SAME balance row is always
  // touched across the request's lifecycle, even if joiningDate / leaveYearBasis changes later.
  const reqLeaveYear=_leaveYearOf(u,start);
  const req={id:uid('lv'),userId:u.id,leaveTypeId:tId,leaveYear:reqLeaveYear,start,end,halfDay,halfDaySession:null,workingDays:wd,reason,unpaid:isUnpaid,
    flow,stageIndex:0,stage:firstStage.type, // `stage` kept (=stage type) for UI/data back-compat
    status:'Pending',needsAdmin:false,mgrDecision:null,mgrNote:'',mgrAt:null,hrDecision:null,hrNote:'',hrAt:null,createdAt:new Date().toISOString()};
  // Bug 5 (binding decision #5): does ANY active user (other than the submitter) approve the first stage?
  const pred=_stageApprover(req,0);
  const directApprovers=DB.users.filter(x=>x.status==='Active'&&x.id!==u.id&&pred(x.id));
  if(!directApprovers.length){
    // No designated approver for the opening stage → escalate to HR + Admins (terminal fallback).
    const reached=_escalateStranded(req,'⚠️ '+fullName(u)+'\'s '+lt.name+' ('+fmtD(start)+'→'+fmtD(end)+') has no approver for its first stage — please review.');
    if(!reached){
      // Nobody at all can act — refuse to strand the request silently.
      toast('No approver configured — contact admin','err');return;
    }
  }
  DB.leaveRequests.unshift(req);
  // M2: NOW all validation has passed — materialize the persisted balance row and place the reservation.
  if(!isUnpaid){const b=_balanceFor(u.id,tId,reqLeaveYear);b.pending=_r2((b.pending||0)+wd);} // unpaid types never touch the ledger
  hlog('Leave requested',fullName(u)+': '+lt.name+' '+start+'→'+end+' ('+wd+'d)');
  saveDB();closeModal();toast('Leave request submitted');
  // notify the first stage's approver(s) resolved via _stageApprover (gated by §4 in-app toggle)
  if(_hnp('inapp_hrm_leave_submitted'))directApprovers.forEach(a=>_hrmNotify(a.id,'📝 '+fullName(u)+' requested '+lt.name+' ('+fmtD(start)+'→'+fmtD(end)+') — your approval needed','leave'));
  // C3: email the APPROVER(s) (not the requester) with the full structured leave detail.
  if(_hnpEmail('email_hrm_leave_submitted'))directApprovers.forEach(a=>queueEmail('hrm_leave_submitted',a.id,null,start,{approver_name:fullName(a),user_name:fullName(u),leave_type:lt.name,start_date:fmtD(start),end_date:fmtD(end),working_days:wd+(wd===1?' day':' days')+(halfDay?' (half-day)':''),reason:reason||'—'}));
  rr();
};
App.cancelLeave=(id)=>{
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);if(!r||r.userId!==S.uid||r.status!=='Pending')return;
  // DATA-2: release against the SAME balance row the reservation was placed on (persisted at submit).
  if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(uById(r.userId),r.start));
    b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));}

};

App.decideLeave=(id,action,expectedStageIndex)=>{
  // LV-4: re-read the request and verify it is still Pending AT THE STAGE the click was rendered for.
  //   A fast double-click (or an approver valid for consecutive stages) must NOT skip a stage: each call
  //   advances exactly one stage and is a no-op once the request has already advanced/finalized.
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);
  if(!r){toast('Request not found','err');return;}
  if(r.status!=='Pending'){toast('This request was already '+(r.status==='Approved'?'approved':r.status==='Rejected'?'decided':'finalized'),'warn');return;}
  const curIdx=(r.stageIndex!=null?r.stageIndex:0);
  if(expectedStageIndex!=null&&Number(expectedStageIndex)!==curIdx){toast('This request already moved to the next stage — refreshing','warn');rr();return;}
  if(r.userId===S.uid){toast('You cannot approve your own leave request','err');return;} // M7
  if(!_canActOn(r)){toast('You are not the approver for this stage','err');return;}
  const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);
  // C1: requester deleted (tombstone, no cascade) → abort cleanly BEFORE any decision field is set.
  if(!emp){toast('Employee no longer exists','err');return;}
  if(action==='reject'){
    modalShell({title:'Reject leave',size:'max-w-md',
      body:`<textarea id="lv-rnote" rows="3" class="ui-input rf" placeholder="Reason for rejection (sent to employee)"></textarea>`,
      footer:btnG('Cancel','App.closeModal()')+btnDanger('Reject',`App._doReject('${id}',${curIdx})`)});
    return;
  }
  // approve — §2: advance through the snapshot flow by stageIndex
  const flow=_reqFlow(r);const si=(r.stageIndex!=null?r.stageIndex:0);const curStage=flow[si];
  const nextStage=flow[si+1];
  // Keep legacy mgr/hr decision fields populated for back-compat display.
  if(curStage&&curStage.type==='manager'){r.mgrDecision='Approved';r.mgrAt=new Date().toISOString();}
  else{r.hrDecision='Approved';r.hrAt=new Date().toISOString();}
  if(nextStage){
    r.stageIndex=si+1;r.stage=nextStage.type;
    hlog('Leave approved (stage '+(si+1)+': '+_stageLabel(curStage)+')',fullName(emp)+': '+(lt?lt.name:''));
    const pred=_stageApprover(r,si+1);
    const nextApprovers=DB.users.filter(x=>x.status==='Active'&&x.id!==emp.id&&pred(x.id));
    // Bug 5 (binding decision #5): if the NEXT stage has no designated approver, escalate to HR +
    //   Admins (terminal fallback) instead of stranding the request unseen.
    if(!nextApprovers.length){
      _escalateStranded(r,'⚠️ '+fullName(emp)+'\'s '+(lt?lt.name:'leave')+' reached a stage with no approver — please review.');
    }else{r.needsAdmin=false;}
    // next-stage approvers = same "approval needed" event as submission (gated by §4)
    if(_hnp('inapp_hrm_leave_submitted'))nextApprovers.forEach(a=>_hrmNotify(a.id,'📝 '+fullName(emp)+'\'s '+(lt?lt.name:'leave')+' needs your approval (stage '+(si+2)+')','leave'));
    // C3: email the NEXT-stage approver(s) with structured detail (mirrors submit-stage email).
    if(_hnpEmail('email_hrm_leave_submitted'))nextApprovers.forEach(a=>queueEmail('hrm_leave_submitted',a.id,null,r.start,{approver_name:fullName(a),user_name:fullName(emp),leave_type:lt?lt.name:'leave',start_date:fmtD(r.start),end_date:fmtD(r.end),working_days:r.workingDays+(r.workingDays===1?' day':' days'),reason:r.reason||'—'}));
    _hrmNotify(emp.id,'✓ Your '+(lt?lt.name:'leave')+' passed '+_stageLabel(curStage)+' — pending '+_stageLabel(nextStage)+'.','leave'); // progress note (informational)
  }else{
    r.stage='done';r.status='Approved';
    // DATA-2: touch the SAME balance row the reservation was placed on (persisted at submit).
    if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(emp,r.start)); // C1: r.leaveYear persisted at submit, no emp deref needed
      b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));
      b.used=_r2((b.used||0)+r.workingDays);}
    _writeLeaveAttendance(r); // mark attendance Leave/HalfDay (history written for unpaid too)
    hlog('Leave approved',fullName(emp)+': '+(lt?lt.name:''));
    if(_hnp('inapp_hrm_leave_approved'))_hrmNotify(emp.id,'✅ Your '+(lt?lt.name:'leave')+' ('+fmtD(r.start)+'→'+fmtD(r.end)+') was approved.','leave');
    // C3: email the employee with structured detail incl. approver + remaining balance.
    if(_hnpEmail('email_hrm_leave_approved')){const _bal=r.unpaid?'—':(_balRemaining(_balanceReadonly(emp.id,r.leaveTypeId,r.leaveYear||_leaveYearOf(emp,r.start)))+' day(s)');queueEmail('hrm_leave_approved',emp.id,null,r.start,{user_name:fullName(emp),leave_type:lt?lt.name:'leave',start_date:fmtD(r.start),end_date:fmtD(r.end),working_days:r.workingDays+(r.workingDays===1?' day':' days'),approver_name:fullName(me()),balance:_bal});}
  }
  saveDB();toast('Approved');rr();
};
App._doReject=(id,expectedStageIndex)=>{
  // LV-4: idempotent reject — re-read, confirm still Pending at the rendered stage.
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);
  if(!r){toast('Request not found','err');return;}
  if(r.status!=='Pending'){toast('This request was already decided','warn');closeModal();rr();return;}
  const curIdx=(r.stageIndex!=null?r.stageIndex:0);
  if(expectedStageIndex!=null&&Number(expectedStageIndex)!==curIdx){toast('This request already moved to the next stage — refreshing','warn');closeModal();rr();return;}
  if(r.userId===S.uid){toast('You cannot decide your own leave request','err');return;} // M7
  if(!_canActOn(r)){toast('You are not the approver for this stage','err');return;}
  const note=($('#lv-rnote')?.value||'').trim();const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);
  // C1: requester deleted → abort cleanly BEFORE any decision field is set.
  if(!emp){toast('Employee no longer exists','err');closeModal();return;}
  // §2: reject at ANY stage stops the flow and releases the reservation (unpaid-skip below unchanged).
  const curStage=_reqStage(r);
  if(curStage&&curStage.type==='manager'){r.mgrDecision='Rejected';r.mgrNote=note;r.mgrAt=new Date().toISOString();}
  else{r.hrDecision='Rejected';r.hrNote=note;r.hrAt=new Date().toISOString();}
  r.status='Rejected';
  // DATA-2: release against the SAME balance row the reservation was placed on (persisted at submit).
  if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(emp,r.start));
    b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));} // release reservation (skip for unpaid)
  hlog('Leave rejected',fullName(emp)+': '+(lt?lt.name:'')+(note?(' — '+note):''));
  if(_hnp('inapp_hrm_leave_rejected'))_hrmNotify(emp.id,'❌ Your '+(lt?lt.name:'leave')+' was rejected'+(note?': '+note:'.'),'leave');
  // C3: email the employee with structured detail incl. approver + rejection reason.
  if(_hnpEmail('email_hrm_leave_rejected'))queueEmail('hrm_leave_rejected',emp.id,null,r.start,{user_name:fullName(emp),leave_type:lt?lt.name:'leave',start_date:fmtD(r.start),end_date:fmtD(r.end),approver_name:fullName(me()),reason:note||'No reason provided'});
  saveDB();closeModal();toast('Rejected');rr();
};
function _writeLeaveAttendance(r){
  let d=r.start,guard=0;
  while(d<=r.end&&guard++<400){
    const u=uById(r.userId);const off=new Set(u.hrm?.schedule?.offDays||[]);
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    const prof=userProfileId(u);const isHol=(DB.holidays||[]).some(h=>h.profileId===prof&&h.date===d);
    if(!off.has(dow)&&!isHol){
      let rec=attFor(r.userId,d);
      if(!rec){
        // No prior record → write a pure leave day.
        rec={id:_attId(r.userId,d),userId:r.userId,date:d,clockIn:null,clockOut:null,inMin:null,outMin:null,hours:null,status:r.halfDay?'HalfDay':'Leave',leaveType:r.leaveTypeId,flags:[],inGeo:null,autoClosed:false,note:'',createdAt:new Date().toISOString()}; // M5: deterministic id
        DB.attendance.push(rec);
      }else if(rec.clockIn||rec.inMin!=null||(rec.hours||0)>0){
        // M2: the employee already WORKED this day. Don't blow away worked hours.
        rec.leaveType=r.leaveTypeId;
        const fl=new Set(rec.flags||[]);
        if(r.halfDay){
          // Half-day leave on a worked day → keep hours, mark HalfDay + which session is leave.
          rec.status='HalfDay';rec.halfDaySession=rec.halfDaySession||'PM';fl.add('half-day-worked');
        }else{
          // Full-day leave on an already-worked day → keep the worked record (Present + hours),
          // just tag the overlap. Payroll excludes this date from leavesTaken (see _leaveDaysInRange).
          fl.add('leave-overlap');
        }
        rec.flags=[...fl];
      }else{
        // Existing non-worked record (e.g. a previously-written leave/off day) → set leave status.
        rec.status=r.halfDay?'HalfDay':'Leave';rec.leaveType=r.leaveTypeId;
      }
    }
    d=_isoAdd(d,1);
  }
}
/* L5/M2: working leave-days for `r` that fall inside [d1,d2] AND were not already worked.
   Clips to the overlap window and excludes full-day-on-worked overlaps from the payroll leave count. */
function _leaveDaysInRange(r,d1,d2){
  const u=uById(r.userId);if(!u)return 0;
  const off=new Set(u.hrm?.schedule?.offDays||[]);const prof=userProfileId(u);
  const hols=new Set((DB.holidays||[]).filter(h=>h.profileId===prof).map(h=>h.date));
  let d=r.start>d1?r.start:d1;const end=r.end<d2?r.end:d2;let n=0,guard=0;
  while(d<=end&&guard++<400){
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    if(!off.has(dow)&&!hols.has(d)){
      const rec=attFor(r.userId,d);
      const worked=rec&&(rec.clockIn||rec.inMin!=null||(rec.hours||0)>0);
      if(r.halfDay)n+=0.5; // half-day always counts 0.5 (hours kept separately)
      else if(!worked)n+=1; // full-day leave on a worked day is NOT counted (no double pay)
    }
    d=_isoAdd(d,1);
  }
  return _r2(n);
}

/* ════════ §3b — BULK LEAVE-BALANCE EDITOR (HR Config tab, gated by leaveBalances.edit) ════════
   Inline-editable table (employees × leave types) writing DB.leaveBalances via _balanceFor; adjusts
   `entitled` (manual grant) — consistent with the M3 fix — never `accrued`. Plus a multi-select
   "adjust together" mode applying a +/- delta with a reason. All changes audit-logged. Super Admins
   excluded. Comp-off is intentionally NOT a bulk-editable column (it lives in its own ledger). */
// People in scope for balance management: scoped users minus Super Admins, with dept/loc/profile filters.
function _balScopeUsers(){
  const f=S.filters;
  let list=scopedUsers('leaveBalances').filter(u=>u.role!=='Admin'&&u.status!=='Inactive');
  if(f.cfgBalDept)list=list.filter(u=>u.department===f.cfgBalDept);
  if(f.cfgBalLoc)list=list.filter(u=>(u.hrm?.locationId||'')===f.cfgBalLoc);
  if(f.cfgBalQ){const q=f.cfgBalQ.toLowerCase();list=list.filter(u=>fullName(u).toLowerCase().includes(q)||(u.department||'').toLowerCase().includes(q));}
  return list.sort((a,b)=>fullName(a).localeCompare(fullName(b)));
}
// A3 (cause 1): the bulk-balance filter bar's change/search handlers call rr(), which re-renders the
//   table from DB and would WIPE any un-flushed inline cell edits. Flush first so manual edits survive

  });

//   (the change would otherwise vanish on reload). Mirrors the targeted savers at 3201/3738.
function _bulkBalTargetedSave(){

App._acAssignRole=(uid2,roleId)=>{
  if(!can('accessControl','manage'))return toast('You need Access Control → Manage','err');
  const u=uById(uid2);if(!u||!roleId||!DB.roleProfiles[roleId])return;
  _ensureHrm(u);
  const old=u.hrm.roleProfileId;
  if(old===roleId)return;
  // lockout: if the OLD standing granted AC and the new role doesn't, someone else must still hold it
  const newGrants=a=>!!(DB.roleProfiles[roleId].perms?.accessControl?.actions?.[a])||!!(u.hrm.perms?.accessControl?.actions?.[a]);
  for(const act of ['view','manage']){
    if(canUser(u,'accessControl',act)&&!newGrants(act)&&!_acLockoutSafe(u.id,act)){rr();return toast('Blocked — '+fullName(u)+' is the last person with Access Control ('+act+')','err');}
  }
  u.hrm.roleProfileId=roleId;u.hrm.permsV3=1;
  // ONE role: derive the legacy base-role field from the access role so nothing is set twice.
  const baseRole=roleId==='superadmin'?'Admin':roleId==='admin'?'SubAdmin':'User';
  if(u.role!==baseRole){u.role=baseRole;sb.from('profiles').update({role:baseRole}).eq('id',u.id).then(()=>{}).catch(()=>{});}
  u.hrm.isHR=(roleId==='hr'); // ONE concept: the HR role IS the HR approver stage
  log(fullName(me()),'Role assigned',fullName(u)+' → '+(DB.roleProfiles[roleId].name||roleId));
  saveDB();_syncRoleProfiles();toast(fullName(u)+' → '+(DB.roleProfiles[roleId].name||roleId));rr();
};

App._rpSave=()=>{

  const p=_RPD;if(!p)return;

  const ex=DB.roleProfiles[p.id];
