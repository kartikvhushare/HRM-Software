App.login=async()=>{
  const email=($('#li-e')?.value||'').trim().toLowerCase();
  const pw=($('#li-p')?.value||'').trim();
  if(!email||!pw){toast('Enter your email and password','err');return;}
  const btn=document.querySelector('button[onclick="App.login()"]');
  if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error)throw error;
    // Render from cache immediately so UI appears fast
    const cachedUser=DB.users.find(x=>(x.email||'').toLowerCase()===email);
    if(cachedUser&&cachedUser.status==='Active'){
      S.uid=cachedUser.id;
      S.route='dashboard'; // W2.1: dashboard is now role-aware (admin→adminDash, mgr→mgrDash, employee→homeDash)
      render(); // show page instantly
    }
    // Load fresh profile in background
    const{data:profile}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
    if(!profile){await sb.auth.signOut();S.uid=null;render();throw new Error('Profile not found');}
    if(profile.status==='Inactive'){await sb.auth.signOut();S.uid=null;render();throw new Error('Account inactive — contact admin');}
    const u={id:profile.id,firstName:_unesc(profile.first_name)||'',lastName:_unesc(profile.last_name)||'',email:profile.email||'',phone:_unesc(profile.phone)||'',position:_unesc(profile.position)||'',department:_unesc(profile.department)||'',role:profile.role||'User',status:profile.status,managerId:profile.manager_id||null,managerHistory:profile.manager_history||[],rules:profile.rules||{past:true,future:true,edit:true},approval:profile.approval_settings||{past:false,future:false,edited:false},docAccess:profile.doc_access||{departments:{},locations:{}},questionsAccess:profile.questions_access||false,emailEnabled:profile.email_enabled!==false,cities:Array.isArray(profile.cities)?profile.cities:[],password:'***'};
    const idx=DB.users.findIndex(x=>x.id===u.id);
    if(idx>-1)DB.users[idx]=u;else DB.users.push(u);
    S.uid=u.id;
    if(!S.route||S.route==='login')S.route='dashboard'; // W2.1: role-aware home
    saveDB();render();
    // Load full data in background — don't block UI
    loadFromSB().then(()=>{saveDB();if(Date.now()-_lastUserAction>3000)render();}).catch(()=>{});
  }catch(err){
    const em=(err&&err.message)||'Sign in failed';
    const msg=em.includes('Invalid')||em.includes('credentials')||em.includes('invalid_grant')
      ?'Incorrect email or password':em;
    toast(msg,'err');
    // The original button may have been replaced by a render() in the cached fast-path,
    // so re-query before re-enabling rather than touching a detached node.
    const b=document.querySelector('button[onclick="App.login()"]')||btn;
    if(b){b.disabled=false;b.textContent='Sign in';}
  }
};

/* ===== DASHBOARD HELPERS: date range filter + tickets panel ===== */
const DASH_RANGES=[['all','All time'],['today','Today'],['yesterday','Yesterday'],['cweek','Current week'],['lweek','Last week'],['cmonth','Current month'],['lmonth','Last month'],['custom','Custom range']];
function _dashRangeBounds(){
  const r=S.filters.dashRange||'all';
  const today=todayISO();
  const t=new Date(today+'T00:00:00');
  const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(r==='today')return{from:today,to:today};
  if(r==='yesterday'){const d=new Date(t);d.setDate(d.getDate()-1);const y=iso(d);return{from:y,to:y};}
  if(r==='cweek'){const d=new Date(t);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));return{from:iso(d),to:today};}
  if(r==='lweek'){const d=new Date(t);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow)-7);const e=new Date(d);e.setDate(e.getDate()+6);return{from:iso(d),to:iso(e)};}
  if(r==='cmonth'){return{from:iso(new Date(t.getFullYear(),t.getMonth(),1)),to:today};}
  if(r==='lmonth'){return{from:iso(new Date(t.getFullYear(),t.getMonth()-1,1)),to:iso(new Date(t.getFullYear(),t.getMonth(),0))};}
  if(r==='custom'){
    const f=S.filters.dashFrom||'',e=S.filters.dashTo||'';
    if(!f&&!e)return null;
    return{from:f||'0000-01-01',to:e||'9999-12-31'};
  }
  return null; // 'all'
}
const _inDashRange=date=>{const b=_dashRangeBounds();if(!b)return true;return !!date&&date>=b.from&&date<=b.to;};
function _dashFilterBar(){
  const r=S.filters.dashRange||'all';
  const b=_dashRangeBounds();
  return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:#fff;border-radius:14px;border:1.5px solid #ECEDF0">
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em">${ic('calendar','w-4 h-4')}Date range</span>
    <select onchange="S.filters.dashRange=this.value;rr()" style="background:#fff;border:1.5px solid #E5E7EB;border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600;outline:none;cursor:pointer">
      ${DASH_RANGES.map(([id,lbl])=>`<option value="${id}" ${r===id?'selected':''}>${lbl}</option>`).join('')}
    </select>
    ${r==='custom'?`
      <input type="date" value="${esc(S.filters.dashFrom||'')}" onchange="S.filters.dashFrom=this.value;rr()" style="border:1.5px solid #E5E7EB;border-radius:9px;padding:5px 8px;font-size:13px;outline:none"/>
      <span style="font-size:12px;color:#9CA3AF">to</span>
      <input type="date" value="${esc(S.filters.dashTo||'')}" onchange="S.filters.dashTo=this.value;rr()" style="border:1.5px solid #E5E7EB;border-radius:9px;padding:5px 8px;font-size:13px;outline:none"/>
    `:''}
    ${b?`<span style="font-size:12px;color:#6B7280;font-weight:600">${b.from===b.to?new Date(b.from+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):new Date(b.from+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+new Date(b.to+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}
  </div>`;
}
function _dashTicketsPanel(scopeUsers){
  const open=(DB.tickets||[]).filter(t=>t.status==='Open'||t.status==='In Progress');
  const ids=scopeUsers?new Set(scopeUsers.map(u=>u.id)):null;
  const counts={};let unassigned=0;
  open.forEach(t=>{
    if(!t.assignedTo){if(!ids)unassigned++;return;}
    if(ids&&!ids.has(t.assignedTo))return;
    counts[t.assignedTo]=(counts[t.assignedTo]||0)+1;
  });
  const rows=Object.entries(counts).map(([uid2,n])=>({u:uById(uid2),n})).filter(r=>r.u).sort((a,b)=>b.n-a.n);
  const total=rows.reduce((s,r)=>s+r.n,0)+unassigned;
  return`<div class="bg-white rounded-2xl border border-ink-100 shadow-soft overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex justify-between items-center">
      <h3 class="fd font-semibold text-sm">Open tickets by user</h3>
      <button onclick="App.go('tickets')" class="text-xs font-semibold text-brand-700">View all →</button>
    </div>
    <div class="divide-y divide-ink-50">
      ${rows.map(({u,n})=>`<div class="px-4 py-2.5 flex items-center gap-2.5" style="cursor:pointer" onclick="App.go('tickets')">${avatar(u,'w-7 h-7','text-[10px]')}<div class="flex-1 min-w-0"><div class="text-xs font-semibold truncate">${esc(fullName(u))}</div><div class="text-[11px] text-ink-400">not completed</div></div><span style="font-size:12px;font-weight:800;min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:13px;background:${n>=5?'#FFEDED':'#FEF7E6'};color:${n>=5?'#C92C2C':'#B36A00'};padding:0 8px">${n}</span></div>`).join('')}
      ${unassigned?`<div class="px-4 py-2.5 flex items-center gap-2.5"><div style="width:28px;height:28px;border-radius:50%;background:#F3F4F6;display:grid;place-items:center;font-size:11px">？</div><div class="flex-1 min-w-0"><div class="text-xs font-semibold">Unassigned</div></div><span style="font-size:12px;font-weight:800;min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:13px;background:#F3F4F6;color:#6B7280;padding:0 8px">${unassigned}</span></div>`:''}
      ${!total?`<div class="px-4 py-8 text-center text-sm text-ink-400"><div style="display:flex;justify-content:center;margin-bottom:6px;color:#16A34A">${ic('check','w-6 h-6')}</div>No open tickets</div>`:''}
    </div>
  </div>`;
}

    // Only count submissions from dates the user was actually under me (handles transfers in AND out)

      +(canDl&&!gone?'<button type="button" onclick="App._openPersonalDoc(\''+u.id+'\',\''+d.id+'\')" style="padding:5px 10px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:12px;font-weight:600;cursor:pointer">Open</button>':'')

      +'</div>';
  }).join(''):'<p style="font-size:12px;color:#9CA3AF;text-align:center;padding:10px">No documents yet.</p>';
  return'<div style="border-top:1px solid #ECEDF0;margin-top:14px;padding-top:14px">'

    +(canUpload?'<label style="font-size:12px;font-weight:600;color:#0E7A4F;cursor:pointer">+ Upload<input type="file" style="display:none" onchange="App._uploadPersonalDoc(\''+u.id+'\',this)"></label>':'')
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div>'
    +'<p style="font-size:10px;color:#B8B5AC;margin-top:8px">Files under 3MB are held for this session. Durable storage connects when the backend is added — content may be lost on reload until then.</p>'
    +'</div>';

App._uploadPersonalDoc=(userId,input)=>{
  const u=uById(userId);if(!u)return;
  const isSelf=userId===S.uid;
  if(!can('documentsPersonal','create')||(!isSelf&&!scopeFilter('documentsPersonal')(userId))){toast('Not allowed','err');return;}
  const file=(input.files||[])[0];if(!file)return;
  if(file.size>PERSONAL_DOC_MAX){toast('File too large — max 3MB','err');input.value='';return;}
  const reader=new FileReader();
  reader.onload=()=>{
    _ensureHrm(u);
    u.hrm.personalDocs.push({id:uid('pd'),name:file.name,type:file.type||'',size:file.size,uploadedAt:new Date().toISOString(),uploadedBy:S.uid,dataUrl:reader.result});
    saveDB();
    toast('Uploaded');
    // Re-render the open user-edit modal (or profile page) in place.
    if(document.getElementById('u-role'))App.editUser(userId);else rr();
  };
  reader.onerror=()=>toast('Could not read file','err');
  reader.readAsDataURL(file);
};
App._openPersonalDoc=(userId,docId)=>{
  const u=uById(userId);if(!u)return;

  else toast('Allow pop-ups to open the file','warn');
};

App.saveUser=async(id)=>{
  // SEC-2: re-check action + scope before mutating (handler must not trust hidden buttons).
  if(id){
    if(!can('employees','edit')||!scopeFilter('employees')(id)){toast('Not allowed','err');return;}
  }else if(!can('employees','create')){toast('Not allowed','err');return;}
  const g=i=>($('#'+i)?.value||'').trim();
  const fn=g('u-fn'),ln=g('u-ln'),email=g('u-email');
  if(!fn||!ln||!email){toast('Name & email required','err');return;}
  const _existingU=id?uById(id):null;
  // C2: assignManager is a dedicated gate. If the user lacks it, preserve the existing manager
  //   (or force none on create) so a deep-link/console call can't re-parent someone out of scope.
  let mId=$('#u-mgr')?.value||null;
  if(!can('employees','assignManager')){
    const cur=_existingU?(_existingU.managerId||null):null;
    if((mId||null)!==(cur||null)){toast('Not permitted to change reporting manager','err');return;}
    mId=cur;
  }
  if(id&&mId&&(mId===id||isDesc(mId,id))){toast('Circular hierarchy!','err');return;}

  // ── Access (docAccess / questionsAccess) is now governed by Role profiles (Access Control tab).
  //    The per-user toggles were removed from this form, so preserve any existing values verbatim
  //    rather than reading them from the (now-absent) DOM controls. ──
  const docAccess=(_existingU&&_existingU.docAccess)?_existingU.docAccess:{departments:{},locations:{}};

  // ── Read ALL toggles and DOM values NOW, before any async/closeModal ──
  const questionsAccess=_existingU?(_existingU.questionsAccess??false):false;
  // Email notifications opt-in (requirement #4) — default on.
  const email_enabled=$('#u-em')?togV('u-em'):true;
  // City (location) access scope (requirement #6) — empty array = all cities.
  // perms v2: rules / approval / city access moved to Access Control — preserve existing values here.
  const cities=_existingU?(_existingU.cities||[]):[];
  const rules=_existingU?(_existingU.rules||{past:true,future:true,edit:true}):{past:true,future:true,edit:true};
  const approval_settings=_existingU?(_existingU.approval||{past:false,future:false,edited:false}):{past:false,future:false,edited:false};
  // HRM fields — stored locally on u.hrm ONLY, never added to the Supabase upsert payload (pd)
  const hrm=_readHrmFromForm(id?uById(id)?.hrm:null);
  // C2: assignRole is a dedicated gate (it grants permission BUNDLES → privilege escalation risk).
  //   If the user lacks it, preserve the existing role profile (or none on create) — never let the
  //   form value change who the target can act as.
  if(!can('employees','assignRole')){
    const curRP=_existingU?.hrm?.roleProfileId??null;
    if((hrm.roleProfileId||null)!==(curRP||null)){toast('Not permitted to assign a role profile','err');return;}
    hrm.roleProfileId=curRP;
  }

  // SEC-1: never let a non-Super-Admin assign or change an elevated role.
  // Non-admins: force role 'User' on create, and preserve the existing role on edit.
  // Also: only a Super Admin may change a Super Admin's role.
  const reqRole=$('#u-role')?.value||'User';
  const existing=id?uById(id):null;
  let role;
  if(isAdmin()){
    role=reqRole;
  }else if(id){
    // preserve existing role verbatim; non-admins can never touch role on edit
    role=existing?existing.role:'User';
  }else{
    role='User';
  }
  if(existing&&existing.role==='Admin'&&!isAdmin())role=existing.role; // can't demote a Super Admin
  if(!isAdmin()&&(role==='Admin'||role==='SubAdmin')&&(!existing||existing.role!==role)){toast('Not allowed','err');return;}
  const pd={first_name:fn,last_name:ln,email,
    phone:g('u-phone'),position:g('u-pos'),
    department:$('#u-dep')?.value,role,
    status:$('#u-status')?.value,manager_id:mId||null,
    rules,approval_settings,
    doc_access:docAccess,questions_access:questionsAccess,
    email_enabled,cities};

  if(id){
    // Update local state immediately
    const u=uById(id);
    // ── Manager change: record history so dashboards can scope by date ──
    // Rule: dates BEFORE the change belong to the old manager; the change date onwards belongs to the new one
    if(u&&(u.managerId||null)!==(mId||null)){
      const chDate=todayISO();
      let h=Array.isArray(u.managerHistory)?JSON.parse(JSON.stringify(u.managerHistory)):[];
      if(!h.length)h.push({managerId:u.managerId||null,from:'0001-01-01',to:chDate});
      else{const open=h.find(p=>!p.to);if(open)open.to=chDate;}
      h.push({managerId:mId||null,from:chDate,to:null});
      u.managerHistory=h;
      pd.manager_history=h;
    }
    const _roleChanged=u&&u.role!==pd.role;
    if(u)Object.assign(u,{firstName:fn,lastName:ln,email,
      phone:pd.phone,position:pd.position,department:pd.department,
      role:pd.role,status:pd.status,managerId:mId,
      rules,approval:approval_settings,
      questionsAccess,emailEnabled:email_enabled,cities,
      docAccess,hrm});
    // perms v3: a base-role change assigns the matching built-in access ROLE and clears
    // per-user overrides (fine-tune afterwards in Access Control).
    if(_roleChanged&&u){_ensureHrm(u);u.hrm.roleProfileId=_roleIdForUser(u);u.hrm.perms=null;u.hrm.permsV3=1;log(fullName(me()),'Access role assigned (base-role change)',fn+' '+ln+' → '+u.hrm.roleProfileId);}
    log(fullName(me()),'Edited user',fn+' '+ln);
    toast('Saved');closeModal();saveDB();render();
    // Sync all fields including doc_access to Supabase in background
    sb.from('profiles').update(pd).eq('id',id).then(({error})=>{
      if(error)_syncErr('user changes')(error);
    }).catch(_syncErr('user changes'));
  } else {
    const pw=g('u-pw');if(!pw){toast('Password required','err');return;}
    const saveBtn=document.querySelector('[onclick*="saveUser"]');
    if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Creating…';}
    toast('Creating user…','ok');
    const{data:res,error}=await sb.functions.invoke('create-user',{body:{...pd,password:pw}});
    if(error||res?.error){
      let msg=error?.message||res?.error||'Failed';
      try{if(error?.context){const b=await error.context.json();msg=b.error||msg;}}catch(e){}
      toast(msg,'err');
      if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='Create';}
      return;
    }
    const newId=res?.id||res?.user?.id;
    if(!newId){toast('User created — reload to see them','ok');closeModal();render();return;}
    DB.users.push(_ensureHrm({id:newId,firstName:fn,lastName:ln,email,
      phone:pd.phone,position:pd.position,department:pd.department,
      role:pd.role,status:pd.status,managerId:mId,
      rules:pd.rules,approval:pd.approval_settings,
      questionsAccess,emailEnabled:email_enabled,cities,
      docAccess,hrm,password:'***'}));
    (()=>{const nu=uById(newId);if(nu){_ensureHrm(nu);nu.hrm.roleProfileId=_roleIdForUser(nu);nu.hrm.permsV3=1;}})(); // perms v3: assign role
    // Save doc_access + questions_access + email/cities for new user
    sb.from('profiles').update({doc_access:docAccess,questions_access:questionsAccess,email_enabled,cities}).eq('id',newId).then(()=>{}).catch(()=>{});
    log(fullName(me()),'Created user',fn+' '+ln);
    toast(fn+' '+ln+' created');
    closeModal();saveDB();render();
  }
};

App.togUser=(id)=>{
  const u=uById(id);if(!u)return;
  // SEC-2/C2: require employees.deactivate (dedicated gate) + target in scope; never disable a Super Admin unless Super Admin.
  if(!can('employees','deactivate')||!scopeFilter('employees')(id)){toast('Not permitted','err');return;}
  if(u.role==='Admin'&&!isAdmin()){toast('Not permitted','err');return;}
  const enabling=u.status!=='Active';
  u.status=enabling?'Active':'Inactive';
  // M8: deactivating an employee must not strand their Pending leave / leak the reserved `pending` balance.
  if(!enabling){
    let released=0;
    (DB.leaveRequests||[]).filter(r=>r.userId===id&&r.status==='Pending').forEach(r=>{
      // DATA-2: release against the SAME balance row the reservation was placed on.
      if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(u,r.start));b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));}
      r.status='Rejected';r.hrNote='Auto-rejected — employee deactivated';released++;
    });
    if(released)hlog('Leave auto-rejected on deactivation',fullName(u)+' ('+released+')');
  }
  saveDB();render();
  toast(fullName(u)+' '+(enabling?'enabled':'disabled'),enabling?'ok':'warn');
  sb.from('profiles').update({status:u.status}).eq('id',id).then(({error})=>{if(error)_syncErr(enabling?'enable':'disable')(error);}).catch(_syncErr(enabling?'enable':'disable'));
};
App.delUser=async(id)=>{
  const u=uById(id);if(!u)return;
  // SEC-2: require employees.delete + target in scope; never delete a Super Admin unless Super Admin.
  if(!can('employees','delete')||!scopeFilter('employees')(id)){toast('Not allowed','err');return;}
  if(u.role==='Admin'&&!isAdmin()){toast('Not allowed','err');return;}
  const name=fullName(u);
  if(!confirm('Permanently delete '+name+'?\n\nThis will delete ALL their submissions and approvals. This cannot be undone.\n\nTo keep their data, use Disable instead.'))return;
  // Optimistic local cleanup first
  DB.users.filter(x=>x.managerId===id).forEach(x=>x.managerId=u.managerId);
  if(!DB.users_deleted)DB.users_deleted=[];
  if(!DB.users_deleted.includes(id))DB.users_deleted.push(id);
  DB.users=DB.users.filter(x=>x.id!==id);
  DB.checklists.forEach(c=>c.assignees=(c.assignees||[]).filter(a=>a!==id));
  DB.submissions=DB.submissions.filter(s=>s.userId!==id);
  DB.approvals=DB.approvals.filter(a=>a.requesterId!==id);
  DB.notifications=DB.notifications.filter(n=>n.userId!==id);
  DB.feedback=(DB.feedback||[]).filter(f=>f.userId!==id&&f.managerId!==id);
  // N2: also prune the deleted user's HRM data so their pending leave doesn't linger in
  // approver queues and their reserved balances/attendance/expenses/shifts/SOPs don't leak.
  DB.leaveRequests=(DB.leaveRequests||[]).filter(r=>r.userId!==id);
  DB.leaveBalances=(DB.leaveBalances||[]).filter(b=>b.userId!==id);
  DB.attendance=(DB.attendance||[]).filter(a=>a.userId!==id);
  DB.expenses=(DB.expenses||[]).filter(x=>x.userId!==id);
  DB.shifts=(DB.shifts||[]).filter(s=>s.userId!==id);
  DB.sopInstances=(DB.sopInstances||[]).filter(i=>i.userId!==id);
  // FIX: If ex-manager now has 0 direct reports, downgrade to User
  if(u.managerId){
    const exMgr=uById(u.managerId);
    if(exMgr&&exMgr.role==='Manager'){
      const stillHasTeam=DB.users.some(x=>x.managerId===exMgr.id);
      if(!stillHasTeam){
        exMgr.role='User';
        sb.from('profiles').update({role:'User'}).eq('id',exMgr.id).then(()=>{}).catch(()=>{});
        toast(fullName(exMgr)+' has no team — role changed to User','warn');
      }
    }
  }
  log(fullName(me()),'Deleted user',name);
  toast(name+' deleted','warn');
  render();saveDB();
  // Background Supabase deletion of all related data
  Promise.all([
    sb.from('submissions').delete().eq('user_id',id),
    sb.from('approvals').delete().eq('requester_id',id),
    sb.from('notifications').delete().eq('user_id',id),
    sb.from('feedback').delete().eq('user_id',id),
    sb.from('leave_requests').delete().eq('user_id',id),
    sb.from('leave_balances').delete().eq('user_id',id),
    sb.from('attendance').delete().eq('user_id',id),
    sb.from('expenses').delete().eq('user_id',id),
    sb.from('shifts').delete().eq('user_id',id),
    sb.from('sop_instances').delete().eq('user_id',id),
    sb.from('profiles').delete().eq('id',id),
  ]).then(()=>{}).catch(e=>console.warn('delUser cleanup:',e));
};

/* ===== DEPARTMENTS — hierarchy helpers ===== */
function _deptById(id){return (DB.departments||[]).find(d=>d.id===id);}
function _deptByName(n){return (DB.departments||[]).find(d=>d.name===n&&!d.parentId);}
// Top-level departments = no parent, OR a parent that no longer exists (orphan self-heal).
function topDepts(){return (DB.departments||[]).filter(d=>!d.parentId||!_deptById(d.parentId));}
function subDepts(parentId){return (DB.departments||[]).filter(d=>d.parentId===parentId);}
// Sub-departments of a top-level department, looked up by its NAME (questions store names).
function subDeptsOfName(name){const p=_deptByName(name);return p?subDepts(p.id):[];}

// A user's cities = array of location ids. Empty/absent ⇒ ALL cities.
function userCities(u){return Array.isArray(u&&u.cities)?u.cities:[];}
// Active location ids the current user may act within (empty array meaning is "all" handled by callers).
function myCityScope(){const u=me();return u?userCities(u):[];}

function _scopeDocsTab(type, scopeKey){
  const u=me();const isAdm=isAdmin();
  const da=(u?.docAccess)||{departments:{},locations:{}};
  // perms H2: the legacy per-resource docAccess map (p.view/upload/download/edit) still decides WHICH
  // dept/loc this user reaches; the documentsOrg PERM_AREA now gates the ACTIONS on top of it. For an
  // UNASSIGNED user, can('documentsOrg',*)===hasDocAccess()===true whenever any p.* below is true, so
  // ANDing never strips an action they have today. A role profile can additionally restrict actions.
  const cView=isAdm||can('documentsOrg','view'),cUp=isAdm||can('documentsOrg','create'),cDl=isAdm||can('documentsOrg','download'),cDel=isAdm||can('documentsOrg','delete');
  function perm(){
    if(isAdm)return{view:true,upload:true,download:true,edit:true};
    const map=type==='dept'?da.departments:da.locations;
    const base=(map&&map[scopeKey])||{};
    // Intersect legacy per-resource grant with the area's action gate.
    return {view:!!base.view&&cView,upload:!!base.upload&&cUp,download:!!base.download&&cDl,edit:!!base.edit&&cDel};
  }
  const p=perm();
  if(!p.view&&!isAdm)return empty('folder','No access','You do not have document access for this '+(type==='dept'?'department':'location')+'.');

  const folderId=S.filters.docFolder||null;
  const scopeFolders=(DB.folders||[]).filter(f=>f.type===type&&f.scope===scopeKey&&(f.parentId||null)===(folderId||null));
  const scopeDocs=(DB.documents||[]).filter(d=>d.type===type&&d.scope===scopeKey&&(d.folderId||null)===(folderId||null));

  // Breadcrumb
  function buildPath(id){if(!id)return[];const f=(DB.folders||[]).find(x=>x.id===id);if(!f)return[];return[...buildPath(f.parentId||null),f];}
  const crumbs=buildPath(folderId);
  const rootLabel=type==='dept'?scopeKey:(DB.locations.find(l=>l.id===scopeKey)?.name||scopeKey);

  let html='';
  // Breadcrumb bar
  if(crumbs.length){
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap">'
      +'<button type="button" onclick="App._docNav(null)" style="font-size:13px;font-weight:600;color:var(--c-brand);background:none;border:none;cursor:pointer;padding:0">'+esc(rootLabel)+'</button>'
      +crumbs.map(f=>'<span style="color:var(--c-text-3)">›</span><button type="button" onclick="App._docNav(this.dataset.id)" data-id="'+f.id+'" style="font-size:13px;font-weight:600;color:'+(folderId===f.id?'var(--c-text)':'var(--c-brand)')+';background:none;border:none;cursor:pointer;padding:0">'+esc(f.name)+'</button>').join('')
      +'</div>';
  }
  // Toolbar
  html+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  if(isAdm||p.edit)html+=btn('New folder','App._newFolderIn(\''+type+'\',\''+scopeKey+'\')',{variant:'ghost',size:'sm',icon:'folder'});
  if(isAdm||p.upload)html+=btn('Upload file','App._uploadDocIn(\''+type+'\',\''+scopeKey+'\')',{variant:'primary',size:'sm',icon:'upload'});
  html+='</div>';
  // Empty state
  if(!scopeFolders.length&&!scopeDocs.length){html+=empty('folder','No files yet',(isAdm||p.upload)?'Click "Upload file" to add documents':'No documents uploaded yet.');return html;}
  // Folders grid
  if(scopeFolders.length){
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px">'
      +scopeFolders.map(f=>'<div onclick="App._docNav(this.dataset.id)" data-id="'+f.id+'" class="fld-card" style="background:var(--c-surface);border-radius:var(--r-md);border:1px solid var(--c-border);box-shadow:var(--sh-sm);padding:14px;cursor:pointer;transition:all .15s">'
        +'<div style="margin-bottom:8px;color:var(--c-brand,#4338CA)">'+ic('folder','w-7 h-7')+'</div>'
        +'<div style="font-size:13px;font-weight:700;color:var(--c-text)">'+esc(f.name)+'</div>'
        +'<div style="font-size:11px;color:var(--c-text-3);margin-top:4px">'+((DB.documents||[]).filter(d=>d.folderId===f.id).length)+' files</div>'
        +(isAdm||p.edit?'<button type="button" onclick="event.stopPropagation();App._delFolder(this.dataset.id)" data-id="'+f.id+'" style="margin-top:8px;font-size:11px;color:var(--c-danger);background:none;border:none;cursor:pointer;padding:0">Delete</button>':'')
        +'</div>'
      ).join('')+'</div>';
  }
  // Documents list
  if(scopeDocs.length){
    html+='<div style="background:var(--c-surface);border-radius:var(--r-lg);border:1px solid var(--c-border);box-shadow:var(--sh-sm);overflow:hidden">'
      +scopeDocs.map((d,i)=>{
        const ext=(d.name.split('.').pop()||'').toLowerCase();
        const icon=_fileIcon(ext,'w-[22px] h-[22px]');
        return'<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:'+(i<scopeDocs.length-1?'1px solid var(--c-border)':'none')+'">'
          +'<span style="display:grid;place-items:center;color:var(--c-text-3);flex-shrink:0">'+icon+'</span>'
          +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--c-text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(d.name)+_docApprBadge(d)+'</div>'
          +'<div style="font-size:11px;color:var(--c-text-3);margin-top:1px">'+(d.uploadedAt?fmtS(d.uploadedAt.slice(0,10)):'')+' · '+(d.uploaderName||'')+(d.fileSize?' · '+_fmtSize(d.fileSize):'')+'</div></div>'
          +'<div style="display:flex;gap:6px;flex-shrink:0">'
          +(p.download||isAdm?btn('Download','App._downloadDoc(this.dataset.id)',{variant:'brand',size:'sm',attrs:'data-id="'+d.id+'"'}):'')
          +(p.view||isAdm?btn('View','App._previewDoc(this.dataset.id)',{variant:'ghost',size:'sm',attrs:'data-id="'+d.id+'"'}):'')
          +(isAdm||p.edit?'<button type="button" onclick="App._delDoc(this.dataset.id)" data-id="'+d.id+'" aria-label="Delete file" style="display:grid;place-items:center;padding:6px 9px;border-radius:8px;background:var(--c-danger-soft);color:var(--c-danger);border:1px solid transparent;cursor:pointer">'+ic('x','w-3.5 h-3.5')+'</button>':'')
          +'</div></div>';
      }).join('')+'</div>';
  }
  return html;
}

App._newFolderIn=(t,s)=>{
  App._folderCtx={type:t,scope:s};
  modalShell({title:'New folder',size:'max-w-sm',
    body:'<label for="nf-name" class="ui-label">Folder name</label>'
      +'<input id="nf-name" type="text" placeholder="e.g. Procurement, Inventory…" class="ui-input" autofocus/>',

App._createFolderIn=()=>{
  // Guard: prevent double-tap / double-submit
  if(App._folderCtx._creating)return;

  const name=(document.getElementById('nf-name')?.value||'').trim();
  if(!name){
    const inp=document.getElementById('nf-name');
    if(inp){inp.style.borderColor='#EF4444';inp.focus();}
    toast('Enter a folder name','err');
    return;
  }
  const {type:t,scope:s}=App._folderCtx;
  if(!t||!s){toast('Scope error — please try again','err');closeModal();return;}

  // Lock immediately
  App._folderCtx._creating=true;

  // Disable the button visually
  const createBtn=document.querySelector('[onclick="App._createFolderIn()"]');
  if(createBtn){createBtn.disabled=true;createBtn.textContent='Creating…';createBtn.style.opacity='0.7';}

  if(!DB.folders)DB.folders=[];
  const parentId=S.filters.docFolder||null;
  const f={
    id:uid('fld'),name,
    type:t,scope:s,
    parentId,
    createdBy:S.uid,
    createdAt:new Date().toISOString()
  };
  DB.folders.push(f);

  // Close modal first so user sees the result immediately
  closeModal();
  toast('"'+name+'" created');
  App._folderCtx={type:null,scope:null,_creating:false};
  saveDB();
  render();

  // Sync to Supabase in background
  sb.from('doc_folders').insert({
    id:f.id,name:f.name,parent_id:f.parentId||null,
    type:f.type,scope:f.scope,
    created_by:f.createdBy,created_at:f.createdAt
  }).then(()=>{}).catch(e=>console.warn('folder sync:',e));
  log(fullName(me()),'Created folder',name);
};

function _visibleAnnouncements(){

    .sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
}
function _annIsRead(id){const u=me();return !!(u&&Array.isArray(u.hrm?.announcementsRead)&&u.hrm.announcementsRead.includes(id));}
function _unreadAnnouncements(){return _visibleAnnouncements().filter(a=>!_annIsRead(a.id));}

function _annRecipients(a){return DB.users.filter(u=>u.status!=='Inactive'&&(!a.deptTarget||u.department===a.deptTarget)&&(!a.locTarget||(u.hrm?.locationId||null)===a.locTarget)&&u.id!==a.createdBy);}
function _annDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}

App._delAnnouncement=(id)=>{
  const a=(DB.announcements||[]).find(x=>x.id===id);if(!a)return;
  if(!(isAdmin()||a.createdBy===S.uid||isHR())){toast('Not allowed','err');return;}

  DB.announcements=(DB.announcements||[]).filter(x=>x.id!==id);
  // DATA-5: prune the deleted id from every user's read-state so the array doesn't grow unbounded.
  DB.users.forEach(u=>{if(u.hrm&&Array.isArray(u.hrm.announcementsRead)&&u.hrm.announcementsRead.includes(id))u.hrm.announcementsRead=u.hrm.announcementsRead.filter(x=>x!==id);});

App.postAnnouncement=()=>{
  if(!can('announcements','create')){toast('Not allowed','err');return;}

  const a={id:uid('ann'),title,body,deptTarget:deptTarget||null,locTarget:locTarget||null,createdBy:S.uid,createdAt:new Date().toISOString()};

     (gated by email_announcement AND the hrm_email_enabled master switch via _hnpEmail).
     queueEmail is the SINGLE place real sending connects — no backend network call added here. */
  recipients.forEach(u=>{

App.editDept=(id=null,presetParent=null)=>{
  const d=id?DB.departments.find(x=>x.id===id):null;

  const curParent=d?(d.parentId||''):(presetParent||'');
  const parentOpts=[['','— None (top-level department) —'],...topDepts().filter(x=>!d||x.id!==d.id).map(x=>[x.id,x.name])];
  // A department that itself has sub-departments can't become a sub-department (only one level of nesting).
  const parentField=hasChildren
    ?'<input type="hidden" id="d-parent" value="">'
    :selF('Parent department (optional)','d-parent',parentOpts,curParent);
  modalShell({title:`${d?'Edit':'New'} ${curParent?'sub-department':'department'}`,size:'max-w-sm',
    body:fld('Name','d-n',d?.name||'')+parentField,

App.saveDept=(id)=>{const n=$('#d-n')?.value.trim();if(!n){toast('Name required','err');return;}
  let parentId=$('#d-parent')?.value||null;
  // Guard: a department with sub-departments stays top-level.
  if(id&&subDepts(id).length)parentId=null;
  const obj=id?DB.departments.find(x=>x.id===id):{id:uid('d'),name:n,parentId};
  if(id){obj.name=n;obj.parentId=parentId;}else DB.departments.push(obj);
  log(fullName(me()),id?'Edited dept':'Created dept',n);toast(id?'Updated':'Created');saveDB();closeModal();render();
  sb.from('departments').upsert({id:obj.id,name:obj.name,parent_id:obj.parentId||null},{onConflict:'id'}).then(({error})=>{if(error)_syncErr('department')(error);}).catch(_syncErr('department'));};
App.delDept=(id)=>{const d=DB.departments.find(x=>x.id===id);if(!d)return;
  const kids=subDepts(id);
  const msg=kids.length?('Delete "'+d.name+'" and its '+kids.length+' sub-department'+(kids.length!==1?'s':'')+'? Users and checklists will keep existing but lose this department.'):('Delete '+d.name+'? Users and checklists in this department will not be deleted but will have no department.');
  if(!confirm(msg))return;
  if(!DB.departments_deleted)DB.departments_deleted=[];
  const toDelete=[id,...kids.map(k=>k.id)];
  toDelete.forEach(delId=>{if(!DB.departments_deleted.includes(delId))DB.departments_deleted.push(delId);});
  DB.departments=DB.departments.filter(x=>!toDelete.includes(x.id));
  sb.from('departments').delete().in('id',toDelete).then(({error})=>{if(error)_syncErr('department delete')(error);}).catch(_syncErr('department delete'));// Clear dept from users and checklists (don't delete them)
const _affected=[];DB.users.forEach(u=>{if(u.department===d.name){u.department='';_affected.push(u.id);}});DB.checklists.forEach(c=>{if(c.department===d.name)c.department='';});
// N3: profiles aren't part of the debounced _sync, so persist the cleared department directly.
if(_affected.length)sb.from('profiles').update({department:''}).in('id',_affected).then(({error})=>{if(error)_syncErr('clear department')(error);}).catch(_syncErr('clear department'));
log(fullName(me()),'Deleted dept',d.name);toast('Deleted','warn');saveDB();render();};

  ${canGeo?`<div style="background:var(--c-surface-2);border-radius:var(--r-md);padding:14px;display:flex;flex-direction:column;gap:8px"><p style="font-size:10px;font-weight:700;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.05em">Geofence (clock-in & clock-out)</p>
    ${mkTog('ln-geo',geo.enabled??false,'Require staff to be on-site to clock in and out')}
    <div class="grid grid-cols-3 gap-2">${fld('Latitude','ln-lat',geo.lat??'','number')}${fld('Longitude','ln-lng',geo.lng??'','number')}${fld('Radius (m)','ln-rad',geo.radius??200,'number')}</div>
    <button type="button" onclick="App.useMyLocationLoc()" style="font-size:12px;font-weight:600;color:var(--c-brand);background:none;border:none;cursor:pointer;padding:0">📍 Use my current location</button>
    <p style="font-size:11px;color:var(--c-text-3)">Assign this location to users in their profile. When enabled, an assigned user must be inside the radius to clock in AND clock out (strict). Geofence data stays on this device only.</p>
  </div>`:''}</div>`,
  footer:btnG('Cancel','App.closeModal()')+btnP(l?'Save':'Create',`App.saveLoc('${id||''}')`)});};
App.useMyLocationLoc=()=>{if(!navigator.geolocation){toast('Geolocation unavailable','err');return;}navigator.geolocation.getCurrentPosition(pos=>{const la=$('#ln-lat'),ln=$('#ln-lng');if(la)la.value=pos.coords.latitude;if(ln)ln.value=pos.coords.longitude;toast('Location filled');},()=>toast('Could not get location','err'),{enableHighAccuracy:true,timeout:8000});};
App.saveLoc=(id)=>{const n=$('#ln-n')?.value.trim();if(!n){toast('Name required','err');return;}const data={name:n,address:$('#ln-a')?.value.trim()||'',department:$('#ln-d')?.value||'',status:$('#ln-s')?.value||'Active'};const obj=id?locById(id):{id:uid('loc'),...data};if(id)Object.assign(obj,data);else DB.locations.push(obj);
  // Geofence stored in DB.hrmConfig.locationGeo keyed by location id — NOT part of the `locations` upsert `data`,
  //   but it IS synced separately via the hrm_config.location_geo jsonb column (HR/Admin upsert).
  // Only written when the geofence fields were rendered (user has 'locations','manage'); otherwise existing geo is preserved untouched.
  if($('#ln-rad')){
    DB.hrmConfig=DB.hrmConfig||{};DB.hrmConfig.locationGeo=DB.hrmConfig.locationGeo||{};
    const _lat=$('#ln-lat')?.value,_lng=$('#ln-lng')?.value;
    DB.hrmConfig.locationGeo[obj.id]={enabled:togV('ln-geo'),lat:(_lat!==''&&_lat!=null)?Number(_lat):null,lng:(_lng!==''&&_lng!=null)?Number(_lng):null,radius:Number($('#ln-rad')?.value)||200};
  }
  log(fullName(me()),id?'Edited location':'Created location',n);toast(id?'Updated':'Created');saveDB();closeModal();render();sb.from('locations').upsert({id:obj.id,...data},{onConflict:'id'}).then(({error})=>{if(error)_syncErr('location')(error);}).catch(_syncErr('location'));};
App.delLoc=(id)=>{const l=locById(id);if(!l)return;if(!confirm('Delete "'+l.name+'"? Checklists using this location will keep it as reference.'))return;if(!DB.locations_deleted)DB.locations_deleted=[];if(!DB.locations_deleted.includes(id))DB.locations_deleted.push(id);DB.locations=DB.locations.filter(x=>x.id!==id);if(DB.hrmConfig?.locationGeo)delete DB.hrmConfig.locationGeo[id];
// DATA-4: clear the dangling locationId from every user pointing at the deleted location
// (mirrors the dept-clear pattern; u.hrm syncs via the user_hrm table, so cleared ids propagate on next sync).
// M4: _ensureHrm also self-heals a stale locationId on devices that haven't received this clear yet.
DB.users.forEach(u=>{if(u.hrm&&u.hrm.locationId===id)u.hrm.locationId=null;});
saveDB();render();toast('Deleted','warn');sb.from('locations').delete().eq('id',id).then(({error})=>{if(error)console.error('delLoc:',error.message);}).catch(()=>{});};

function _freqUI(freq){
  if(!CLD)return'';
  const sd=CLD?.selectedDays||[], sdt=CLD?.selectedDates||[], cdt=CLD?.customDates||[];
  const sched=CLD?.schedule||'Every day';

  if(freq==='Daily'){
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Schedule</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        ${['Every day','Selected weekdays'].map(o=>`<button type="button" data-sched="${o}" onclick="App._dailySched('${o}',this)"
          style="flex:1;padding:8px;border-radius:10px;border:1.5px solid;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;background:${sched===o?'#15171C':'#fff'};color:${sched===o?'#fff':'#6B7280'};border-color:${sched===o?'#15171C':'#ECEDF0'}">${o}</button>`).join('')}
      </div>
      <div id="cn-daysel" style="display:${sched==='Selected weekdays'?'flex':'none'};flex-wrap:wrap;gap:6px">
        ${WKDAYS.map(d=>`<button type="button" onclick="App._togDay('${d}',this)" class="dchip ${sd.includes(d)?'on':''}">${d}</button>`).join('')}
      </div>
    </div>`;
  }

  if(freq==='Weekly'){
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Repeat on</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${WKDAYS.map(d=>`<button type="button" onclick="App._togDay('${d}',this)" class="dchip ${sd.includes(d)?'on':''}">${d}</button>`).join('')}</div>
    </div>`;
  }

  if(freq==='Monthly'){
    // Include 'L' = Last day of month
    const nums=[...Array.from({length:31},(_,i)=>i+1),'L'];
    // Normalise sdt: always compare as numbers (Supabase may return strings)
    const sdtNorm=sdt.map(x=>x==='L'?'L':Number(x));
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Days of month</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">
        ${nums.map(n=>{const on=sdtNorm.includes(n);return`<button type="button" onclick="App._togDN('${n}',this)"
          style="min-width:${n==='L'?48:32}px;height:32px;border-radius:50%;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;background:${on?'#15171C':'#fff'};color:${on?'#fff':'#6B7280'};border-color:${on?'#15171C':'#ECEDF0'};${n==='L'?'border-radius:8px;padding:0 8px':''}" title="${n==='L'?'Last day of month':n}">${n==='L'?'Last':n}</button>`;}).join('')}
      </div>
      <p style="font-size:11px;color:#9CA3AF">Tip: Select "Last" to always run on the last day of any month (handles 28/29/30/31 automatically)</p>
    </div>`;
  }

  if(freq==='Custom'){
    const now=new Date();const cy=now.getFullYear(),cm=now.getMonth();
    const calYear=CLD._calYear||cy, calMonth=CLD._calMonth||cm;
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const cdt=CLD?.customDates||[];

App.dupCl=async(id)=>{

App.delCl=(id)=>{
  const c=clById(id);if(!c)return;
  if(!confirm('Delete "'+c.name+'"?\n\nPast submissions will be preserved.'))return;
  // ── Remove locally immediately for instant UI ──
  DB.checklists=DB.checklists.filter(x=>x.id!==id);

  const clAssignees=c.assignees||[];
  clAssignees.forEach(uid2=>{if(uid2!==S.uid)DB.notifications.unshift({id:uid('n'),userId:uid2,text:'Checklist removed: "'+c.name+'" is no longer assigned to you',time:new Date().toISOString(),read:false,kind:'checklist'});});

    if(error)console.error('delCl sync:',error.message);
  }).catch(e=>console.error('delCl:',e));
};

function _clFooter(c,date,sub,isPast,isFuture,u,hasEditReq,editApproved){
  const cid=c.id;
  // "Any one can complete" mode: submission was made by another assignee — read-only for me
  if(sub&&sub.status!=='Editing'&&sub.userId&&sub.userId!==S.uid){

    else if(sub.status==='Pending Approval'||sub.status==='Pending')right='<span style="font-size:12px;font-weight:600;color:#F97316">Awaiting approval</span>';

    return '<span></span><button onclick="App._submitRun(\''+cid+'\',\''+date+'\')" class="submit-pill go" data-cl="'+cid+'">\u2713 Submit</button>';

  if(sub.status==='Editing'){

  }
  return '';
}
// ── Multi-photo helpers ──
// A question response may carry photos in r.photos[] (new) and/or r.photo (legacy single).
// This returns a de-duped list of *displayable* photos (drops '[photo]' placeholders).
function _qrPhotoList(qr){
  if(!qr)return[];
  const raw=[];
  if(Array.isArray(qr.photos))raw.push(...qr.photos);
  if(qr.photo)raw.push(qr.photo);
  const seen=new Set();const out=[];
  for(const p of raw){if(!p||p==='[photo]'||typeof p!=='string')continue;if(seen.has(p))continue;seen.add(p);out.push(p);}
  return out;
}
// True if the response has at least one real photo attached.
function _qrHasPhoto(qr){return _qrPhotoList(qr).length>0;}

App._setQROpt=(clId,qId,optIdx)=>{

  const _q=(DB.questions||[]).find(x=>x.id===qId);

};
App._setQR=(clId,qId,val,skipRr)=>{
  if(!RUN[clId])return;
  if(!RUN[clId].questionResponses)RUN[clId].questionResponses=[];
  const existing=RUN[clId].questionResponses.find(r=>r.questionId===qId);
  if(existing){
    // If the answer is changing to a DIFFERENT value, clear any photo/comment that
    // belonged to the previous answer — otherwise a stale photo from the old answer
    // could wrongly satisfy a "photo required" check for the new answer (Fix #1).
    // Only do this for discrete-choice questions (tapping a different option = a real
    // answer switch). Number inputs fire per-keystroke, so we must NOT wipe their photo.
    const _q=(DB.questions||[]).find(x=>x.id===qId);
    const _discrete=_q&&_q.type!=='number';
    const _changed=String(existing.response??'')!==String(val??'');
    existing.response=val;
    if(_discrete&&_changed){existing.photo=null;existing.photos=[];existing.comment='';}
  }
  else{RUN[clId].questionResponses.push({questionId:qId,response:val,comment:''});}
  if(!skipRr)rr();
  clearTimeout(App._saveT);App._saveT=setTimeout(()=>saveDB(),2000);
};
App._clearQRPhoto=(clId,qId,idx)=>{
  if(!RUN[clId])return;
  if(!RUN[clId].questionResponses)RUN[clId].questionResponses=[];
  const existing=RUN[clId].questionResponses.find(r=>r.questionId===qId);
  if(existing){
    // Normalise into photos[] then drop the one at idx
    const list=_qrPhotoList(existing);
    if(typeof idx==='number'&&idx>=0&&idx<list.length)list.splice(idx,1);
    else list.length=0; // no index → clear all (back-compat)
    existing.photos=list;
    existing.photo=null;
  }
  clearTimeout(App._saveT);App._saveT=setTimeout(()=>saveDB(),2000);
  rr();
};
App._setQRPhoto=(clId,qId,input)=>{
  const files=[...(input?.files||[])];if(!files.length)return;
  if(!RUN[clId])return;
  if(!RUN[clId].questionResponses)RUN[clId].questionResponses=[];
  let existing=RUN[clId].questionResponses.find(r=>r.questionId===qId);
  if(!existing){existing={questionId:qId,response:null,comment:'',photos:[]};RUN[clId].questionResponses.push(existing);}
  // Fold any legacy single photo into the array before appending
  if(!Array.isArray(existing.photos))existing.photos=[];
  if(existing.photo&&existing.photo!=='[photo]'){existing.photos.push(existing.photo);existing.photo=null;}
  let pending=files.length;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      existing.photos.push(e.target.result);
      if(--pending===0){
        clearTimeout(App._saveT);App._saveT=setTimeout(()=>saveDB(),2000);
        rr();
      }
    };
    reader.onerror=()=>{if(--pending===0)rr();};
    reader.readAsDataURL(file);
  });
  // Allow re-selecting the same file again later
  if(input)input.value='';
};

// ── Photo persistence (Fix #5) ──
// Uploads any base64 ("data:") question photos to Supabase Storage (reusing the existing
// "documents" bucket, which already works in production) and returns a NEW responses array
// with each uploaded photo replaced by its durable public URL. This is fail-safe: if a
// given upload fails for ANY reason, that photo falls back to '[photo]' and the submission
// still succeeds. Existing http(s) URLs and already-stripped placeholders are left as-is.
// Helper for converting a data URL to a Blob without fetch() (more reliable on mobile).
function _dataUrlToBlob(dataUrl){
  try{
    const [head,b64]=dataUrl.split(',');
    const mime=(head.match(/data:([^;]+)/)||[,'image/jpeg'])[1];
    const bin=atob(b64);const len=bin.length;const arr=new Uint8Array(len);
    for(let i=0;i<len;i++)arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }catch(e){return null;}
}
async function _uploadSubmissionPhotos(clId,userId,date,responses){
  const out=(responses||[]).map(r=>({...r}));
  for(const r of out){
    // Build the working list (photos[] + any legacy single photo)
    let list=[];
    if(Array.isArray(r.photos))list.push(...r.photos);
    if(r.photo)list.push(r.photo);
    if(!list.length)continue;
    const uploaded=[];
    for(let i=0;i<list.length;i++){
      const p=list[i];
      if(!p||typeof p!=='string'){continue;}
      if(!p.startsWith('data:')){uploaded.push(p);continue;} // already a URL/placeholder
      try{
        const blob=_dataUrlToBlob(p);
        if(!blob){uploaded.push('[photo]');continue;}
        const ext=(blob.type.split('/')[1]||'jpg').replace(/[^a-z0-9]/gi,'')||'jpg';
        const path='submissions/'+clId+'/'+userId+'/'+date+'/'+r.questionId+'_'+Date.now()+'_'+i+'.'+ext;
        const {error}=await sb.storage.from('documents').upload(path,blob,{cacheControl:'3600',upsert:true,contentType:blob.type});
        if(error){console.warn('[photo upload]',error.message);uploaded.push('[photo]');continue;}
        const {data:urlData}=sb.storage.from('documents').getPublicUrl(path);
        uploaded.push(urlData?.publicUrl||'[photo]');
      }catch(e){console.warn('[photo upload failed]',e.message);uploaded.push('[photo]');}
    }
    r.photos=uploaded;
    r.photo=null; // consolidated into photos[]
  }
  return out;
}

App._submitRun=async(clId,date)=>{

    if(peerDone){const by=uById(peerDone.userId);toast('Already completed by '+(by?fullName(by):'a teammate'),'warn');delete RUN[clId];S.expandedCl=null;render();return;}
  }

    const _unanswered=_qs.filter(_q=>{const _qr=(run.questionResponses||[]).find(r=>r.questionId===_q.id)||{};return _qr.response===null||_qr.response===undefined||_qr.response==='';});
    if(_unanswered.length){toast('Please answer all '+_qs.length+' question'+((_qs.length>1)?'s':'')+' before submitting','err');return;}
  }

  //    Each requirement is checked against that question's own response only.
  for(const _q of _qs){
    const _qr=(run.questionResponses||[]).find(r=>r.questionId===_q.id)||{};
    if(_q.photo&&!_qrHasPhoto(_qr)){
      toast('Photo required for: "'+_q.text.slice(0,40)+'"','err');return;

  const needsAppr=dateAppr;
  const isResub=run.status==='Editing';run.status=needsAppr?'Pending Approval':late?'Late':'On Time';run.submittedAt=new Date().toISOString();const u=me();const mgrId=u?.managerId;if(isResub){const ei=DB.submissions.findIndex(s=>s.checklistId===clId&&s.userId===S.uid&&s.date===date);if(ei>-1){const ex=DB.submissions[ei];ex.tasks=JSON.parse(JSON.stringify(run.tasks));ex.questionResponses=JSON.parse(JSON.stringify(run.questionResponses||[]));ex.status=run.status;ex.submittedAt=run.submittedAt;ex.editCount=run.editCount||0;ex.editHistory=run.editHistory||[];}if(needsAppr){DB.approvals.push({id:uid('a'),type:'Submission',requesterId:S.uid,checklistId:clId,date,status:'Pending',note:'Resubmitted after edit #'+(run.editCount||1),createdAt:new Date().toISOString(),isResubmit:true});if(mgrId)DB.notifications.unshift({id:uid('n'),userId:mgrId,text:'Re-submitted: '+fullName(u)+' edited and resubmitted — needs re-approval',time:new Date().toISOString(),read:false,kind:'submission'});}}else{run.id=uid('s');DB.submissions.push(JSON.parse(JSON.stringify(run)));if(needsAppr){DB.approvals.push({id:uid('a'),type:'Submission',requesterId:S.uid,checklistId:clId,date,status:'Pending',note:'Awaiting approval',createdAt:new Date().toISOString()});_invalidateNotifCache();}}
  if(needsAppr){
    const apprText='🔔 Approval needed: '+fullName(u)+' submitted "'+c.name+'" — awaiting your review';
    if(mgrId)DB.notifications.unshift({id:uid('n'),userId:mgrId,text:apprText,time:new Date().toISOString(),read:false,kind:'submission'});
    const adminU2=DB.users.find(x=>x.role==='Admin');
    if(adminU2&&adminU2.id!==mgrId)DB.notifications.unshift({id:uid('n'),userId:adminU2.id,text:apprText,time:new Date().toISOString(),read:false,kind:'submission'});
  }
  log(fullName(u),'Submitted '+run.status,c.name);
  toast(needsAppr?'Submitted — pending approval':'Submitted',late||needsAppr?'warn':'ok');
  // Process escalations — only on first submission, not resubmits
  if(!isResub)_processEscalations(clId,date,run.questionResponses||[]);
  // questionResponses already in run — will be included in push/update below
  // Capture the original responses (may contain base64 photos) so we can persist photos
  // to Storage in the background after the instant render (Fix #5).
  const _origQR=JSON.parse(JSON.stringify(run.questionResponses||[]));
  const _subId=run.id;
  const _inlineP=r=>(Array.isArray(r.photos)&&r.photos.some(p=>typeof p==='string'&&p.startsWith('data:')))||(typeof r.photo==='string'&&r.photo.startsWith('data:'));
  const _hasInlinePhoto=_origQR.some(_inlineP);
  // Strip base64 photos before sending to Supabase (store placeholder; URLs persisted in bg)
  const _stripP=p=>(typeof p==='string'&&p.startsWith('data:'))?'[photo]':p;
  const srQR=(run.questionResponses||[]).map(r=>{

        if(!anyUrl)return; // nothing persisted (all failed) — leave placeholders, no-op
        // Patch the in-memory record so managers see the real photo without a reload
        const rec=DB.submissions.find(s=>s.id===_subId);
        if(rec)rec.questionResponses=uploadedQR;
        saveDB();
        // Re-upsert just this submission with the URL-bearing responses
        sb.from('submissions').upsert({id:_subId,checklist_id:clId,user_id:S.uid,date,status:sr.status,submitted_at:sr.submitted_at,tasks:sr.tasks,question_responses:uploadedQR,edit_count:sr.edit_count,edit_history:sr.edit_history},{onConflict:'id'})
          .then(({error})=>{if(error)console.warn('[photo re-upsert]',error.message);})
          .catch(e=>console.warn('[photo re-upsert failed]',e.message));
      }).catch(e=>console.warn('[photo persist]',e.message));
    }
    // After submission saved, sync notifications/approvals/issues in background
    Promise.allSettled([
      DB.approvals.length?sb.from('approvals').upsert(DB.approvals.map(a=>({id:a.id,type:a.type||'Submission',requester_id:a.requesterId,checklist_id:a.checklistId||null,date:a.date||null,status:a.status,note:a.note||'',is_resubmit:a.isResubmit||false,used_at:a.usedAt||null})),{onConflict:'id'}):Promise.resolve(),

    ]).catch(()=>{});
  }).catch(e=>console.warn('sub upsert failed:',e.message));

// Read-only question responses block (adapted from team view)
function _roResponses(c,sub,date){
  if(!sub)return`<div style="padding:14px 16px;font-size:13px;color:#9CA3AF">No submission for ${fmtD(date)}</div>`;
  const qResps=sub.questionResponses||[];
  const qs=(c.questionIds||[]).map(qid=>(DB.questions||[]).find(x=>x.id===qid)).filter(Boolean);
  if(!qs.length)return`<div style="padding:14px 16px;font-size:13px;color:#9CA3AF">No questions in this checklist</div>`;
  const _escSetRo=_subEscalatedQids(c,sub);
  let h=qs.map(q=>{
    const qr=qResps.find(r=>r.questionId===q.id)||{};
    const resp=qr.response;const hasR=resp!==null&&resp!==undefined&&resp!=='';
    const esc1=_escSetRo.has(q.id);
    const boxBg=esc1?'#EF4444':(hasR?'#10B981':'#E5E7EB');
    const ansClr=esc1?'#BE123C':'#0E9F6E';
    return`<div style="padding:10px 14px;border-bottom:1px solid #F9FAFB;display:flex;align-items:center;gap:10px;${esc1?'background:#FFF5F5':''}">
      <div style="width:18px;height:18px;border-radius:5px;background:${boxBg};display:grid;place-items:center;flex-shrink:0">${esc1?'<span style="color:#fff;font-size:12px;font-weight:800;line-height:1">!</span>':(hasR?'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>':'')}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:${hasR?'#15171C':'#9CA3AF'}">${esc(q.text)}${esc1?'<span style="font-size:9px;font-weight:800;color:#BE123C;background:#FFE4E6;padding:1px 6px;border-radius:8px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em">Flagged</span>':''}</div>
        ${hasR?`<div style="font-size:11px;font-weight:700;color:${ansClr};margin-top:2px">${esc(String(resp))}</div>`:'<div style="font-size:11px;color:#D1D5DB;font-style:italic;margin-top:2px">Not answered</div>'}
        ${qr.comment?`<div style="font-size:11px;color:#6B7280;margin-top:2px;font-style:italic">"${esc(qr.comment)}"</div>`:''}
        ${(()=>{const pl=_qrPhotoList(qr);return pl.length?'<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">'+pl.map(ph=>'<img src="'+esc(ph)+'" loading="lazy" decoding="async" alt="Task response photo" onclick="App._bigImg(this.src)" style="max-width:100px;max-height:72px;border-radius:8px;object-fit:cover;border:1px solid #E5E7EB;cursor:pointer" title="Click to enlarge"/>').join('')+'</div>':'';})()}
      </div>
    </div>`;
  }).join('');
  const by=sub.userId?uById(sub.userId):null;
  h+=`<div style="padding:10px 16px;font-size:11px;color:#9CA3AF;border-top:1px solid #F3F4F6">Submitted${by?' by <strong>'+esc(fullName(by))+'</strong>':''} ${sub.submittedAt?new Date(sub.submittedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):''}</div>`;
  return h;
}

function allClsPage(){
  const today=todayISO();
  if(S.filters.aclWk===undefined)S.filters.aclWk=0;
  // Week strip (Mon–Sun) — same as Team view
  const ref=new Date(today+'T00:00:00');
  const dow=ref.getDay();
  ref.setDate(ref.getDate()+(dow===0?-6:1-dow)+S.filters.aclWk*7);
  const week=Array.from({length:7},(_,i)=>{const dd=new Date(ref);dd.setDate(dd.getDate()+i);return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');});
  if(!S.filters.aclDate||!week.includes(S.filters.aclDate)){S.filters.aclDate=week.find(x=>x===today)||week[0];}
  const d=S.filters.aclDate;
  const dep=S.filters.aclDep||'';
  const loc=S.filters.aclLoc||'';
  const filtCls=dd=>DB.checklists.filter(c=>clOn(c,dd)&&(!dep||c.department===dep)&&(!loc||(c.locationIds||[]).includes(loc)));
  // ── Hierarchy scope: Super Admin sees everyone; Admin (SubAdmin) / managers see themselves + their tree (users under them, and users under those users) ──
  const scopeUsers=(isAdmin()||isSubAdmin()
    ? DB.users
    : [me(),...subTree(S.uid)].filter(Boolean)
  ).filter(u=>u.status==='Active');
  const scopeIds=new Set(scopeUsers.map(u=>u.id));
  const cls=filtCls(d);

  // Strip dots: aggregated across ALL users/checklists (respecting filters)
  const dayDots=dd=>{
    const dcls=filtCls(dd);
    let sub=false,pend=false;
    dcls.forEach(c=>{
      if(c.anyOne){
        if(!isAdmin()&&!isSubAdmin()&&!(c.assignees||[]).some(a=>scopeIds.has(a)))return;
        if(DB.submissions.some(x=>x.checklistId===c.id&&x.date===dd&&x.status!=='Editing'))sub=true;else pend=true;
      }
      else (c.assignees||[]).forEach(a=>{if(!scopeIds.has(a))return;if(subFor(c.id,a,dd))sub=true;else pend=true;});
    });
    return{sub,pend,late:pend&&dd<today};
  };

  const BC={'Late':'#F43F5E','Pending Approval':'#F97316','On Time':'#10B981','Submitted':'#10B981','Pending':'#F59E0B','Rejected':'#9F1239','Editing':'#0EA5E9'};

  // One read-only expandable card
  const roCard=(c,sub,key,metaExtra)=>{
    const st=sub?sub.status:(d<today?'Late':'Pending');
    const exp=S.filters.aclExp===key;
    const ansN=sub?(sub.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length:0;
    return`<div style="background:var(--c-surface);border-radius:var(--r-md);border:1px solid var(--c-border);box-shadow:var(--sh-sm);border-left:4px solid ${BC[st]||'#D1D5DB'};overflow:hidden">
      <button onclick="S.filters.aclExp=S.filters.aclExp==='${key}'?null:'${key}';rr()" style="width:100%;text-align:left;padding:12px 14px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">${esc(c.name)}${c.anyOne?' <span title="Any one assignee can complete" style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:#EEF2FF;color:#4338CA">\ud83d\udc65 Any one</span>':''}</div>
          <div style="font-size:12px;color:var(--c-text-3);margin-top:2px">${(c.questionIds||[]).length} question${(c.questionIds||[]).length!==1?'s':''}${c.department?' · '+esc(c.department):''}${metaExtra||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          ${sub&&(c.questionIds||[]).length?_subBadges(c,sub,{small:true}):''}
          ${chip(st)}
          <span style="color:var(--c-text-3);transform:rotate(${exp?'90':'0'}deg);transition:transform .2s">${ic('chevR','w-4 h-4')}</span>
        </div>
      </button>
      ${exp?`<div style="border-top:1px solid var(--c-border)">${_roResponses(c,sub,d)}</div>`:''}
    </div>`;
  };

  // ── Render one location's section: group ("any one") checklists, then individual checklists user-by-user.
  //    secKey is prefixed into every expand key so the same checklist/user appearing under two
  //    locations expands independently. Returns '' when this section has nothing to show. ──
  const renderSection=(sectionCls,secKey)=>{
    const sgrp=sectionCls.filter(c=>c.anyOne&&(isAdmin()||isSubAdmin()||(c.assignees||[]).some(a=>scopeIds.has(a))));
    const sind=sectionCls.filter(c=>!c.anyOne);
    const sUserMap={};
    sind.forEach(c=>(c.assignees||[]).forEach(uid2=>{if(!scopeIds.has(uid2))return;const u=uById(uid2);if(!u||u.status!=='Active')return;(sUserMap[uid2]=sUserMap[uid2]||[]).push(c);}));
    const sUserIds=Object.keys(sUserMap).sort((a,b)=>fullName(uById(a)).localeCompare(fullName(uById(b))));

    let gHtml='';
    if(sgrp.length){
      gHtml=`<div style="margin-bottom:18px;margin-top:8px">
        <div style="font-size:11px;font-weight:700;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Group checklists — any one can complete</div>
        <div style="display:flex;flex-direction:column;gap:8px">

// ── B3: UNIFIED APPROVALS INBOX UI ───────────────────────────────────────────────────

const _APPR_META={

const _APPR_ORDER=['leave','submission','edit','document','overtime'];
function unifiedApprovalsPage(){

  const chips=(presentTypes.size>1)?('<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;overflow-x:auto">'

      .map(([k,l])=>{const a=typeF===k;return '<button class="ui-tab-pill'+(a?' on':'')+'" onclick="App._setInboxType(this.dataset.k)" data-k="'+k+'">'+esc(l)+'</button>';}).join('')
    +'</div>'):'';

App._bulkApproveInbox=(type)=>{
  const rows=_approvalInbox().filter(x=>x.type===type&&x.status==='Pending');
  if(!rows.length){toast('Nothing to approve','warn');return;}
  let n=0;
  rows.forEach(x=>{

App._decide=async(id,status)=>{
  // Guard: cannot approve your own submission
  const _appr=DB.approvals.find(x=>x.id===id);
  if(_appr&&_appr.requesterId===S.uid&&status==='Approved'){toast('Cannot approve your own submission','err');return;}
  const a=DB.approvals.find(x=>x.id===id);if(!a)return;
  if(a.status!=='Pending'){toast('Already '+a.status.toLowerCase(),'warn');return;}
  // Immediately disable buttons to prevent double-click
  document.querySelectorAll(`[data-id="${id}"]`).forEach(b=>{b.disabled=true;b.style.opacity='0.5';});
  a.status=status;
  const u=uById(a.requesterId),c=clById(a.checklistId);
  const s=DB.submissions.find(x=>x.checklistId===a.checklistId&&x.userId===a.requesterId&&x.date===a.date);
  if(s&&a.type==='Submission'){
    if(status==='Approved'){
      s.status=s.status==='Late'?'Late':'On Time';
    } else {
      s.status='Rejected';
    }
  }
  if(s&&a.type==='Edit Request'){
    s.editRequestStatus=status;
    if(status==='Rejected')s.editRequestStatus='Rejected';
  }
  const msg=a.type==='Edit Request'
    ?(status==='Approved'?'✅ Edit approved for "'+c?.name+'" — you can now resubmit':'❌ Edit request rejected for "'+c?.name+'"')
    :(status==='Approved'
      ?'✅ Submission approved — '+c?.name+' on '+fmtD(a.date)
      :'❌ Submission rejected — '+c?.name+'. '+(a.date?fmtD(a.date):''));
  DB.notifications.unshift({id:uid('n'),userId:a.requesterId,text:msg,time:new Date().toISOString(),read:false,kind:'submission'});
  if(a.type==='Submission'){
    queueEmail(status==='Approved'?'submission_approved':'submission_rejected', a.requesterId, null, null, {checklist_name:c?.name||''});
  } else if(a.type==='Edit Request'){
    queueEmail('approval_decided', a.requesterId, null, null, {checklist_name:c?.name||''});
  }
  log(fullName(me()),status+' '+a.type,fullName(u));
  _invalidateNotifCache();
  saveDB();
  toast(status==='Approved'?'Approved':'Rejected',status==='Approved'?'ok':'warn');
  _touchAction();render();
  // Targeted Supabase save — only affected rows, not full 11-table sync
  Promise.allSettled([
    sb.from('approvals').update({status:a.status}).eq('id',a.id),
    s ? sb.from('submissions').update({status:s.status,question_responses:s.questionResponses||[]}).eq('id',s.id) : Promise.resolve(),
    sb.from('notifications').upsert(DB.notifications.slice(0,20).map(n=>({id:n.id,user_id:n.userId,text:n.text,read:n.read||false,created_at:n.time||new Date().toISOString(),kind:n.kind||null,target_route:n.targetRoute||null})),{onConflict:'id'}),
  ]).catch(()=>{});
};

// ── Session keepalive: refresh the auth token every 10 minutes to prevent 401 ──
// NOTE: this no longer re-downloads all data on a timer (that was the main egress drain).
// Data now loads per-tab on click (see _lazyForRoute) and on tab refocus (visibilitychange).
setInterval(async()=>{
  if(!S.uid)return;
  if(document.visibilityState==='hidden')return; // paused while tab is backgrounded
  try{
    const{data:{session},error}=await sb.auth.getSession();
    if(error||!session){
      // Session gone — try refresh
      const{data,error:re}=await sb.auth.refreshSession();
      if(re){console.warn('[auth] session expired, reloading');render();return;}
    }
  }catch(e){console.warn('[keepalive]',e.message);}
  _runDeadlineChecks();
},10*60*1000); // every 10 minutes

// ── Checklist deadline → manager alert (client-side) ───────────────────────────
// If a checklist isn't submitted by its deadline + grace, email the assignee's MANAGER once.
// Frontend-only: this fires whenever an admin / sub-admin / manager has Bridge open. A shared dedup
// set (workspace_settings key 'cl_deadline_alerts', read-all-authenticated) keeps it to ONCE per
// (date, checklist, employee) across devices, and a deterministic notification id is idempotent too.
const DEADLINE_GRACE_MIN=15; // requirement: deadline + 15 minutes
let _dlSent=null,_dlSaveT=null,_dlRunning=false;
async function _loadDlSent(){
  if(_dlSent)return _dlSent;
  _dlSent={};
  try{const{data}=await sb.from('workspace_settings').select('value').eq('key','cl_deadline_alerts').maybeSingle();
    if(data&&data.value&&typeof data.value==='object')_dlSent={...data.value};}catch(e){/* row/table may not exist yet */}
  return _dlSent;
}
function _persistDlSent(){
  const cut=Date.now()-7*86400000; // prune keys older than 7 days
  Object.keys(_dlSent).forEach(k=>{if((_dlSent[k]||0)<cut)delete _dlSent[k];});
  clearTimeout(_dlSaveT);
  _dlSaveT=setTimeout(()=>{sb.from('workspace_settings').upsert({key:'cl_deadline_alerts',value:_dlSent,updated_at:new Date().toISOString()},{onConflict:'key'}).then(()=>{},e=>console.warn('[deadline] persist:',e&&e.message));},1500);
}
async function _runDeadlineChecks(){
  if(_dlRunning||!S.uid)return;
  if(!(isAdmin()||isSubAdmin()||isMgr()))return; // only roles that hold the needed submission data run it
  _dlRunning=true;
  try{
    await _loadDlSent();
    if(!_ns)await _loadNS();
    const today=todayISO(),nowM=nowHM();
    const adminish=isAdmin()||isSubAdmin();
    const teamSet=adminish?null:new Set(subTree(S.uid).map(u=>u.id)); // a manager only holds their reports' data
    let changed=false;
    (DB.checklists||[]).forEach(c=>{
      if(!c.scheduleTime||!clOn(c,today))return;                  // no deadline / not active today
      if(nowM<hm2m(c.scheduleTime)+DEADLINE_GRACE_MIN)return;     // deadline + grace not reached yet
      (c.assignees||[]).forEach(aid=>{
        if(!adminish&&!(teamSet&&teamSet.has(aid)))return;         // manager: only their own reports
        if(subForCl(c,aid,today))return;                          // already submitted ("any one" handled)
        const emp=uById(aid);if(!emp)return;
        const mgrId=emp.managerId;if(!mgrId)return;                // nobody to notify
        const key=today+'|'+c.id+'|'+aid;
        if(_dlSent[key])return;                                    // already alerted
        _dlSent[key]=Date.now();changed=true;
        const mgr=uById(mgrId);
        // Email (sendEmail respects the global toggle, per-event toggle and the recipient's opt-out).
        if(mgr&&mgr.emailEnabled!==false)sendEmail('submission_late',mgrId,{checklist_name:c.name,employee_name:fullName(emp)});
        // In-app notification for the manager (deterministic id → idempotent upsert; respects in-app toggle).
        if(!_ns||_ns.inapp_submission_late!==false){
          const nid='dlm_'+today.replace(/-/g,'')+'_'+c.id+'_'+aid;
          const txt='⏰ Overdue: '+fullName(emp)+' has not submitted "'+c.name+'" (due '+c.scheduleTime+')';
          const t=new Date().toISOString();
          sb.from('notifications').upsert({id:nid,user_id:mgrId,text:txt,read:false,created_at:t,kind:'submission_late',target_route:'teamview'},{onConflict:'id'}).then(()=>{},()=>{});
          if(mgrId===S.uid)DB.notifications.unshift({id:nid,userId:mgrId,text:txt,read:false,time:t,kind:'submission_late',targetRoute:'teamview'});
        }
      });
    });
    if(changed){_invalidateNotifCache();_persistDlSent();if(Date.now()-_lastUserAction>3000)rr();}
  }catch(e){console.warn('[deadline] check failed:',e.message);}
  finally{_dlRunning=false;}
}
// Kick off once shortly after boot, then piggyback on the keepalive interval + tab refocus.
setTimeout(()=>{try{_runDeadlineChecks();}catch(e){}},8000);

// ── Questions CSV import ──
App._importQCSV=(input)=>{
  const file=input.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length){toast('Empty file','err');return;}
    // Skip header row
    const start=lines[0].toLowerCase().startsWith('text')?1:0;
    const rows=lines.slice(start);
    if(!rows.length){toast('No data rows found','err');return;}
    let added=0,skipped=0;
    rows.forEach(line=>{
      // Parse CSV properly (handle quoted commas)
      const cols=[];let cur='',inQ=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"'){inQ=!inQ;}
        else if(line[i]===','&&!inQ){cols.push(cur.trim());cur='';}
        else cur+=line[i];
      }
      cols.push(cur.trim());
      // N1: column order must match the downloaded template
      // (text,type,option1..5,photo_required,comment_required,approval_required).
      // condition/value/value2 are OPTIONAL trailing columns for number-type conditions.
      const [text,type,o1,o2,o3,o4,o5,photo,comment,approval,condition,cval,cval2]=cols;
      if(!text||!type){skipped++;return;}
      const qtRaw=(type||'').toLowerCase().trim();
      const qtype=['passfail','yesno','tick','number','answer'].includes(qtRaw)?qtRaw:'answer';
      // Build options
      let options=[];
      if(qtype==='passfail'){
        options=[{text:'Pass',escalate:false},{text:'Fail',escalate:false}];
      } else if(qtype==='yesno'){
        options=[{text:'Yes',escalate:false},{text:'No',escalate:false}];
      } else if(qtype==='tick'){
        options=[{text:'Done',escalate:false},{text:'Not done',escalate:false}];
      } else if(qtype==='answer'){
        options=[o1,o2,o3,o4,o5].filter(Boolean).map(t=>({text:t.trim(),escalate:false}));
        if(!options.length){skipped++;return;}
      } else if(qtype==='number'){
        // Parse condition if provided
        const validConds=['lt','lte','gt','gte','eq','neq','between'];
        const cond=(condition||'').toLowerCase().trim();
        if(cond&&validConds.includes(cond)){
          const condObj={condition:cond,value:parseFloat(cval)||0};
          if(cond==='between')condObj.value2=parseFloat(cval2)||condObj.value;
          options=[condObj];
        }
        // number questions can have 0 conditions (manual entry) so don't skip
      }
      const isTrue=s=>(s||'').toLowerCase().trim()==='true'||s==='1';
      const q={
        id:uid('q'),
        text:text.trim(),
        type:qtype,
        options,
        photo:isTrue(photo),
        comment:isTrue(comment),
        approval:isTrue(approval),
        isPublic:false,
        createdBy:S.uid,
        createdAt:new Date().toISOString()
      };
      if(!DB.questions)DB.questions=[];
      DB.questions.push(q);
      added++;
    });
    if(added){
      saveDB();
      sb.from('questions').upsert(DB.questions.filter(q=>q.createdBy===S.uid).map(q=>({id:q.id,text:q.text||'',type:q.type||'answer',options:q.options||[],photo:q.photo||false,approval:q.approval||false,comment:q.comment||false,is_public:q.isPublic!==false,created_by:q.createdBy||null,created_at:q.createdAt||new Date().toISOString()})),{onConflict:'id'}).then(()=>{}).catch(()=>{});
      rr();
      toast(added+' question'+(added===1?'':'s')+' imported'+(skipped?' ('+skipped+' skipped)':'')+'','ok');
    } else {
      toast('No valid questions found'+(skipped?' — '+skipped+' rows skipped':''),'err');
    }
    input.value=''; // Reset so same file can be uploaded again
  };
  reader.readAsText(file);
};


// ── Question visibility ──
// Public (isPublic !== false): visible to everyone with Questions access.
// Private: visible only to the creator (assigned users still see it inside their checklists).
// Admin always sees everything.
function visibleQuestions(){
  const all=DB.questions||[];
  if(isAdmin()||isSubAdmin())return all;
  return all.filter(q=>q.isPublic!==false||q.createdBy===S.uid);
}
// Creator (or admin) can manage a question
// perms M1: legacy = Super Admin / SubAdmin / the question's creator. For a user WITH a role profile,
// also honor a profile granting questions.manage (lets a profile widen management beyond own questions).
// Unassigned users hit only the legacy branch (_myProfile() is null), so today's behavior is unchanged.
function canManageQ(q){return isAdmin()||isSubAdmin()||q.createdBy===S.uid||(_myProfile()&&can('questions','manage'));}


function qCard(q){

    const bg=Q_TYPE_BG[q.type]||'#F6F7F8';

    let h=`<div style="background:var(--c-surface);border-radius:var(--r-md);border:1px solid ${exp?'var(--c-brand)':'var(--c-border)'};box-shadow:var(--sh-sm);overflow:hidden">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer" onclick="App._togExpandQ('${q.id}')">`;
    h+=`<span style="color:var(--c-text-3);transition:transform .2s;transform:rotate(${exp?90:0}deg)">${ic('chevR','w-4 h-4')}</span>`;
    h+=`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:${bg};color:${clr}">${tl}</span>`;
    h+=`<div style="flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(q.text)}</div>`;
