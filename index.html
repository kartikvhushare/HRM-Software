.org-tree li::before{right:50%;border-right:2px solid #E2E4EA}
.org-tree li::after{left:50%}
/* only one child → drop side branches, keep a single straight vertical stem */
.org-tree li:only-child::after{display:none}
.org-tree li:only-child::before{right:auto;left:50%;width:2px;border-top:0;border-right:2px solid #E2E4EA}

const dayAbbr=iso=>DAYS3[new Date(iso+'T00:00:00').getDay()].slice(0,3);

function clOn(c,date){if(c.status&&c.status!=='Active')return false;
  if(c.startDate&&date<c.startDate)return false;
  if(c.endDate&&date>c.endDate)return false;
  const dy=dayAbbr(date);
  const dn=new Date(date+'T00:00:00').getDate();
  if(c.frequency==='Daily'){
    if(!c.schedule||c.schedule==='Every day')return true;
    return(c.selectedDays||[]).includes(dy);
  }
  if(c.frequency==='Weekly')return(c.selectedDays||[]).includes(dy);
  if(c.frequency==='Monthly'){
    const lastDay=new Date(new Date(date+'T00:00:00').getFullYear(),new Date(date+'T00:00:00').getMonth()+1,0).getDate();
    const isLast=dn===lastDay;
    const sdt=(c.selectedDates||[]).map(x=>x==='L'?'L':Number(x));
    return sdt.includes(dn)||(isLast&&sdt.includes('L'));
  }
  if(c.frequency==='Custom')return(c.customDates||[]).includes(date);
  return true;
}

  const bg=type==='ok'?'#15171C':type==='warn'?'#D97706':'#DC2626';
  t.innerHTML=`<div class="pop" style="background:${bg};color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.25)">${type==='ok'?'✓':'⚠'} ${esc(msg)}</div>`;
  clearTimeout(_toast);_toast=setTimeout(()=>{if(t)t.innerHTML='';},2800);
}

/* ===== Egress-reduction helpers: 30-day windowing + lazy per-tab loading ===== */
const _DAY_MS=24*60*60*1000;
function _cutoff30ISO(){return new Date(Date.now()-30*_DAY_MS).toISOString();}
function _cutoff30Date(){return _cutoff30ISO().slice(0,10);}
function _mapTk(rows){return(rows||[]).map(t=>({id:t.id,title:t.title||'',description:t.description||'',priority:t.priority||'Medium',status:t.status||'Open',assignedTo:t.assigned_to||null,createdBy:t.created_by||null,checklistId:t.checklist_id||null,questionId:t.question_id||null,questionText:t.question_text||'',answerGiven:t.answer_given||'',submitterId:t.submitter_id||null,date:t.date||null,createdAt:t.created_at,resolvedAt:t.resolved_at||null,resolveNote:t.resolve_note||'',viewedBy:t.viewed_by||[]}));}
function _roleCtx(){const _uid=S.uid;const _isAdmin=isAdmin();const _isSubAdmin=isSubAdmin();const _isMgr=isMgr();const _teamIds=(_isMgr&&!_isAdmin)?new Set([_uid,...subTree(_uid).map(u=>u.id)]):null;return{_uid,_isAdmin,_isSubAdmin,_isMgr,_teamIds};}
// Apply helpers — shared by the startup bulk load AND the lazy per-tab loaders so the
// role-based visibility filtering can never drift between the two paths.
function _applySubmissions(subs,{merge=false}={}){
  const {_uid,_isAdmin,_isSubAdmin,_isMgr,_teamIds}=_roleCtx();
  const allSubs=_mS(subs||[]);
  let visible;
  if(_isAdmin||_isSubAdmin){visible=allSubs;}
  else if(_isMgr){const _grpIds=new Set(DB.checklists.filter(c=>c.anyOne&&(c.assignees||[]).includes(_uid)).map(c=>c.id));visible=allSubs.filter(s=>_teamIds.has(s.userId)||_grpIds.has(s.checklistId));}
  else{const _grpIds=new Set(DB.checklists.filter(c=>c.anyOne&&(c.assignees||[]).includes(_uid)).map(c=>c.id));visible=allSubs.filter(s=>s.userId===_uid||_grpIds.has(s.checklistId));}
  if(merge){const byId=new Map((DB.submissions||[]).map(s=>[s.id,s]));visible.forEach(s=>byId.set(s.id,s));DB.submissions=[...byId.values()];}
  else{DB.submissions=visible;}

function _applyApprovals(appr){
  const {_uid,_isAdmin,_isSubAdmin,_isMgr,_teamIds}=_roleCtx();
  const allAppr=_mA(appr||[]);
  if(_isAdmin||_isSubAdmin){DB.approvals=allAppr;}
  else if(_isMgr){DB.approvals=allAppr.filter(a=>_teamIds.has(a.requesterId)||a.requesterId===_uid);}
  else{DB.approvals=allAppr.filter(a=>a.requesterId===_uid);}
}
function _applyNotifications(notifs){
  const _uid=S.uid;
  DB.notifications=(notifs||[]).filter(n=>n.user_id===_uid).map(n=>({id:n.id,userId:n.user_id,text:n.text||'',read:n.read||false,time:n.created_at}));
}
function _applyFeedback(feedbackRows){
  if(!feedbackRows){DB.feedback=DB.feedback||[];return;}
  const {_uid,_isAdmin,_isSubAdmin,_isMgr,_teamIds}=_roleCtx();
  const allFb=feedbackRows.map(fb=>({id:fb.id,checklistId:fb.checklist_id||null,userId:fb.user_id,managerId:fb.manager_id,date:fb.date||null,title:fb.title||null,type:fb.type||'General',text:fb.text||'',priority:fb.priority||'Low',taskName:fb.task_name||null,level:fb.level||'direct',status:fb.status||'Sent',acknowledged:fb.acknowledged||false,acknowledgedAt:fb.acknowledged_at||null,reply:fb.reply||null,repliedAt:fb.replied_at||null,replies:fb.replies||[],createdAt:fb.created_at}));

function _applyFolders(docFolderRows){
  if(!docFolderRows)return;
  const _delFolders=new Set(DB.folders_deleted||[]);
  DB.folders=docFolderRows.filter(f=>!_delFolders.has(f.id)).map(f=>({id:f.id,name:f.name,parentId:f.parent_id||null,type:f.type,scope:f.scope,createdBy:f.created_by||null,createdAt:f.created_at}));
}
function _applyDocuments(docRows){
  if(!docRows)return;
  const _delDocs=new Set(DB.documents_deleted||[]);
  // Also drop any document whose folder is tombstoned — guards against orphaned docs
  // reappearing after a folder delete + refresh (§11).
  const _delFolders=new Set(DB.folders_deleted||[]);
  DB.documents=docRows.filter(d=>!_delDocs.has(d.id)&&!_delFolders.has(d.folder_id||'')).map(d=>({id:d.id,name:d.name,folderId:d.folder_id||null,type:d.type,scope:d.scope,url:d.url,storagePath:d.storage_path||null,fileType:d.file_type||null,fileSize:d.file_size||null,uploadedBy:d.uploaded_by||null,uploaderName:d.uploader_name||null,uploadedAt:d.uploaded_at}));
}
function _applyTickets(rows){
  const {_uid,_isAdmin,_isSubAdmin}=_roleCtx();
  const allTk=_mapTk(rows||[]);
  // Admin/subadmin see all; everyone else only tickets assigned to them.
  const visible=(_isAdmin||_isSubAdmin)?allTk:allTk.filter(t=>t.assignedTo===_uid);
  // Keep any local-only tickets (just created, or older than the 30-day window) that the
  // server query didn't return — never drop them.
  const fromSB=new Set(allTk.map(t=>t.id));
  const localOnly=(DB.tickets||[]).filter(t=>!fromSB.has(t.id));
  DB.tickets=[...visible,...localOnly];

// Per-tab lazy loaders — fetch only the opened tab's data (last 30 days), nothing on a timer.
let _tabLoading={};
async function _lazyLoad(kind){
  if(!S.uid||document.visibilityState==='hidden'||_tabLoading[kind])return;
  _tabLoading[kind]=true;
  try{
    const c=_cutoff30ISO();
    if(kind==='tickets'){const{data,error}=await sb.from('tickets').select('*').gte('created_at',c).order('created_at',{ascending:false});if(error){console.error('[TK] lazy error:',error.message);}else _applyTickets(data);}
    else if(kind==='approvals'){const{data,error}=await sb.from('approvals').select('*').gte('created_at',c).order('created_at',{ascending:false});if(!error)_applyApprovals(data);}
    else if(kind==='notifications'){const{data,error}=await sb.from('notifications').select('*').gte('created_at',c).order('created_at',{ascending:false});if(!error)_applyNotifications(data);}
    else if(kind==='feedback'){const{data,error}=await sb.from('feedback').select('*').gte('created_at',c).order('created_at',{ascending:false});if(!error)_applyFeedback(data);}
    else if(kind==='documents'){const r=await Promise.all([sb.from('documents').select('*').gte('uploaded_at',c).order('uploaded_at',{ascending:false}),sb.from('doc_folders').select('*').order('created_at',{ascending:false})]);if(!r[0].error)_applyDocuments(r[0].data);if(!r[1].error)_applyFolders(r[1].data);}
    saveDB();rr();
  }catch(e){console.warn('[lazyLoad]',kind,e.message);}
  finally{_tabLoading[kind]=false;}
}
async function _lazyLoadDate(view){
  if(!S.uid||document.visibilityState==='hidden')return;
  let d;
  if(view==='mychecklists')d=S.calDate||todayISO();
  else if(view==='teamview')d=S.tvCalDate||todayISO();
  else if(view==='allcl')d=(S.filters&&S.filters.aclDate)||todayISO();
  if(!d)return;
  const key='subs:'+d;
  if(_tabLoading[key])return;_tabLoading[key]=true;
  try{
    const{data,error}=await sb.from('submissions').select('*').eq('date',d).order('submitted_at',{ascending:false});
    if(!error){_applySubmissions(data,{merge:true});saveDB();rr();}
  }catch(e){console.warn('[lazyLoadDate]',e.message);}
  finally{_tabLoading[key]=false;}
}
// Refresh only the active route's data — used on navigation and when the tab regains focus.
function _lazyForRoute(r){
  if(document.visibilityState==='hidden'||!S.uid)return;
  if(r==='tickets')_lazyLoad('tickets');
  else if(r==='approvals')_lazyLoad('approvals');
  else if(r==='notifications'){_lazyLoad('notifications');_lazyLoad('feedback');}
  else if(r==='departments'||r==='locations')_lazyLoad('documents');
  else if(r==='mychecklists')_lazyLoadDate('mychecklists');
  else if(r==='teamview')_lazyLoadDate('teamview');
  else if(r==='allcl')_lazyLoadDate('allcl');
  else if(r==='dashboard'){_lazyLoad('tickets');_lazyLoadDate('mychecklists');}
}

async function loadFromSB(){
  // Check and refresh session before queries — prevents 401 on stale tokens
  try{
    const {data:{session},error}=await sb.auth.getSession();
    if(error||!session){
      const {data:refreshData,error:refreshErr}=await sb.auth.refreshSession();
      if(refreshErr||!refreshData?.session){
        console.warn('[auth] no valid session, skipping loadFromSB');
        return; // Don't loop — user needs to log in again
      }
    }
  }catch(e){console.warn('[auth] session check:',e.message);}

  // Egress control: the big tables load only the last 30 days at startup. Older rows stay
  // in the DB and load on demand when the user opens that day/tab. Small reference tables
  // (departments, locations, checklists, audit_logs, profiles, doc_folders, questions) load fully.
  const _c30=_cutoff30ISO(), _c30d=_cutoff30Date();
  let depts,locs,allCls,subs,appr,audit,notifs,profiles,feedbackRows,docFolderRows,docRows,qRows;
  try{
    const res=await Promise.all([
      sb.from('departments').select('*').order('name'),
      sb.from('locations').select('*').order('name'),
      sb.from('checklists').select('*').order('created_at',{ascending:false}),
      sb.from('submissions').select('*').gte('date',_c30d).order('submitted_at',{ascending:false}),
      sb.from('approvals').select('*').gte('created_at',_c30).order('created_at',{ascending:false}),
      sb.from('audit_logs').select('*').order('created_at',{ascending:false}).limit(300),
      sb.from('notifications').select('*').gte('created_at',_c30).order('created_at',{ascending:false}),
      sb.from('profiles').select('*').order('first_name'),
      sb.from('feedback').select('*').gte('created_at',_c30).order('created_at',{ascending:false}),
      sb.from('doc_folders').select('*').order('created_at',{ascending:false}),
      sb.from('documents').select('*').gte('uploaded_at',_c30).order('uploaded_at',{ascending:false}),
      sb.from('questions').select('*').order('created_at',{ascending:false}),
    ]);
  [depts,locs,allCls,subs,appr,audit,notifs,profiles,feedbackRows,docFolderRows,docRows,qRows]=res.map(r=>r.data||[]);
  }catch(e){
    console.error('loadFromSB failed:',e.message);
    return; // Keep existing cached data
  }
  // ── Role-based IDs for filtering ──
  // NOTE: DB.users is populated below from profiles, but we need it for subTree.
  // Use the already-loaded DB.users from local cache for role checks here.
  const _uid=S.uid;
  const _isAdmin=isAdmin();
  const _isSubAdmin=isSubAdmin();
  const _isMgr=isMgr();
  const _teamIds=(_isMgr&&!_isAdmin)?new Set([_uid,...subTree(_uid).map(u=>u.id)]):null;

  // ── Departments + Locations: everyone sees all ──
  const _delDepts=new Set(DB.departments_deleted||[]);
  DB.departments=(depts||[]).filter(d=>!_delDepts.has(d.id)).map(d=>({id:d.id,name:d.name}));
  const _delLocs=new Set(DB.locations_deleted||[]);
  DB.locations=(locs||[]).filter(l=>!_delLocs.has(l.id)).map(l=>({id:l.id,name:l.name,address:l.address||'',department:l.department||'',status:l.status||'Active'}));

  // ── Checklists ──
  {
    const _delCls=new Set(DB.checklists_deleted||[]);
    const mapped=_mC(allCls||[]).filter(c=>!_delCls.has(c.id));
    // IDs that came back from Supabase this load
    const _serverIds=new Set(mapped.map(c=>c.id));
    // Local checklists the current user owns that have NOT yet arrived from the server
    // (e.g. an upsert that hasn't completed yet, or one blocked by RLS). These must NOT
    // be wiped on refresh — keep them so the user never loses a checklist they just made.
    const _localPending=(DB.checklists||[]).filter(c=>
      !_serverIds.has(c.id)&&!_delCls.has(c.id)&&
      (c.createdBy===_uid||(c.assignees||[]).includes(_uid))
    );
    let _visible;
    if(mapped.length===0&&DB.checklists.length>0){
      // Nothing from Supabase — keep local cache (RLS may be blocking)
      _visible=DB.checklists.filter(c=>!_delCls.has(c.id));
    } else if(_isAdmin||_isSubAdmin){
      _visible=mapped;
    } else if(_isMgr){
      // Manager: checklists he created OR assigned to him OR assigned to his team
      _visible=mapped.filter(c=>c.createdBy===_uid||(c.assignees||[]).includes(_uid)||(_teamIds&&(c.assignees||[]).some(a=>_teamIds.has(a))));
    } else {
      // User: checklists assigned to them OR created by them
      _visible=mapped.filter(c=>(c.assignees||[]).includes(_uid)||c.createdBy===_uid);
    }
    // Merge in any local-only checklists the server didn't return, de-duplicated by id.
    const _seen=new Set(_visible.map(c=>c.id));
    DB.checklists=[..._visible,..._localPending.filter(c=>!_seen.has(c.id))];
  }

  // ── Submissions (role filtering via shared helper) ──
  _applySubmissions(subs);

  // ── Approvals (role filtering via shared helper) ──
  _applyApprovals(appr);

  // ── Audit logs: admin + subadmin ──
  if(_isAdmin||_isSubAdmin){
    DB.audit=(audit||[]).map(l=>({id:l.id,actor:l.actor||'',action:l.action||'',target:l.target||'',time:l.created_at}));
  } else {
    DB.audit=[];
  }

  // ── Notifications: always only for this user (shared helper) ──
  _applyNotifications(notifs);
  // ── Profiles (users): always load ALL users ──
  // subTree(), fullName(), uById(), avatar(), checklist assignee picker all need full user list.
  // Role-based visibility is enforced at the page/UI level, not by restricting DB.users.
  {
    const _savedQAccess={};DB.users.forEach(u=>{if(u.questionsAccess)_savedQAccess[u.id]=true;});
    // ── HRM: _mU() rebuilds DB.users and does NOT carry u.hrm (no Supabase column). Snapshot
    //    and re-merge so schedule/HR/report-perm data survives every background refresh. ──
    const _savedHrm={};DB.users.forEach(u=>{if(u.hrm)_savedHrm[u.id]=u.hrm;});
    const _delUsers=new Set(DB.users_deleted||[]);
    DB.users=_mU(profiles).filter(u=>!_delUsers.has(u.id));
    DB.users.forEach(u=>{if(!u.questionsAccess&&_savedQAccess[u.id])u.questionsAccess=true;});
    DB.users.forEach(u=>{if(_savedHrm[u.id])u.hrm=_savedHrm[u.id];_ensureHrm(u);});
  }

  // ── Questions: load ALL for everyone — needed so checklist cards can show questions ──
  // Questions tab visibility is controlled by nav (users have no tab, manager needs questionsAccess)
  // Questions tab content is filtered by createdBy in questionsPage()
  if(qRows){
    const _delQs=new Set(DB.questions_deleted||[]);
    DB.questions=qRows.filter(q=>!_delQs.has(q.id)).map(q=>({id:q.id,text:q.text||'',type:q.type||'answer',options:q.options||[],photo:q.photo||false,approval:q.approval||false,comment:q.comment||false,isPublic:q.is_public!==false,createdBy:q.created_by||null,createdAt:q.created_at}));
  }

  // ── Feedback: role-scoped (shared helper, last-30-day window) ──
  _applyFeedback(feedbackRows);

  // ── Documents + Folders: everyone sees all (access controlled by scope in UI) ──
  // Tombstone guard: snapshot the deleted-id sets before any rebuild so a server
  // round-trip can never resurrect a deleted folder/document (§11). loadFromSB does not
  // touch these arrays, but we re-assert them defensively (mirrors the _savedHrm pattern).
  if(!DB.folders_deleted)DB.folders_deleted=[];
  if(!DB.documents_deleted)DB.documents_deleted=[];
  const _savedFolDel=[...DB.folders_deleted], _savedDocDel=[...DB.documents_deleted];
  _applyFolders(docFolderRows);
  _applyDocuments(docRows);
  DB.folders_deleted=_savedFolDel; DB.documents_deleted=_savedDocDel;
  // Belt-and-suspenders: filter any rows that slipped through (e.g. a row whose folder
  // is tombstoned but the doc id itself was not previously recorded).
  {
    const _fd=new Set(DB.folders_deleted), _dd=new Set(DB.documents_deleted);
    DB.folders=(DB.folders||[]).filter(f=>!_fd.has(f.id));
    DB.documents=(DB.documents||[]).filter(d=>!_dd.has(d.id)&&!_fd.has(d.folderId||''));
  }

  // ── Tickets: last 30 days, role-filtered via shared helper ──
  sb.from('tickets').select('*').gte('created_at',_cutoff30ISO()).order('created_at',{ascending:false})
    .then(({data,error})=>{
      if(error){console.error('[TK] error:',error.message);return;}
      _applyTickets(data);saveDB();rr();
    }).catch(e=>console.error('[TK] fetch failed:',e.message));
}

function saveDB(){
  // Always save to localStorage — strip large base64 photos to avoid 5MB limit
  try{
    const dbCopy=JSON.parse(JSON.stringify({DB,uid:S.uid}));
    // Strip base64 photos from submissions to avoid 5MB localStorage limit
    (dbCopy.DB.submissions||[]).forEach(s=>{
      (s.tasks||[]).forEach(t=>{if(t.photo&&t.photo.startsWith('data:'))t.photo='[photo]';});

      (s.questionResponses||[]).forEach(r=>{

      });
    });
    // §7: strip personal-document base64 bytes (kept in-memory only; metadata persists).
    (dbCopy.DB.users||[]).forEach(u=>{
      const pd=u.hrm&&Array.isArray(u.hrm.personalDocs)?u.hrm.personalDocs:null;
      if(pd)pd.forEach(d=>{if(d.dataUrl&&typeof d.dataUrl==='string'&&d.dataUrl.startsWith('data:'))d.dataUrl=null;});
    });

    // If still too large, save without submissions — also strip personal-document

    try{
      const slim={DB:{...DB,submissions:[]},uid:S.uid};
      slim.DB.users=(DB.users||[]).map(u=>{
        if(!(u.hrm&&Array.isArray(u.hrm.personalDocs)))return u;

    }
  }

  clearTimeout(_syncTimer);

let _notifCache={uid:null,count:0,ts:0};
function _notifCount(){
  const uid=S.uid;if(!uid)return 0;
  const now=Date.now();
  // Cache for 3 seconds to avoid recalculating on every rr()
  if(_notifCache.uid===uid&&now-_notifCache.ts<3000)return _notifCache.count;
  let count=0;
  if(isAdmin()||isMgr()){
    const myTree=subTree(uid).map(u=>u.id);
    count+=DB.approvals.filter(a=>a.status==='Pending'&&(isAdmin()||myTree.includes(a.requesterId))).length;
  }
  count+=DB.notifications.filter(n=>n.userId===uid&&!n.read).length;
  // Count unviewed tickets assigned to me
  const unviewedTickets=(DB.tickets||[]).filter(t=>t.assignedTo===uid&&!(t.viewedBy||[]).includes(uid)).length;
  count+=unviewedTickets;
  _notifCache={uid,count,ts:now};

}

function _recoverEditingSubmissions(){

  DB.submissions.forEach(s=>{
    if(s.status==='Editing'){
      if(RUN[s.checklistId]){
        // Already has an active RUN — restore questionResponses into it
        if(!RUN[s.checklistId].questionResponses&&s.questionResponses)
          RUN[s.checklistId].questionResponses=JSON.parse(JSON.stringify(s.questionResponses||[]));
      } else {

        const today=todayISO();
        const cl=clById(s.checklistId);const late=s.date<today||(s.date===today&&cl?.scheduleTime&&nowHM()>hm2m(cl.scheduleTime));
        s.status=s.editCount>0?(late?'Late':'On Time'):(late?'Late':'Pending');

      }
    }
  });
}

  if(!isAdmin()&&can('documentsOrg','view')){

App.login=async()=>{

    const idx=DB.users.findIndex(x=>x.id===u.id);

/* ===== DASHBOARD HELPERS: date range filter + tickets panel ===== */
const DASH_RANGES=[['all','All time'],['today','Today'],['yesterday','Yesterday'],['cweek','Current week'],['lweek','Last week'],['cmonth','Current month'],['lmonth','Last month'],['custom','Custom range']];
function _dashRangeBounds(){
  const r=S.filters.dashRange||'all';
  const today=todayISO();
  const t=new Date(today+'T00:00:00');
  const iso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(r==='today')return{from:today,to:today};
  if(r==='yesterday'){const d=new Date(t);d.setDate(d.getDate()-1);const y=iso(d);return{from:y,to:y};}
  if(r==='cweek'){const d=new Date(t);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));return{from:iso(d),to:today};}
  if(r==='lweek'){const d=new Date(t);const dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow)-7);const e=new Date(d);e.setDate(e.getDate()+6);return{from:iso(d),to:iso(e)};}
  if(r==='cmonth'){return{from:iso(new Date(t.getFullYear(),t.getMonth(),1)),to:today};}
  if(r==='lmonth'){return{from:iso(new Date(t.getFullYear(),t.getMonth()-1,1)),to:iso(new Date(t.getFullYear(),t.getMonth(),0))};}
  if(r==='custom'){
    const f=S.filters.dashFrom||'',e=S.filters.dashTo||'';
    if(!f&&!e)return null;
    return{from:f||'0000-01-01',to:e||'9999-12-31'};
  }
  return null; // 'all'
}
const _inDashRange=date=>{const b=_dashRangeBounds();if(!b)return true;return !!date&&date>=b.from&&date<=b.to;};
function _dashFilterBar(){
  const r=S.filters.dashRange||'all';
  const b=_dashRangeBounds();
  return`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;padding:10px 14px;background:#fff;border-radius:14px;border:1.5px solid #ECEDF0">
    <span style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em">📅 Date range</span>
    <select onchange="S.filters.dashRange=this.value;rr()" style="background:#fff;border:1.5px solid #E5E7EB;border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600;outline:none;cursor:pointer">
      ${DASH_RANGES.map(([id,lbl])=>`<option value="${id}" ${r===id?'selected':''}>${lbl}</option>`).join('')}
    </select>
    ${r==='custom'?`
      <input type="date" value="${esc(S.filters.dashFrom||'')}" onchange="S.filters.dashFrom=this.value;rr()" style="border:1.5px solid #E5E7EB;border-radius:9px;padding:5px 8px;font-size:13px;outline:none"/>
      <span style="font-size:12px;color:#9CA3AF">to</span>
      <input type="date" value="${esc(S.filters.dashTo||'')}" onchange="S.filters.dashTo=this.value;rr()" style="border:1.5px solid #E5E7EB;border-radius:9px;padding:5px 8px;font-size:13px;outline:none"/>
    `:''}
    ${b?`<span style="font-size:12px;color:#6B7280;font-weight:600">${b.from===b.to?new Date(b.from+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):new Date(b.from+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+new Date(b.to+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}
  </div>`;
}
function _dashTicketsPanel(scopeUsers){
  const open=(DB.tickets||[]).filter(t=>t.status==='Open'||t.status==='In Progress');
  const ids=scopeUsers?new Set(scopeUsers.map(u=>u.id)):null;
  const counts={};let unassigned=0;
  open.forEach(t=>{
    if(!t.assignedTo){if(!ids)unassigned++;return;}
    if(ids&&!ids.has(t.assignedTo))return;
    counts[t.assignedTo]=(counts[t.assignedTo]||0)+1;
  });
  const rows=Object.entries(counts).map(([uid2,n])=>({u:uById(uid2),n})).filter(r=>r.u).sort((a,b)=>b.n-a.n);
  const total=rows.reduce((s,r)=>s+r.n,0)+unassigned;
  return`<div class="bg-white rounded-2xl border border-ink-100 shadow-soft overflow-hidden">
    <div class="px-4 py-3 border-b border-ink-100 flex justify-between items-center">
      <h3 class="fd font-semibold text-sm">Open tickets by user</h3>
      <button onclick="App.go('tickets')" class="text-xs font-semibold text-brand-700">View all →</button>
    </div>
    <div class="divide-y divide-ink-50">
      ${rows.map(({u,n})=>`<div class="px-4 py-2.5 flex items-center gap-2.5" style="cursor:pointer" onclick="App.go('tickets')">${avatar(u,'w-7 h-7','text-[10px]')}<div class="flex-1 min-w-0"><div class="text-xs font-semibold truncate">${esc(fullName(u))}</div><div class="text-[11px] text-ink-400">not completed</div></div><span style="font-size:12px;font-weight:800;min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:13px;background:${n>=5?'#FFEDED':'#FEF7E6'};color:${n>=5?'#C92C2C':'#B36A00'};padding:0 8px">${n}</span></div>`).join('')}
      ${unassigned?`<div class="px-4 py-2.5 flex items-center gap-2.5"><div style="width:28px;height:28px;border-radius:50%;background:#F3F4F6;display:grid;place-items:center;font-size:11px">？</div><div class="flex-1 min-w-0"><div class="text-xs font-semibold">Unassigned</div></div><span style="font-size:12px;font-weight:800;min-width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:13px;background:#F3F4F6;color:#6B7280;padding:0 8px">${unassigned}</span></div>`:''}
      ${!total?'<div class="px-4 py-8 text-center text-sm text-ink-400">No open tickets 🎉</div>':''}
    </div>
  </div>`;
}

/* ════════ §7 — PERSONAL DOCUMENTS ON PROFILES (frontend-only) ════════
   Metadata on u.hrm.personalDocs (rides on u.hrm → never synced). Base64 bytes held in
   memory for the session only and STRIPPED in saveDB → durable storage is a backend
   connection point (content lost on reload until backend exists). Max 3MB/file. */
const PERSONAL_DOC_MAX=3*1024*1024;
// Render the Documents area for target user `u`. Honors documentsPersonal scope/actions.
function _personalDocsSection(u){
  if(!u)return'';
  const isSelf=u.id===S.uid;
  // scope: self-edits always allowed (own profile); viewing others requires scope.
  if(!isSelf&&!scopeFilter('documentsPersonal')(u.id))return'';
  if(!can('documentsPersonal','view'))return'';
  _ensureHrm(u);
  const docs=(u.hrm.personalDocs||[]).slice().sort((a,b)=>(b.uploadedAt||'').localeCompare(a.uploadedAt||''));
  const canUpload=can('documentsPersonal','create');
  const canDl=can('documentsPersonal','download');
  const canDel=can('documentsPersonal','delete');
  const rows=docs.length?docs.map(d=>{
    const ext=(d.name.split('.').pop()||'').toLowerCase();
    const icon=ext==='pdf'?'📄':ext.match(/xlsx?|csv/)?'📊':ext.match(/docx?/)?'📝':ext.match(/png|jpe?g|gif|webp|bmp/)?'🖼️':'📎';
    const gone=!d.dataUrl; // bytes stripped on reload → metadata-only
    return'<div style="display:flex;align-items:center;gap:10px;background:#F6F7F8;border-radius:10px;padding:10px">'
      +'<span style="font-size:20px">'+icon+'</span>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(d.name)+'</div>'
      +'<div style="font-size:11px;color:#9CA3AF">'+esc((d.type||'file').split('/').pop()||'file')+' · '+_fmtSize(d.size)+' · '+fmtD((d.uploadedAt||'').slice(0,10))+(gone?' · <span style="color:#B45309">not on this device</span>':'')+'</div></div>'
      +(canDl&&!gone?'<button type="button" onclick="App._openPersonalDoc(\''+u.id+'\',\''+d.id+'\')" style="padding:5px 10px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:12px;font-weight:600;cursor:pointer">Open</button>':'')
      +(canDel?'<button type="button" onclick="App._delPersonalDoc(\''+u.id+'\',\''+d.id+'\')" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;border:none;background:#FEF2F2;color:#DC2626;cursor:pointer;flex-shrink:0">'+ic('trash','w-3.5 h-3.5')+'</button>':'')
      +'</div>';
  }).join(''):'<p style="font-size:12px;color:#9CA3AF;text-align:center;padding:10px">No documents yet.</p>';
  return'<div style="border-top:1px solid #ECEDF0;margin-top:14px;padding-top:14px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
    +'<p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF">Documents</p>'
    +(canUpload?'<label style="font-size:12px;font-weight:600;color:#0E7A4F;cursor:pointer">+ Upload<input type="file" style="display:none" onchange="App._uploadPersonalDoc(\''+u.id+'\',this)"></label>':'')
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'+rows+'</div>'
    +'<p style="font-size:10px;color:#B8B5AC;margin-top:8px">Files under 3MB are held for this session. Durable storage connects when the backend is added — content may be lost on reload until then.</p>'
    +'</div>';
}
App._uploadPersonalDoc=(userId,input)=>{
  const u=uById(userId);if(!u)return;
  const isSelf=userId===S.uid;
  if(!can('documentsPersonal','create')||(!isSelf&&!scopeFilter('documentsPersonal')(userId))){toast('Not allowed','err');return;}
  const file=(input.files||[])[0];if(!file)return;
  if(file.size>PERSONAL_DOC_MAX){toast('File too large — max 3MB','err');input.value='';return;}
  const reader=new FileReader();
  reader.onload=()=>{
    _ensureHrm(u);
    u.hrm.personalDocs.push({id:uid('pd'),name:file.name,type:file.type||'',size:file.size,uploadedAt:new Date().toISOString(),uploadedBy:S.uid,dataUrl:reader.result});
    saveDB();
    toast('Uploaded ✓');
    // Re-render the open user-edit modal (or profile page) in place.
    if(document.getElementById('u-role'))App.editUser(userId);else rr();
  };
  reader.onerror=()=>toast('Could not read file','err');
  reader.readAsDataURL(file);
};
App._openPersonalDoc=(userId,docId)=>{
  const u=uById(userId);if(!u)return;
  if(!can('documentsPersonal','download')){toast('Not allowed','err');return;}
  const d=(u.hrm?.personalDocs||[]).find(x=>x.id===docId);
  if(!d||!d.dataUrl){toast('File not available on this device','warn');return;}
  if((d.type||'').startsWith('image/')){App._bigImg(d.dataUrl);return;}
  const w=window.open();
  if(w){if((d.type||'')==='application/pdf'||d.dataUrl.startsWith('data:application/pdf')){w.document.write('<iframe src="'+d.dataUrl+'" style="border:0;width:100%;height:100%"></iframe>');}else{const a=w.document.createElement('a');a.href=d.dataUrl;a.download=d.name;w.document.body.appendChild(a);a.click();}}
  else toast('Allow pop-ups to open the file','warn');
};
App._delPersonalDoc=(userId,docId)=>{
  const u=uById(userId);if(!u)return;
  const isSelf=userId===S.uid;
  if(!can('documentsPersonal','delete')||(!isSelf&&!scopeFilter('documentsPersonal')(userId))){toast('Not allowed','err');return;}
  if(!confirm('Delete this document?'))return;
  u.hrm.personalDocs=(u.hrm.personalDocs||[]).filter(x=>x.id!==docId);
  saveDB();toast('Deleted');
  if(document.getElementById('u-role'))App.editUser(userId);else rr();
};

App.saveUser=async(id)=>{
  // SEC-2: re-check action + scope before mutating (handler must not trust hidden buttons).
  if(id){
    if(!can('employees','edit')||!scopeFilter('employees')(id)){toast('Not allowed','err');return;}
  }else if(!can('employees','create')){toast('Not allowed','err');return;}
  const g=i=>($('#'+i)?.value||'').trim();
  const fn=g('u-fn'),ln=g('u-ln'),email=g('u-email');
  if(!fn||!ln||!email){toast('Name & email required','err');return;}
  const mId=$('#u-mgr')?.value||null;
  if(id&&mId&&(mId===id||isDesc(mId,id))){toast('Circular hierarchy!','err');return;}

  // ── Read doc permissions FIRST (before any closeModal) ──
  const docAccess={departments:{},locations:{}};
  document.querySelectorAll('.doc-perm-dept').forEach(cb=>{
    const dept=cb.dataset.dept,p=cb.dataset.perm;
    if(!docAccess.departments[dept])docAccess.departments[dept]={view:false,upload:false,download:false,edit:false};
    docAccess.departments[dept][p]=cb.checked;
  });
  document.querySelectorAll('.doc-perm-loc').forEach(cb=>{
    const loc=cb.dataset.loc,p=cb.dataset.perm;
    if(!docAccess.locations[loc])docAccess.locations[loc]={view:false,upload:false,download:false,edit:false};
    docAccess.locations[loc][p]=cb.checked;
  });

  // ── Read ALL toggles and DOM values NOW, before any async/closeModal ──
  const questionsAccess=togV('u-qa');
  const rules={past:togV('u-rp'),future:togV('u-rf'),edit:togV('u-re')};
  const approval_settings={past:togV('u-ap'),future:togV('u-af'),edited:togV('u-ae')};
  // HRM fields — stored locally on u.hrm ONLY, never added to the Supabase upsert payload (pd)
  const hrm=_readHrmFromForm(id?uById(id)?.hrm:null);

  // SEC-1: never let a non-Super-Admin assign or change an elevated role.
  // Non-admins: force role 'User' on create, and preserve the existing role on edit.
  // Also: only a Super Admin may change a Super Admin's role.
  const reqRole=$('#u-role')?.value||'User';
  const existing=id?uById(id):null;
  let role;
  if(isAdmin()){
    role=reqRole;
  }else if(id){
    // preserve existing role verbatim; non-admins can never touch role on edit
    role=existing?existing.role:'User';
  }else{
    role='User';
  }
  if(existing&&existing.role==='Admin'&&!isAdmin())role=existing.role; // can't demote a Super Admin
  if(!isAdmin()&&(role==='Admin'||role==='SubAdmin')&&(!existing||existing.role!==role)){toast('Not allowed','err');return;}
  const pd={first_name:fn,last_name:ln,email,
    phone:g('u-phone'),position:g('u-pos'),
    department:$('#u-dep')?.value,role,
    status:$('#u-status')?.value,manager_id:mId||null,
    rules,approval_settings,
    doc_access:docAccess,questions_access:questionsAccess};

  if(id){
    // Update local state immediately
    const u=uById(id);
    // ── Manager change: record history so dashboards can scope by date ──
    // Rule: dates BEFORE the change belong to the old manager; the change date onwards belongs to the new one
    if(u&&(u.managerId||null)!==(mId||null)){
      const chDate=todayISO();
      let h=Array.isArray(u.managerHistory)?JSON.parse(JSON.stringify(u.managerHistory)):[];
      if(!h.length)h.push({managerId:u.managerId||null,from:'0001-01-01',to:chDate});
      else{const open=h.find(p=>!p.to);if(open)open.to=chDate;}
      h.push({managerId:mId||null,from:chDate,to:null});
      u.managerHistory=h;
      pd.manager_history=h;
    }
    if(u)Object.assign(u,{firstName:fn,lastName:ln,email,
      phone:pd.phone,position:pd.position,department:pd.department,
      role:pd.role,status:pd.status,managerId:mId,
      rules,approval:approval_settings,
      questionsAccess,
      docAccess,hrm});
    log(fullName(me()),'Edited user',fn+' '+ln);
    toast('Saved ✓');closeModal();saveDB();render();
    // Sync all fields including doc_access to Supabase in background
    sb.from('profiles').update(pd).eq('id',id).then(({error})=>{
      if(error)console.warn('saveUser sync:',error.message);
    });
  } else {
    const pw=g('u-pw');if(!pw){toast('Password required','err');return;}
    const saveBtn=document.querySelector('[onclick*="saveUser"]');
    if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Creating…';}
    toast('Creating user…','ok');
    const{data:res,error}=await sb.functions.invoke('create-user',{body:{...pd,password:pw}});
    if(error||res?.error){
      let msg=error?.message||res?.error||'Failed';
      try{if(error?.context){const b=await error.context.json();msg=b.error||msg;}}catch(e){}
      toast(msg,'err');
      if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='Create';}
      return;
    }
    const newId=res?.id||res?.user?.id;
    if(!newId){toast('User created — reload to see them','ok');closeModal();render();return;}
    DB.users.push(_ensureHrm({id:newId,firstName:fn,lastName:ln,email,
      phone:pd.phone,position:pd.position,department:pd.department,
      role:pd.role,status:pd.status,managerId:mId,
      rules:pd.rules,approval:pd.approval_settings,
      questionsAccess,
      docAccess,hrm,password:'***'}));
    // Save doc_access + questions_access for new user
    sb.from('profiles').update({doc_access:docAccess,questions_access:questionsAccess}).eq('id',newId).then(()=>{}).catch(()=>{});
    log(fullName(me()),'Created user',fn+' '+ln);
    toast('✓ '+fn+' '+ln+' created');
    closeModal();saveDB();render();
  }
};

App._doResetPw=async(uid)=>{

App.togUser=(id)=>{
  const u=uById(id);if(!u)return;
  // SEC-2: require employees.edit + target in scope; never disable a Super Admin unless Super Admin.
  if(!can('employees','edit')||!scopeFilter('employees')(id)){toast('Not allowed','err');return;}
  if(u.role==='Admin'&&!isAdmin()){toast('Not allowed','err');return;}
  const enabling=u.status!=='Active';
  u.status=enabling?'Active':'Inactive';
  // M8: deactivating an employee must not strand their Pending leave / leak the reserved `pending` balance.
  if(!enabling){
    let released=0;
    (DB.leaveRequests||[]).filter(r=>r.userId===id&&r.status==='Pending').forEach(r=>{
      // DATA-2: release against the SAME balance row the reservation was placed on.
      if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(u,r.start));b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));}
      r.status='Rejected';r.hrNote='Auto-rejected — employee deactivated';released++;
    });
    if(released)hlog('Leave auto-rejected on deactivation',fullName(u)+' ('+released+')');
  }
  saveDB();render();
  toast(fullName(u)+' '+(enabling?'enabled ✓':'disabled'),enabling?'ok':'warn');
  sb.from('profiles').update({status:u.status}).eq('id',id).then(()=>{}).catch(e=>console.warn('togUser:',e));
};
App.delUser=async(id)=>{
  const u=uById(id);if(!u)return;
  // SEC-2: require employees.delete + target in scope; never delete a Super Admin unless Super Admin.
  if(!can('employees','delete')||!scopeFilter('employees')(id)){toast('Not allowed','err');return;}
  if(u.role==='Admin'&&!isAdmin()){toast('Not allowed','err');return;}
  const name=fullName(u);
  if(!confirm('Permanently delete '+name+'?\n\nThis will delete ALL their submissions and approvals. This cannot be undone.\n\nTo keep their data, use Disable instead.'))return;
  // Optimistic local cleanup first
  DB.users.filter(x=>x.managerId===id).forEach(x=>x.managerId=u.managerId);
  if(!DB.users_deleted)DB.users_deleted=[];
  if(!DB.users_deleted.includes(id))DB.users_deleted.push(id);
  DB.users=DB.users.filter(x=>x.id!==id);
  DB.checklists.forEach(c=>c.assignees=(c.assignees||[]).filter(a=>a!==id));
  DB.submissions=DB.submissions.filter(s=>s.userId!==id);
  DB.approvals=DB.approvals.filter(a=>a.requesterId!==id);
  DB.notifications=DB.notifications.filter(n=>n.userId!==id);
  DB.feedback=(DB.feedback||[]).filter(f=>f.userId!==id&&f.managerId!==id);
  // FIX: If ex-manager now has 0 direct reports, downgrade to User
  if(u.managerId){
    const exMgr=uById(u.managerId);
    if(exMgr&&exMgr.role==='Manager'){
      const stillHasTeam=DB.users.some(x=>x.managerId===exMgr.id);
      if(!stillHasTeam){
        exMgr.role='User';
        sb.from('profiles').update({role:'User'}).eq('id',exMgr.id).then(()=>{}).catch(()=>{});
        toast(fullName(exMgr)+' has no team — role changed to User','warn');
      }
    }
  }
  log(fullName(me()),'Deleted user',name);
  toast(name+' deleted','warn');
  render();saveDB();
  // Background Supabase deletion of all related data
  Promise.all([
    sb.from('submissions').delete().eq('user_id',id),
    sb.from('approvals').delete().eq('requester_id',id),
    sb.from('notifications').delete().eq('user_id',id),
    sb.from('feedback').delete().eq('user_id',id),
    sb.from('profiles').delete().eq('id',id),
  ]).then(()=>{}).catch(e=>console.warn('delUser cleanup:',e));
};

/* ===== DEPARTMENTS ===== */
function _scopeDocsTab(type, scopeKey){
  const u=me();const isAdm=isAdmin();
  const da=(u?.docAccess)||{departments:{},locations:{}};
  // perms H2: the legacy per-resource docAccess map (p.view/upload/download/edit) still decides WHICH
  // dept/loc this user reaches; the documentsOrg PERM_AREA now gates the ACTIONS on top of it. For an
  // UNASSIGNED user, can('documentsOrg',*)===hasDocAccess()===true whenever any p.* below is true, so
  // ANDing never strips an action they have today. A role profile can additionally restrict actions.
  const cView=isAdm||can('documentsOrg','view'),cUp=isAdm||can('documentsOrg','create'),cDl=isAdm||can('documentsOrg','download'),cDel=isAdm||can('documentsOrg','delete');
  function perm(){
    if(isAdm)return{view:true,upload:true,download:true,edit:true};
    const map=type==='dept'?da.departments:da.locations;
    const base=(map&&map[scopeKey])||{};
    // Intersect legacy per-resource grant with the area's action gate.
    return {view:!!base.view&&cView,upload:!!base.upload&&cUp,download:!!base.download&&cDl,edit:!!base.edit&&cDel};
  }
  const p=perm();
  if(!p.view&&!isAdm)return empty('folder','No access','You do not have document access for this '+(type==='dept'?'department':'location')+'.');

  const folderId=S.filters.docFolder||null;
  const scopeFolders=(DB.folders||[]).filter(f=>f.type===type&&f.scope===scopeKey&&(f.parentId||null)===(folderId||null));
  const scopeDocs=(DB.documents||[]).filter(d=>d.type===type&&d.scope===scopeKey&&(d.folderId||null)===(folderId||null));

  // Breadcrumb

  const crumbs=buildPath(folderId);
  const rootLabel=type==='dept'?scopeKey:(DB.locations.find(l=>l.id===scopeKey)?.name||scopeKey);

      +crumbs.map(f=>'<span style="color:#D1D5DB">›</span><button onclick="App._docNav(this.dataset.id)" data-id="'+f.id+'" style="font-size:13px;font-weight:600;color:'+(folderId===f.id?'#15171C':'#0E9F6E')+';background:none;border:none;cursor:pointer;padding:0">'+esc(f.name)+'</button>').join('')

  if(isAdm||p.upload)html+='<button onclick="App._uploadDocIn(\''+type+'\',\''+scopeKey+'\')" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:#15171C;color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer">⬆ Upload file</button>';
  html+='</div>';
  // Empty state
  if(!scopeFolders.length&&!scopeDocs.length){html+=empty('folder','No files yet',(isAdm||p.upload)?'Click "Upload file" to add documents':'No documents uploaded yet.');return html;}
  // Folders grid
  if(scopeFolders.length){
    html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px">'
      +scopeFolders.map(f=>'<div onclick="App._docNav(this.dataset.id)" data-id="'+f.id+'" class="fld-card" style="background:#fff;border-radius:14px;border:1.5px solid #ECEDF0;padding:14px;cursor:pointer;transition:all .15s">'
        +'<div style="font-size:28px;margin-bottom:8px">📁</div>'
        +'<div style="font-size:13px;font-weight:700">'+esc(f.name)+'</div>'
        +'<div style="font-size:11px;color:#9CA3AF;margin-top:4px">'+((DB.documents||[]).filter(d=>d.folderId===f.id).length)+' files</div>'
        +(isAdm||p.edit?'<button onclick="event.stopPropagation();App._delFolder(this.dataset.id)" data-id="'+f.id+'" style="margin-top:8px;font-size:11px;color:#DC2626;background:none;border:none;cursor:pointer;padding:0">Delete</button>':'')
        +'</div>'
      ).join('')+'</div>';
  }
  // Documents list
  if(scopeDocs.length){
    html+='<div style="background:#fff;border-radius:16px;border:1px solid #ECEDF0;overflow:hidden">'
      +scopeDocs.map((d,i)=>{
        const ext=(d.name.split('.').pop()||'').toLowerCase();
        const icon=ext==='pdf'?'📄':ext.match(/xlsx?|csv/)?'📊':ext.match(/docx?/)?'📝':ext.match(/pptx?/)?'📊':ext.match(/jpe?g|png|gif|webp/)?'🖼':'📎';
        return'<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:'+(i<scopeDocs.length-1?'1px solid #F3F4F6':'none')+'">'
          +'<span style="font-size:22px;flex-shrink:0">'+icon+'</span>'
          +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(d.name)+'</div>'
          +'<div style="font-size:11px;color:#9CA3AF;margin-top:1px">'+(d.uploadedAt?fmtS(d.uploadedAt.slice(0,10)):'')+' · '+(d.uploaderName||'')+(d.fileSize?' · '+_fmtSize(d.fileSize):'')+'</div></div>'
          +'<div style="display:flex;gap:6px;flex-shrink:0">'
          +(p.download||isAdm?'<button onclick="App._downloadDoc(this.dataset.id)" data-id="'+d.id+'" style="padding:5px 10px;border-radius:7px;background:#ECFDF5;color:#0E9F6E;font-size:12px;font-weight:700;border:1px solid #A7F3D0;cursor:pointer">↓ Download</button>':'')
          +(p.view||isAdm?'<button onclick="App._previewDoc(this.dataset.id)" data-id="'+d.id+'" style="padding:5px 10px;border-radius:7px;background:#F6F7F8;color:#374151;font-size:12px;font-weight:700;border:1px solid #ECEDF0;cursor:pointer">View</button>':'')
          +(isAdm||p.edit?'<button onclick="App._delDoc(this.dataset.id)" data-id="'+d.id+'" style="padding:5px 8px;border-radius:7px;background:#FEE2E2;color:#DC2626;font-size:12px;font-weight:700;border:1px solid #FECACA;cursor:pointer">✕</button>':'')
          +'</div></div>';
      }).join('')+'</div>';
  }
  return html;
}

App._createFolderIn=()=>{
  // Guard: prevent double-tap / double-submit
  if(App._folderCtx._creating)return;

  const name=(document.getElementById('nf-name')?.value||'').trim();
  if(!name){
    const inp=document.getElementById('nf-name');
    if(inp){inp.style.borderColor='#EF4444';inp.focus();}
    toast('Enter a folder name','err');
    return;
  }
  const {type:t,scope:s}=App._folderCtx;
  if(!t||!s){toast('Scope error — please try again','err');closeModal();return;}

  // Lock immediately
  App._folderCtx._creating=true;

  // Disable the button visually
  const createBtn=document.querySelector('[onclick="App._createFolderIn()"]');
  if(createBtn){createBtn.disabled=true;createBtn.textContent='Creating…';createBtn.style.opacity='0.7';}

  if(!DB.folders)DB.folders=[];
  const parentId=S.filters.docFolder||null;
  const f={
    id:uid('fld'),name,
    type:t,scope:s,
    parentId,
    createdBy:S.uid,
    createdAt:new Date().toISOString()
  };
  DB.folders.push(f);

  // Close modal first so user sees the result immediately
  closeModal();
  toast('📁 "'+name+'" created');
  App._folderCtx={type:null,scope:null,_creating:false};
  saveDB();
  render();

  // Sync to Supabase in background
  sb.from('doc_folders').insert({
    id:f.id,name:f.name,parent_id:f.parentId||null,
    type:f.type,scope:f.scope,
    created_by:f.createdBy,created_at:f.createdAt
  }).then(()=>{}).catch(e=>console.warn('folder sync:',e));
  log(fullName(me()),'Created folder',name);
};

/* === EMAIL CONNECTION POINT (backend wires sendEmail) ===
   This is the SINGLE place real email sending connects. Callers (incl. all hrm_* events)
   gate themselves on DB.hrmNotifPrefs via _hnpEmail(...) BEFORE calling queueEmail. The backend
   completes delivery by implementing/replacing sendEmail. No backend network call is added here. */
function queueEmail(eventKey,userId,clId,date,vars){
  // sendEmail is defined later in the file but called here — JS hoisting handles async functions
  if(typeof sendEmail==='function'){
    sendEmail(eventKey,userId,vars||{}).catch(e=>console.warn('[queueEmail] sendEmail failed:',e.message));
  }
}


/* ═══════════════ §10 — COMPANY ANNOUNCEMENTS (FRONTEND-ONLY) ═══════════════
   Data: DB.announcements (array) — never synced to Supabase.
   Per-user read-state: u.hrm.announcementsRead (array of ids) — rides on u.hrm (protected).
   Visibility honours optional dept/location targeting. New announcements in-app-notify + queue
   email per targeted recipient at the single EMAIL CONNECTION POINT below. */
function _visibleAnnouncements(){
  const u=me();if(!u)return[];
  const dep=u.department,loc=u.hrm?.locationId||null;
  return (DB.announcements||[]).filter(a=>(!a.deptTarget||a.deptTarget===dep)&&(!a.locTarget||a.locTarget===loc))
    .sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
}
function _annIsRead(id){const u=me();return !!(u&&Array.isArray(u.hrm?.announcementsRead)&&u.hrm.announcementsRead.includes(id));}
function _unreadAnnouncements(){return _visibleAnnouncements().filter(a=>!_annIsRead(a.id));}
// Recipients of an announcement = targeted users (dept/loc filtered), excluding the creator.
function _annRecipients(a){return DB.users.filter(u=>u.status!=='Inactive'&&(!a.deptTarget||u.department===a.deptTarget)&&(!a.locTarget||(u.hrm?.locationId||null)===a.locTarget)&&u.id!==a.createdBy);}
function _annDate(iso){if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}
// Top banner: newest unread announcement on every page (dismiss = mark read).
function _annBanner(){
  if(!S.uid||!can('announcements','view'))return'';
  const un=_unreadAnnouncements();if(!un.length)return'';
  const a=un[0];const more=un.length-1;
  return`<div class="fade" style="margin-top:14px;display:flex;align-items:flex-start;gap:12px;background:linear-gradient(90deg,#15171C,#262A33);color:#fff;border-radius:14px;padding:13px 15px">

    </div>
  </div>`;
}

          </div>

      }).join('')}</div>`;
  return`<div class="fade">${head}${search}${body}</div>`;

App._readAllAnnouncements=()=>{const u=me();if(!u)return;if(!Array.isArray(u.hrm.announcementsRead))u.hrm.announcementsRead=[];_visibleAnnouncements().forEach(a=>{if(!u.hrm.announcementsRead.includes(a.id))u.hrm.announcementsRead.push(a.id);});saveDB();toast('All announcements marked read');rr();};
App._delAnnouncement=(id)=>{
  const a=(DB.announcements||[]).find(x=>x.id===id);if(!a)return;
  if(!(isAdmin()||a.createdBy===S.uid||isHR())){toast('Not allowed','err');return;}
  if(!confirm('Delete this announcement for everyone?'))return;
  DB.announcements=(DB.announcements||[]).filter(x=>x.id!==id);
  // DATA-5: prune the deleted id from every user's read-state so the array doesn't grow unbounded.
  DB.users.forEach(u=>{if(u.hrm&&Array.isArray(u.hrm.announcementsRead)&&u.hrm.announcementsRead.includes(id))u.hrm.announcementsRead=u.hrm.announcementsRead.filter(x=>x!==id);});
  saveDB();toast('Announcement deleted');rr();
};

App.postAnnouncement=()=>{
  if(!can('announcements','create')){toast('Not allowed','err');return;}
  const title=($('#an-t')?.value||'').trim();
  const body=($('#an-b')?.value||'').trim();
  if(!title){toast('Title required','err');return;}
  if(!body){toast('Message required','err');return;}
  const deptTarget=$('#an-dep')?.value||null;
  const locTarget=$('#an-loc')?.value||null;
  const a={id:uid('ann'),title,body,deptTarget:deptTarget||null,locTarget:locTarget||null,createdBy:S.uid,createdAt:new Date().toISOString()};
  DB.announcements.unshift(a);
  const recipients=_annRecipients(a);
  /* === EMAIL CONNECTION POINT (backend wires sendEmail) ===
     Notify every targeted recipient: in-app (gated by inapp_announcement) + email
     (gated by email_announcement AND the hrm_email_enabled master switch via _hnpEmail).
     queueEmail is the SINGLE place real sending connects — no backend network call added here. */
  recipients.forEach(u=>{
    if(_hnp('inapp_announcement'))_hrmNotify(u.id,'📣 '+title);
    if(_hnpEmail('email_announcement'))queueEmail('announcement',u.id,null,null,{title,body});
  });
  saveDB();
  closeModal();
  toast('Announcement posted to '+recipients.length+' '+(recipients.length===1?'person':'people'));
  rr();
};

function deptsPage(){
  const sel=S.filters.deptSel||null;
  const stab=S.filters.deptTab||'docs';
  // ── Detail view ──
  if(sel){
    const d=DB.departments.find(x=>x.id===sel||x.name===sel);
    if(!d){S.filters.deptSel=null;return deptsPage();}
    const dUsers=DB.users.filter(u=>u.department===d.name);
    const dCls=DB.checklists.filter(c=>c.department===d.name);
    const TABS=[['docs','📁 Documents'],['users','👥 Users'],['checklists','✓ Checklists']];
    return'<div class="fade">'
      // Back bar
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
      +'<button onclick="App._closeDept()" style="width:34px;height:34px;border-radius:10px;border:1.5px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">'+ic('back','w-4 h-4')+'</button>'
      +'<div style="width:36px;height:36px;border-radius:10px;background:#ECFDF5;display:grid;place-items:center">'+ic('dept','w-4 h-4 text-brand-600')+'</div>'
      +'<div style="flex:1"><div class="fd" style="font-size:16px;font-weight:800">'+esc(d.name)+'</div>'
      +'<div style="font-size:12px;color:#9CA3AF">'+dUsers.length+' users · '+dCls.length+' checklists</div></div>'
      +(isAdmin()?'<button onclick="App.editDept(this.dataset.id)" data-id="'+d.id+'" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:#F6F7F8;color:#374151;font-size:13px;font-weight:600;border:1px solid #ECEDF0;cursor:pointer">'+ic('edit','w-4 h-4')+'Edit</button>':'')
      +'</div>'
      // Sub-tabs
      +'<div style="display:flex;gap:4px;margin-bottom:16px;background:#F6F7F8;border-radius:12px;padding:4px">'
      +TABS.map(([k,l])=>'<button onclick="App._setDeptTab(this.dataset.k)" data-k="'+k+'" style="flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:'+(stab===k?'#fff':'transparent')+';color:'+(stab===k?'#15171C':'#6B7280')+';box-shadow:'+(stab===k?'0 1px 4px rgba(0,0,0,.08)':'none')+'">'+l+'</button>').join('')
      +'</div>'
      // Tab content
      +(stab==='docs'?_scopeDocsTab('dept',d.name):'')
      +(stab==='users'
        ?('<div class="space-y-2">'
          +(dUsers.length
            ?dUsers.map(u=>'<div style="display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;border:1px solid #ECEDF0;padding:12px 14px">'+avatar(u,'w-10 h-10','text-xs')+'<div style="flex:1"><div style="font-size:14px;font-weight:600">'+esc(fullName(u))+'</div><div style="font-size:12px;color:#9CA3AF">'+esc(u.position||u.role)+'</div></div>'+chip(u.status)+'</div>').join('')
            :empty('users','No users','No users assigned to this department.')
          )+'</div>')
        :'')
      +(stab==='checklists'
        ?('<div class="space-y-2">'
          +(dCls.length
            ?dCls.map(c=>'<div style="display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;border:1px solid #ECEDF0;padding:12px 14px"><div style="width:36px;height:36px;border-radius:10px;background:#F6F7F8;display:grid;place-items:center;flex-shrink:0">'+ic('list','w-4 h-4')+'</div><div style="flex:1"><div style="font-size:14px;font-weight:600">'+esc(c.name)+'</div><div style="font-size:12px;color:#9CA3AF">'+esc(c.frequency)+' · '+(c.assignees||[]).length+' assigned</div></div></div>').join('')
            :empty('list','No checklists','No checklists in this department.')
          )+'</div>')
        :'')
      +'</div>';
  }
  // ── List view ──
  // Filter depts by user's access if not admin
  const visibleDepts=isAdmin()?DB.departments:DB.departments.filter(d=>{
    const da=(me()?.docAccess)||{};
    return Object.keys(da.departments||{}).includes(d.name);
  });
  return'<div class="fade">'+hdr('Departments','',isAdmin()?btnP('Add','App.editDept()','plus'):'')
    +'<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">'
    +visibleDepts.map(d=>{
      const us=DB.users.filter(u=>u.department===d.name);
      const cls=DB.checklists.filter(c=>c.department===d.name);
      const docs=(DB.documents||[]).filter(x=>x.type==='dept'&&x.scope===d.name).length;
      const folders=(DB.folders||[]).filter(x=>x.type==='dept'&&x.scope===d.name&&!x.parentId).length;
      return'<div onclick="App._openDept(this.dataset.id)" data-id="'+d.id+'" class="dept-card" style="background:#fff;border-radius:16px;border:1.5px solid #ECEDF0;padding:16px;cursor:pointer;transition:all .15s;display:block;width:100%">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:12px">'
        +'<div style="width:36px;height:36px;border-radius:10px;background:#ECFDF5;display:grid;place-items:center">'+ic('dept','w-4 h-4 text-brand-600')+'</div>'
        +(isAdmin()?'<div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button onclick="App.editDept(this.dataset.id)" data-id="'+d.id+'" style="width:28px;height:28px;display:grid;place-items:center;border-radius:7px;color:#9CA3AF;border:none;background:transparent;cursor:pointer">'+ic('edit','w-3.5 h-3.5')+'</button><button onclick="App.delDept(this.dataset.id)" data-id="'+d.id+'" style="width:28px;height:28px;display:grid;place-items:center;border-radius:7px;color:#9CA3AF;border:none;background:transparent;cursor:pointer">'+ic('trash','w-3.5 h-3.5')+'</button></div>':'')
        +'</div>'
        +'<div class="fd" style="font-size:15px;font-weight:800;margin-bottom:6px">'+esc(d.name)+'</div>'
        +'<div style="display:flex;gap:12px;font-size:12px;color:#9CA3AF">'
        +'<span><b style="color:#15171C">'+us.length+'</b> users</span>'
        +'<span><b style="color:#15171C">'+cls.length+'</b> checklists</span>'
        +(docs||folders?'<span><b style="color:#0E9F6E">'+(folders+' folders, '+docs+' files')+'</b></span>':'')
        +'</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">'
        +'<div style="display:flex;-space-x-1.5">'+us.slice(0,5).map(u=>'<div style="border-radius:50%;ring:2px solid #fff;margin-right:-6px">'+avatar(u,'w-6 h-6','text-[9px]')+'</div>').join('')+'</div>'
        +'<span style="font-size:11px;font-weight:600;color:#0E9F6E">Open →</span>'
        +'</div></div>';
    }).join('')
    +(DB.departments.length?'':empty('dept','No departments','Create your first department.'))
    +'</div></div>';
}
App.editDept=(id=null)=>{const d=id?DB.departments.find(x=>x.id===id):null;openModal(`<div class="p-6"><div class="flex justify-between mb-4"><h2 class="fd text-xl font-bold">${d?'Edit':'New'} department</h2><button onclick="App.closeModal()" class="text-ink-400">${ic('x')}</button></div>${fld('Name','d-n',d?.name||'')}<div class="flex gap-2 mt-4"><button onclick="App.closeModal()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #ECEDF0;background:#fff;font-weight:600;font-size:14px;cursor:pointer">Cancel</button><button onclick="App.saveDept('${id||''}')" style="flex:1;padding:12px;border-radius:12px;background:#15171C;color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer">${d?'Save':'Create'}</button></div></div>`,'max-w-sm');};
App.saveDept=(id)=>{const n=$('#d-n')?.value.trim();if(!n){toast('Name required','err');return;}const obj=id?DB.departments.find(x=>x.id===id):{id:uid('d'),name:n};if(id)obj.name=n;else DB.departments.push(obj);log(fullName(me()),id?'Edited dept':'Created dept',n);toast(id?'Updated ✓':'Created ✓');saveDB();closeModal();render();sb.from('departments').upsert({id:obj.id,name:obj.name},{onConflict:'id'}).then(({error})=>{if(error)console.error('saveDept:',error.message);}).catch(()=>{});};
App.delDept=(id)=>{const d=DB.departments.find(x=>x.id===id);if(!d)return;if(!confirm('Delete '+d.name+'? Users and checklists in this department will not be deleted but will have no department.'))return;if(!DB.departments_deleted)DB.departments_deleted=[];if(!DB.departments_deleted.includes(id))DB.departments_deleted.push(id);DB.departments=DB.departments.filter(x=>x.id!==id);sb.from('departments').delete().eq('id',id).then(({error})=>{if(error)console.error('delDept:',error.message);}).catch(()=>{});// Clear dept from users and checklists (don't delete them)
DB.users.forEach(u=>{if(u.department===d.name)u.department='';});DB.checklists.forEach(c=>{if(c.department===d.name)c.department='';});log(fullName(me()),'Deleted dept',d.name);toast('Deleted','warn');saveDB();render();};

/* ===== LOCATIONS ===== */
function locsPage(){
  const sel=S.filters.locSel||null;
  const stab=S.filters.locTab||'docs';
  // ── Detail view ──
  if(sel){
    const l=DB.locations.find(x=>x.id===sel);
    if(!l){S.filters.locSel=null;return locsPage();}
    const lCls=DB.checklists.filter(c=>(c.locationIds||[]).includes(l.id));
    const TABS=[['docs','📁 Documents'],['checklists','✓ Checklists'],['info','ℹ Info']];
    return'<div class="fade">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
      +'<button onclick="App._closeLoc()" style="width:34px;height:34px;border-radius:10px;border:1.5px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">'+ic('back','w-4 h-4')+'</button>'
      +'<div style="width:36px;height:36px;border-radius:10px;background:#EFF6FF;display:grid;place-items:center">'+ic('pin','w-4 h-4')+'</div>'
      +'<div style="flex:1"><div class="fd" style="font-size:16px;font-weight:800">'+esc(l.name)+'</div>'
      +'<div style="font-size:12px;color:#9CA3AF">'+esc(l.address||'No address')+'</div></div>'
      +chip(l.status||'Active')
      +(can('locations','edit')?'<button onclick="App.editLoc(this.dataset.id)" data-id="'+l.id+'" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:#F6F7F8;color:#374151;font-size:13px;font-weight:600;border:1px solid #ECEDF0;cursor:pointer">'+ic('edit','w-4 h-4')+'Edit</button>':'')
      +(can('locations','edit')?'<button onclick="App.delLoc(this.dataset.id)" data-id="'+l.id+'" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:#FFF1F2;color:#BE123C;font-size:13px;font-weight:600;border:1px solid #FECACA;cursor:pointer">'+ic('trash','w-4 h-4')+'Delete</button>':'')
      +'</div>'
      +'<div style="display:flex;gap:4px;margin-bottom:16px;background:#F6F7F8;border-radius:12px;padding:4px">'
      +TABS.map(([k,ll])=>'<button onclick="App._setLocTab(this.dataset.k)" data-k="'+k+'" style="flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:'+(stab===k?'#fff':'transparent')+';color:'+(stab===k?'#15171C':'#6B7280')+';box-shadow:'+(stab===k?'0 1px 4px rgba(0,0,0,.08)':'none')+'">'+ll+'</button>').join('')
      +'</div>'
      +(stab==='docs'?_scopeDocsTab('loc',l.id):'')
      +(stab==='checklists'
        ?('<div class="space-y-2">'
          +(lCls.length
            ?lCls.map(c=>'<div style="display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;border:1px solid #ECEDF0;padding:12px 14px"><div style="width:36px;height:36px;border-radius:10px;background:#F6F7F8;display:grid;place-items:center;flex-shrink:0">'+ic('list','w-4 h-4')+'</div><div style="flex:1"><div style="font-size:14px;font-weight:600">'+esc(c.name)+'</div><div style="font-size:12px;color:#9CA3AF">'+esc(c.frequency)+'</div></div></div>').join('')
            :empty('list','No checklists','No checklists assigned to this location.')
          )+'</div>')
        :'')
      +(stab==='info'
        ?'<div class="bg-white rounded-2xl border border-ink-100 p-5 space-y-3">'
          +[['Name',l.name],['Address',l.address||'—'],['Department',l.department||'All departments'],['Status',l.status||'Active']].map(([k,v])=>'<div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9CA3AF;margin-bottom:2px">'+k+'</div><div style="font-size:14px;font-weight:600">'+esc(v)+'</div></div>').join('')
          +'</div>'
        :'')
      +'</div>';
  }
  // ── List view ──
  // Filter locations by user's access if not admin
  const visibleLocs=isAdmin()?DB.locations:DB.locations.filter(l=>{
    const da=(me()?.docAccess)||{};
    return Object.keys(da.locations||{}).includes(l.id);
  });
  return'<div class="fade">'+hdr('Locations','Physical sites & areas',can('locations','create')?btnP('Add location','App.editLoc()','plus'):'')
    +'<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">'
    +visibleLocs.map(l=>{
      const docs=(DB.documents||[]).filter(x=>x.type==='loc'&&x.scope===l.id).length;
      const folders=(DB.folders||[]).filter(x=>x.type==='loc'&&x.scope===l.id&&!x.parentId).length;
      return'<div onclick="App._openLoc(this.dataset.id)" data-id="'+l.id+'" class="loc-card" style="background:#fff;border-radius:16px;border:1.5px solid #ECEDF0;padding:16px;cursor:pointer;transition:all .15s;display:block;width:100%">'

        +'<div style="width:36px;height:36px;border-radius:10px;background:#EFF6FF;display:grid;place-items:center">'+ic('pin','w-4 h-4')+'</div>'

        +'<div class="fd" style="font-size:15px;font-weight:800;margin-bottom:4px">'+esc(l.name)+'</div>'

        +(docs||folders?'<div style="font-size:11px;font-weight:600;color:#3B82F6;margin-bottom:8px">'+folders+' folders · '+docs+' files</div>':'')
        +'<div style="font-size:11px;font-weight:600;color:#6B7280;text-align:right">Open →</div>'
        +'</div>';
    }).join('')
    +(DB.locations.length?'':empty('pin','No locations','Add locations to assign them to checklists.'))
    +'</div></div>';
}
App.editLoc=(id=null)=>{const l=id?locById(id):null;const geo=(DB.hrmConfig?.locationGeo||{})[id||'']||{};const canGeo=can('locations','manage');openModal(`<div class="p-6"><div class="flex justify-between mb-4"><h2 class="fd text-xl font-bold">${l?'Edit':'New'} location</h2><button onclick="App.closeModal()" class="text-ink-400">${ic('x')}</button></div><div class="space-y-3">${fld('Location name','ln-n',l?.name||'')}${fld('Address','ln-a',l?.address||'')}${selF('Department (optional)','ln-d',[['','All departments'],...DB.departments.map(d=>[d.name,d.name])],l?.department||'')}${selF('Status','ln-s',['Active','Inactive'],l?.status||'Active')}
  ${canGeo?`<div class="bg-ink-50 rounded-2xl p-4 space-y-2"><p class="text-[10px] font-bold text-ink-400 uppercase tracking-wide">Geofence (clock-in & clock-out)</p>
    ${mkTog('ln-geo',geo.enabled??false,'Require staff to be on-site to clock in and out')}
    <div class="grid grid-cols-3 gap-2">${fld('Latitude','ln-lat',geo.lat??'','number')}${fld('Longitude','ln-lng',geo.lng??'','number')}${fld('Radius (m)','ln-rad',geo.radius??200,'number')}</div>
    <button type="button" onclick="App.useMyLocationLoc()" style="font-size:12px;font-weight:600;color:#0E9F6E;background:none;border:none;cursor:pointer;padding:0">📍 Use my current location</button>
    <p style="font-size:11px;color:#9CA3AF">Assign this location to users in their profile. When enabled, an assigned user must be inside the radius to clock in AND clock out (strict). Geofence data stays on this device only.</p>
  </div>`:''}</div><div class="flex gap-2 mt-5"><button onclick="App.closeModal()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #ECEDF0;background:#fff;font-weight:600;font-size:14px;cursor:pointer">Cancel</button><button onclick="App.saveLoc('${id||''}')" style="flex:1;padding:12px;border-radius:12px;background:#15171C;color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer">${l?'Save':'Create'}</button></div></div>`,'max-w-sm');};
App.useMyLocationLoc=()=>{if(!navigator.geolocation){toast('Geolocation unavailable','err');return;}navigator.geolocation.getCurrentPosition(pos=>{const la=$('#ln-lat'),ln=$('#ln-lng');if(la)la.value=pos.coords.latitude;if(ln)ln.value=pos.coords.longitude;toast('Location filled ✓');},()=>toast('Could not get location','err'),{enableHighAccuracy:true,timeout:8000});};
App.saveLoc=(id)=>{const n=$('#ln-n')?.value.trim();if(!n){toast('Name required','err');return;}const data={name:n,address:$('#ln-a')?.value.trim()||'',department:$('#ln-d')?.value||'',status:$('#ln-s')?.value||'Active'};const obj=id?locById(id):{id:uid('loc'),...data};if(id)Object.assign(obj,data);else DB.locations.push(obj);
  // Geofence stored in a frontend-only side store keyed by location id — NEVER part of `data`/the Supabase upsert.
  // Only written when the geofence fields were rendered (user has 'locations','manage'); otherwise existing geo is preserved untouched.
  if($('#ln-rad')){
    DB.hrmConfig=DB.hrmConfig||{};DB.hrmConfig.locationGeo=DB.hrmConfig.locationGeo||{};
    const _lat=$('#ln-lat')?.value,_lng=$('#ln-lng')?.value;
    DB.hrmConfig.locationGeo[obj.id]={enabled:togV('ln-geo'),lat:(_lat!==''&&_lat!=null)?Number(_lat):null,lng:(_lng!==''&&_lng!=null)?Number(_lng):null,radius:Number($('#ln-rad')?.value)||200};
  }
  log(fullName(me()),id?'Edited location':'Created location',n);toast(id?'Updated ✓':'Created ✓');saveDB();closeModal();render();sb.from('locations').upsert({id:obj.id,...data},{onConflict:'id'}).then(({error})=>{if(error)console.error('saveLoc:',error.message);}).catch(()=>{});};
App.delLoc=(id)=>{const l=locById(id);if(!l)return;if(!confirm('Delete "'+l.name+'"? Checklists using this location will keep it as reference.'))return;if(!DB.locations_deleted)DB.locations_deleted=[];if(!DB.locations_deleted.includes(id))DB.locations_deleted.push(id);DB.locations=DB.locations.filter(x=>x.id!==id);if(DB.hrmConfig?.locationGeo)delete DB.hrmConfig.locationGeo[id];
// DATA-4: clear the dangling locationId from every user pointing at the deleted location
// (mirrors the dept-clear pattern; frontend-only — u.hrm is never part of the Supabase payload).
DB.users.forEach(u=>{if(u.hrm&&u.hrm.locationId===id)u.hrm.locationId=null;});
saveDB();render();toast('Deleted','warn');sb.from('locations').delete().eq('id',id).then(({error})=>{if(error)console.error('delLoc:',error.message);}).catch(()=>{});};

/* ===== CHECKLIST ADMIN PAGE ===== */
function clsPage(){
  const myTeamIds=new Set([S.uid,...subTree(S.uid).map(u=>u.id)]);
let list=(isAdmin()||isSubAdmin())?DB.checklists:DB.checklists.filter(c=>c.createdBy===S.uid||(c.assignees||[]).includes(S.uid));
  if(S.search)list=list.filter(c=>c.name.toLowerCase().includes(S.search.toLowerCase())||c.department.toLowerCase().includes(S.search.toLowerCase()));
  return`<div class="fade">${hdr('Create Checklist',list.length+' configured',can('checklists','create')?btnP('New checklist','App.editCl()','plus'):'')}
  <div class="space-y-2.5">
    ${list.map(c=>{
      const ass=(c.assignees||[]).map(uById).filter(Boolean);

3AF'">${ic('copy','w-3.5 h-3.5')}</button>${(isAdmin()||isSubAdmin()||(isMgr()&&c.createdBy===S.uid))?`<button onclick="App.delCl('${c.id}')" title="Delete" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;color:#9CA3AF;background:transparent;border:none;cursor:pointer" onmouseover="this.style.background='#FFF1F2';this.style.color='#BE123C'" onmouseout="this.style.background='transparent';this.style.color='#9CA3AF'">${ic('trash','w-3.5 h-3.5')}</button>`:''}</div>`:''}<div class="flex -space-x-1">${ass.slice(0,4).map(u=>`<div class="ring-2 ring-white rounded-full">${avatar(u,'w-6 h-6','text-[9px]')}</div>`).join('')}</div></div></div></div>`;

function _freqUI(freq){
  if(!CLD)return'';
  const sd=CLD?.selectedDays||[], sdt=CLD?.selectedDates||[], cdt=CLD?.customDates||[];
  const sched=CLD?.schedule||'Every day';

  if(freq==='Daily'){
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Schedule</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        ${['Every day','Selected weekdays'].map(o=>`<button type="button" data-sched="${o}" onclick="App._dailySched('${o}',this)"
          style="flex:1;padding:8px;border-radius:10px;border:1.5px solid;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;background:${sched===o?'#15171C':'#fff'};color:${sched===o?'#fff':'#6B7280'};border-color:${sched===o?'#15171C':'#ECEDF0'}">${o}</button>`).join('')}
      </div>
      <div id="cn-daysel" style="display:${sched==='Selected weekdays'?'flex':'none'};flex-wrap:wrap;gap:6px">
        ${WKDAYS.map(d=>`<button type="button" onclick="App._togDay('${d}',this)" class="dchip ${sd.includes(d)?'on':''}">${d}</button>`).join('')}
      </div>
    </div>`;
  }

  if(freq==='Weekly'){
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Repeat on</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${WKDAYS.map(d=>`<button type="button" onclick="App._togDay('${d}',this)" class="dchip ${sd.includes(d)?'on':''}">${d}</button>`).join('')}</div>
    </div>`;
  }

  if(freq==='Monthly'){
    // Include 'L' = Last day of month
    const nums=[...Array.from({length:31},(_,i)=>i+1),'L'];
    // Normalise sdt: always compare as numbers (Supabase may return strings)
    const sdtNorm=sdt.map(x=>x==='L'?'L':Number(x));
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Days of month</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">
        ${nums.map(n=>{const on=sdtNorm.includes(n);return`<button type="button" onclick="App._togDN('${n}',this)"
          style="min-width:${n==='L'?48:32}px;height:32px;border-radius:50%;border:1.5px solid;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;background:${on?'#15171C':'#fff'};color:${on?'#fff':'#6B7280'};border-color:${on?'#15171C':'#ECEDF0'};${n==='L'?'border-radius:8px;padding:0 8px':''}" title="${n==='L'?'Last day of month':n}">${n==='L'?'Last':n}</button>`;}).join('')}
      </div>
      <p style="font-size:11px;color:#9CA3AF">Tip: Select "Last" to always run on the last day of any month (handles 28/29/30/31 automatically)</p>
    </div>`;
  }

  if(freq==='Custom'){
    const now=new Date();const cy=now.getFullYear(),cm=now.getMonth();
    const calYear=CLD._calYear||cy, calMonth=CLD._calMonth||cm;
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const cdt=CLD?.customDates||[];
    const cells=[];for(let i=0;i<firstDay;i++)cells.push('');for(let d=1;d<=daysInMonth;d++)cells.push(d);while(cells.length%7!==0)cells.push('');
    const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
    return`<div>
      <div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Pick dates</div>
      <div style="background:#F6F7F8;border-radius:10px;padding:8px;display:inline-block;min-width:220px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <button type="button" onclick="if(!CLD._calYear)CLD._calYear=${cy};if(!CLD._calMonth&&CLD._calMonth!==0)CLD._calMonth=${cm};CLD._calMonth--;if(CLD._calMonth<0){CLD._calMonth=11;CLD._calYear--;}$('#cn-sched').innerHTML=_freqUI('Custom')" style="width:22px;height:22px;border-radius:6px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">${ic('back','w-3 h-3')}</button>
          <span style="font-size:12px;font-weight:700;color:#15171C">${MN[calMonth]} ${calYear}</span>
          <button type="button" onclick="if(!CLD._calYear)CLD._calYear=${cy};if(!CLD._calMonth&&CLD._calMonth!==0)CLD._calMonth=${cm};CLD._calMonth++;if(CLD._calMonth>11){CLD._calMonth=0;CLD._calYear++;}$('#cn-sched').innerHTML=_freqUI('Custom')" style="width:22px;height:22px;border-radius:6px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">${ic('chevR','w-3 h-3')}</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px;text-align:center">
          ${['S','M','T','W','T','F','S'].map(d=>`<div style="font-size:9px;font-weight:700;color:#9CA3AF;padding:2px 0">${d}</div>`).join('')}
        </div>
        ${weeks.map(w=>`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px">${w.map(d=>{if(!d)return'<div></div>';const iso=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const on=cdt.includes(iso);const past=iso<todayISO();return`<button type="button" onclick="App._togCalDate('${iso}')" style="aspect-ratio:1;border-radius:6px;border:none;font-size:11px;font-weight:${on?700:400};cursor:pointer;background:${on?'#15171C':'transparent'};color:${on?'#fff':past?'#D1D5DB':'#15171C'};padding:3px 0">${d}</button>`;}).join('')}</div>`).join('')}
      </div>
      ${cdt.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${cdt.sort().map(d=>`<span style="display:inline-flex;align-items:center;gap:3px;background:#15171C;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${fmtS(d)}<button onclick="App._remCD('${d}')" style="background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;padding:0;font-size:13px;line-height:1">×</button></span>`).join('')}</div>`:''}
    </div>`;
  }
  return'';
}

App._freqChange=f=>{
  const prev=CLD.frequency;
  CLD.frequency=f;
  if(prev!==f){
    CLD.schedule=f==='Daily'?'Every day':'';
    CLD.selectedDays=[];CLD.selectedDates=[];CLD.customDates=[];
  }
  if(f==='Custom'&&!CLD._calYear){const n=new Date();CLD._calYear=n.getFullYear();CLD._calMonth=n.getMonth();}
  const sw=$('#cn-sched');if(sw)sw.innerHTML=_freqUI(f);
};
App._dailySched=(o,el)=>{
  CLD.schedule=o;
  // Update button styles
  el.parentNode.querySelectorAll('button[data-sched]').forEach(b=>{
    const active=b.dataset.sched===o;
    b.style.background=active?'#15171C':'#fff';
    b.style.color=active?'#fff':'#6B7280';
    b.style.borderColor=active?'#15171C':'#ECEDF0';
  });
  // Show/hide weekday picker
  const daysel=$('#cn-daysel');
  if(daysel)daysel.style.display=o==='Selected weekdays'?'flex':'none';
};
App._togDay=(d,el)=>{const i=CLD.selectedDays.indexOf(d);if(i>-1)CLD.selectedDays.splice(i,1);else CLD.selectedDays.push(d);el.classList.toggle('on');};
App._togDN=(n,el)=>{
  if(!CLD.selectedDates)CLD.selectedDates=[];
  const val=isNaN(n)?n:Number(n);
  // Normalise existing array to same type to avoid duplicates from type mismatch
  CLD.selectedDates=CLD.selectedDates.map(x=>x==='L'?'L':Number(x));
  const i=CLD.selectedDates.indexOf(val);
  if(i>-1)CLD.selectedDates.splice(i,1);else CLD.selectedDates.push(val);
  const on=CLD.selectedDates.includes(val);
  el.style.background=on?'#15171C':'#fff';el.style.color=on?'#fff':'#6B7280';el.style.borderColor=on?'#15171C':'#ECEDF0';
};
App._togCalDate=(iso)=>{
  if(!CLD.customDates)CLD.customDates=[];
  const i=CLD.customDates.indexOf(iso);
  if(i>-1)CLD.customDates.splice(i,1);else CLD.customDates.push(iso);
  // Re-render the calendar
  const sw=$('#cn-sched');if(sw)sw.innerHTML=_freqUI('Custom');
};
App._remCD=d=>{CLD.customDates=(CLD.customDates||[]).filter(x=>x!==d);const w=$('#cn-cdt');if(w)w.innerHTML=(CLD.customDates||[]).map(d=>`<span style="display:inline-flex;align-items:center;gap:4px;background:#15171C;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${fmtS(d)}<button onclick="App._remCD('${d}')" class="opacity-70 hover:opacity-100">${ic('x','w-3 h-3')}</button></span>`).join('');};

App._saveCl=(editing)=>{

  CLD.department=$('#cn-dep')?.value||CLD.department;CLD.frequency=$('#cn-freq')?.value||CLD.frequency;
  CLD.startDate=$('#cn-sd')?.value||null;CLD.endDate=$('#cn-ed')?.value||null;
  CLD.scheduleTime=$('#cn-time')?.value||null;
  if($('#cn-anyone'))CLD.anyOne=$('#cn-anyone').classList.contains('on');
  if(!CLD.name){toast('Name required','err');

    return;}
  CLD.questionIds=CLD.questionIds||[];CLD.questionConfigs=CLD.questionConfigs||{};CLD.tasks=CLD.tasks||[];
  if(!CLD.questionIds.length){toast('Add at least one question','err');

    return;}
  const prevAssignees=editing?((clById(CLD.id)?.assignees)||[]):[];
  const _existIdx=DB.checklists.findIndex(c=>c.id===CLD.id);
  if(_existIdx>-1){DB.checklists[_existIdx]=CLD;}else{DB.checklists.push(CLD);}
  const newlyAssigned=(CLD.assignees||[]).filter(uid2=>!prevAssignees.includes(uid2)&&uid2!==S.uid);

App.delCl=(id)=>{
  const c=clById(id);if(!c)return;
