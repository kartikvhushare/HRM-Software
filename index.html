/* §8 — user-facing ticket create flow with Manager / HR routing.
   Routing is IMPLICIT via `assignedTo` (no new synced column → tickets upsert unaffected).
   A frontend-only `route` marker is kept on the local object for display but is NOT in the
   Supabase insert payload (which mirrors the existing escalation insert columns exactly). */
App.newTicket=()=>{
  if(!can('tickets','create')){toast('Not allowed','err');return;}
  const u=me();
  const hasMgr=!!_mgrOfOn(u,todayISO());
  const hasHR=DB.users.some(x=>x.hrm?.isHR&&x.status==='Active'&&x.role!=='Admin');
  const routeOpts=[];
  if(hasMgr)routeOpts.push(['manager','My Manager']);
  if(hasHR)routeOpts.push(['hr','HR']);
  if(!routeOpts.length){toast('No manager or HR is available to receive tickets','err');return;}
  openModal('<div class="p-5">'
    +'<div class="flex justify-between mb-4"><h2 class="fd text-xl font-bold">New ticket</h2><button onclick="App.closeModal()" class="text-ink-400">'+ic('x')+'</button></div>'
    +'<div class="space-y-3">'
    +fld('Subject','tk-title','','text','What is this about?')
    +'<div><label class="block text-xs font-semibold text-ink-500 mb-1">Description</label><textarea id="tk-desc" rows="4" placeholder="Describe the issue…" class="w-full bg-white border border-ink-200 rounded-xl px-3 py-2.5 text-sm rf"></textarea></div>'
    +'<div class="grid grid-cols-2 gap-3">'+selF('Priority','tk-pri',[['Low','Low'],['Medium','Medium'],['High','High']],'Medium')+selF('Send to','tk-route',routeOpts,routeOpts[0][0])+'</div>'
    +'</div>'
    +'<div class="flex gap-2 mt-5"><button onclick="App.closeModal()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #ECEDF0;background:#fff;font-weight:600;font-size:14px;cursor:pointer">Cancel</button><button onclick="App.createTicket()" style="flex:1;padding:12px;border-radius:12px;background:#15171C;color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer">Create ticket</button></div>'
    +'</div>','max-w-md');
};
App.createTicket=()=>{
  if(!can('tickets','create')){toast('Not allowed','err');return;}
  const title=($('#tk-title')?.value||'').trim();
  const description=($('#tk-desc')?.value||'').trim();
  const priority=$('#tk-pri')?.value||'Medium';
  const route=$('#tk-route')?.value||'manager';
  if(!title){toast('Add a subject','err');return;}
  let assignee=null;
  if(route==='manager'){assignee=_mgrOfOn(me(),todayISO())||me().managerId||null;}
  else{const hr=DB.users.find(x=>x.hrm?.isHR&&x.status==='Active'&&x.role!=='Admin');assignee=hr?hr.id:null;}
  if(!assignee){toast(route==='manager'?'You have no manager assigned':'No active HR user found','err');return;}
  const date=todayISO();
  const ticket={id:uid('tk'),title,description,priority,status:'Open',assignedTo:assignee,createdBy:S.uid,
    checklistId:null,questionId:null,questionText:'',answerGiven:'',submitterId:S.uid,date,
    createdAt:new Date().toISOString(),resolvedAt:null,resolveNote:'',viewedBy:[],
    route /* frontend-only display marker — NOT in the Supabase payload */};
  if(!DB.tickets)DB.tickets=[];
  DB.tickets.unshift(ticket);
  // Mirror the existing escalation insert columns exactly (no `route` column → schema-safe).
  sb.from('tickets').insert({id:ticket.id,title:ticket.title,description:ticket.description,priority:ticket.priority,status:ticket.status,assigned_to:ticket.assignedTo,created_by:ticket.createdBy,checklist_id:null,question_id:null,question_text:'',answer_given:'',submitter_id:ticket.submitterId,date:ticket.date,created_at:ticket.createdAt,resolved_at:null,resolve_note:'',viewed_by:[]})
    .then(({error})=>{if(error)console.error('[ticket insert]',error.message);}).catch(e=>console.error('[ticket insert failed]',e.message));
  _hrmNotify(assignee,'🎫 New ticket from '+fullName(me())+': '+title);
  _invalidateNotifCache();
  saveDB();
  App.closeModal();
  toast('Ticket sent to '+(route==='manager'?'your manager':'HR')+' ✓');
  rr();
};
App._tkSetStatus=(el)=>{const id=el.dataset.id,status=el.dataset.st;App._ticketStatus(id,status);};
App._tkFilter=(key,val)=>{if(key==='status')S.filters.tkStatus=val;else S.filters.tkPriority=val;rr();};
App._ticketStatus=(id,status)=>{
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  t.status=status;
  saveDB();rr();
  sb.from('tickets').update({status}).eq('id',id).then(()=>{}).catch(e=>console.warn('ticket status:',e.message));
};

App._resolveTicket=(id)=>{
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  openModal(`<div style="padding:20px">
    <h2 style="font-size:18px;font-weight:800;font-family:var(--font-display);margin-bottom:4px">Resolve ticket</h2>
    <p style="font-size:13px;color:#6B7280;margin-bottom:14px">Add a note explaining how this was resolved.</p>
    <textarea id="tk-note" rows="3" placeholder="What was done to resolve this?" style="width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:10px;font-size:13px;resize:none;outline:none;box-sizing:border-box"></textarea>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="App.closeModal()" style="flex:1;padding:11px;border-radius:10px;border:1.5px solid #E5E7EB;background:#fff;font-weight:600;font-size:14px;cursor:pointer">Cancel</button>
      <button onclick="App._confirmResolve('${id}')" style="flex:2;padding:11px;border-radius:10px;background:#0E9F6E;color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer">Mark Resolved</button>
    </div>
  </div>`,'max-w-sm');
};

App._confirmResolve=(id)=>{
  const note=$('#tk-note')?.value?.trim()||'';
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  t.status='Resolved';t.resolvedAt=new Date().toISOString();t.resolveNote=note;
  // Notify the submitter
  if(t.submitterId&&t.submitterId!==S.uid){
    DB.notifications.unshift({id:uid('n'),userId:t.submitterId,text:'✅ Ticket resolved: "'+t.title+'"'+(note?' — '+note.slice(0,60):''),time:new Date().toISOString(),read:false});
    _invalidateNotifCache();
  }
  closeModal();saveDB();rr();
  sb.from('tickets').update({status:'Resolved',resolved_at:t.resolvedAt,resolve_note:note}).eq('id',id).then(()=>{}).catch(e=>console.warn('resolve:',e.message));
};

App._delTicket=(id)=>{
  if(!isAdmin())return;
  DB.tickets=(DB.tickets||[]).filter(t=>t.id!==id);
  saveDB();rr();
  sb.from('tickets').delete().eq('id',id).then(()=>{}).catch(e=>console.warn('del ticket:',e.message));
};


// ── Analytics clickable stat card ──
App._aStatCard=(label,val,color,type,data)=>{
  const colMap={sky:'#0EA5E9',brand:'#0E9F6E',rose:'#EF4444',orange:'#F97316'};
  const c=colMap[color]||color;
  return`<div onclick="App._aStatDrill('${type}')" style="background:#fff;border-radius:16px;border:1.5px solid #E5E7EB;padding:16px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='${c}';this.style.boxShadow='0 4px 16px rgba(0,0,0,.08)'" onmouseout="this.style.borderColor='#E5E7EB';this.style.boxShadow=''">`
  +`<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9CA3AF;margin-bottom:8px">${label}</div><div style="font-size:28px;font-weight:800;color:${c}">${val}</div><div style="font-size:11px;color:#D1D5DB;margin-top:4px">Click to see details</div></div>`;
};

App._aStatDrill=(type)=>{
  const f=S.filters;
  const fArr=k=>Array.isArray(f[k])?f[k]:(f[k]?[f[k]]:[]);
  let subs=DB.submissions;
  if(!isAdmin())subs=subs.filter(s=>subTree(S.uid).some(u=>u.id===s.userId)||s.userId===S.uid);
  if(fArr('users').length)subs=subs.filter(s=>fArr('users').includes(s.userId));
  if(fArr('deps').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('deps').includes(c.department);});
  if(fArr('locs').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('locs').some(l=>(c.locationIds||[]).includes(l));});
  if(fArr('stats').length)subs=subs.filter(s=>fArr('stats').includes(s.status));
  if(f.dr1)subs=subs.filter(s=>s.date>=f.dr1);
  if(f.dr2)subs=subs.filter(s=>s.date<=f.dr2);
  let aTickets=(DB.tickets||[]).slice();
  if(!isAdmin()){
    // Both manager and user: only tickets assigned to them
    aTickets=aTickets.filter(t=>t.assignedTo===S.uid);
  }
  if(f.dr1)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')>=f.dr1);
  if(f.dr2)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')<=f.dr2);
  const today=todayISO();
  let title='',rows='',emptyMsg='No data.';
  const subRow=s=>{
    const u=uById(s.userId),c=clById(s.checklistId);
    const extra=s.submittedAt?' · '+new Date(s.submittedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F3F4F6;cursor:pointer" onclick="App.viewSub(\''+s.id+'\')" onmouseover="this.style.background=\'#FAFAFA\'" onmouseout="this.style.background=\'\'">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+(c?esc(c.name):'<span style="color:#EF4444;font-style:italic">[Deleted checklist]</span>')+'</div>'
      +'<div style="font-size:11px;color:#9CA3AF;margin-top:1px">'+(u?esc(fullName(u)):'?')+' · '+fmtS(s.date)+extra+'</div>'
      +'</div>'+chip(s.status)+'</div>';
  };
  if(type==='submitted'){
    const list=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='All Submissions ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No submissions in this period.';
  } else if(type==='ontime'){
    const list=subs.filter(s=>s.status==='On Time').sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='On Time ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No on-time submissions.';
  } else if(type==='late'){
    const list=subs.filter(s=>s.status==='Late').sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='Late ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No late submissions.';
  } else if(type==='missed'){
    const relevantUsers=isAdmin()?DB.users:[me(),...subTree(S.uid)].filter(Boolean);
    const dr1=f.dr1||(new Date(Date.now()-30*86400000).toISOString().slice(0,10));
    const dr2=f.dr2||today;
    const dateRange=[];
    let d=new Date(dr1+'T00:00:00');const dEnd=new Date(dr2+'T00:00:00');
    while(d<=dEnd&&dateRange.length<60){dateRange.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    const missed=[];
    const _seenGrp=new Set(); // anyOne checklists are collective → list once per date
    relevantUsers.forEach(u=>{
      dateRange.forEach(dt=>{
        if(dt>=today)return;
        DB.checklists.filter(c=>(c.assignees||[]).includes(u.id)&&clOn(c,dt)&&c.status!=='Draft').forEach(c=>{
          // For "any one" group checklists, a completion by ANY assignee counts for everyone —
          // so it's only "missed" if nobody in the group submitted. Otherwise check own submission.
          const done=c.anyOne
            ? DB.submissions.some(s=>s.checklistId===c.id&&s.date===dt&&s.status!=='Editing')
            : !!DB.submissions.find(s=>s.checklistId===c.id&&s.userId===u.id&&s.date===dt);
          if(done)return;
          if(c.anyOne){
            const k=c.id+'|'+dt;
            if(_seenGrp.has(k))return; // already listed this group checklist for this date
            _seenGrp.add(k);
            missed.push({u:null,c,dt}); // group → no single owner
          } else {
            missed.push({u,c,dt});
          }
        });
      });
    });
    title='Missed ('+missed.length+')';
    rows=missed.slice(0,100).map(({u,c,dt})=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F3F4F6"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+esc(c.name)+(c.anyOne?' <span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:#EEF2FF;color:#4338CA">👥 Group</span>':'')+'</div><div style="font-size:11px;color:#9CA3AF">'+(u?esc(fullName(u)):'No one in group completed')+' · '+fmtS(dt)+'</div></div><span style="font-size:11px;font-weight:700;color:#F97316;background:#FFF7ED;padding:2px 8px;border-radius:20px">Missed</span></div>').join('');
    emptyMsg='No missed checklists in this period.';
  } else if(type==='compliant'||type==='noncompliant'){
    const want=type==='noncompliant';
    const list=subs.map(s=>{const c=clById(s.checklistId);if(!c||!(c.questionIds||[]).length)return null;const n=_subEscalationCount(c,s);return{s,c,n};})
      .filter(x=>x&&((x.n>0)===want))
      .sort((a,b)=>want?(b.n-a.n)||((b.s.submittedAt||'').localeCompare(a.s.submittedAt||'')):(b.s.submittedAt||'').localeCompare(a.s.submittedAt||''));
    title=(want?'Non-compliant':'Compliant')+' ('+list.length+')';
    rows=list.map(({s,c,n})=>{const u=uById(s.userId);return'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F3F4F6;cursor:pointer" onclick="App.viewSub(\''+s.id+'\')" onmouseover="this.style.background=\'#FAFAFA\'" onmouseout="this.style.background=\'\'">'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(c.name)+'</div>'
      +'<div style="font-size:11px;color:#9CA3AF;margin-top:1px">'+(u?esc(fullName(u)):'?')+' · '+fmtS(s.date)+'</div></div>'
      +(want
        ? '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FFF1F2;color:#BE123C">⚠ '+n+' escalated</span>'
        : '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#ECFDF5;color:#059669">✓ Compliant</span>')
      +'</div>';}).join('');
    emptyMsg=want?'No non-compliant submissions in this period — all clear.':'No compliant submissions in this period.';
  } else {
    const tkMap={tickets:aTickets,tkopen:aTickets.filter(t=>t.status==='Open'),tkhigh:aTickets.filter(t=>t.priority==='High'||t.priority==='Critical'),tkresolved:aTickets.filter(t=>t.status==='Resolved'||t.status==='Closed')};
    const tkLabels={tickets:'All Tickets',tkopen:'Open Tickets',tkhigh:'High Priority Tickets',tkresolved:'Resolved Tickets'};
    const list=(tkMap[type]||[]).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    title=(tkLabels[type]||'Tickets')+' ('+list.length+')';
    const priClr={High:'#DC2626',Medium:'#F59E0B',Low:'#6B7280',Critical:'#7C3AED'};
    rows=list.map(t=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #F3F4F6"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(t.title)+'</div><div style="font-size:11px;color:#9CA3AF;margin-top:1px">'+(uById(t.submitterId)?'From '+esc(fullName(uById(t.submitterId))):'')+' → '+(uById(t.assignedTo)?esc(fullName(uById(t.assignedTo))):'?')+' · '+fmtS(t.date||t.createdAt?.slice(0,10)||'')+'</div></div><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FEF2F2;color:'+(priClr[t.priority]||'#6B7280')+'">'+esc(t.priority)+'</span>'+chip(t.status)+'</div>').join('');
    emptyMsg='No tickets in this category.';
  }
  openModal('<div style="display:flex;flex-direction:column;max-height:80vh">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #F3F4F6;flex-shrink:0">'
    +'<h2 style="font-size:16px;font-weight:800;font-family:var(--font-display)">'+title+'</h2>'
    +'<button onclick="App.closeModal()" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;border:none;background:transparent;cursor:pointer;color:#9CA3AF">'+ic('x')+'</button>'
    +'</div>'
    +'<div style="overflow-y:auto;flex:1">'+(rows||'<div style="padding:32px;text-align:center;color:#9CA3AF;font-size:13px">'+emptyMsg+'</div>')+'</div></div>','max-w-lg');
};

function analyticsPage(){
  const today=todayISO();
  // Collect all relevant submissions
  let subs=DB.submissions;
  if(!isAdmin())subs=subs.filter(s=>subTree(S.uid).some(u=>u.id===s.userId)||s.userId===S.uid);
  const f=S.filters;
  const fArr=k=>Array.isArray(f[k])?f[k]:(f[k]?[f[k]]:[]);
  if(fArr('users').length)  subs=subs.filter(s=>fArr('users').includes(s.userId));
  if(fArr('deps').length)   subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('deps').includes(c.department);});
  if(fArr('locs').length)   subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('locs').some(l=>(c.locationIds||[]).includes(l));});
  if(fArr('stats').length)  subs=subs.filter(s=>fArr('stats').includes(s.status));
  if(f.dr1) subs=subs.filter(s=>s.date>=f.dr1);
  if(f.dr2) subs=subs.filter(s=>s.date<=f.dr2);

  // Ticket stats for analytics
  let aTickets=(DB.tickets||[]).slice();
  if(!isAdmin()){
    // Both manager and user: only tickets assigned to them
    aTickets=aTickets.filter(t=>t.assignedTo===S.uid);
  }
  if(f.dr1)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')>=f.dr1);
  if(f.dr2)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')<=f.dr2);
  const tkOpen=aTickets.filter(t=>t.status==='Open').length;
  const tkResolved=aTickets.filter(t=>t.status==='Resolved'||t.status==='Closed').length;
  const tkHigh=aTickets.filter(t=>t.priority==='High'||t.priority==='Critical').length;
  const tot=Math.max(subs.length,1);
  const byS={'On Time':0,'Late':0,'Pending Approval':0,'Rejected':0,'Pending (not submitted)':0};
  subs.forEach(s=>{if(byS[s.status]!==undefined)byS[s.status]++;else byS['Pending (not submitted)']++;});
  // ── Compliance over the filtered submissions (computed from answers → covers old data) ──
  let compliantN=0,nonCompliantN=0,totalEscalations=0;
  subs.forEach(s=>{const c=clById(s.checklistId);if(!c||!(c.questionIds||[]).length)return;const n=_subEscalationCount(c,s);if(n>0){nonCompliantN++;totalEscalations+=n;}else{compliantN++;}});

  // Count missed (assigned but no submission for past dates)
  const relevantUsers=isAdmin()?DB.users:[me(),...subTree(S.uid)].filter(Boolean);
  const dateRange=[];
  const dr1=f.dr1||(new Date(Date.now()-30*86400000).toISOString().slice(0,10));
  const dr2=f.dr2||today;
  let d=new Date(dr1+'T00:00:00');const dEnd=new Date(dr2+'T00:00:00');
  while(d<=dEnd&&dateRange.length<60){dateRange.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  let totalAssigned=0,totalMissed=0;
  relevantUsers.forEach(u=>{
    if(fArr('users').length&&!fArr('users').includes(u.id))return;
    dateRange.forEach(dt=>{
      const cls=DB.checklists.filter(c=>(c.assignees||[]).includes(u.id)&&clOn(c,dt)&&c.status!=='Draft');
      cls.forEach(c=>{
        totalAssigned++;
        // For "any one" group checklists, a submission by ANY assignee completes it for
        // everyone — so it's only "missed" if nobody submitted (Fix #2).
        const _done=c.anyOne
          ? DB.submissions.some(s=>s.checklistId===c.id&&s.date===dt&&s.status!=='Editing')
          : !!DB.submissions.find(s=>s.checklistId===c.id&&s.userId===u.id&&s.date===dt);
        if(!_done&&dt<today){
          totalMissed++;
        }
      });
    });
  });

  const topU=relevantUsers.map(u=>({u,n:subs.filter(s=>s.userId===u.id).length,tk:aTickets.filter(t=>t.assignedTo===u.id||t.submitterId===u.id).length})).filter(x=>x.n).sort((a,b)=>b.n-a.n);
  const recent=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||'')).slice(0,50);
  const activeCount=fArr('users').length+fArr('deps').length+fArr('locs').length+fArr('stats').length+(f.dr1?1:0)+(f.dr2?1:0);

  function msDropdown(label,key,items,getId,getLabel){
    const sel=fArr(key);const isOpen=S.afOpen===key;
    const txt=sel.length===0?'All':sel.length===1?getLabel(items.find(x=>getId(x)===sel[0])||items[0])||'?':sel.length+' selected';
    return`<div data-af="1" style="position:relative;flex:1;min-width:120px">
      <button data-af="1" type="button" onclick="S.afOpen=S.afOpen==='${key}'?null:'${key}';rr()"
        style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;background:#fff;border:1.5px solid ${isOpen?'#10B981':sel.length?'#15171C':'#E5E7EB'};border-radius:10px;padding:7px 12px;font-size:13px;font-weight:${sel.length?600:400};color:${sel.length?'#15171C':'#9CA3AF'};cursor:pointer">
        <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(label+(sel.length?': '+txt:''))}</span>
        <span style="color:#9CA3AF;transform:rotate(${isOpen?180:0}deg);transition:transform .15s;flex-shrink:0">${ic('chevD','w-4 h-4')}</span>
      </button>
      ${isOpen?`<div data-af="1" style="position:absolute;top:calc(100%+4px);left:0;right:0;background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:100;max-height:220px;overflow-y:auto;padding:6px">
        ${sel.length?`<button data-af="1" onclick="delete S.filters['${key}'];rr()" style="width:100%;text-align:left;padding:6px 10px;font-size:12px;font-weight:600;color:#E11D48;background:none;border:none;cursor:pointer;border-radius:8px">Clear selection</button><div style="height:1px;background:#F3F4F6;margin:4px 0"></div>`:''}
        ${items.map(item=>{const id=getId(item);const nm=getLabel(item)||'?';const on=sel.includes(id);return`<button data-af="1" type="button" onclick="App._togF('${key}','${id}')"
          style="width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:none;cursor:pointer;background:${on?'#F0FDF9':'transparent'};text-align:left">
          <div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${on?'#10B981':'#D1D5DB'};background:${on?'#10B981':'#fff'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${on?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>`:''}
          </div>
          <span style="font-size:13px;font-weight:${on?600:400};color:${on?'#15171C':'#6B7280'}">${esc(nm)}</span>
        </button>`;}).join('')}
      </div>`:''}
    </div>`;
  }
  

  return`<div class="fade" onclick="(function(e){if(S.afOpen&&!e.target.closest('[data-af]')){S.afOpen=null;rr();}})(event)">
  ${hdr('Analytics','')}
  <!-- Filter bar -->
  <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:14px 16px;margin-bottom:14px;position:sticky;top:0;z-index:20">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      ${msDropdown('Status','stats',['On Time','Late','Pending Approval','Rejected'],s=>s,s=>s)}
      ${msDropdown('Department','deps',DB.departments,d=>d.name,d=>d.name)}
      ${msDropdown('Team member','users',relevantUsers,u=>u.id,u=>fullName(u))}
      ${DB.locations.length?msDropdown('Location','locs',DB.locations,l=>l.id,l=>l.name):''}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:220px">
        <input type="date" value="${f.dr1||''}" onchange="S.filters.dr1=this.value;rr()" style="flex:1;background:#F6F7F8;border:1.5px solid #E5E7EB;border-radius:8px;padding:6px 10px;font-size:13px;outline:none"/>
        <span style="color:#9CA3AF">to</span>
        <input type="date" value="${f.dr2||''}" onchange="S.filters.dr2=this.value;rr()" style="flex:1;background:#F6F7F8;border:1.5px solid #E5E7EB;border-radius:8px;padding:6px 10px;font-size:13px;outline:none"/>
      </div>

      ${activeCount?`<button onclick="S.filters={};S.afOpen=null;rr()" style="padding:6px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:13px;font-weight:600;color:#9CA3AF;background:#fff;cursor:pointer">Clear (${activeCount})</button>`:''}
      ${btnG('Export','App._exportCSV()','download')}
    </div>
  </div>

  <!-- Stats row 1: submissions (all clickable) -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">
    ${App._aStatCard('Submitted',subs.length,'sky','submitted',subs)}
    ${App._aStatCard('On time',byS['On Time']||0,'brand','ontime',subs.filter(s=>s.status==='On Time'))}
    ${App._aStatCard('Late',byS['Late']||0,'rose','late',subs.filter(s=>s.status==='Late'&&!!clById(s.checklistId)))}
    ${App._aStatCard('Missed',totalMissed,'orange','missed',null)}
  </div>
  <!-- Stats row 2: tickets (all clickable) -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">
    ${App._aStatCard('Tickets',aTickets.length,'#F97316','tickets',aTickets)}
    ${App._aStatCard('Open',tkOpen,'#F59E0B','tkopen',aTickets.filter(t=>t.status==='Open'))}
    ${App._aStatCard('High Priority',tkHigh,'#DC2626','tkhigh',aTickets.filter(t=>t.priority==='High'||t.priority==='Critical'))}
    ${App._aStatCard('Resolved',tkResolved,'#0E9F6E','tkresolved',aTickets.filter(t=>t.status==='Resolved'||t.status==='Closed'))}
  </div>
  <!-- Stats row 3: compliance (computed from answers — covers historical data) -->
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
    ${App._aStatCard('Compliant',compliantN,'#0E9F6E','compliant',null)}
    ${App._aStatCard('Non-compliant',nonCompliantN,'#BE123C','noncompliant',null)}
  </div>


  <!-- Charts -->

  
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:18px">
      <div class="fd" style="font-size:14px;font-weight:700;margin-bottom:14px">Status breakdown</div>
      ${[['On Time','#10B981'],['Late','#EF4444'],['Pending Approval','#F97316'],['Rejected','#9F1239']].map(([k,c])=>{const v=byS[k]||0;const pct=Math.round(v/tot*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:600">${k}</span><span style="color:#9CA3AF">${v} · ${pct}%</span></div><div style="height:5px;background:#F3F4F6;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${c};border-radius:3px"></div></div></div>`;}).join('')}
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #F3F4F6">
        <div style="font-size:12px;font-weight:600;color:#9CA3AF;margin-bottom:6px">MISSED (past, no submission)</div>
        <div style="display:flex;justify-content:space-between;font-size:13px"><span style="font-weight:600;color:#F97316">${totalMissed} missed</span><span style="color:#9CA3AF">of ${totalAssigned} assigned in period</span></div>
      </div>
    </div>
    <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:18px">
      <div class="fd" style="font-size:14px;font-weight:700;margin-bottom:14px">Top contributors</div>
      ${topU.slice(0,7).map(({u,n})=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;cursor:pointer" onclick="App._userDrill('${u.id}')">${avatar(u,'w-7 h-7','text-[10px]')}<div style="flex:1;font-size:13px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(fullName(u))}</div><span class="fd" style="font-size:15px;font-weight:800">${n}</span><span style="font-size:11px;color:#9CA3AF">&rsaquo;</span></div>`).join('')||'<p style="font-size:13px;color:#9CA3AF">No data yet</p>'}
    </div>
  </div>

  <!-- Table -->
  <div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;overflow:hidden">
    <div style="padding:14px 18px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center">
      <span class="fd" style="font-size:14px;font-weight:700">Submissions (${subs.length})</span>
      ${btnG('Export CSV','App._exportCSV()','download')}
    </div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="border-bottom:1px solid #F3F4F6">
        ${['User','Checklist','Dept','Date','Status','Answered','Compliance'].map(h=>`<th style="padding:9px 16px;font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;text-align:left;white-space:nowrap">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${recent.map(s=>{const u=uById(s.userId),c=clById(s.checklistId);if(!u)return'';const qCount=(s.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length;if(!c)return`<tr style="border-bottom:1px solid #F9FAFB;opacity:.5"><td style="padding:9px 16px" colspan="7"><span style="font-size:12px;color:#9CA3AF">${esc(fullName(u))} — deleted checklist — ${fmtS(s.date)}</span></td></tr>`;const _qTot=(c.questionIds||[]).length;const _esc=_qTot?_subEscalationCount(c,s):0;return`<tr style="border-bottom:1px solid #F9FAFB;cursor:pointer" onclick="App.viewSub('${s.id}')" onmouseover="this.style.background='#FAFAFA'" onmouseout="this.style.background=''">
        <td style="padding:9px 16px"><div style="display:flex;align-items:center;gap:7px;cursor:pointer" onclick="event.stopPropagation();App._userDrill('${u.id}')">${avatar(u,'w-7 h-7','text-[10px]')}<span style="font-weight:500;text-decoration:underline;text-decoration-color:#E5E7EB">${esc(fullName(u))}</span></div></td>
        <td style="padding:9px 16px;max-width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(c.name)}</td>
        <td style="padding:9px 16px;color:#9CA3AF;font-size:12px">${esc(c.department)}</td>
        <td style="padding:9px 16px;color:#9CA3AF;font-size:12px;white-space:nowrap">${fmtS(s.date)}</td>
        <td style="padding:9px 16px">${chip(s.status)}</td>
        <td style="padding:9px 16px">${qCount?`<span style="font-size:12px;font-weight:700;color:#0E9F6E">${qCount}/${_qTot}</span>`:'<span style="color:#E5E7EB">—</span>'}</td>
        <td style="padding:9px 16px">${_qTot?(_esc>0?`<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FFF1F2;color:#BE123C;white-space:nowrap">⚠ ${_esc}</span>`:`<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#ECFDF5;color:#059669;white-space:nowrap">✓</span>`):'<span style="color:#E5E7EB">—</span>'}</td>
      </tr>`;}).join('')}</tbody>
    </table>${recent.length?'':empty('chart','No submissions match','Adjust filters or date range')}</div>
  </div></div>`;
}


App._viewSubById=(id)=>App.viewSub(id);
App._userDrill=(uid)=>{
  const u=uById(uid);if(!u)return;
  let subs=DB.submissions.filter(s=>s.userId===uid);
  const today=todayISO();
  const dr1=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  subs=subs.filter(s=>s.date>=dr1);
  const tot=subs.length;
  const onTime=subs.filter(s=>s.status==='On Time').length;
  const late=subs.filter(s=>s.status==='Late'&&!!clById(s.checklistId)).length;
  const pending=subs.filter(s=>s.status==='Pending Approval').length;
  const rejected=subs.filter(s=>s.status==='Rejected').length;
  const issues=subs.reduce((n,s)=>n+(s.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length,0);
  const nonComp=subs.reduce((n,s)=>{const c=clById(s.checklistId);return n+((c&&(c.questionIds||[]).length&&_subEscalationCount(c,s)>0)?1:0);},0);
  const pct=tot?Math.round(onTime/tot*100):0;
  const recent=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||'')).slice(0,10);
  openModal(
    '<div class="p-5" style="max-height:80vh;overflow-y:auto">'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
    +avatar(u,'w-12 h-12','text-sm')
    +'<div><div class="fd" style="font-size:18px;font-weight:800">'+esc(fullName(u))+'</div>'
    +'<div style="font-size:12px;color:#9CA3AF;margin-top:2px">'+esc(u.position)+' · '+esc(u.department)+'</div></div>'
    +'<button onclick="App.closeModal()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:20px">×</button>'
    +'</div>'
    // Score
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'
    +[['Submitted',tot,'#15171C'],['On time',onTime,'#059669'],['Late',late,'#DC2626'],['Pending',pending,'#F97316'],['Non-compliant',nonComp,'#BE123C'],['Answered',issues,'#0E9F6E']].map(([l,v,c])=>'<div style="background:#F9FAFB;border-radius:12px;padding:12px;text-align:center"><div class="fd" style="font-size:22px;font-weight:800;color:'+c+'">'+v+'</div><div style="font-size:11px;font-weight:600;color:#9CA3AF;margin-top:2px">'+l+'</div></div>').join('')
    +'</div>'
    // Completion rate bar
    +'<div style="background:#F9FAFB;border-radius:12px;padding:12px;margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px"><span>On-time rate (last 30d)</span><span style="color:'+(pct>=80?'#059669':pct>=60?'#F97316':'#DC2626')+'">'+pct+'%</span></div>'
    +'<div style="height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct>=80?'#059669':pct>=60?'#F97316':'#DC2626')+';border-radius:3px;transition:width .5s"></div></div>'
    +'</div>'
    // Recent submissions
    +'<div class="fd" style="font-size:13px;font-weight:700;margin-bottom:8px">Recent submissions</div>'
    +(recent.length
      ? recent.map(s=>{const c=clById(s.checklistId);const _esc=(c&&(c.questionIds||[]).length)?_subEscalationCount(c,s):0;const _comp=(c&&(c.questionIds||[]).length)?(_esc>0?'<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:#FFF1F2;color:#BE123C;white-space:nowrap">⚠ '+_esc+'</span>':'<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:#ECFDF5;color:#059669">✓</span>'):'';return'<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #F3F4F6;cursor:pointer" onclick="App._viewSubById(this.dataset.id)" data-id="'+s.id+'">'+'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(c?.name||'—')+'</div><div style="font-size:11px;color:#9CA3AF;margin-top:1px">'+fmtS(s.date)+'</div></div>'+_comp+chip(s.status)+'</div>';}).join('')
      : '<p style="font-size:13px;color:#9CA3AF">No submissions in last 30 days</p>'
    )
    +'</div>',
    'max-w-md'
  );
};
App._togF=(key,val)=>{
  if(!S.filters)S.filters={};
  if(!S.filters[key])S.filters[key]=[];
  if(!Array.isArray(S.filters[key]))S.filters[key]=[S.filters[key]];
  const idx=S.filters[key].indexOf(val);

  else S.filters[key].push(val);
  if(!S.filters[key].length)delete S.filters[key];
  S.afOpen=key; // keep dropdown open
  rr();
};

function _fmtSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return Math.round(b/1024)+'KB';return(b/1048576).toFixed(1)+'MB';}

App._delFolder=(id)=>{
  const f=(DB.folders||[]).find(x=>x.id===id);
  if(!f)return;
  if(!confirm('Delete folder "'+f.name+'" and all its files?'))return;
  // Collect all folder IDs (recursive) and doc IDs BEFORE modifying DB
  const toDelete=[];
  function collectRec(fid){toDelete.push(fid);(DB.folders||[]).filter(x=>x.parentId===fid).forEach(c=>collectRec(c.id));}
  collectRec(id);
  const docIds=(DB.documents||[]).filter(x=>toDelete.includes(x.folderId)).map(x=>x.id);
  // Track deleted IDs (tombstones) so a Supabase refresh can never resurrect them.
  if(!DB.folders_deleted)DB.folders_deleted=[];
  if(!DB.documents_deleted)DB.documents_deleted=[];
  toDelete.forEach(fid=>{if(!DB.folders_deleted.includes(fid))DB.folders_deleted.push(fid);});
  // Tombstone every contained document too — otherwise an orphaned doc reappears on reload
  // because _applyDocuments only filters by documents_deleted (the folder gate is gone).
  docIds.forEach(d=>{if(!DB.documents_deleted.includes(d))DB.documents_deleted.push(d);});
  DB.folders=(DB.folders||[]).filter(x=>!toDelete.includes(x.id));
  DB.documents=(DB.documents||[]).filter(x=>!toDelete.includes(x.folderId||''));
  log(fullName(me()),'Deleted folder',f.name);
  toast('Deleted','warn');saveDB();render();
  // Sync to Supabase in background
  const delOps=toDelete.map(fid=>sb.from('doc_folders').delete().eq('id',fid).then(({error})=>{if(error)console.error('delFolder sync:',error.message);}));
  if(docIds.length)delOps.push(sb.from('documents').delete().in('id',docIds).then(({error})=>{if(error)console.error('delDoc sync:',error.message);}));
  Promise.all(delOps).catch(e=>console.error('delFolder:',e));
};

App._doUpload=async()=>{
  const files=App._pendingFiles;if(!files?.length){toast('Select a file','err');return;}
  const btn=document.getElementById('ud-btn');
  const prog=document.getElementById('ud-progress');
  const bar=document.getElementById('ud-bar');
  if(btn)btn.style.display='none';
  if(prog)prog.style.display='block';
  const scopeTab=S.filters.docScope||'dept';
  const scopeKey=S.filters.docScopeKey;
  const folderId=S.filters.docFolder||null;
  let done=0;
  for(const file of files){
    const path=scopeTab+'/'+scopeKey+'/'+(folderId||'root')+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const{data,error}=await sb.storage.from('documents').upload(path,file,{cacheControl:'3600',upsert:false});
    if(error){toast('Upload failed: '+error.message,'err');if(btn)btn.style.display='block';if(prog)prog.style.display='none';return;}
    const{data:urlData}=sb.storage.from('documents').getPublicUrl(path);
    if(!DB.documents)DB.documents=[];
    const docObj={id:uid('doc'),name:file.name,folderId,type:scopeTab,scope:scopeKey,url:urlData?.publicUrl||path,storagePath:path,fileType:file.type,fileSize:file.size,uploadedBy:S.uid,uploaderName:fullName(me()),uploadedAt:new Date().toISOString()};
    DB.documents.push(docObj);
    // Insert directly to Supabase so refresh doesn't lose the file
    await sb.from('documents').insert({id:docObj.id,name:docObj.name,folder_id:docObj.folderId||null,type:docObj.type,scope:docObj.scope,url:docObj.url,storage_path:docObj.storagePath,file_type:docObj.fileType,file_size:docObj.fileSize,uploaded_by:docObj.uploadedBy,uploader_name:docObj.uploaderName,uploaded_at:docObj.uploadedAt}).then(({error})=>{if(error)console.error('doc insert:',error.message);}).catch(()=>{});
    done++;
    if(bar)bar.style.width=Math.round(done/files.length*100)+'%';
  }
  log(fullName(me()),'Uploaded '+done+' file(s)',scopeKey);
  toast('Uploaded '+done+' file'+(done>1?'s':''));
  saveDB();closeModal();render();
};

  const a=document.createElement('a');a.href=data.signedUrl;a.download=doc.name;a.click();
};

App._execClear=async()=>{
  const catMap={
    submissions: {local:()=>{DB.submissions=[];Object.keys(RUN).forEach(k=>delete RUN[k]);},table:'submissions'},
    checklists:  {local:()=>{DB.checklists=[];DB.checklists_deleted=[];},table:'checklists'},
    tickets:     {local:()=>{DB.tickets=[];},table:'tickets'},
    approvals:   {local:()=>{DB.approvals=[];},table:'approvals'},
    notifications:{local:()=>{DB.notifications=[];_invalidateNotifCache();},table:'notifications'},
    feedback:    {local:()=>{DB.feedback=[];},table:'feedback'},
    questions:   {local:()=>{DB.questions=[];DB.questions_deleted=[];},table:'questions'},
    documents:   {local:()=>{DB.documents=[];DB.folders=[];DB.documents_deleted=[];DB.folders_deleted=[];},table:'documents'},
    audit:       {local:()=>{DB.audit=[];},table:'audit_logs'},
    users:       {local:()=>{DB.users=DB.users.filter(u=>u.id===S.uid);},table:'profiles'},
  };
  const sel=Object.keys(catMap).filter(k=>document.getElementById('clr-'+k)?.checked);
  if(!sel.length){toast('Select at least one category','warn');return;}
  const labels=sel.map(k=>catMap[k].table).join(', ');
  if(!confirm('Permanently delete: '+labels+'?\n\nThis cannot be undone.'))return;
  closeModal();
  // Local deletion
  sel.forEach(k=>catMap[k].local());
  // Supabase deletion in background
  await Promise.allSettled(
    sel.map(k=>sb.from(catMap[k].table).delete().neq('id','00000000-0000-0000-0000-000000000000').then(()=>{}).catch(()=>{}))
  );

let _ns=null;
async function _loadNS(){
  if(_ns)return _ns;
  try{const r=localStorage.getItem(NS_LS);if(r)_ns={..._nsDefault(),...JSON.parse(r)};}catch(e){}
  if(!_ns)_ns=_nsDefault();
  try{const{data,error:wsErr}=await sb.from('workspace_settings').select('value').eq('key','notification_settings').single();
      if(wsErr&&(wsErr.code==='42P01'||wsErr.message?.includes('does not exist'))){console.warn('workspace_settings table missing — using defaults');return _ns;}
    if(data?.value){
      const saved=data.value;
      _ns={..._nsDefault(),...saved};
      // Deep-merge templates — spread would overwrite entire templates obj with saved one, which is correct
      // but if saved has no templates key at all, restore empty object
      if(!_ns.templates)_ns.templates={};
      localStorage.setItem(NS_LS,JSON.stringify(_ns));
    }}catch(e){}
  return _ns;
}
async function _saveNS(){
  if(!_ns)return;
  localStorage.setItem(NS_LS,JSON.stringify(_ns));
  try{await sb.from('workspace_settings').upsert({key:'notification_settings',value:_ns,updated_at:new Date().toISOString()},{onConflict:'key'});}catch(e){console.warn('NS sync:',e.message);}
}

// ── Resolve template variables ──
function _fillTemplate(str, vars){
  return str.replace(/\{\{(\w+)\}\}/g,(_,k)=>vars[k]||'');
}

// ── Render plain text body as HTML — {{action_url}} line becomes a CTA button ──
function _bodyToHtml(fromName, bodyText, actionUrl=''){
  const safeName=String(fromName||'Shiftly').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
  const rawLines = bodyText.split('\n').map(l=>l.trim());
  // ctaUrl is passed in as 3rd arg — already the resolved URL
  let ctaUrl = actionUrl||'';
  // Strip: the {{action_url}} placeholder, the resolved URL itself (already a button), and any bare https line
  const lines = rawLines
    .filter(l=>l!=='{{action_url}}' && l!==ctaUrl && !/^https?:\/\//.test(l))
    .map(l=>l.replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])));
  const ctaLabel=ctaUrl.includes('approvals')?'View Approvals'
    :ctaUrl.includes('mychecklists')?'Open My Checklists'
    :ctaUrl.includes('notifications')?'View Notifications'
    :ctaUrl.includes('settings')?'Open Settings'
    :ctaUrl.includes('analytics')?'View Analytics'
    :'Open Shiftly';
  return`<!DOCTYPE html><html><body style="margin:0;padding:0;background:#F7F6F2;font-family:sans-serif">
  <div style="max-width:520px;margin:32px auto;background:#fff;border-radius:16px;border:1px solid #ECEDF0;overflow:hidden">
    <div style="background:#15171C;padding:20px 28px;display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:#0E9F6E;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff">S</div>
      <span style="font-weight:700;font-size:16px;color:#fff">${safeName}</span>
    </div>
    <div style="padding:28px">
      ${lines.filter(Boolean).map((l,i)=>i===0
        ?`<p style="font-size:15px;color:#374151;margin:0 0 16px">${l}</p>`
        :`<p style="font-size:14px;color:#6B7280;margin:0 0 8px;line-height:1.6">${l}</p>`
      ).join('')}
      ${ctaUrl?`<div style="margin-top:24px">
        <a href="${ctaUrl}" style="display:inline-block;background:#15171C;color:#fff;font-weight:700;font-size:14px;padding:12px 24px;border-radius:10px;text-decoration:none">${ctaLabel} →</a>
        <p style="margin:10px 0 0;font-size:11px;color:#B8B5AC">Or copy: ${ctaUrl}</p>
      </div>`:''}
    </div>
    <div style="padding:16px 28px;background:#F9F8F5;border-top:1px solid #ECEDF0;font-size:11px;color:#9CA3AF">
      ${safeName} · Automated notification · Do not reply
    </div>
  </div></body></html>`;
}

// ── sendEmail: FAST — calls edge function directly, no queue, no extra DB round trip ──
async function sendEmail(eventType, userId, vars){
  const user = userId ? uById(userId) : null;
  if(!user?.email){console.warn('sendEmail: no email for user',userId);return;}
  if(!_ns) await _loadNS();
  if(!_ns.email_enabled) return;
  if(_ns['email_'+eventType]===false) return;
  // Build app URL from current window location
  const appUrl = window.location.origin;
  // Each event type links to the most relevant page
  const routeMap = {
    checklist_assigned:'mychecklists',
    submission_late:'mychecklists', submission_approved:'mychecklists',
    submission_rejected:'mychecklists', approval_requested:'approvals',
    approval_decided:'approvals', feedback_received:'notifications',
    deadline_reminder:'mychecklists',
  };
  const actionUrl = appUrl + '/#' + (routeMap[eventType]||'');
  const allVars = {user_name:fullName(user), from_name:_ns.email_from_name||'Shiftly', app_url:appUrl, action_url:actionUrl, ...vars};
  const defaults = _defaultTemplates();
  const tpl = {
    subject:(_ns.templates?.[eventType]?.subject)||defaults[eventType]?.subject||eventType,
    body:   (_ns.templates?.[eventType]?.body)   ||defaults[eventType]?.body   ||'',
  };
  const subject  = _fillTemplate(tpl.subject, allVars);
  const bodyHtml = _bodyToHtml(_ns.email_from_name, _fillTemplate(tpl.body, allVars), actionUrl);
  sb.functions.invoke('send-notification',{body:{
    to:user.email, from_name:_ns.email_from_name||'Shiftly', subject, html:bodyHtml,
  }}).catch(e=>console.warn('sendEmail invoke failed:',e.message));
}

App._exportCSV=()=>{
  let subs=DB.submissions;if(!isAdmin())subs=subs.filter(s=>subTree(S.uid).some(u=>u.id===s.userId)||s.userId===S.uid);
  const f=S.filters;const fArr=k=>Array.isArray(f[k])?f[k]:(f[k]?[f[k]]:[]);
  if(fArr('users').length)subs=subs.filter(s=>fArr('users').includes(s.userId));
  if(fArr('deps').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return fArr('deps').includes(c?.department);});
  if(fArr('locs').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return fArr('locs').some(l=>(c?.locationIds||[]).includes(l));});
  if(fArr('stats').length)subs=subs.filter(s=>fArr('stats').includes(s.status));
  if(f.dr1)subs=subs.filter(s=>s.date>=f.dr1);if(f.dr2)subs=subs.filter(s=>s.date<=f.dr2);
  const summaryRows=[['#','User','Email','Phone','Department','Position','Checklist','Dept','Location(s)','Date','Status','Submitted At','Edit Count','Pending Approval','Compliance','Escalations']];
  subs.forEach((s,i)=>{const u=uById(s.userId),c=clById(s.checklistId);if(!u)return;if(!c&&!s.checklistDeleted)return;const clName=c?c.name:'[Deleted checklist]';const clDept=c?c.department||'':'';const clLocs=c?(c.locationIds||[]).map(id=>DB.locations.find(l=>l.id===id)?.name||'').join('; '):'';const _escN=(c&&(c.questionIds||[]).length)?_subEscalationCount(c,s):0;const _compTxt=(c&&(c.questionIds||[]).length)?(_escN>0?'Non-compliant':'Compliant'):'N/A';summaryRows.push([i+1,fullName(u),u.email||'',u.phone||'',u.department||'',u.position||'',clName,clDept,clLocs,s.date,s.status,s.submittedAt?new Date(s.submittedAt).toLocaleString('en-GB'):'',s.editCount||0,s.status==='Pending Approval'?'Yes':'No',_compTxt,_escN]);});
  // Also export question responses as a second sheet
  const qRows=[['Sub #','User','Email','Checklist','Date','Status','Question','Response','Comment','Escalated']];
  subs.forEach((s,si)=>{const u=uById(s.userId),c=clById(s.checklistId);if(!u)return;(s.questionResponses||[]).forEach((qr,qi)=>{const q=(DB.questions||[]).find(x=>x.id===qr.questionId);const _esc=(c&&q&&_qrEscalates(c,q,qr))?'Yes':'';qRows.push([si+1,fullName(u),u.email||'',c?c.name:'[Deleted]',s.date,s.status,q?q.text:'Q'+(qi+1),qr.response!==null&&qr.response!==undefined?String(qr.response):'',qr.comment||'',_esc]);});});
  const all=[...summaryRows,[],['=== QUESTION RESPONSES (one row per response) ==='],[],...qRows];
  const csv=all.map(r=>r.map(v=>{let cell=String(v??'');
    // Neutralize CSV formula injection: cells that begin with = + - @ (or tab/CR)
    // are prefixed with a single quote so spreadsheet apps treat them as text.
    if(/^[=+\-@\t\r]/.test(cell))cell="'"+cell;

/* ── Date helpers ── */
function _isoAdd(iso,days){const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+days);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _addMonths(iso,n){const d=new Date(iso+'T00:00:00');d.setMonth(d.getMonth()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function _monthsBetween(a,b){if(!a||!b)return 0;const d1=new Date(a+'T00:00:00'),d2=new Date(b+'T00:00:00');let m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());if(d2.getDate()<d1.getDate())m--;return Math.max(0,m);}
function _r2(n){return Math.round(n*100)/100;}

/* ── Leave-year id for a user (calendar | anniversary) ── */
function _leaveYearOf(u,iso){
  iso=iso||todayISO();
  // H1: derive basis from the USER'S OWN profile, not the globally active profile.
  const basis=(DB.hrmConfig?.profiles?.[userProfileId(u)]?.leaveYearBasis)||'calendar';
  if(basis==='anniversary'&&u?.hrm?.joiningDate){
    const j=new Date(u.hrm.joiningDate+'T00:00:00');const d=new Date(iso+'T00:00:00');
    let y=d.getFullYear();const annThis=new Date(y,j.getMonth(),j.getDate());
    if(d<annThis)y--;
    return y+'-anniv';
  }
  return iso.slice(0,4);
}
/* ── First calendar date of the user's current leave year (L7: carry-over expiry anchor). ── */
function _leaveYearStart(u,iso){
  iso=iso||todayISO();
  const basis=(DB.hrmConfig?.profiles?.[userProfileId(u)]?.leaveYearBasis)||'calendar';
  if(basis==='anniversary'&&u?.hrm?.joiningDate){
    const j=new Date(u.hrm.joiningDate+'T00:00:00');const d=new Date(iso+'T00:00:00');
    let y=d.getFullYear();const annThis=new Date(y,j.getMonth(),j.getDate());
    if(d<annThis)y--;
    return y+'-'+String(j.getMonth()+1).padStart(2,'0')+'-'+String(j.getDate()).padStart(2,'0');
  }
  return iso.slice(0,4)+'-01-01';
}

/* ── Lookups ── */
const ltById=id=>(DB.leaveTypes||[]).find(t=>t.id===id);
function _typesFor(profileId){return (DB.leaveTypes||[]).filter(t=>t.profileId===profileId);}

/* ── Balance ledger (create-if-missing) ── */
function _balanceFor(userId,leaveTypeId,leaveYear){
  const u=uById(userId);
  leaveYear=leaveYear||_leaveYearOf(u,todayISO());
  let b=(DB.leaveBalances||[]).find(x=>x.userId===userId&&x.leaveTypeId===leaveTypeId&&x.leaveYear===leaveYear);
  if(!b){
    // LV-8: fixed-entitlement (non-accruing) PAID types — birthday/parental/bereavement/study, etc. — carry
    //   their whole allowance in lt.entitlement with accrualPerMonth:0. Seed the new row's `entitled` from it so
    //   they are usable; accruing types (accrualPerMonth>0) still start at 0 and grow via _runMonthlyAccrual.
    //   Comp-off is HR-ledger only (never balance-row based). Unpaid types stay 0 (they bypass the ledger anyway).
    const lt=ltById(leaveTypeId);
    const seedEnt=(lt&&!_isCompOffLt(lt)&&lt.unpaid!==true&&(lt.accrualPerMonth||0)<=0&&(lt.entitlement||0)>0)?_r2(lt.entitlement):0;
    b={id:uid('lb'),userId,leaveTypeId,leaveYear,entitled:seedEnt,accrued:0,carriedIn:0,carriedExpiry:null,used:0,pending:0,lastAccruedMonth:null};DB.leaveBalances.push(b);
  }
  return b;
}
/* L8: read-only balance lookup — never pushes a row into DB.leaveBalances (use on render/analytics paths). */
function _balanceReadonly(userId,leaveTypeId,leaveYear){
  const u=uById(userId);
  leaveYear=leaveYear||_leaveYearOf(u,todayISO());
  const found=(DB.leaveBalances||[]).find(x=>x.userId===userId&&x.leaveTypeId===leaveTypeId&&x.leaveYear===leaveYear);
  if(found)return found;
  // LV-8: mirror _balanceFor's fixed-entitlement seeding in the read-only default so preview/render show the
  //   real usable balance for non-accruing paid types BEFORE the first row is materialized. Never pushes a row.
  const lt=ltById(leaveTypeId);
  const seedEnt=(lt&&!_isCompOffLt(lt)&&lt.unpaid!==true&&(lt.accrualPerMonth||0)<=0&&(lt.entitlement||0)>0)?_r2(lt.entitlement):0;
  return {id:null,userId,leaveTypeId,leaveYear,entitled:seedEnt,accrued:0,carriedIn:0,carriedExpiry:null,used:0,pending:0,lastAccruedMonth:null};
}
function _balRemaining(b){
  if(!b)return 0;
  let carried=b.carriedIn||0;
  if(b.carriedExpiry&&todayISO()>b.carriedExpiry)carried=0;
  return _r2((b.entitled||0)+carried-(b.used||0)-(b.pending||0));
}
/* §3a: comp-off REMAINING from the dedicated ledger (u.hrm.compOff).
   Each positive grant honors its OWN expiry (expired grants drop out); negative removals always apply.
   Independent of carry-over's carriedExpiry. */
function _compOffRemaining(userId){
  const u=uById(userId);const led=u?.hrm?.compOff;if(!Array.isArray(led))return 0;
  const today=todayISO();
  let total=0;
  led.forEach(e=>{
    const d=Number(e.days)||0;
    if(d>=0){ if(e.expiry&&today>e.expiry)return; total+=d; }   // grant expired → drops out
    else total+=d;                                              // removal always applies
  });
  return _r2(Math.max(0,total));
}
const _isCompOffLt=lt=>!!lt&&lt.key==='compoff';
/* Remaining days for a user+leaveType — comp-off reads the dedicated ledger; everything else the balance row. */
function _ltRemaining(userId,lt,leaveYear){
  if(_isCompOffLt(lt))return _compOffRemaining(userId);
  return _balRemaining(_balanceReadonly(userId,lt.id,leaveYear));
}

/* ── Working-day deduction (exclude off-days + public holidays) ── */
function _workingDaysBetween(userId,start,end,halfDay){
  const u=uById(userId);if(!u)return 0;
  const off=new Set(u.hrm?.schedule?.offDays||[]);
  const prof=userProfileId(u);
  const hols=new Set((DB.holidays||[]).filter(h=>h.profileId===prof).map(h=>h.date));
  let count=0,d=start;
  let guard=0;
  while(d<=end&&guard++<1000){
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    if(!off.has(dow)&&!hols.has(d))count++;
    d=_isoAdd(d,1);
  }
  if(halfDay&&count>0)count-=0.5;
  return _r2(count);
}

/* ── Worked-hours / late / early computation ── */
function computeHours(rec){
  if(rec.inMin==null)return 0;
  // L3: an auto-closed (forgotten clock-out) record must NOT book a full ~15h day into payroll.
  // Cap worked hours at the user's scheduled shift length instead of running to midnight.
  if(rec.autoClosed){
    const u=uById(rec.userId);const sh=Number(u?.hrm?.schedule?.hours);
    return _r2(sh>0?sh:0);
  }
  let out=rec.outMin;
  if(out==null)return 0;
  // LV-5: a genuine clock-out earlier than clock-in is an OVERNIGHT shift (e.g. 22:00→06:00).
  //   Add a full day so it books (out+1440)-in (=8h), instead of clamping to midnight (=2h).
  //   Auto-closed records never reach here (they return the capped scheduled hours above).
  if(out<rec.inMin)out+=1440;
  return _r2((out-rec.inMin)/60);
}
function _applyFlags(rec){
  const u=uById(rec.userId);if(!u)return;
  _ensureHrm(u); // L2: guard against an unmigrated user with no u.hrm.schedule
  const s=u.hrm?.schedule||{in:'09:00',out:'18:00'};const grace=userProfile(u).grace??15; // LV-6: user's profile, not global
  const flags=new Set((rec.flags||[]).filter(f=>f==='auto-closed'||f==='forgot-clockout'||f==='outside-geofence'));
  if(rec.inMin!=null&&rec.inMin>hm2m(s.in)+grace)flags.add('late');
  if(rec.outMin!=null&&!rec.autoClosed&&rec.outMin<hm2m(s.out)-grace)flags.add('early');
  rec.flags=[...flags];
}
function attFor(userId,date){return (DB.attendance||[]).find(a=>a.userId===userId&&a.date===date);}

/* ── Geofence (Haversine, meters) ── */
function _distM(lat1,lng1,lat2,lng2){
  const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── Auto clock-out (lazy: boot + visibility regain). True midnight close needs a backend cron — deferred. ── */
function _runAutoClose(){
  const today=todayISO();let changed=false;
  (DB.attendance||[]).forEach(rec=>{
    if(rec.clockIn&&!rec.clockOut&&rec.date<today){
      const at=userProfile(uById(rec.userId)).autoCloseAt||'00:00'; // LV-6: user's profile, not global
      rec.clockOut=rec.date+'T'+at+':00';
      rec.outMin=hm2m(at);
      rec.autoClosed=true;rec.status='AutoClosed';
      rec.hours=computeHours(rec);
      const fl=new Set(rec.flags||[]);fl.add('auto-closed');fl.add('forgot-clockout');rec.flags=[...fl];
      if(_hnp('inapp_hrm_missed_clockout'))_hrmNotify(rec.userId,'⏱ Your '+fmtD(rec.date)+' clock-out was auto-closed at midnight (you forgot to clock out).');
      if(_hnpEmail('email_hrm_missed_clockout'))queueEmail('hrm_auto_closed',rec.userId,null,rec.date,{date:rec.date});
      changed=true;
    }
  });
  if(changed)saveDB();
}

/* ── Monthly pro-rated accrual (guarded by lastAccruedMonth) ── */
function _runMonthlyAccrual(){
  const ym=todayISO().slice(0,7);let changed=false;
  DB.users.filter(u=>u.status==='Active'&&u.hrm?.joiningDate).forEach(u=>{
    const serviceMonths=_monthsBetween(u.hrm.joiningDate,todayISO());
    const prof=userProfileId(u);
    _ensureHrm(u);const marks=u.hrm.accrualMarks;
    _typesFor(prof).filter(lt=>lt.enabled&&(lt.accrualPerMonth||0)>0).forEach(lt=>{
      // LV-7: idempotency is keyed per (user,leaveType,calendar month) GLOBALLY via u.hrm.accrualMarks,
      //   so an anniversary leave-year rollover (which creates a fresh row with lastAccruedMonth:null)
      //   can no longer make the rollover month accrue twice.
      if(marks[lt.id]===ym)return;
      const b=_balanceFor(u.id,lt.id,_leaveYearOf(u,todayISO()));
      if(lt.eligibilityMonths&&serviceMonths<lt.eligibilityMonths){marks[lt.id]=ym;b.lastAccruedMonth=ym;changed=true;return;}
      let base=lt.accrualPerMonth;
      if(lt.key==='annual'){if(serviceMonths<6)base=0;else if(serviceMonths<12)base=HRM_ANNUAL_MID;else base=lt.accrualPerMonth;}
      const ww=u.hrm.schedule?.workWeek||5;
      const prorate=ww===6?HRM_SIXDAY_PRORATE:1;
      let add=_r2(base*prorate);
      // M3: track the ACCRUED portion separately so maxPerYear caps only accruals,
      // never manual grants / comp-off that also live in b.entitled.
      const prevAccrued=b.accrued||0;
      let nextAccrued=_r2(prevAccrued+add);
      if(lt.maxPerYear&&nextAccrued>lt.maxPerYear){nextAccrued=lt.maxPerYear;add=_r2(nextAccrued-prevAccrued);}
      if(add>0){b.accrued=nextAccrued;b.entitled=_r2((b.entitled||0)+add);}
      marks[lt.id]=ym;b.lastAccruedMonth=ym;changed=true;
    });
  });
  if(changed)saveDB();
}

/* ── Carry-over + expiry (lazy at year rollover) ── */
function _runCarryOver(){
  const today=todayISO();let changed=false;
  DB.users.filter(u=>u.hrm).forEach(u=>{
    const curYear=_leaveYearOf(u,today);
    _typesFor(userProfileId(u)).forEach(lt=>{
      // find prior-year balances for this user/type that haven't been carried yet
      (DB.leaveBalances||[]).filter(b=>b.userId===u.id&&b.leaveTypeId===lt.id&&b.leaveYear!==curYear&&!b._carried).forEach(prev=>{
        if(!lt.carryOver?.enabled)return; // leave unmarked → enabling carry-over later retro-applies
        prev._carried=true;changed=true;
        const carry=Math.min(_balRemaining(prev),lt.carryOver.maxDays||0);
        if(carry<=0)return;
        const nb=_balanceFor(u.id,lt.id,curYear);
        nb.carriedIn=_r2((nb.carriedIn||0)+carry);
        if(lt.carryOver.expiryMonths)nb.carriedExpiry=_addMonths(_leaveYearStart(u,today),lt.carryOver.expiryMonths); // L7: anchor to leave-year start, not Jan-1
      });
    });
  });
  if(changed)saveDB();
}

/* ── Birthday gating ── */
function _birthdayOk(u,startISO){
  if(!u?.hrm?.dob)return false;
  return new Date(u.hrm.dob+'T00:00:00').getMonth()===new Date(startISO+'T00:00:00').getMonth();
}

/* ── Boot init (idempotent) ── */
function _hrmInit(){
  _seedProfiles();
  _seedRoleProfiles();
  DB.hrmConfig.locationGeo=DB.hrmConfig.locationGeo||{}; // frontend-only per-location geofence store (never synced to Supabase)
  Object.keys(DB.hrmConfig.profiles||{}).forEach(_seedLeaveTypes);
  DB.users.forEach(_ensureHrm);
  _runAutoClose();
  _runMonthlyAccrual();
  _runCarryOver();
  saveDB();
}

/* ── Attendance status colors ── */
const ATT_COLOR={Present:'#10B981',Absent:'#F43F5E',Leave:'#8B5CF6',HalfDay:'#F59E0B',OffDay:'#9CA3AF',Holiday:'#0EA5E9',AutoClosed:'#EAB308'};
const ATT_LABEL={Present:'Present',Absent:'Absent',Leave:'On leave',HalfDay:'Half-day',OffDay:'Off-day',Holiday:'Public holiday',AutoClosed:'Auto-closed'};
function _m2hm(m){if(m==null)return'—';m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

/* Compute the display status for a user on a date (no record = derive off/holiday/absent/leave) */
function _dayStatus(userId,date){
  const rec=attFor(userId,date);
  if(rec)return rec;
  const u=uById(userId);if(!u)return null;
  const off=new Set(u.hrm?.schedule?.offDays||[]);
  const dow=DAYS3[new Date(date+'T00:00:00').getDay()];
  const prof=userProfileId(u);
  const hol=(DB.holidays||[]).find(h=>h.profileId===prof&&h.date===date);
  // leave approved covering this date?
  const lv=(DB.leaveRequests||[]).find(r=>r.userId===userId&&r.status==='Approved'&&r.start<=date&&r.end>=date);
  if(hol)return{virtual:true,status:'Holiday',date,note:hol.name};
  if(off.has(dow))return{virtual:true,status:'OffDay',date};
  if(lv){const lt=ltById(lv.leaveTypeId);return{virtual:true,status:lv.halfDay?'HalfDay':'Leave',date,leaveType:lv.leaveTypeId,note:lt?lt.name:''};}
  if(date<todayISO())return{virtual:true,status:'Absent',date};
  return null;
}

/* ── Resolve the geofence a user must satisfy to clock in.
   Precedence: assigned location (Locations + per-user) → profile office (backward compat) → none.
   Returns {lat,lng,radius} when a geofence is ACTIVE, else null (no geofence → allow). ── */
function _activeGeofence(u){
  if(!u)return null;
  const locId=u.hrm?.locationId;
  if(locId){
    const g=(DB.hrmConfig?.locationGeo||{})[locId];
    if(g&&g.enabled&&g.lat!=null&&g.lng!=null)return{lat:g.lat,lng:g.lng,radius:g.radius||200};
  }
  // Fallback: profile-level office geofence (legacy single-office config)
  const off=activeProfile().office||{};
  if(off.enabled&&off.lat!=null&&off.lng!=null)return{lat:off.lat,lng:off.lng,radius:off.radius||200};
  return null;
}

/* ════════ CLOCK IN / OUT ════════ */
// Shared strict geofence gate for clock-in AND clock-out. Resolves the active geofence
// (assigned-location geo → profile-office fallback). With no geofence, runs onPass(null)
// immediately. With a geofence active, requires GPS inside the radius; blocks otherwise
// with a clear message. `verb` ('in'/'out') only swaps the wording.
function _withGeofence(verb,onPass){
  const gf=_activeGeofence(me());
  if(!gf){onPass(null);return;}
  const word='clock '+verb;
  if(!navigator.geolocation){toast('Location required to '+word+' — enable location access','err');return;}
  toast('Checking location…');
  navigator.geolocation.getCurrentPosition(
    pos=>{const d=_distM(pos.coords.latitude,pos.coords.longitude,gf.lat,gf.lng);
      if(d<=(gf.radius||200)){onPass({lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy});}
      else{toast('You must be inside the office area to '+word+' ('+Math.round(d)+'m away)','err');}
    },
    ()=>{toast('Location required to '+word+' — enable location access','err');},
    {enableHighAccuracy:true,timeout:8000,maximumAge:0}
  );
}
App.clockIn=()=>{
  const uId=S.uid,date=todayISO();
  // LV-2: only an ACTUAL clock-in (clockIn/inMin set) means "already clocked in today".
  //   A pre-written Leave/HalfDay record (clockIn:null/inMin:null) must NOT block clock-in — on a
  //   half-day-leave day the worked half is still clocked, and a cancelled-leave day must be clockable.
  const existing=attFor(uId,date);
  if(existing&&(existing.clockIn!=null||existing.inMin!=null)){toast('Already clocked in today','warn');return;}
  const _record=(geo)=>{
    // L1: `date` & `inMin` are LOCAL (todayISO/nowHM); all hours/late math uses these local *Min values.
    // `clockIn` ISO is a UTC display/audit stamp only — never used for hours math (no functional change).
    const m=nowHM();
    let rec=existing;
    if(rec){
      // Merge the clock-in onto the existing Leave/HalfDay row rather than creating a duplicate.
      rec.clockIn=new Date().toISOString();rec.inMin=m;rec.clockOut=null;rec.outMin=null;rec.hours=null;
      rec.inGeo=geo;rec.autoClosed=false;
      // Keep HalfDay status for a half-day-leave day (worked half); a leftover full-Leave row becomes Present.
      if(rec.status!=='HalfDay')rec.status='Present';
    }else{
      rec={id:uid('att'),userId:uId,date,clockIn:new Date().toISOString(),clockOut:null,inMin:m,outMin:null,hours:null,status:'Present',leaveType:null,flags:[],inGeo:geo,autoClosed:false,note:'',createdAt:new Date().toISOString()};
      DB.attendance.unshift(rec);
    }
    _applyFlags(rec);
    saveDB();
    if(rec.flags.includes('late')&&_hnp('inapp_hrm_late'))_hrmNotify(uId,'⚠️ You clocked in late at '+_m2hm(m)+' on '+fmtD(date)+'.');
    if(rec.flags.includes('late')&&_hnpEmail('email_hrm_late'))queueEmail('hrm_late',uId,null,date,{time:_m2hm(m)});
    toast('Clocked in at '+_m2hm(m)+' ✓');rr();
  };
  _withGeofence('in',_record);
};
App.clockOut=()=>{
  const uId=S.uid,date=todayISO();
  const rec=attFor(uId,date);
  // LV-2: a pre-written Leave/HalfDay row (no actual clock-in) is not "clocked in" — require a real clock-in.
  if(!rec||(rec.clockIn==null&&rec.inMin==null)){toast('Clock in first','warn');return;}
  if(rec.clockOut){toast('Already clocked out','warn');return;}
  // Same strict geofence gate as clock-in: only record when inside the boundary.
  _withGeofence('out',(geo)=>{
    const m=nowHM();
    rec.clockOut=new Date().toISOString();rec.outMin=m;rec.hours=computeHours(rec);
    if(geo)rec.outGeo=geo;
    _applyFlags(rec);saveDB();
    if(rec.flags.includes('early'))_hrmNotify(uId,'⚠️ You clocked out early at '+_m2hm(m)+' on '+fmtD(date)+'.');
    toast('Clocked out — '+rec.hours+'h worked ✓');rr();
  });
};

function _clockWidget(){
  const date=todayISO();const rec=attFor(S.uid,date);const u=me();
  const sched=u.hrm?.schedule||{};
  // Clock-out reminder (in-app, lazy)
  if(rec&&rec.clockIn&&!rec.clockOut&&nowHM()>hm2m(sched.out)+(userProfile(u).grace??15)){ // LV-6: user's profile
    if(!rec._remNotified){rec._remNotified=true;_hrmNotify(S.uid,'🔔 Don\'t forget to clock out — your shift ended at '+(sched.out||'18:00')+'.');saveDB();}
  }
  let inner;
  // LV-2: a record that exists but has no actual clock-in (a pre-written Leave/HalfDay row) must still
  //   show the Clock In button so the worked (half-)day can be clocked.
  const _clockedIn=rec&&(rec.clockIn!=null||rec.inMin!=null);
  if(!_clockedIn){
    inner=`<button onclick="App.clockIn()" style="display:inline-flex;align-items:center;gap:8px;background:#10B981;color:#fff;font-size:15px;font-weight:700;padding:14px 28px;border-radius:14px;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(16,185,129,.3)">${ic('clock','w-5 h-5')}Clock In</button>
    <p style="font-size:12px;color:#9CA3AF;margin-top:8px">${rec&&rec.status==='HalfDay'?'Half-day leave — clock in for your worked half · ':''}Shift ${sched.in||'09:00'}–${sched.out||'18:00'} · ${sched.hours||9}h</p>`;
  }else if(!rec.clockOut){
    inner=`<div style="font-size:13px;color:#6B7280;margin-bottom:10px">Clocked in at <strong style="color:#15171C">${_m2hm(rec.inMin)}</strong>${rec.flags.includes('late')?' <span style="color:#F43F5E;font-weight:700">· Late</span>':''}</div>
    <button onclick="App.clockOut()" style="display:inline-flex;align-items:center;gap:8px;background:#15171C;color:#fff;font-size:15px;font-weight:700;padding:14px 28px;border-radius:14px;border:none;cursor:pointer">${ic('clock','w-5 h-5')}Clock Out</button>`;
  }else{
    inner=`<div style="font-size:14px;font-weight:700;color:#10B981;margin-bottom:4px">✓ Shift complete</div>
    <div style="font-size:13px;color:#6B7280">${_m2hm(rec.inMin)} → ${_m2hm(rec.outMin)} · <strong style="color:#15171C">${rec.hours}h</strong>${rec.autoClosed?' <span style="color:#EAB308;font-weight:700">· Auto-closed</span>':''}${rec.flags.includes('late')?' <span style="color:#F43F5E">· Late in</span>':''}${rec.flags.includes('early')?' <span style="color:#F59E0B">· Early out</span>':''}</div>`;
  }
  return `<div style="background:#fff;border-radius:20px;border:1px solid #ECEDF0;box-shadow:0 1px 3px rgba(16,24,40,.06);padding:22px;text-align:center;margin-bottom:16px">${inner}</div>`;
}

/* Month-grid attendance calendar for a user */
function _attCalendar(userId,ym){
  ym=ym||todayISO().slice(0,7);
  const[y,mo]=ym.split('-').map(Number);
  const first=new Date(y,mo-1,1),firstDow=first.getDay();
  const days=new Date(y,mo,0).getDate();
  let cells='';
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const date=ym+'-'+String(d).padStart(2,'0');
    const st=_dayStatus(userId,date);
    const col=st?ATT_COLOR[st.status]:'#F3F4F6';
    const txt=st&&st.status!=='Present'?'#fff':(st?'#fff':'#9CA3AF');
    const isT=date===todayISO();
    const tip=st?(ATT_LABEL[st.status]+(st.note?' — '+st.note:'')+(st.hours?(' ('+st.hours+'h)'):'')):'';
    cells+=`<div onclick="App._attDay('${userId}','${date}')" title="${esc(tip)}" style="aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;background:${st?col:'#F6F7F8'};color:${st?'#fff':'#9CA3AF'};border:${isT?'2px solid #15171C':'1px solid transparent'}">${d}</div>`;
  }
  const monName=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const prevYm=_ymShift(ym,-1),nextYm=_ymShift(ym,1);
  const legend=Object.keys(ATT_COLOR).map(k=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#6B7280"><span style="width:10px;height:10px;border-radius:3px;background:${ATT_COLOR[k]}"></span>${ATT_LABEL[k]}</span>`).join('');
  return `<div style="background:#fff;border-radius:20px;border:1px solid #ECEDF0;padding:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="S.filters.attYm='${prevYm}';rr()" style="width:32px;height:32px;border-radius:9px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center"><span style="transform:rotate(180deg)">${ic('chevR','w-4 h-4')}</span></button>
      <div class="fd" style="font-weight:800;font-size:15px">${monName}</div>
      <button onclick="S.filters.attYm='${nextYm}';rr()" style="width:32px;height:32px;border-radius:9px;border:1px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center">${ic('chevR','w-4 h-4')}</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:10px;font-weight:800;color:#B8B5AC">${d}</div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${cells}</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #F3F4F6">${legend}</div>
  </div>`;
}
function _ymShift(ym,n){const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

/* §6 — Day detail modal: clock-in/out, hours, status, flags, notes for one user/day. */
App._attDay=(userId,date)=>{
  // Scope: own day always; others only within attendance scope.
  if(userId!==S.uid&&!(can('attendance','view')&&scopeFilter('attendance')(userId))){toast('Not allowed','err');return;}
  const u=uById(userId);if(!u)return;
  const st=_dayStatus(userId,date);
  const status=st?st.status:'—';
  const col=ATT_COLOR[status]||'#9CA3AF';
  const label=ATT_LABEL[status]||status;
  const rec=st&&!st.virtual?st:null; // a real attendance record (has in/out)
  const row=(k,v)=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F3F4F6"><span style="font-size:12px;font-weight:600;color:#9CA3AF">'+k+'</span><span style="font-size:14px;font-weight:700;color:#15171C">'+v+'</span></div>';
  const flags=(rec&&(rec.flags||[]).length)?(rec.flags||[]).map(f=>'<span style="display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:#FEF2F2;color:#B91C1C;margin-right:4px">'+esc(f)+'</span>').join(''):'';
  let body='';
  if(rec){
    body=row('Clock in',_m2hm(rec.inMin))
      +row('Clock out',_m2hm(rec.outMin))
      +row('Hours worked',rec.hours!=null?rec.hours+'h':'—')
      +(rec.autoClosed?row('Note','<span style="color:#B45309">Auto-closed</span>'):'')
      +(flags?'<div style="padding:10px 0"><div style="font-size:12px;font-weight:600;color:#9CA3AF;margin-bottom:6px">Flags</div>'+flags+'</div>':'')
      +(rec.note?row('Note',esc(rec.note)):'');
  }else if(st){
    body=row('Clock in','—')+row('Clock out','—')+row('Hours worked','—')
      +(st.note?row('Details',esc(st.note)):'');
  }else{
    body='<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:18px">No record for this day.</p>';
  }
  openModal('<div style="padding:20px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    +'<h2 style="font-size:18px;font-weight:800;font-family:var(--font-display)">'+fmtD(date)+'</h2>'
    +'<button onclick="App.closeModal()" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;border:none;background:transparent;cursor:pointer;color:#9CA3AF">'+ic('x')+'</button></div>'
    +'<p style="font-size:12px;color:#9CA3AF;margin-bottom:12px">'+esc(fullName(u))+(userId===S.uid?' (me)':'')+'</p>'

function _isMgrApprover(r){if(r.userId===S.uid)return false;const emp=uById(r.userId);if(!emp)return false;return isAdmin()||emp.managerId===S.uid||_underOn(r.userId,S.uid,r.start);}

/* ════════ DYNAMIC APPROVAL FLOWS (§2) — frontend-only ════════ */
// A flow is an ordered array of stage objects:
//   {id, type:'manager'}                          → the requester's date-aware manager
//   {id, type:'role', role:'hr'}                  → any active HR user (Super Admin excluded from queue but universal approver)
//   {id, type:'user', userId:'<id>'}             → a specific named approver
// Back-compat: old `prof.approvalChain=['manager','hr']` is migrated on read by _normalizeFlow().
function _stageLabel(stage){
  if(!stage)return '';
  if(stage.type==='manager')return 'Manager';
  if(stage.type==='role')return (stage.role==='hr')?'HR':esc(stage.role||'Role');
  if(stage.type==='user'){const u=uById(stage.userId);return u?fullName(u):'Specific person';}
  return '';
}
// Migrate a profile's legacy approvalChain → approvalFlow shape (idempotent, non-mutating return).
function _normalizeFlow(prof){
  if(prof&&Array.isArray(prof.approvalFlow)&&prof.approvalFlow.length)return prof.approvalFlow;
  const chain=(prof&&Array.isArray(prof.approvalChain)&&prof.approvalChain.length)?prof.approvalChain:['manager','hr'];
  return chain.map((s,i)=>s==='manager'?{id:'st'+i,type:'manager'}:{id:'st'+i,type:'role',role:'hr'});
}
// Resolve the active flow for a request: per-leave-type override (lt.approvalFlow) → profile flow.
function _flowFor(req){
  const lt=req&&req.leaveTypeId?ltById(req.leaveTypeId):null;
  if(lt&&Array.isArray(lt.approvalFlow)&&lt.approvalFlow.length)return lt.approvalFlow;
  const emp=req?uById(req.userId):null;
  const prof=DB.hrmConfig?.profiles?.[userProfileId(emp)]||activeProfile();
  return _normalizeFlow(prof);
}
// The stage object for stage N of a request (uses the snapshot stored at submit time when present).
function _reqFlow(req){return (Array.isArray(req.flow)&&req.flow.length)?req.flow:_flowFor(req);}
function _reqStage(req){const f=_reqFlow(req);const i=(req.stageIndex!=null)?req.stageIndex:0;return f[i]||null;}
// Returns a PURE predicate(userId)=>boolean: "is this user a designated approver for `stage` of `req`?"
// (Data-only — used both for notification fan-out and for action gating. Super Admin's universal
//  approver power is applied separately in _canActOn, never baked into this predicate.)
function _stageApprover(req,stageIndexOrStage){
  let stage=stageIndexOrStage;
  if(typeof stageIndexOrStage==='number'){const f=_reqFlow(req);stage=f[stageIndexOrStage]||null;}
  if(!stage)return ()=>false;
  // C1: manager stage = ANY active manager in the requester's upward chain (restores skip-level/ancestor
  //   approval and avoids stranding when the direct manager is inactive/deleted). Mirrors the old
  //   _isMgrApprover (_underOn). Valid approver ⇔ requester is in the approver's subtree on req.start.
  if(stage.type==='manager')return id=>{const a=uById(id);if(!a||a.status!=='Active')return false;return _underOn(req.userId,id,req.start);};
  if(stage.type==='user')return id=>!!stage.userId&&id===stage.userId;
  if(stage.type==='role'&&stage.role==='hr')return id=>!!(uById(id)?.hrm?.isHR)&&uById(id)?.role!=='Admin';
  return ()=>false;
}
// Can the CURRENT user act on the current stage of req? (permission + stage match; Admin universal; never own request)
function _canActOn(req){
  if(req.userId===S.uid)return false; // M7 self-approval guard
  if(isAdmin())return true; // RESOLVED: Super Admin is a universal approver at every stage
  if(!can('leaveRequests','approve'))return false;
  if(_stageApprover(req,(req.stageIndex!=null?req.stageIndex:0))(S.uid))return true;
  // LV-3: stranded escalation — when a stage has NO active resolvable approver, let an active HR user
  //   clear it too (Super Admin already can via isAdmin above) so the flow can't permanently strand.
  if(me()?.hrm?.isHR&&_stageStranded(req))return true;
  return false;
}
// Classify a pending request's current stage for the two-tab UI: manager-type → 'manager' tab, else → 'hr' tab.
function _stageTab(req){const st=_reqStage(req);return (st&&st.type==='manager')?'manager':'hr';}
// LV-3: a stage is STRANDED when no ACTIVE, non-Super-Admin user can satisfy its approver predicate
//   (role:'hr' with no active HR; user:'<id>' pointing at a missing/inactive user; a manager stage whose
//   whole upward chain is inactive/deleted). Such requests are invisible to everyone except a Super Admin,
//   so we surface them in the HR/Admin queue with a clear "needs admin" label instead of silently stranding.
function _stageStranded(req){
  if(!req||req.status!=='Pending')return false;
  const pred=_stageApprover(req,(req.stageIndex!=null?req.stageIndex:0));
  return !(DB.users||[]).some(x=>x.status==='Active'&&x.role!=='Admin'&&pred(x.id));
}
// §2: counts are driven by the current-stage approver (handles custom flows incl. named approvers).
function _mgrPendingCount(){return (DB.leaveRequests||[]).filter(r=>r.status==='Pending'&&_stageTab(r)==='manager'&&_canActOn(r)).length;}
function _hrPendingCount(){return (DB.leaveRequests||[]).filter(r=>r.status==='Pending'&&_stageTab(r)==='hr'&&_canActOn(r)).length;}
