    const mine=canManageQ(q);
    h+=`<div style="display:flex;gap:4px;align-items:center" onclick="event.stopPropagation()">`;
    if(mine){
      h+=`<span title="Change via Edit" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid ${isPub?'#A7F3D0':'#FDE68A'};background:${isPub?'#ECFDF5':'#FFFBEB'};font-size:11px;font-weight:700;color:${isPub?'#047857':'#B45309'}">${isPub?ic('globe','w-3 h-3')+'Public':ic('lock','w-3 h-3')+'Private'}</span>`;
      h+=btn('Edit',`App._editQuestion('${q.id}')`,{variant:'ghost',size:'sm'});
      h+=`<button type="button" onclick="App._delQuestion('${q.id}')" aria-label="Delete question" style="width:30px;height:30px;display:grid;place-items:center;border-radius:8px;border:none;background:transparent;color:var(--c-text-3);cursor:pointer" onmouseover="this.style.color='var(--c-danger)'" onmouseout="this.style.color='var(--c-text-3)'">${ic('trash','w-4 h-4')}</button>`;
    } else {
      h+=`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid #E5E7EB;background:#F9FAFB;font-size:11px;font-weight:700;color:#6B7280">${ic('globe','w-3 h-3')}Public</span>`;
    }
    h+=`</div></div>`;
    if(exp){
      h+=`<div style="padding:0 14px 12px 40px;border-top:1px solid #F5F4F0">`;
      const opts=q.options||[];
      if(!opts.length){h+=`<p style="font-size:12px;color:#D1D5DB;font-style:italic;padding:8px 0">No options — click Edit</p>`;}
      else opts.forEach((o,oi)=>{

        let lbl=q.type==='number'
          ?((NUM_CONDITIONS.find(x=>x.id===o.condition)||{label:o.condition}).label+' '+o.value+(o.condition==='between'?' – '+o.value2:''))
          :(o.text||o.label||'');
        h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F9F8F5">`;
        h+=`<span style="width:20px;height:20px;border-radius:50%;background:#EFF6FF;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#1D4ED8">${oi+1}</span>`;
        h+=`<span style="flex:1;font-size:13px;color:#374151">${esc(lbl)}</span>`;

        h+=`</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
    return h;
  }

// Board view — questions grouped by Department › Sub-department (requirement #3).
// Collapse state for the Questions board (transient UI state on S.filters).
function _qColl(){return S.filters.qCollapsed||(S.filters.qCollapsed=[]);}
function _qIsColl(key){return _qColl().includes(key);}
App._togQGroup=(key)=>{const arr=_qColl();const i=arr.indexOf(key);if(i>=0)arr.splice(i,1);else arr.push(key);App._filterQuestions(S.filters.qSearch||'');};
App._qExpandAll=()=>{S.filters.qCollapsed=[];App._filterQuestions(S.filters.qSearch||'');};
App._qCollapseAll=()=>{
  const all=[];(DB.questions||[]).forEach(q=>{const d=(q.department||'').trim()||'__none__';if(!all.includes('d:'+d))all.push('d:'+d);});
  S.filters.qCollapsed=all;App._filterQuestions(S.filters.qSearch||'');
};
function _renderQGrouped(list){
  if(!list.length)return empty('help','No questions yet','Create questions or upload a CSV template.');
  const searching=!!(S.filters.qSearch||'').trim(); // during search, force-expand so matches are visible
  const byDept={};
  list.forEach(q=>{
    const d=(q.department||'').trim()||'__none__';
    const s=(q.subDepartment||'').trim()||'__none__';
    byDept[d]=byDept[d]||{};
    (byDept[d][s]=byDept[d][s]||[]).push(q);
  });
  const order=topDepts().map(d=>d.name).filter(n=>byDept[n]);
  Object.keys(byDept).forEach(d=>{if(d!=='__none__'&&!order.includes(d))order.push(d);});
  if(byDept['__none__'])order.push('__none__');
  const chev=open=>`<span style="display:inline-flex;color:var(--c-text-3);transition:transform .2s;transform:rotate(${open?90:0}deg)">${ic('chevR','w-4 h-4')}</span>`;
  let html='<div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:4px">'
    +btn('Expand all','App._qExpandAll()',{variant:'ghost',size:'sm'})
    +btn('Collapse all','App._qCollapseAll()',{variant:'ghost',size:'sm'})+'</div>';
  order.forEach(dName=>{
    const subs=byDept[dName];
    const dLabel=dName==='__none__'?'Uncategorized':dName;
    const total=Object.values(subs).reduce((a,arr)=>a+arr.length,0);
    const dKey='d:'+dName;
    const dOpen=searching||!_qIsColl(dKey);
    html+=`<div data-k="${esc(dKey)}" onclick="App._togQGroup(this.dataset.k)" style="margin-top:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:var(--r-md);padding:10px 12px">`
      +chev(dOpen)
      +`<span style="display:inline-flex;color:#0E9F6E">${ic('dept','w-4 h-4')}</span>`
      +`<span style="font-size:14px;font-weight:800;color:var(--c-text)">${esc(dLabel)}</span>`
      +`<span style="font-size:11px;font-weight:700;color:#6B7280;background:var(--c-surface);border-radius:999px;padding:1px 9px">${total}</span></div>`;
    if(!dOpen)return;
    const subOrder=subDeptsOfName(dName).map(s=>s.name).filter(n=>subs[n]);
    Object.keys(subs).forEach(s=>{if(s!=='__none__'&&!subOrder.includes(s))subOrder.push(s);});
    if(subs['__none__'])subOrder.push('__none__');
    html+='<div style="padding-left:10px;border-left:2px solid var(--c-border);margin-left:6px">';
    subOrder.forEach(sName=>{
      const qs=subs[sName];
      const sLabel=sName==='__none__'?'(no sub-department)':sName;
      const sKey='s:'+dName+'␟'+sName;
      const sOpen=searching||!_qIsColl(sKey);
      html+=`<div data-k="${esc(sKey)}" onclick="App._togQGroup(this.dataset.k)" style="margin:10px 0 6px;display:flex;align-items:center;gap:7px;cursor:pointer">`
        +chev(sOpen)
        +`<span style="width:6px;height:6px;border-radius:50%;background:#0E9F6E"></span>`
        +`<span style="font-size:12px;font-weight:700;color:var(--c-text-2)">${esc(sLabel)}</span>`
        +`<span style="font-size:10px;color:var(--c-text-3)">${qs.length} question${qs.length!==1?'s':''}</span></div>`;
      if(sOpen)html+='<div class="space-y-2" style="margin:0 0 8px 4px">'+qs.map(q=>qCard(q)).join('')+'</div>';
    });
    html+='</div>';
  });
  return html;
}

App._togExpandQ=(id)=>{S.filters.expandedQ=S.filters.expandedQ===id?null:id;rr();};

App._filterQuestions=(val)=>{
  S.filters.qSearch=val;
  const box=document.getElementById('qResults');
  if(!box)return;
  const allQ=visibleQuestions();
  const filtered=val?allQ.filter(q=>q.text.toLowerCase().includes(val.toLowerCase())):allQ;
  box.innerHTML=_renderQGrouped(filtered);
};

App._delQuestion=(id)=>{
  const q=(DB.questions||[]).find(x=>x.id===id);if(!q)return;
  if(!confirm('Delete "'+q.text+'"?'))return;
  if(!DB.questions_deleted)DB.questions_deleted=[];
  if(!DB.questions_deleted.includes(id))DB.questions_deleted.push(id);
  DB.questions=(DB.questions||[]).filter(x=>x.id!==id);
  DB.checklists.forEach(c=>{c.questionIds=(c.questionIds||[]).filter(x=>x!==id);if(c.questionConfigs)delete c.questionConfigs[id];});
  toast('Deleted','warn');saveDB();render();
  // Sync to Supabase in background
  sb.from('questions').delete().eq('id',id).then(({error})=>{
    if(error)console.error('delQuestion sync:',error.message);
  }).catch(e=>console.error('delQuestion:',e));
};

App._saveQuestion=()=>{

  if(!(_QED.department||'').trim()){toast('Select a department','err');return;}

// ── Compliance check (Fix #3, revised) ──
// Returns the Set of question IDs that actually triggered a REAL escalation ticket for a
// given submission — matched by checklist + date + the submission's own submitter (so
// "any one" group submissions match whoever submitted). This is the single source of
// truth for both the card badge (count) and the per-question red highlight.
// Does a single stored answer (resp) trip an escalation for question q on checklist c?
// Pure re-evaluation of the saved response against the checklist's escalation config —
// this is what makes OLD submissions show compliance even when no ticket was ever created.
function _qrEscalates(c,q,resp){
  if(!c||!q||!resp)return false;
  const r=resp.response;
  if(r===null||r===undefined||r==='')return false; // unanswered ≠ escalation
  const qCfg=(c.questionConfigs||{})[q.id]||{};
  if(q.type==='answer'){
    const _respStr=String(r).trim();
    const optIdx=(q.options||[]).findIndex(o=>String(o.text||'').trim()===_respStr);
    return optIdx>-1&&!!qCfg['opt_'+optIdx];
  }
  if(q.type==='number'){
    const val=parseFloat(r);
    for(let i=0;i<(q.options||[]).length;i++){
      const cond=q.options[i];let m=false;
      if(cond.condition==='lt')m=val<cond.value;
      else if(cond.condition==='lte')m=val<=cond.value;
      else if(cond.condition==='gt')m=val>cond.value;
      else if(cond.condition==='gte')m=val>=cond.value;
      else if(cond.condition==='eq')m=val===cond.value;
      else if(cond.condition==='neq')m=val!==cond.value;
      else if(cond.condition==='between')m=val>=cond.value&&val<=(cond.value2||cond.value);
      if(m)return !!qCfg['opt_'+i];
    }
    return false;
  }
  // passfail / yesno / tick — match by label index
  const labels={passfail:['Pass','Fail'],yesno:['Yes','No'],tick:['Done','Not done']};
  const lbs=labels[q.type]||[];
  const optIdx=lbs.findIndex(l=>l.toLowerCase()===String(r).trim().toLowerCase());
  return optIdx>-1&&!!qCfg['opt_'+optIdx];
}
function _subEscalatedQids(c,sub){
  const out=new Set();
  if(!c||!sub)return out;
  // 1) Re-evaluate the actual saved answers against the escalation config (works on old data)
  const qById={};(c.questionIds||[]).forEach(qid=>{const q=(DB.questions||[]).find(x=>x.id===qid);if(q)qById[qid]=q;});
  (sub.questionResponses||[]).forEach(resp=>{
    const q=qById[resp.questionId];
    if(q&&_qrEscalates(c,q,resp))out.add(resp.questionId);
  });
  // 2) Union with any real escalation tickets recorded for this submission (belt and suspenders)
  const submitterId=sub.userId; // for "any one" group checklists this is whoever submitted
  (DB.tickets||[]).forEach(t=>{
    if(t.checklistId===c.id&&t.date===sub.date&&t.submitterId===submitterId&&t.questionId){
      out.add(t.questionId);
    }
  });
  return out;
}
// Count of distinct questions that escalated (0 = compliant).
function _subEscalationCount(c,sub){return _subEscalatedQids(c,sub).size;}
// ── Separate badges: Attempt (answered/total) + Compliance (escalations) ──
// Returns an HTML string with up to two pills. `opts.small` shrinks them for dense rows.
function _subBadges(c,sub,opts){
  if(!sub)return'';
  const total=(c.questionIds||[]).length;
  const answered=(sub.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length;
  const flagged=_subEscalationCount(c,sub);
  const small=opts&&opts.small;
  const pad=small?'2px 7px':'3px 9px';
  const fs=small?'10px':'11px';
  const allAns=total>0&&answered>=total;
  // Attempt badge — green when all questions attempted, grey otherwise
  const attBg=allAns?'#ECFDF5':'#F6F7F8';
  const attClr=allAns?'#059669':'#6B7280';
  const attLabel=small?answered+'/'+total:answered+'/'+total+' attempted';
  const attempt=total>0
    ? '<span title="'+answered+' of '+total+' question'+(total!==1?'s':'')+' attempted" style="display:inline-flex;align-items:center;gap:4px;font-size:'+fs+';font-weight:700;padding:'+pad+';border-radius:20px;background:'+attBg+';color:'+attClr+'">'+(allAns?ic('check','w-3 h-3'):'')+attLabel+'</span>'
    : '';
  // Compliance badge — green "Compliant" when no escalations, red "N escalated" when flagged
  const compBg=flagged?'#FFF1F2':'#ECFDF5';
  const compClr=flagged?'#BE123C':'#059669';
  const compLabel=flagged
    ? (small?ic('alert','w-3 h-3')+flagged:ic('alert','w-3 h-3')+flagged+' escalated')
    : (small?'':ic('check','w-3 h-3')+'Compliant');
  const compliance='<span title="'+(flagged?flagged+' answer'+(flagged!==1?'s':'')+' triggered an escalation':'No escalations — compliant')+'" style="display:inline-flex;align-items:center;gap:4px;font-size:'+fs+';font-weight:700;padding:'+pad+';border-radius:20px;background:'+compBg+';color:'+compClr+'">'+compLabel+'</span>';
  return attempt+compliance;
}

// ── Escalation on submit ──
function _processEscalations(checklistId,date,responses){
  const c=clById(checklistId);if(!c)return;
  const u=me();
  const configs=c.questionConfigs||{};
  (responses||[]).forEach(resp=>{
    const q=(DB.questions||[]).find(x=>x.id===resp.questionId);if(!q)return;
    const qCfg=configs[resp.questionId]||{};
    let escalateTo=null;
    // Find which option index matched the response
    if(q.type==='answer'){
      const _respStr=String(resp.response||'').trim();const optIdx=(q.options||[]).findIndex(o=>String(o.text||'').trim()===_respStr);
      if(optIdx>-1)escalateTo=qCfg['opt_'+optIdx]||null;
    } else if(q.type==='number'){
      const val=parseFloat(resp.response);
      for(let i=0;i<(q.options||[]).length;i++){
        const cond=q.options[i];
        let m=false;
        if(cond.condition==='lt')m=val<cond.value;
        else if(cond.condition==='lte')m=val<=cond.value;
        else if(cond.condition==='gt')m=val>cond.value;
        else if(cond.condition==='gte')m=val>=cond.value;
        else if(cond.condition==='eq')m=val===cond.value;
        else if(cond.condition==='neq')m=val!==cond.value;
        else if(cond.condition==='between')m=val>=cond.value&&val<=(cond.value2||cond.value);
        if(m){escalateTo=qCfg['opt_'+i]||null;break;}
      }
    } else {
      // passfail, yesno, tick — match by label index
      const labels={passfail:['Pass','Fail'],yesno:['Yes','No'],tick:['Done','Not done']};
      const lbs=labels[q.type]||[];
      const optIdx=lbs.findIndex(l=>l.toLowerCase()===String(resp.response||'').trim().toLowerCase());
      if(optIdx>-1)escalateTo=qCfg['opt_'+optIdx]||null;
    }
    if(escalateTo){
      if(!DB.notifications)DB.notifications=[];
      if(!DB.tickets)DB.tickets=[];
      const escMsg='⚠️ Escalation: "'+q.text+'" answered "'+String(resp.response||'')+'" by '+fullName(u)+' on '+c.name+' ('+date+')';
      // Determine priority from question or response
      const _respLower=String(resp.response||'').toLowerCase();
      const ticketPriority=_respLower==='fail'||_respLower==='not done'||_respLower==='no'?'High':'Medium';
      // ── Deduplication: don't create ticket if one already exists for same question+checklist
      // that is still Open or In Progress (unresolved)
      const existingOpenTicket=(DB.tickets||[]).find(t=>
        t.questionId===q.id&&
        t.checklistId===checklistId&&
        t.submitterId===S.uid&&
        (t.status==='Open'||t.status==='In Progress')
      );
      if(existingOpenTicket){
        // Just update the notification so assignee knows it happened again
        DB.notifications.unshift({id:uid('n'),userId:escalateTo,text:'🔁 Repeat escalation: "'+q.text+'" answered "'+String(resp.response||'')+'" again by '+fullName(u)+' — ticket #'+existingOpenTicket.id.slice(-6)+' still open',time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
        _invalidateNotifCache();
        return; // Skip creating a duplicate ticket
      }
      // Create ticket
      const ticket={
        id:uid('tk'),
        title:q.text.slice(0,80),
        description:'Answer: "'+String(resp.response||'')+'"\nSubmitted by: '+fullName(u)+'\nChecklist: '+c.name+'\nDate: '+date,
        priority:ticketPriority,
        status:'Open',
        assignedTo:escalateTo,
        createdBy:S.uid,
        checklistId:checklistId,
        questionId:q.id,
        questionText:q.text,
        answerGiven:String(resp.response||''),
        submitterId:S.uid,
        date:date,
        createdAt:new Date().toISOString(),
        resolvedAt:null,
        resolveNote:'',
        viewedBy:[]
      };
      DB.tickets.unshift(ticket);
      // Insert ticket directly to Supabase — don't rely on debounced _sync
      sb.from('tickets').insert({
        id:ticket.id,
        title:ticket.title,
        description:ticket.description,
        priority:ticket.priority,
        status:ticket.status,
        assigned_to:ticket.assignedTo,
        created_by:ticket.createdBy,
        checklist_id:ticket.checklistId,
        question_id:ticket.questionId,
        question_text:ticket.questionText,
        answer_given:ticket.answerGiven,
        submitter_id:ticket.submitterId,
        date:ticket.date,
        created_at:ticket.createdAt,
        resolved_at:null,
        resolve_note:'',
        viewed_by:[]
      }).then(({error})=>{
        if(error)console.error('[ticket insert]',error.message);
        else console.log('[ticket]',ticket.id,'inserted for',ticket.assignedTo);
      }).catch(e=>console.error('[ticket insert failed]',e.message));
      // In-app notification to assignee
      DB.notifications.unshift({id:uid('n'),userId:escalateTo,text:escMsg,time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
      // In-app notification to admin
      const adminU=DB.users.find(x=>x.role==='Admin');
      if(adminU&&adminU.id!==escalateTo&&adminU.id!==S.uid){
        DB.notifications.unshift({id:uid('n'),userId:adminU.id,text:escMsg,time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
      }
      // Email the escalation target
      queueEmail('escalation',escalateTo,null,date,{checklist_name:c.name,question:q.text,answer:String(resp.response||''),submitter:fullName(u)});
      _invalidateNotifCache();
    }
  });
}

function notificationsPage(){
  const uid=S.uid;
  const notifs=DB.notifications.filter(n=>n.userId===uid).sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,80);
  // Track which were unread BEFORE marking them (so the dot shows on this render)
  const unreadIds=new Set(notifs.filter(n=>!n.read).map(n=>n.id));
  const hadUnread=unreadIds.size>0;
  // A1: opening the inbox must NOT mark everything read. Single-row reads happen on tap
  //     (App._notifClick → _markNotifRead); a whole-list flip is only via "Mark all read".
  // Feedback for this user
  const myFb=DB.feedback.filter(fb=>fb.userId===uid).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const unackFb=myFb.filter(fb=>!fb.acknowledged);

  const tab=S.filters.ntab||'All';
  const TABS=['All','Approvals','Escalations','Feedback'];

  function notifType(text,kind){
    // N7/E2: prefer the structured kind; fall back to text matching for legacy kind-less rows.
    if(kind){
      const K={feedback:'feedback',escalation:'escalation',ticket:'escalation',
        submission:'approval',edit:'edit',document:'approval',leave:'approval'};
      if(K[kind])return K[kind];
    }
    if(!text)return'general';
    if(text.includes('💬')||text.includes('replied')||text.includes('reply'))return'feedback';
    if(text.includes('Feedback')||text.includes('feedback'))return'feedback';
    
    if(text.includes('Escalation')||text.includes('escalation'))return'escalation';
    if(text.includes('Approved')||text.includes('approved'))return'approval';
    if(text.includes('Rejected')||text.includes('rejected'))return'approval';
    if(text.includes('pproval')||text.includes('pprove'))return'approval';
    if(text.includes('Edit')||text.includes('edit request')||text.includes('resubmit'))return'edit';
    if(text.includes('Re-submitted')||text.includes('Resubmit'))return'edit';
    if(text.includes('overdue')||text.includes('Late')||text.includes('late'))return'late';
    return'general';
  }
  const TYPE_CLR={approval:'#8B5CF6',edit:'#0EA5E9',escalation:'#F97316',feedback:'#3B82F6',late:'#EF4444',general:'#6B7280'};
  const TYPE_BG={approval:'#EDE9FE',edit:'#E0F2FE',escalation:'#FFF7ED',feedback:'#EFF6FF',late:'#FEF2F2',general:'#F6F7F8'};
  const TYPE_ICON={approval:'approve',edit:'edit',escalation:'alert',feedback:'msg',late:'clock',general:'bell'};

  const filteredNotifs=tab==='All'?notifs
    :tab==='Approvals'?notifs.filter(n=>['approval','edit'].includes(notifType(n.text,n.kind)))
    :tab==='Feedback'?notifs.filter(n=>notifType(n.text,n.kind)==='feedback')
    :tab==='Escalations'?notifs.filter(n=>notifType(n.text,n.kind)==='escalation')
    :notifs;

  const counts={
    All:notifs.length,
    Approvals:notifs.filter(n=>['approval','edit'].includes(notifType(n.text,n.kind))).length,
    Escalations:notifs.filter(n=>notifType(n.text,n.kind)==='escalation').length,
    Feedback:notifs.filter(n=>notifType(n.text,n.kind)==='feedback').length+myFb.filter(fb=>!fb.acknowledged).length,

  };

  const _inbPills='<div style="display:flex;gap:6px;margin-bottom:14px">'+(can('approvals','view')?'<button class="ui-tab-pill" onclick="App.go(\'approvals\')">To approve'+(_approvalPendingCount()?' ('+_approvalPendingCount()+')':'')+'</button>':'')+'<button class="ui-tab-pill on">Alerts</button></div>';
  return '<div class="fade">'+hdr('Inbox','Alerts and updates')+_inbPills
    // A1: explicit "Mark all read" — the ONLY whole-list flip. Shown only when unread exist.
    +(hadUnread?'<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="ui-btn ui-btn-subtle ui-btn-sm" onclick="App._markAllNotifsRead()">'+ic('approve','w-4 h-4')+'Mark all read</button></div>':'')
    // Tabs
    +'<div class="ui-tabs" style="margin-bottom:16px">'
    +TABS.map(t=>{
      const active=tab===t;
      const cb=counts[t]?(' <span style="display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;padding:1px 6px;min-width:16px;border-radius:99px;margin-left:6px;background:'+(active?'rgba(255,255,255,.22)':'var(--c-border)')+';color:'+(active?'#fff':'var(--c-text-2)')+'">'+counts[t]+'</span>'):'';
      return '<button class="ui-tab'+(active?' on':'')+'" onclick="App._setNTab(this.dataset.t)" data-t="'+t+'">'+t+cb+'</button>';
    }).join('')
    +'</div>'
    // Feedback section (when tab=Feedback)
    +(tab==='Feedback'
      ? _feedbackTabContent(uid)
      // Notification timeline for other tabs
      : (filteredNotifs.length
        ? '<div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;overflow:hidden">'
          +'<div style="display:flex;flex-direction:column">'
          +filteredNotifs.map((n,idx)=>{
              const type=notifType(n.text,n.kind);
              const clr=TYPE_CLR[type];const bg=TYPE_BG[type];const ico=TYPE_ICON[type];
              const isNew=unreadIds.has(n.id);
              // Parse deep-link target from notification text
              return '<div style="display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid #F9F8F5;cursor:pointer;'+(isNew?'background:#FAFFFE':'background:#fff')+'" onclick="App._notifClick(this.dataset.id)" data-id="'+n.id+'">'
                +'<div style="width:36px;height:36px;border-radius:10px;background:'+bg+';display:grid;place-items:center;flex-shrink:0;margin-top:1px">'+ic(ico,'w-4 h-4 text-['+clr+']')+'</div>'
                +'<div style="flex:1;min-width:0">'
                +'<p style="font-size:13px;color:#111110;margin:0;line-height:1.5;font-weight:'+(isNew?'600':'400')+'">'+esc(n.text)+'</p>'
                +'<p style="font-size:11px;color:#B8B5AC;margin-top:3px">'+(n.time?new Date(n.time).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'')+' · '+type.charAt(0).toUpperCase()+type.slice(1)+'</p>'
                +'</div>'
                +(isNew?'<div style="width:7px;height:7px;border-radius:50%;background:#0E9F6E;flex-shrink:0;margin-top:6px"></div>':'')
                +'</div>';
            }).join('')
          +'</div></div>'
        : (_isLoading('notifications')?loadingState('Loading notifications…'):empty('bell','All clear','No notifications yet.'))
      )
    )
    +'</div>';
}
App._setNTab=(t)=>{S.filters.ntab=t;rr();};
// A1: mark ONE notification read with a targeted server write — never re-upsert the whole array.
function _markNotifRead(id){
  const n=DB.notifications.find(x=>x.id===id);if(!n||n.read)return;
  n.read=true;_invalidateNotifCache();saveDB();
  sb.from('notifications').update({read:true}).eq('id',id)
    .then(({error})=>{if(error)console.warn('[notif read]',error.message);})
    .catch(e=>console.warn('[notif read]',e.message));
}
App._markAllNotifsRead=()=>{
  const uid=S.uid;
  const mine=DB.notifications.filter(n=>n.userId===uid&&!n.read);
  if(!mine.length)return;
  mine.forEach(n=>n.read=true);
  _invalidateNotifCache();saveDB();
  // ONE scoped server-side update — no per-row map.
  sb.from('notifications').update({read:true}).eq('user_id',uid).eq('read',false)
    .then(({error})=>{if(error){console.warn('[notif mark-all]',error.message);toast("Couldn't sync — check your connection",'err');}})
    .catch(e=>{console.warn('[notif mark-all]',e.message);toast("Couldn't sync — check your connection",'err');});
  toast('All marked read');rr();
};
// Navigate to a route from a notification with a clean nav state, then set its filters.
function _navNotif(route,filters){
  S.route=route;S.search='';S.expandedCl=null;S.afOpen=null;S.tvUser=null;
  S.filters=filters||{};render();window.scrollTo(0,0);
}
// kind → target route map (plan4 §D). Approval-NEEDED kinds land on the unified Approvals
// inbox (the single approvals home after DUP-1/DUP-2). OUTCOME notifications carry an explicit
// n.targetRoute set at creation, which wins over this map.
const _NOTIF_ROUTE={
  leave:'leave',
  submission:'approvals', edit:'approvals',
  document:'approvals', // pending-approval default; decided rows set targetRoute
  ticket:'tickets', escalation:'tickets',
  feedback:'feedback',
  announcement:'announcements',
  checklist:'mychecklists',
  attendance:'attendance',
};
App._notifClick=(id)=>{
  const n=DB.notifications.find(x=>x.id===id);if(!n)return;
  _markNotifRead(id);
  const t=n.text||'';
  // ── 1. STRUCTURED routing FIRST (kind / targetRoute) — deterministic, runs before any text
  //    matching so e.g. a document "needs your approval" goes to Approvals, never to Leave. ──
  // 1a. explicit targetRoute (set at creation for decided/outcome notifs) wins outright.
  if(n.targetRoute){
    if(n.targetRoute==='feedback'){App._goNotifFeedback();return;}
    if(n.targetRoute==='leave'){_navNotif('leave',{});return;}
    if(n.targetRoute==='approvals'){_navNotif('approvals',{atab:'Pending'});return;}
    App._setNTab&&App._setNTab('All');App.go(n.targetRoute);return;
  }
  // 1b. structured kind → route map.
  if(n.kind&&_NOTIF_ROUTE[n.kind]){
    const r=_NOTIF_ROUTE[n.kind];
    if(r==='feedback'){App._goNotifFeedback();return;}
    if(r==='leave'){_navNotif('leave',{});return;}
    if(r==='approvals'){_navNotif('approvals',{atab:'Pending'});return;}
    App._setNTab&&App._setNTab('All');App.go(r);return;
  }
  // ── 2. TEXT FALLBACK (legacy rows without kind/targetRoute, incl. cross-device) ──
  if(t.includes('💬')||t.includes('replied')||t.includes('Feedback')){
    App._goNotifFeedback();return;
  }
  // H1: leave notifications must open the LEAVE page, not the checklist Approvals page.
  const _isLeaveText=/(Your .* (was approved|was rejected|passed)|your approval needed|needs your approval|reached a stage with no approver|requested .* — your approval)/.test(t);
  if(_isLeaveText){ _navNotif('leave',{}); return; }
  // N3: route tickets + escalations BEFORE the generic approved/approval checks so a ticket or
  // escalation whose text happens to contain those words still opens the Tickets page (not Approvals).
  if(t.includes('🎫')||t.includes('Ticket')||t.includes('ticket')){ App._setNTab&&App._setNTab('All');App.go('tickets'); return; }
  if(t.includes('Escalation')||t.includes('escalation')){ App._setNTab&&App._setNTab('All');App.go('tickets'); return; }
  if(t.includes('approved')||t.includes('Approved')){ _navNotif('approvals',{atab:'Approved'}); return; }
  if(t.includes('rejected')||t.includes('Rejected')){ _navNotif('approvals',{atab:'Rejected'}); return; }
  if(t.includes('approval')||t.includes('Pending')){ _navNotif('approvals',{atab:'Pending'}); return; }
  if(t.includes('submitted')||t.includes('resubmit')||t.includes('Re-submitted')){ _navNotif('approvals',{atab:'Pending'}); return; }
  if(t.includes('Checklist removed')||t.includes('no longer assigned')){ App.go('mychecklists'); return; }
  // Default: go to notifications
  App._setNTab('All');App.go('notifications');
};

  DB.notifications.unshift({id:uid('n'),userId,text:'Feedback from '+fullName(me())+': "'+( title||text.slice(0,40))+'"',time:new Date().toISOString(),read:false,kind:'feedback'});
  _invalidateNotifCache();log(fullName(me()),'Sent feedback',fullName(uById(userId)));
  toast('Feedback sent');closeModal();saveDB();render();
};
/* ===== HIERARCHY ===== */
/* §9 — Org chart as a real top-down tree (pure HTML/CSS connector lines, no libraries).
   Scope: Super Admin / everyone-scope sees the whole org (roots = users with no manager);
   everyone else sees their own subtree (root = me) via scopeOf('hierarchy'). Built from managerId
   (reuses subTree for scope membership). Branches expand/collapse via COLL; "Center on me" scrolls. */
function hierarchyPage(){
  if(!can('hierarchy','view'))return`<div class="fade">${hdr('Hierarchy','Reporting structure')}${empty('tree','Not available','You don\'t have access to the org chart.')}</div>`;
  const sc=scopeOf('hierarchy');
  let roots;
  // UI-3: a user is a root when they have no manager OR their managerId points to a deleted/missing
  // user (dangling pointer). Without this, such users are neither a root nor any node's child and
  // vanish from the chart entirely. (_orgNode's _seen cycle guard still handles A→B→A loops.)
  if(sc==='everyone'){roots=DB.users.filter(u=>!u.managerId||!uById(u.managerId));}
  else{roots=[me()].filter(Boolean);}
  const wide=sc==='everyone';
  const title=wide?'Organisation':'My Team';
  return`<div class="fade">${hdr(title,'Reporting structure — who reports to whom',btnG('Center on me','App._orgCenter()','search'))}
  <div style="background:var(--c-surface);border-radius:var(--r-lg);border:1px solid var(--c-border);box-shadow:var(--sh-sm);padding:16px">
    <div id="org-scroll" class="org-scroll" style="max-height:72vh">
      <div style="min-width:max-content;padding:8px 20px 20px;margin:0 auto">
        <ul class="org-tree org-tree-root" style="justify-content:center">${(()=>{const _seenTop=new Set();const nodes=roots.map(r=>_orgNode(r,_seenTop)).join('');return nodes||empty('tree','No reporting structure yet','Assign managers to build the org chart.');})()}</ul>
      </div>
    </div>
  </div></div>`;
}
App._orgCenter=()=>{
  // UI-4: my node is only in the DOM if every ancestor branch is expanded. Walk up the manager
  // chain and clear COLL[ancestorId] for each ancestor, re-render, THEN scroll to the node.
  const u=me();
  if(u){let cur=u.managerId,guard=new Set([u.id]);while(cur&&!guard.has(cur)){guard.add(cur);if(COLL[cur])COLL[cur]=false;const m=uById(cur);cur=m?m.managerId:null;}rr();}
  const scrollToMe=()=>{const el=document.getElementById('node-'+S.uid);const sc=document.getElementById('org-scroll');if(el&&sc&&el.scrollIntoView){el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});el.animate?el.animate([{boxShadow:'0 0 0 0 rgba(14,159,110,.5)'},{boxShadow:'0 0 0 6px rgba(14,159,110,0)'}],{duration:900}):0;}else toast('Your card isn\'t in the current view','err');};
  if(window.requestAnimationFrame)requestAnimationFrame(scrollToMe);else scrollToMe();
};
// One node card + (optionally) its children row. Card shows avatar, name, position, role badge.
function _orgNode(u,_seen=new Set()){
  if(!u||_seen.has(u.id))return'';
  _seen.add(u.id);
  const kids=DB.users.filter(x=>x.managerId===u.id&&x.id!==u.id&&!_seen.has(x.id));
  const col=COLL[u.id];
  const isMe=u.id===S.uid;
  const badge=u.role==='Admin'?`<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--c-ink);color:#fff">SUPER ADMIN</span>`:u.role==='SubAdmin'?`<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--c-info-soft);color:var(--c-info-ink)">ADMIN</span>`:'';
  const card=`<div id="node-${u.id}" class="org-card" style="display:flex;flex-direction:column;align-items:center;gap:6px;background:${isMe?'var(--c-brand-soft)':'var(--c-surface)'};border:1px solid ${isMe?'var(--c-brand)':'var(--c-border)'};border-radius:var(--r-md);padding:10px 14px 12px;min-width:148px;max-width:200px;box-shadow:var(--sh-sm)">
    ${avatar(u,'w-11 h-11','text-sm')}
    <div style="text-align:center;min-width:0">
      <div style="font-size:14px;font-weight:600;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:172px">${esc(fullName(u))}</div>
      <div style="font-size:11px;color:var(--c-text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:172px">${esc(u.position||'—')}${u.department?' · '+esc(u.department):''}</div>
      ${badge?`<div style="margin-top:3px">${badge}</div>`:''}
    </div>
    ${kids.length?`<button type="button" onclick="COLL['${u.id}']=!COLL['${u.id}'];rr()" style="margin-top:2px;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--c-brand-ink);background:var(--c-brand-soft);border:none;border-radius:99px;padding:3px 10px;cursor:pointer">${ic(col?'chevR':'chevD','w-3 h-3')}${kids.length} report${kids.length!==1?'s':''}</button>`:''}
  </div>`;
  const childRow=(kids.length&&!col)?`<div class="org-children"><ul class="org-tree">${kids.map(k=>_orgNode(k,_seen)).join('')}</ul></div>`:'';
  return`<li class="${kids.length&&!col?'org-parent':''}">${card}${childRow}</li>`;
}

function ticketsPage(){
  // Mark assigned tickets as viewed when page opens (no rr() — already rendering)
  let _dirty=false;
  (DB.tickets||[]).forEach(t=>{
    if(t.assignedTo===S.uid&&!(t.viewedBy||[]).includes(S.uid)){
      if(!t.viewedBy)t.viewedBy=[];
      t.viewedBy.push(S.uid);
      _dirty=true;
    }
  });
  if(_dirty){
    saveDB();
    // Sync viewed_by to Supabase in background — no rr() here (already in a render)
    (DB.tickets||[]).filter(t=>t.assignedTo===S.uid&&(t.viewedBy||[]).includes(S.uid)).forEach(t=>{
      sb.from('tickets').update({viewed_by:t.viewedBy||[]}).eq('id',t.id).then(()=>{}).catch(()=>{});
    });
    // Schedule badge refresh after render completes
    setTimeout(()=>{_invalidateNotifCache();const c=document.getElementById('content');if(c)c.innerHTML=pageContent();},50);
  }
  // Visibility:
  // Admin — sees all tickets
  // Manager — sees tickets assigned to them OR tickets they created (so they can track)
  // User — sees ONLY tickets assigned to them
  let tickets=(DB.tickets||[]).slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  // §8: visibility respects scopeOf('tickets'). A user always sees tickets they created or that
  // are assigned to them; within a wider scope (team/dept/location/everyone) they also see tickets
  // assigned to or raised by anyone in scope. Super Admin (everyone) sees all.
  if(!isAdmin()){
    const inScope=scopeFilter('tickets');
    tickets=tickets.filter(t=>t.assignedTo===S.uid||t.createdBy===S.uid||t.submitterId===S.uid||(can('tickets','view')&&(inScope(t.assignedTo)||inScope(t.submitterId)||inScope(t.createdBy))));

  const f=S.filters;
  const statusFilter=f.tkStatus||'';

  function tkCard(t){

      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">'+

          // Show photo from the linked submission's question response

          (canResolve&&t.status==='In Progress'?btn('Resolve',`App._resolveTicket('${t.id}')`,{variant:'brand',size:'sm'}):'')+
          (canResolve&&(t.status==='Open'||t.status==='In Progress')?btn('Close',`App._tkSetStatus(this)`,{variant:'ghost',size:'sm',attrs:`data-id="${t.id}" data-st="Closed"`}):'')+
          (isAdmin()&&(t.status==='Resolved'||t.status==='Closed')?btn('Reopen',`App._tkSetStatus(this)`,{variant:'ghost',size:'sm',attrs:`data-id="${t.id}" data-st="Open"`}):'')+
        '</div>'+
      '</div>'+
    '</div>';
  }

  return'<div class="fade">'+
    hdr('Tickets','Raise an issue or track escalation tickets',can('tickets','create')?btnP('New ticket','App.newTicket()','plus'):'')+

    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'+
      statCard('Open',open,'#F97316')+
      statCard('In Progress',inprog,'#3B82F6')+
      statCard('Resolved',resolved,'#0E9F6E')+
    '</div>'+
    // Filters
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">'+
      ['','Open','In Progress','Resolved','Closed'].map(s=>{const on=statusFilter===s;return`<button type="button" class="ui-tab-pill${on?' on':''}" onclick="App._tkFilter('status','${s}')">${s||'All'}</button>`;}).join('')+
      '<div style="width:1px;align-self:stretch;background:var(--c-border);margin:0 2px"></div>'+
      ['','High','Medium','Low'].map(p=>{const on=priorityFilter===p;return`<button type="button" class="ui-tab-pill${on?' on':''}" onclick="App._tkFilter('priority','${p}')">${p||'All priority'}</button>`;}).join('')+

      (_isLoading('tickets')?loadingState('Loading tickets…'):empty('ticket','No tickets','Tickets are created automatically when an escalation answer is submitted.'))

}

/* §8 — user-facing ticket create flow with Manager / HR routing.
   Routing is IMPLICIT via `assignedTo` (no new synced column → tickets upsert unaffected).
   A frontend-only `route` marker is kept on the local object for display but is NOT in the
   Supabase insert payload (which mirrors the existing escalation insert columns exactly). */
App.newTicket=()=>{
  if(!can('tickets','create')){toast('Not allowed','err');return;}
  const u=me();
  const hasMgr=!!_mgrOfOn(u,todayISO());
  const hasHR=DB.users.some(x=>x.hrm?.isHR&&x.status==='Active'&&x.role!=='Admin');
  const routeOpts=[];
  if(hasMgr)routeOpts.push(['manager','My Manager']);
  if(hasHR)routeOpts.push(['hr','HR']);
  if(!routeOpts.length){toast('No manager or HR is available to receive tickets','err');return;}
  modalShell({title:'New ticket',size:'max-w-md',
    body:'<div style="display:flex;flex-direction:column;gap:14px">'
      +fld('Subject','tk-title','','text','What is this about?')
      +'<div><label for="tk-desc" class="ui-label">Description</label><textarea id="tk-desc" rows="4" placeholder="Describe the issue…" class="ui-input rf"></textarea></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+selF('Priority','tk-pri',[['Low','Low'],['Medium','Medium'],['High','High']],'Medium')+selF('Send to','tk-route',routeOpts,routeOpts[0][0])+'</div>'
      +'</div>',
    footer:btnG('Cancel','App.closeModal()')+btnP('Create ticket','App.createTicket()')});
};
App.createTicket=()=>{
  if(!can('tickets','create')){toast('Not allowed','err');return;}
  const title=($('#tk-title')?.value||'').trim();
  const description=($('#tk-desc')?.value||'').trim();
  const priority=$('#tk-pri')?.value||'Medium';
  const route=$('#tk-route')?.value||'manager';
  if(!title){toast('Add a subject','err');return;}
  let assignee=null;
  if(route==='manager'){assignee=_mgrOfOn(me(),todayISO())||me()?.managerId||null;}
  else{const hr=DB.users.find(x=>x.hrm?.isHR&&x.status==='Active'&&x.role!=='Admin');assignee=hr?hr.id:null;}
  if(!assignee){toast(route==='manager'?'You have no manager assigned':'No active HR user found','err');return;}
  const date=todayISO();
  const ticket={id:uid('tk'),title,description,priority,status:'Open',assignedTo:assignee,createdBy:S.uid,
    checklistId:null,questionId:null,questionText:'',answerGiven:'',submitterId:S.uid,date,
    createdAt:new Date().toISOString(),resolvedAt:null,resolveNote:'',viewedBy:[],
    route /* frontend-only display marker — NOT in the Supabase payload */};
  if(!DB.tickets)DB.tickets=[];
  DB.tickets.unshift(ticket);
  // Mirror the existing escalation insert columns exactly (no `route` column → schema-safe).
  sb.from('tickets').insert({id:ticket.id,title:ticket.title,description:ticket.description,priority:ticket.priority,status:ticket.status,assigned_to:ticket.assignedTo,created_by:ticket.createdBy,checklist_id:null,question_id:null,question_text:'',answer_given:'',submitter_id:ticket.submitterId,date:ticket.date,created_at:ticket.createdAt,resolved_at:null,resolve_note:'',viewed_by:[]})
    .then(({error})=>{if(error)console.error('[ticket insert]',error.message);}).catch(e=>console.error('[ticket insert failed]',e.message));
  _hrmNotify(assignee,'🎫 New ticket from '+fullName(me())+': '+title,'ticket');
  _invalidateNotifCache();
  saveDB();
  App.closeModal();
  toast('Ticket sent to '+(route==='manager'?'your manager':'HR')+'');
  rr();
};
App._tkSetStatus=(el)=>{const id=el.dataset.id,status=el.dataset.st;App._ticketStatus(id,status);};
App._tkFilter=(key,val)=>{if(key==='status')S.filters.tkStatus=val;else S.filters.tkPriority=val;rr();};
App._ticketStatus=(id,status)=>{
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  t.status=status;
  saveDB();rr();
  sb.from('tickets').update({status}).eq('id',id).then(()=>{}).catch(e=>console.warn('ticket status:',e.message));
};

App._resolveTicket=(id)=>{
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  modalShell({title:'Resolve ticket',sub:'Add a note explaining how this was resolved.',size:'max-w-sm',
    body:'<textarea id="tk-note" rows="3" placeholder="What was done to resolve this?" class="ui-input rf" style="resize:none"></textarea>',
    footer:btnG('Cancel','App.closeModal()')+btn('Mark Resolved',`App._confirmResolve('${id}')`,{variant:'brand'})});
};

App._confirmResolve=(id)=>{
  const note=$('#tk-note')?.value?.trim()||'';
  const t=(DB.tickets||[]).find(x=>x.id===id);if(!t)return;
  t.status='Resolved';t.resolvedAt=new Date().toISOString();t.resolveNote=note;
  // Notify the submitter
  if(t.submitterId&&t.submitterId!==S.uid){
    DB.notifications.unshift({id:uid('n'),userId:t.submitterId,text:'✅ Ticket resolved: "'+t.title+'"'+(note?' — '+note.slice(0,60):''),time:new Date().toISOString(),read:false,kind:'ticket'});
    _invalidateNotifCache();
  }
  closeModal();saveDB();rr();
  sb.from('tickets').update({status:'Resolved',resolved_at:t.resolvedAt,resolve_note:note}).eq('id',id).then(({error})=>{if(error)_syncErr('ticket resolution')(error);}).catch(_syncErr('ticket resolution'));
};

App._delTicket=(id)=>{
  if(!isAdmin()){toast('Not permitted','err');return;}
  DB.tickets=(DB.tickets||[]).filter(t=>t.id!==id);
  saveDB();rr();
  sb.from('tickets').delete().eq('id',id).then(()=>{}).catch(e=>console.warn('del ticket:',e.message));
};


// ── Analytics clickable stat card ──
App._aStatCard=(label,val,color,type,data)=>{
  const colMap={sky:'#0EA5E9',brand:'#0E9F6E',rose:'#EF4444',orange:'#F97316'};
  const c=colMap[color]||color;
  return`<div class="stat-card-click" onclick="App._aStatDrill('${type}')" data-col="${c}" style="background:var(--c-surface);border-radius:var(--r-lg);border:1px solid var(--c-border);box-shadow:var(--sh-sm);padding:18px;cursor:pointer;transition:border-color .15s,box-shadow .15s">`
  +`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c-text-3);margin-bottom:10px">${label}</div><div class="fd" style="font-size:30px;font-weight:800;line-height:1;color:${c}">${val}</div><div style="font-size:12px;color:var(--c-text-3);margin-top:8px;display:flex;align-items:center;gap:3px">Details ${ic('chevR','w-3 h-3')}</div></div>`;
};

App._aStatDrill=(type)=>{
  const f=S.filters;
  const fArr=k=>Array.isArray(f[k])?f[k]:(f[k]?[f[k]]:[]);
  let subs=DB.submissions;
  if(!isAdmin()){const _sc=_reportScopeIds();subs=subs.filter(s=>_sc.has(s.userId));}
  if(fArr('users').length)subs=subs.filter(s=>fArr('users').includes(s.userId));
  if(fArr('deps').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('deps').includes(c.department);});
  if(fArr('locs').length)subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('locs').some(l=>(c.locationIds||[]).includes(l));});
  if(fArr('stats').length)subs=subs.filter(s=>fArr('stats').includes(s.status));
  if(f.dr1)subs=subs.filter(s=>s.date>=f.dr1);
  if(f.dr2)subs=subs.filter(s=>s.date<=f.dr2);
  let aTickets=(DB.tickets||[]).slice();
  if(!isAdmin()){
    // Both manager and user: only tickets assigned to them
    aTickets=aTickets.filter(t=>t.assignedTo===S.uid);
  }
  if(f.dr1)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')>=f.dr1);
  if(f.dr2)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')<=f.dr2);
  const today=todayISO();
  let title='',rows='',emptyMsg='No data.';
  const subRow=s=>{
    const u=uById(s.userId),c=clById(s.checklistId);
    const extra=s.submittedAt?' · '+new Date(s.submittedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
    return'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--c-border);cursor:pointer" onclick="App.viewSub(\''+s.id+'\')" onmouseover="this.style.background=\'var(--c-surface-2)\'" onmouseout="this.style.background=\'\'">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:600;color:var(--c-text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+(c?esc(c.name):'<span style="color:var(--c-danger);font-style:italic">[Deleted checklist]</span>')+'</div>'
      +'<div style="font-size:11px;color:var(--c-text-3);margin-top:1px">'+(u?esc(fullName(u)):'?')+' · '+fmtS(s.date)+extra+'</div>'
      +'</div>'+chip(s.status)+'</div>';
  };
  if(type==='submitted'){
    const list=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='All Submissions ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No submissions in this period.';
  } else if(type==='ontime'){
    const list=subs.filter(s=>s.status==='On Time').sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='On Time ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No on-time submissions.';
  } else if(type==='late'){
    const list=subs.filter(s=>s.status==='Late').sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    title='Late ('+list.length+')';rows=list.map(subRow).join('');emptyMsg='No late submissions.';
  } else if(type==='missed'){
    const relevantUsers=isAdmin()?DB.users:DB.users.filter(u=>_reportScopeIds().has(u.id));
    const dr1=f.dr1||(new Date(Date.now()-30*86400000).toISOString().slice(0,10));
    const dr2=f.dr2||today;
    const dateRange=[];
    let d=new Date(dr1+'T00:00:00');const dEnd=new Date(dr2+'T00:00:00');
    while(d<=dEnd&&dateRange.length<60){dateRange.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    const missed=[];
    const _seenGrp=new Set(); // anyOne checklists are collective → list once per date
    relevantUsers.forEach(u=>{
      dateRange.forEach(dt=>{
        if(dt>=today)return;
        DB.checklists.filter(c=>(c.assignees||[]).includes(u.id)&&clOn(c,dt)&&c.status!=='Draft').forEach(c=>{
          // For "any one" group checklists, a completion by ANY assignee counts for everyone —
          // so it's only "missed" if nobody in the group submitted. Otherwise check own submission.
          const done=c.anyOne
            ? DB.submissions.some(s=>s.checklistId===c.id&&s.date===dt&&s.status!=='Editing')
            : !!DB.submissions.find(s=>s.checklistId===c.id&&s.userId===u.id&&s.date===dt);
          if(done)return;
          if(c.anyOne){
            const k=c.id+'|'+dt;
            if(_seenGrp.has(k))return; // already listed this group checklist for this date
            _seenGrp.add(k);
            missed.push({u:null,c,dt}); // group → no single owner
          } else {
            missed.push({u,c,dt});
          }
        });
      });
    });
    title='Missed ('+missed.length+')';
    rows=missed.slice(0,100).map(({u,c,dt})=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--c-border)"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--c-text)">'+esc(c.name)+(c.anyOne?' <span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;background:var(--c-info-soft);color:var(--c-info-ink);display:inline-flex;align-items:center;gap:3px;vertical-align:middle">'+ic('users','w-3 h-3')+'Group</span>':'')+'</div><div style="font-size:11px;color:var(--c-text-3)">'+(u?esc(fullName(u)):'No one in group completed')+' · '+fmtS(dt)+'</div></div><span style="font-size:11px;font-weight:700;color:var(--c-warn);background:var(--c-warn-soft);padding:2px 8px;border-radius:20px">Missed</span></div>').join('');
    emptyMsg='No missed checklists in this period.';
  } else if(type==='compliant'||type==='noncompliant'){
    const want=type==='noncompliant';
    const list=subs.map(s=>{const c=clById(s.checklistId);if(!c||!(c.questionIds||[]).length)return null;const n=_subEscalationCount(c,s);return{s,c,n};})
      .filter(x=>x&&((x.n>0)===want))
      .sort((a,b)=>want?(b.n-a.n)||((b.s.submittedAt||'').localeCompare(a.s.submittedAt||'')):(b.s.submittedAt||'').localeCompare(a.s.submittedAt||''));
    title=(want?'Non-compliant':'Compliant')+' ('+list.length+')';
    rows=list.map(({s,c,n})=>{const u=uById(s.userId);return'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--c-border);cursor:pointer" onclick="App.viewSub(\''+s.id+'\')" onmouseover="this.style.background=\'var(--c-surface-2)\'" onmouseout="this.style.background=\'\'">'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--c-text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(c.name)+'</div>'
      +'<div style="font-size:11px;color:var(--c-text-3);margin-top:1px">'+(u?esc(fullName(u)):'?')+' · '+fmtS(s.date)+'</div></div>'
      +(want
        ? '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--c-danger-soft);color:var(--c-danger-ink)">'+ic('alert','w-3 h-3')+n+' escalated</span>'
        : '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--c-success-soft);color:var(--c-success-ink)">'+ic('check','w-3 h-3')+'Compliant</span>')
      +'</div>';}).join('');
    emptyMsg=want?'No non-compliant submissions in this period — all clear.':'No compliant submissions in this period.';
  } else {
    const tkMap={tickets:aTickets,tkopen:aTickets.filter(t=>t.status==='Open'),tkhigh:aTickets.filter(t=>t.priority==='High'||t.priority==='Critical'),tkresolved:aTickets.filter(t=>t.status==='Resolved'||t.status==='Closed')};
    const tkLabels={tickets:'All Tickets',tkopen:'Open Tickets',tkhigh:'High Priority Tickets',tkresolved:'Resolved Tickets'};
    const list=(tkMap[type]||[]).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    title=(tkLabels[type]||'Tickets')+' ('+list.length+')';
    const priClr={High:'#DC2626',Medium:'#F59E0B',Low:'#6B7280',Critical:'#7C3AED'};
    rows=list.map(t=>'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--c-border)"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--c-text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(t.title)+'</div><div style="font-size:11px;color:var(--c-text-3);margin-top:1px">'+(uById(t.submitterId)?'From '+esc(fullName(uById(t.submitterId))):'')+' → '+(uById(t.assignedTo)?esc(fullName(uById(t.assignedTo))):'?')+' · '+fmtS(t.date||t.createdAt?.slice(0,10)||'')+'</div></div><span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#FEF2F2;color:'+(priClr[t.priority]||'#6B7280')+'">'+esc(t.priority)+'</span>'+chip(t.status)+'</div>').join('');
    emptyMsg='No tickets in this category.';
  }
  modalShell({title,size:'max-w-lg',
    body:'<div style="margin:-20px">'+(rows||'<div style="padding:32px;text-align:center;color:var(--c-text-3);font-size:13px">'+emptyMsg+'</div>')+'</div>'});
};

let _AData=null,_HData=null,_HRMData=null,_AFiltered=null,_aCharts=[];
// Who the dashboard analytics can see — the SAME reports-permission scope HRM Analytics uses, so the

function _reportScopeIds(){const s=new Set(scopedUsers('reports').map(u=>u.id));s.add(S.uid);return s;}

  if(fArr('deps').length)   subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('deps').includes(c.department);});
  if(fArr('locs').length)   subs=subs.filter(s=>{const c=clById(s.checklistId);return c&&fArr('locs').some(l=>(c.locationIds||[]).includes(l));});

  if(f.dr1) subs=subs.filter(s=>s.date>=f.dr1);
  if(f.dr2) subs=subs.filter(s=>s.date<=f.dr2);

  // Ticket stats for analytics
  let aTickets=(DB.tickets||[]).slice();
  if(!isAdmin()){
    // Both manager and user: only tickets assigned to them
    aTickets=aTickets.filter(t=>t.assignedTo===S.uid);
  }
  if(f.dr1)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')>=f.dr1);
  if(f.dr2)aTickets=aTickets.filter(t=>(t.date||t.createdAt?.slice(0,10)||'')<=f.dr2);
  const tkOpen=aTickets.filter(t=>t.status==='Open').length;
  const tkResolved=aTickets.filter(t=>t.status==='Resolved'||t.status==='Closed').length;
  const tkHigh=aTickets.filter(t=>t.priority==='High'||t.priority==='Critical').length;
  const tot=Math.max(subs.length,1);
  const byS={'On Time':0,'Late':0,'Pending Approval':0,'Rejected':0,'Pending (not submitted)':0};
  subs.forEach(s=>{if(byS[s.status]!==undefined)byS[s.status]++;else byS['Pending (not submitted)']++;});
  // ── Compliance over the filtered submissions (computed from answers → covers old data) ──
  let compliantN=0,nonCompliantN=0,totalEscalations=0;
  subs.forEach(s=>{const c=clById(s.checklistId);if(!c||!(c.questionIds||[]).length)return;const n=_subEscalationCount(c,s);if(n>0){nonCompliantN++;totalEscalations+=n;}else{compliantN++;}});

  // Count missed (assigned but no submission for past dates)
  const relevantUsers=isAdmin()?DB.users:DB.users.filter(u=>_reportScopeIds().has(u.id));
  const dateRange=[];
  const dr1=f.dr1||(new Date(Date.now()-30*86400000).toISOString().slice(0,10));
  const dr2=f.dr2||today;
  let d=new Date(dr1+'T00:00:00');const dEnd=new Date(dr2+'T00:00:00');
  while(d<=dEnd&&dateRange.length<60){dateRange.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  let totalAssigned=0,totalMissed=0;const _missedList=[];
  relevantUsers.forEach(u=>{
    if(fArr('users').length&&!fArr('users').includes(u.id))return;
    dateRange.forEach(dt=>{
      const cls=DB.checklists.filter(c=>(c.assignees||[]).includes(u.id)&&clOn(c,dt)&&c.status!=='Draft');
      cls.forEach(c=>{
        totalAssigned++;
        // For "any one" group checklists, a submission by ANY assignee completes it for
        // everyone — so it's only "missed" if nobody submitted (Fix #2).
        const _done=c.anyOne
          ? DB.submissions.some(s=>s.checklistId===c.id&&s.date===dt&&s.status!=='Editing')
          : !!DB.submissions.find(s=>s.checklistId===c.id&&s.userId===u.id&&s.date===dt);
        if(!_done&&dt<today){
          totalMissed++;
          _missedList.push({userId:u.id,checklistId:c.id,date:dt});
        }
      });
    });
  });

  const topU=relevantUsers.map(u=>({u,n:subs.filter(s=>s.userId===u.id).length,tk:aTickets.filter(t=>t.assignedTo===u.id||t.submitterId===u.id).length})).filter(x=>x.n).sort((a,b)=>b.n-a.n);
  const recent=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||'')).slice(0,50);
  const activeCount=fArr('users').length+fArr('deps').length+fArr('locs').length+fArr('stats').length+(f.dr1?1:0)+(f.dr2?1:0);

  function msDropdown(label,key,items,getId,getLabel){

          <div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${on?'var(--c-brand)':'var(--c-border)'};background:${on?'var(--c-brand)':'var(--c-surface)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${on?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>`:''}
          </div>
          <span style="font-size:13px;font-weight:${on?600:400};color:${on?'var(--c-text)':'var(--c-text-2)'}">${esc(nm)}</span>
        </button>`;}).join('')}
      </div>`:''}
    </div>`;
  }
  

  // ── Pending approvals (scoped) + per-user performance + chart datasets for the live visuals ──
  const _pendA=(DB.approvals||[]).filter(a=>a.status==='Pending'&&(isAdmin()||relevantUsers.some(u=>u.id===a.requesterId))).length;
  const _perfRows=relevantUsers.filter(u=>u.status==='Active').map(u=>{
    const asgn=DB.checklists.filter(c=>(c.assignees||[]).includes(u.id)).length;
    const ss=subs.filter(s=>s.userId===u.id);
    const ot=ss.filter(s=>s.status==='On Time').length;
    return{u,asgn,total:ss.length,late:ss.filter(s=>s.status==='Late').length,pend:ss.filter(s=>['Pending','Pending Approval'].includes(s.status)).length,tk:aTickets.filter(t=>t.assignedTo===u.id&&(t.status==='Open'||t.status==='In Progress')).length,pct:ss.length?Math.round(ot/ss.length*100):0};
  }).filter(r=>r.total||r.asgn).sort((a,b)=>fullName(a.u).localeCompare(fullName(b.u)));
  const _trendLabels=dateRange.map(d=>d.slice(5));
  const _dateMap={};dateRange.forEach(d=>{_dateMap[d.slice(5)]=d;});
  const _depMap={};subs.forEach(s=>{const c=clById(s.checklistId);if(!c)return;const dn=c.department||'—';(_depMap[dn]=_depMap[dn]||{t:0,ot:0});_depMap[dn].t++;if(s.status==='On Time')_depMap[dn].ot++;});
  const _depArr=Object.keys(_depMap).map(k=>({name:k,t:_depMap[k].t,ot:_depMap[k].ot})).sort((a,b)=>b.t-a.t).slice(0,8);
  // compliant / non-compliant submission LISTS (for click-to-drill)
  const _comp=[],_noncomp=[];subs.forEach(s=>{const c=clById(s.checklistId);if(!c||!(c.questionIds||[]).length)return;(_subEscalationCount(c,s)>0?_noncomp:_comp).push(s);});
  // per-employee dataset — respects the employee filter (else top 15 by activity)
  let _empUsers=relevantUsers.filter(u=>u.status==='Active');
  if(fArr('users').length)_empUsers=_empUsers.filter(u=>fArr('users').includes(u.id));
  const _empRows=_empUsers.map(u=>{const ss=subs.filter(s=>s.userId===u.id);return{id:u.id,name:fullName(u),ot:ss.filter(s=>s.status==='On Time').length,late:ss.filter(s=>s.status==='Late').length,pend:ss.filter(s=>['Pending','Pending Approval'].includes(s.status)).length,total:ss.length};}).filter(r=>r.total).sort((a,b)=>b.total-a.total).slice(0,15);
  _AData={
    status:{labels:['On Time','Late','Pending Approval','Rejected','Missed'],data:[byS['On Time']||0,byS['Late']||0,byS['Pending Approval']||0,byS['Rejected']||0,totalMissed],colors:['#10B981','#EF4444','#F97316','#9F1239','#F59E0B']},
    trend:{labels:_trendLabels,sub:dateRange.map(dt=>subs.filter(s=>s.date===dt).length),ontime:dateRange.map(dt=>subs.filter(s=>s.date===dt&&s.status==='On Time').length),late:dateRange.map(dt=>subs.filter(s=>s.date===dt&&s.status==='Late').length)},

    compliance:{labels:['Compliant','Non-compliant'],data:[compliantN,nonCompliantN],colors:['#0E9F6E','#BE123C']},
    emp:{ids:_empRows.map(r=>r.id),labels:_empRows.map(r=>r.name),onTime:_empRows.map(r=>r.ot),late:_empRows.map(r=>r.late),pend:_empRows.map(r=>r.pend)},
    top:{labels:topU.slice(0,8).map(x=>fullName(x.u)),data:topU.slice(0,8).map(x=>x.n)}
  };
  _AFiltered={subs:subs.slice(),tickets:aTickets.slice(),missed:_missedList,compliant:_comp,nonCompliant:_noncomp,dateMap:_dateMap};
  const _cc='background:var(--c-surface);border-radius:var(--r-lg);border:1px solid var(--c-border);box-shadow:var(--sh-sm);padding:18px';

App._viewSubById=(id)=>App.viewSub(id);
App._userDrill=(uid)=>{
  const u=uById(uid);if(!u)return;
  let subs=DB.submissions.filter(s=>s.userId===uid);
  const today=todayISO();
  const dr1=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  subs=subs.filter(s=>s.date>=dr1);
  const tot=subs.length;
  const onTime=subs.filter(s=>s.status==='On Time').length;
  const late=subs.filter(s=>s.status==='Late'&&!!clById(s.checklistId)).length;
  const pending=subs.filter(s=>s.status==='Pending Approval').length;
  const rejected=subs.filter(s=>s.status==='Rejected').length;
  const issues=subs.reduce((n,s)=>n+(s.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length,0);
  const nonComp=subs.reduce((n,s)=>{const c=clById(s.checklistId);return n+((c&&(c.questionIds||[]).length&&_subEscalationCount(c,s)>0)?1:0);},0);
  const pct=tot?Math.round(onTime/tot*100):0;
  const recent=subs.slice().sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||'')).slice(0,10);
  modalShell({title:fullName(u),sub:(u.position||'')+' · '+(u.department||''),size:'max-w-md',
    body:''
    // Score
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'
    +[['Submitted',tot,'var(--c-text)'],['On time',onTime,'#059669'],['Late',late,'#DC2626'],['Pending',pending,'#F97316'],['Non-compliant',nonComp,'#BE123C'],['Answered',issues,'#0E9F6E']].map(([l,v,c])=>'<div style="background:var(--c-surface-2);border-radius:12px;padding:12px;text-align:center"><div class="fd" style="font-size:22px;font-weight:800;color:'+c+'">'+v+'</div><div style="font-size:11px;font-weight:600;color:var(--c-text-3);margin-top:2px">'+l+'</div></div>').join('')
    +'</div>'
    // Completion rate bar
    +'<div style="background:var(--c-surface-2);border-radius:12px;padding:12px;margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:6px"><span style="color:var(--c-text)">On-time rate (last 30d)</span><span style="color:'+(pct>=80?'#059669':pct>=60?'#F97316':'#DC2626')+'">'+pct+'%</span></div>'
    +'<div style="height:6px;background:var(--c-border);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+(pct>=80?'#059669':pct>=60?'#F97316':'#DC2626')+';border-radius:3px;transition:width .5s"></div></div>'
    +'</div>'
    // Recent submissions
    +'<div class="fd" style="font-size:13px;font-weight:700;color:var(--c-text);margin-bottom:8px">Recent submissions</div>'
    +(recent.length
      ? recent.map(s=>{const c=clById(s.checklistId);const _esc=(c&&(c.questionIds||[]).length)?_subEscalationCount(c,s):0;const _comp=(c&&(c.questionIds||[]).length)?(_esc>0?'<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--c-danger-soft);color:var(--c-danger-ink);white-space:nowrap">'+ic('alert','w-3 h-3')+_esc+'</span>':'<span style="display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--c-success-soft);color:var(--c-success-ink)">'+ic('check','w-3 h-3')+'</span>'):'';return'<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--c-border);cursor:pointer" onclick="App._viewSubById(this.dataset.id)" data-id="'+s.id+'">'+'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:var(--c-text);overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+esc(c?.name||'—')+'</div><div style="font-size:11px;color:var(--c-text-3);margin-top:1px">'+fmtS(s.date)+'</div></div>'+_comp+chip(s.status)+'</div>';}).join('')
      : '<p style="font-size:13px;color:var(--c-text-3)">No submissions in last 30 days</p>'
    )});
};
App._togF=(key,val)=>{
  if(!S.filters)S.filters={};
  if(!S.filters[key])S.filters[key]=[];
  if(!Array.isArray(S.filters[key]))S.filters[key]=[S.filters[key]];
  const idx=S.filters[key].indexOf(val);
  if(idx>-1)S.filters[key].splice(idx,1);
  else S.filters[key].push(val);
  if(!S.filters[key].length)delete S.filters[key];
  S.afOpen=key; // keep dropdown open
  rr();
};

/* ===== LIVE DASHBOARD CHARTS (Chart.js) =====
   _AData / _HData are filled by analyticsPage() / homeDash() during render; the canvases are then
   painted by _paintCharts(), which render()/rr() call after the DOM is in place. Charts are destroyed
   and rebuilt on every render so they always reflect the current filters. */
function _aChartTheme(){return {tick:'#8A93A3',grid:'rgba(138,147,163,0.18)'};}
function _destroyACharts(){_aCharts.forEach(c=>{try{c.destroy();}catch(e){}});_aCharts=[];}
function _paintCharts(){try{
  const need=document.getElementById('aChartStatus')||document.getElementById('hChartOnTime')||document.getElementById('hrmChartWorked')||document.querySelector('canvas[data-okr-chart]');
  if(need&&typeof Chart==='undefined'){if(!_paintCharts._r){_paintCharts._r=1;setTimeout(_paintCharts,250);}return;}
  _paintCharts._r=0;
  if(document.getElementById('aChartStatus'))_drawAnalyticsCharts();
  else if(document.getElementById('hChartOnTime'))_drawHomeCharts();
  else if(document.getElementById('hrmChartWorked'))_drawHrmCharts();
  else if(document.querySelector('canvas[data-okr-chart]'))_drawOKRCharts();
  else _destroyACharts();
}catch(e){}}
function _drawHrmCharts(){
  if(typeof Chart==='undefined'||!_HRMData)return;
  _destroyACharts();
  const T=_aChartTheme(),D=_HRMData;
  const mk=(id,empty,cfg)=>{const cv=document.getElementById(id);if(!cv)return;if(empty){_emptyChart(id);return;}try{_aCharts.push(new Chart(cv.getContext('2d'),cfg));}catch(e){}};
  const legB={legend:{position:'bottom',labels:{color:T.tick,font:{size:11},boxWidth:12,padding:10}}};
  const clk=_aClick(i=>{const id=D.ids&&D.ids[i];if(id)App._hrmDrill(id);});
  const noRows=!D.labels||!D.labels.length;
  mk('hrmChartWorked',noRows,{type:'bar',data:{labels:D.labels,datasets:[{label:'Worked hrs',data:D.worked,backgroundColor:'#0E9F6E',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},onHover:_aHover,onClick:clk,scales:{x:{beginAtZero:true,ticks:{color:T.tick,font:{size:10}},grid:{color:T.grid}},y:{ticks:{color:T.tick,font:{size:11}},grid:{display:false}}}}});
  mk('hrmChartLate',noRows,{type:'bar',data:{labels:D.labels,datasets:[{label:'Lates',data:D.lates,backgroundColor:'#F59E0B',borderRadius:4},{label:'Absences',data:D.absences,backgroundColor:'#EF4444',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:legB,onHover:_aHover,onClick:clk,scales:{x:{beginAtZero:true,ticks:{color:T.tick,font:{size:10},precision:0},grid:{color:T.grid}},y:{ticks:{color:T.tick,font:{size:11}},grid:{display:false}}}}});
  mk('hrmChartLeave',noRows,{type:'bar',data:{labels:D.labels,datasets:[{label:'Taken',data:D.taken,backgroundColor:'#0EA5E9',borderRadius:4},{label:'Remaining',data:D.remaining,backgroundColor:'#CBD5E1',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:legB,onHover:_aHover,onClick:clk,scales:{x:{stacked:true,beginAtZero:true,ticks:{color:T.tick,font:{size:10}},grid:{color:T.grid}},y:{stacked:true,ticks:{color:T.tick,font:{size:11}},grid:{display:false}}}}});
}
function _aClick(fn){return (e,els)=>{if(els&&els.length)fn(els[0].index,els[0].datasetIndex);};}
function _aHover(e,els){try{e.native.target.style.cursor=(els&&els.length)?'pointer':'default';}catch(_){}}
// When a chart has no data, show a tidy "No data" panel instead of empty axes/blank rings.
function _allZero(a){return !a||!a.length||a.every(v=>!v);}
function _emptyChart(id){const cv=document.getElementById(id);if(!cv)return;const p=cv.parentElement;if(p)p.innerHTML='<div style="height:100%;display:grid;place-items:center;color:var(--c-text-3);font-size:12.5px;text-align:center;padding:0 14px">No data for this range</div>';}
function _drawAnalyticsCharts(){
  if(typeof Chart==='undefined'||!_AData)return;
  _destroyACharts();
  const T=_aChartTheme(),A=_AData;

App._delFolder=(id)=>{
  const f=(DB.folders||[]).find(x=>x.id===id);
  if(!f)return;
  if(!confirm('Delete folder "'+f.name+'" and all its files?'))return;
  // Collect all folder IDs (recursive) and doc IDs BEFORE modifying DB
  const toDelete=[];
  function collectRec(fid){toDelete.push(fid);(DB.folders||[]).filter(x=>x.parentId===fid).forEach(c=>collectRec(c.id));}
  collectRec(id);
  const docIds=(DB.documents||[]).filter(x=>toDelete.includes(x.folderId)).map(x=>x.id);
  // Track deleted IDs (tombstones) so a Supabase refresh can never resurrect them.
  if(!DB.folders_deleted)DB.folders_deleted=[];
  if(!DB.documents_deleted)DB.documents_deleted=[];
  toDelete.forEach(fid=>{if(!DB.folders_deleted.includes(fid))DB.folders_deleted.push(fid);});
  // Tombstone every contained document too — otherwise an orphaned doc reappears on reload
  // because _applyDocuments only filters by documents_deleted (the folder gate is gone).
  docIds.forEach(d=>{if(!DB.documents_deleted.includes(d))DB.documents_deleted.push(d);});
  DB.folders=(DB.folders||[]).filter(x=>!toDelete.includes(x.id));
  DB.documents=(DB.documents||[]).filter(x=>!toDelete.includes(x.folderId||''));
  log(fullName(me()),'Deleted folder',f.name);
  toast('Deleted','warn');saveDB();render();
  // Sync to Supabase in background
  const delOps=toDelete.map(fid=>sb.from('doc_folders').delete().eq('id',fid).then(({error})=>{if(error)console.error('delFolder sync:',error.message);}));
  if(docIds.length)delOps.push(sb.from('documents').delete().in('id',docIds).then(({error})=>{if(error)console.error('delDoc sync:',error.message);}));
  Promise.all(delOps).catch(e=>console.error('delFolder:',e));
};

App._doUpload=async()=>{
  const files=App._pendingFiles;if(!files?.length){toast('Select a file','err');return;}
  const btn=document.getElementById('ud-btn');
  const prog=document.getElementById('ud-progress');
  const bar=document.getElementById('ud-bar');
  if(btn)btn.style.display='none';
  if(prog)prog.style.display='block';
  const scopeTab=S.filters.docScope||'dept';
  const scopeKey=S.filters.docScopeKey;
  const folderId=S.filters.docFolder||null;
  const needsAppr=document.getElementById('ud-approval')?.checked;
  let done=0;
  const _flagged=[];
  for(const file of files){
    const path=scopeTab+'/'+scopeKey+'/'+(folderId||'root')+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const{data,error}=await sb.storage.from('documents').upload(path,file,{cacheControl:'3600',upsert:false});
    if(error){toast('Upload failed: '+error.message,'err');if(btn)btn.style.display='block';if(prog)prog.style.display='none';return;}
    const{data:urlData}=sb.storage.from('documents').getPublicUrl(path);
    if(!DB.documents)DB.documents=[];
    const docObj={id:uid('doc'),name:file.name,folderId,type:scopeTab,scope:scopeKey,url:urlData?.publicUrl||path,storagePath:path,fileType:file.type,fileSize:file.size,uploadedBy:S.uid,uploaderName:fullName(me()),uploadedAt:new Date().toISOString(),approvalStatus:needsAppr?'pending':null,approverId:null,decidedBy:null,decidedAt:null,decisionNote:null};
    DB.documents.push(docObj);
    if(needsAppr)_flagged.push(docObj);
    // Insert directly to Supabase so refresh doesn't lose the file
    await sb.from('documents').insert({id:docObj.id,name:docObj.name,folder_id:docObj.folderId||null,type:docObj.type,scope:docObj.scope,url:docObj.url,storage_path:docObj.storagePath,file_type:docObj.fileType,file_size:docObj.fileSize,uploaded_by:docObj.uploadedBy,uploader_name:docObj.uploaderName,uploaded_at:docObj.uploadedAt,approval_status:docObj.approvalStatus||null,approver_id:null,decided_by:null,decided_at:null,decision_note:null}).then(({error})=>{if(error)console.error('doc insert:',error.message);}).catch(()=>{});
    done++;
    if(bar)bar.style.width=Math.round(done/files.length*100)+'%';
  }
  log(fullName(me()),'Uploaded '+done+' file(s)',scopeKey);
  // Notify the approver pool for each flagged doc (active org-doc approvers, not the uploader).
  if(_flagged.length){const pool=_docApprovers(S.uid);_flagged.forEach(d=>pool.forEach(a=>_hrmNotify(a.id,'📄 '+fullName(me())+' needs your approval: '+d.name,'document')));}
  toast('Uploaded '+done+' file'+(done!==1?'s':''));
  saveDB();closeModal();render();
};

App._downloadDoc=async(id)=>{
  const doc=(DB.documents||[]).find(x=>x.id===id);if(!doc)return;
  if(doc.url&&doc.url.startsWith('http')){
    const a=document.createElement('a');a.href=doc.url;a.download=doc.name;a.target='_blank';a.rel='noopener noreferrer';a.click();return;
  }
  // Signed URL
  const{data,error}=await sb.storage.from('documents').createSignedUrl(doc.storagePath||doc.url,300);
  if(error){toast('Download failed','err');return;}
  const a=document.createElement('a');a.href=data.signedUrl;a.download=doc.name;a.click();
};

App._previewDoc=async(id)=>{
  const doc=(DB.documents||[]).find(x=>x.id===id);if(!doc)return;
  let url=doc.url;
  if(!url?.startsWith('http')){
    const{data,error}=await sb.storage.from('documents').createSignedUrl(doc.storagePath||doc.url,300);
    if(error){toast('Preview failed','err');return;}
    url=data.signedUrl;
  }
  const ext=(doc.name.split('.').pop()||'').toLowerCase();
  if(ext.match(/jpe?g|png|gif|webp/)){
    modalShell({title:doc.name,size:'max-w-2xl',body:'<img src="'+url+'" alt="'+esc(doc.name)+'" style="width:100%;border-radius:12px;max-height:70vh;object-fit:contain"/>'});
  } else if(ext==='pdf'){
    window.open(url,'_blank','noopener');
  } else {
    window.open(url,'_blank','noopener');
  }
};

// Active users who can approve org docs (HR/Admin/granted), excluding the given uploader.
function _docApprovers(exceptUid){
  return (DB.users||[]).filter(u=>u.id!==exceptUid&&u.status==='Active'&&_canApproveDocAs(u));
}
// Does user `u` have documentsOrg.approve? (mirror can()/_hrFloor for an arbitrary user)
function _canApproveDocAs(u){
  if(!u)return false;
  if(u.role==='Admin')return true;
  if(u.hrm?.isHR)return true; // HR floor
  const pid=u.hrm?.roleProfileId;const p=pid?(DB.roleProfiles?.[pid]||null):null;
  if(p){const a=p.perms?.documentsOrg;return !!(a&&a.actions&&a.actions.approve);}
  return false;
}
// Approve/reject a flagged org document. Gated on documentsOrg.approve + not the uploader.
App._decideDoc=(id,action)=>{
  const d=(DB.documents||[]).find(x=>x.id===id);
  if(!d){toast('Doc not found','err');return;}
  if(!can('documentsOrg','approve')){toast('Not permitted','err');return;}
  if(d.uploadedBy===S.uid){toast('You cannot approve your own document','err');return;} // self-approve guard
  if(d.approvalStatus!=='pending'){toast('Already decided','warn');rr();return;}
  if(action==='reject'){
    modalShell({title:'Reject document',sub:d.name,size:'max-w-md',
      body:'<textarea id="doc-rnote" rows="3" class="ui-input rf" placeholder="Reason for rejection (sent to uploader)"></textarea>',
      footer:btnG('Cancel','App.closeModal()')+btnDanger('Reject','App._doDecideDoc(\''+esc(d.id)+'\',\'reject\')')});
    return;
  }
  App._doDecideDoc(id,'approve');
};
// Commit the decision (note read from the reject modal when present).
App._doDecideDoc=(id,action)=>{
  const d=(DB.documents||[]).find(x=>x.id===id);
  if(!d){toast('Doc not found','err');return;}
  if(!can('documentsOrg','approve')){toast('Not permitted','err');return;}
  if(d.uploadedBy===S.uid){toast('You cannot approve your own document','err');return;}
  if(d.approvalStatus!=='pending'){toast('Already decided','warn');closeModal();rr();return;}
  const note=action==='reject'?(document.getElementById('doc-rnote')?.value||'').trim():'';
  d.approvalStatus=action==='approve'?'approved':'rejected';
  d.decidedBy=S.uid;d.decidedAt=new Date().toISOString();d.decisionNote=note||null;
  saveDB();
  sb.from('documents').update({approval_status:d.approvalStatus,decided_by:d.decidedBy,decided_at:d.decidedAt,decision_note:d.decisionNote}).eq('id',id)
    .then(({error})=>{if(error)_syncErr('document decision')(error);}).catch(_syncErr('document decision'));
  // N5: send the uploader to where their document lives (dept/location page), not the
  // Approvals inbox they may not be able to open.
  const _dFdr=(DB.folders||[]).find(f=>f.id===d.folderId);
  const _dRoute=((_dFdr&&_dFdr.scope==='location')||d.scope==='location')?'locations':'departments';
  _hrmNotify(d.uploadedBy,(action==='approve'?'✅ Your document "':'❌ Your document "')+d.name+'" was '+d.approvalStatus+(note?': '+note:'.'),'document',_dRoute);
  hlog('Document '+d.approvalStatus,d.name+(note?' — '+note:''));
  closeModal();toast(action==='approve'?'Approved':'Rejected');rr();
};

// W1.3/X5: replace blocking confirm() with a styled confirm dialog, then an optimistic delete with a
// toast-with-Undo (5s). The underlying delete still happens via _delDoc (id preserved for the tests);
// the dialog just routes into it. _undoDelDoc restores the locally-removed row + cancels the tombstone.
App._delDoc=(id)=>{
  const doc=(DB.documents||[]).find(x=>x.id===id);if(!doc)return;
  confirmModal({title:'Delete document',body:'Delete “'+esc(doc.name)+'”? You can undo this for a few seconds.',confirmLabel:'Delete',danger:true,onConfirm:`App._doDelDoc('${id}')`});
};
App._doDelDoc=(id)=>{
  const doc=(DB.documents||[]).find(x=>x.id===id);if(!doc)return;
  _delDocUndo={id,doc:JSON.parse(JSON.stringify(doc))};
  if(!DB.documents_deleted)DB.documents_deleted=[];
  if(!DB.documents_deleted.includes(id))DB.documents_deleted.push(id);
  DB.documents=(DB.documents||[]).filter(x=>x.id!==id);
  log(fullName(me()),'Deleted doc',doc.name);saveDB();render();
  toastAction('“'+doc.name+'” deleted','warn',{label:'Undo',fn:`App._undoDelDoc('${id}')`,ms:5000});
  // Defer the remote delete so an Undo within the window never hits the server.
  setTimeout(()=>{
    if(_delDocUndo&&_delDocUndo.id===id)return; // undone — skip
    sb.from('documents').delete().eq('id',id).then(({error})=>{if(error)console.error('delDoc sync:',error.message);}).catch(e=>console.error('delDoc:',e));
    if(doc.storagePath)sb.storage.from('documents').remove([doc.storagePath]).catch(()=>{});
  },5200);
};
let _delDocUndo=null;
App._undoDelDoc=(id)=>{
  if(!_delDocUndo||_delDocUndo.id!==id)return;
  const doc=_delDocUndo.doc;_delDocUndo=null;
  DB.documents_deleted=(DB.documents_deleted||[]).filter(x=>x!==id);
  if(!(DB.documents||[]).some(x=>x.id===id)){DB.documents=DB.documents||[];DB.documents.push(doc);}
  saveDB();toast('Restored');render();
};

App._execClear=async()=>{
  const catMap={
    submissions: {local:()=>{DB.submissions=[];Object.keys(RUN).forEach(k=>delete RUN[k]);},table:'submissions'},
    checklists:  {local:()=>{DB.checklists=[];DB.checklists_deleted=[];},table:'checklists'},
    tickets:     {local:()=>{DB.tickets=[];},table:'tickets'},
    approvals:   {local:()=>{DB.approvals=[];},table:'approvals'},
    notifications:{local:()=>{DB.notifications=[];_invalidateNotifCache();},table:'notifications'},
    feedback:    {local:()=>{DB.feedback=[];},table:'feedback'},
    questions:   {local:()=>{DB.questions=[];DB.questions_deleted=[];},table:'questions'},
    documents:   {local:()=>{DB.documents=[];DB.folders=[];DB.documents_deleted=[];DB.folders_deleted=[];},table:'documents'},
    audit:       {local:()=>{DB.audit=[];},table:'audit_logs'},
    users:       {local:()=>{DB.users=DB.users.filter(u=>u.id===S.uid);},table:'profiles'},
  };
  const sel=Object.keys(catMap).filter(k=>document.getElementById('clr-'+k)?.checked);
  if(!sel.length){toast('Select at least one category','warn');return;}
  const labels=sel.map(k=>catMap[k].table).join(', ');
