App.applyLeave=()=>{
  const u=me();const prof=userProfileId(u);
  // §3a: comp-off is HR-controlled (granted/removed by HR only) — never employee-applicable.
  const types=_typesFor(prof).filter(t=>t.enabled).filter(t=>!_isCompOffLt(t)).filter(t=>!t.birthdayMonthOnly||u.hrm?.dob);
  if(!types.length){toast('No leave types available','warn');return;}
  openModal(`<div class="p-5"><div class="flex justify-between mb-4"><h2 class="fd text-xl font-bold">Apply for leave</h2><button onclick="App.closeModal()" class="text-ink-400">${ic('x')}</button></div>
    <div class="space-y-3">
      ${selF('Leave type','lv-type',types.map(t=>[t.id,t.name]),types[0].id)}
      <div class="grid grid-cols-2 gap-3">${fld('Start date','lv-start',todayISO(),'date')}${fld('End date','lv-end',todayISO(),'date')}</div>
      ${mkTog('lv-half',false,'Half-day (single day only)')}
      <div><label for="lv-reason" class="block text-xs font-semibold text-ink-500 mb-1">Reason</label><textarea id="lv-reason" rows="3" class="w-full bg-white border border-ink-200 rounded-xl px-3 py-2.5 text-sm rf" placeholder="Reason for leave"></textarea></div>
      <div id="lv-preview" style="font-size:12px;color:#6B7280"></div>
    </div>
    <div class="flex gap-2 mt-5"><button onclick="App.closeModal()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #ECEDF0;background:#fff;font-weight:600;font-size:14px;cursor:pointer">Cancel</button><button onclick="App.submitLeave()" style="flex:1;padding:12px;border-radius:12px;background:#15171C;color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer">Submit</button></div>
  </div>`);
  const upd=()=>{const tId=$('#lv-type').value,lt=ltById(tId);const start=$('#lv-start').value,end=$('#lv-end').value,half=togV('lv-half');
    if(!start||!end||end<start){$('#lv-preview').textContent='Select a valid date range.';return;}
    const wd=_workingDaysBetween(u.id,start,end,half&&start===end);
    const b=_balanceReadonly(u.id,tId,_leaveYearOf(u,start));const rem=_balRemaining(b);
    let msg=wd+' working day'+(wd===1?'':'s')+' (off-days & holidays excluded) · '+rem+' remaining';
    if(lt?.birthdayMonthOnly&&!_birthdayOk(u,start))msg+=' · ⚠ Birthday leave only valid in your birthday month';
    $('#lv-preview').textContent=msg;};
  ['lv-type','lv-start','lv-end'].forEach(id=>{const e=$('#'+id);if(e)e.addEventListener('change',upd);});
  const ht=$('#lv-half');if(ht)ht.addEventListener('click',()=>setTimeout(upd,0));
  upd();
};
App.submitLeave=()=>{
  const u=me();const tId=$('#lv-type')?.value;const lt=ltById(tId);if(!lt){toast('Pick a type','err');return;}
  if(_isCompOffLt(lt)){toast('Comp-off is granted by HR and cannot be applied for','err');return;} // §3a defense-in-depth
  const start=$('#lv-start')?.value,end=$('#lv-end')?.value;const half=togV('lv-half');const reason=($('#lv-reason')?.value||'').trim();
  if(!start||!end||end<start){toast('Invalid date range','err');return;}
  if(lt.birthdayMonthOnly&&!_birthdayOk(u,start)){toast('Birthday leave only valid in your birthday month','err');return;}
  // M1: half-day applies to a single date only — never silently drop the toggle on a range.
  if(half&&start!==end){toast('Half-day only for a single date','err');return;}
  const halfDay=half&&start===end;
  // M4: a range that crosses a leave-year boundary mis-allocates the balance charge → reject with a clear message.
  if(_leaveYearOf(u,start)!==_leaveYearOf(u,end)){toast('Leave cannot span two leave-years — split into separate requests','err');return;}
  const wd=_workingDaysBetween(u.id,start,end,halfDay);
  if(wd<=0){toast('Selected range has no working days','err');return;}
  // M6: block overlap with any existing non-Rejected request for the same user.
  if((DB.leaveRequests||[]).some(r=>r.userId===u.id&&r.status!=='Rejected'&&!(r.end<start||r.start>end))){toast('You already have a leave request overlapping these dates','err');return;}
  // LV-1: "unpaid" is an explicit TYPE property (lt.unpaid===true), NOT the presence of an unpaid PAY-TIER.
  //   paidTiers.unpaid describes a pay tier within an otherwise-tracked entitlement (e.g. sick 15/30/45),
  //   so keying off it made every sick request bypass the ledger. Only genuinely-unpaid types skip the balance.
  const isUnpaid=lt.unpaid===true||lt.key==='hajj';
  const b=_balanceFor(u.id,tId,_leaveYearOf(u,start));
  if(wd>_balRemaining(b)&&!isUnpaid){toast('Not enough balance ('+_balRemaining(b)+' remaining)','err');return;}
  // M5: once-per-employment keyed on the semantic leave key (e.g. 'hajj'), not a single type-row id.
  if(lt.oncePerEmployment&&(DB.leaveRequests||[]).some(r=>{const rl=ltById(r.leaveTypeId);return r.userId===u.id&&r.status!=='Rejected'&&rl&&rl.key===lt.key;})){toast('This leave can only be taken once per employment','err');return;}
  // §2: snapshot the active flow at submit so later edits to the flow can't strand in-flight requests.
  const flow=_flowFor({userId:u.id,leaveTypeId:tId,start});
  const firstStage=flow[0]||{type:'manager'};
  // DATA-2: persist the resolved leave-year ON the request so the SAME balance row is always
  // touched across the request's lifecycle, even if joiningDate / leaveYearBasis changes later.
  const reqLeaveYear=_leaveYearOf(u,start);
  const req={id:uid('lv'),userId:u.id,leaveTypeId:tId,leaveYear:reqLeaveYear,start,end,halfDay,halfDaySession:null,workingDays:wd,reason,unpaid:isUnpaid,
    flow,stageIndex:0,stage:firstStage.type, // `stage` kept (=stage type) for UI/data back-compat
    status:'Pending',mgrDecision:null,mgrNote:'',mgrAt:null,hrDecision:null,hrNote:'',hrAt:null,createdAt:new Date().toISOString()};
  DB.leaveRequests.unshift(req);
  if(!isUnpaid)b.pending=_r2((b.pending||0)+wd); // reserve (unpaid types never touch the ledger)
  hlog('Leave requested',fullName(u)+': '+lt.name+' '+start+'→'+end+' ('+wd+'d)');
  saveDB();closeModal();toast('Leave request submitted ✓');
  // notify the first stage's approver(s) resolved via _stageApprover (gated by §4 in-app toggle)
  const pred=_stageApprover(req,0);
  if(_hnp('inapp_hrm_leave_submitted'))DB.users.filter(x=>pred(x.id)&&x.id!==u.id).forEach(a=>_hrmNotify(a.id,'📝 '+fullName(u)+' requested '+lt.name+' ('+fmtD(start)+'→'+fmtD(end)+') — your approval needed'));
  if(_hnpEmail('email_hrm_leave_submitted'))queueEmail('hrm_leave_submitted',u.id,null,start,{type:lt.name});
  rr();
};
App.cancelLeave=(id)=>{
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);if(!r||r.userId!==S.uid||r.status!=='Pending')return;
  // DATA-2: release against the SAME balance row the reservation was placed on (persisted at submit).
  if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(uById(r.userId),r.start));
    b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));}
  r.status='Rejected';r.hrNote='Cancelled by employee';
  hlog('Leave cancelled',fullName(me()));saveDB();toast('Request cancelled');rr();
};

function _leaveApprovalList(stage){
  // §2: `stage` is now a TAB classifier ('manager' | 'hr'). A request lands in a tab based on its
  // CURRENT flow stage (manager-type → manager tab, role/user-type → hr tab). Visibility & actions

  // LV-3: surface STRANDED requests (no resolvable approver) to HR/Admin so they aren't invisible.
  //   They land in whichever tab their current stage maps to; an HR user or Super Admin can clear them.
  const _canSeeStranded=isAdmin()||(can('leaveRequests','approve')&&!!me()?.hrm?.isHR);
  let reqs=(DB.leaveRequests||[]).filter(r=>r.status==='Pending'&&_stageTab(r)===stage&&(_canActOn(r)||(_canSeeStranded&&_stageStranded(r)&&r.userId!==S.uid)));
  reqs.sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
  if(!reqs.length)return empty('approve','No pending requests','You\'re all caught up.');
  return reqs.map(r=>{const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);const b=_balanceReadonly(r.userId,r.leaveTypeId,_leaveYearOf(emp,r.start));
    const flow=_reqFlow(r);const si=(r.stageIndex!=null?r.stageIndex:0);
    const stranded=_stageStranded(r);
    const stageChip=flow.length>1?`<span style="font-size:10px;font-weight:700;background:#EEF2FF;color:#4338CA;padding:2px 7px;border-radius:99px">Stage ${si+1} of ${flow.length} · ${esc(_stageLabel(flow[si]))}</span>`:'';
    const strandChip=stranded?`<span style="font-size:10px;font-weight:700;background:#FEF2F2;color:#B91C1C;padding:2px 7px;border-radius:99px">No approver — needs admin</span>`:'';
    return `<div style="background:#fff;border-radius:16px;border:1px solid #ECEDF0;padding:16px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${avatar(emp,'w-9 h-9','text-xs')}<div style="flex:1"><div style="font-size:14px;font-weight:700">${esc(fullName(emp))}</div><div style="font-size:12px;color:#9CA3AF">${esc(emp?.department||'')} · ${esc(lt?lt.name:'Leave')}</div></div><div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end">${stageChip}${strandChip}</div></div>
      <div style="font-size:13px;color:#374151">${fmtD(r.start)} → ${fmtD(r.end)} · <strong>${r.workingDays} day${r.workingDays===1?'':'s'}</strong>${r.halfDay?' (half-day)':''} · ${_balRemaining(b)} remaining</div>
      ${r.reason?`<div style="font-size:12px;color:#6B7280;margin-top:6px;background:#F9FAFB;border-radius:8px;padding:8px">${esc(r.reason)}</div>`:''}
      ${stage==='hr'&&r.mgrNote?`<div style="font-size:12px;color:#6B7280;margin-top:4px"><strong>Manager note:</strong> ${esc(r.mgrNote)}</div>`:''}

    </div>`;}).join('');
}
App.decideLeave=(id,action,expectedStageIndex)=>{
  // LV-4: re-read the request and verify it is still Pending AT THE STAGE the click was rendered for.
  //   A fast double-click (or an approver valid for consecutive stages) must NOT skip a stage: each call
  //   advances exactly one stage and is a no-op once the request has already advanced/finalized.
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);
  if(!r){toast('Request not found','err');return;}
  if(r.status!=='Pending'){toast('This request was already '+(r.status==='Approved'?'approved':r.status==='Rejected'?'decided':'finalized'),'warn');return;}
  const curIdx=(r.stageIndex!=null?r.stageIndex:0);
  if(expectedStageIndex!=null&&Number(expectedStageIndex)!==curIdx){toast('This request already moved to the next stage — refreshing','warn');rr();return;}
  if(r.userId===S.uid){toast('You cannot approve your own leave request','err');return;} // M7
  if(!_canActOn(r)){toast('You are not the approver for this stage','err');return;}
  const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);
  if(action==='reject'){
    openModal(`<div class="p-5"><div class="flex justify-between mb-3"><h2 class="fd text-lg font-bold">Reject leave</h2><button onclick="App.closeModal()" class="text-ink-400">${ic('x')}</button></div>
      <textarea id="lv-rnote" rows="3" class="w-full bg-white border border-ink-200 rounded-xl px-3 py-2.5 text-sm rf" placeholder="Reason for rejection (sent to employee)"></textarea>
      <div class="flex gap-2 mt-4"><button onclick="App.closeModal()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid #ECEDF0;background:#fff;font-weight:600;cursor:pointer">Cancel</button><button onclick="App._doReject('${id}',${curIdx})" style="flex:1;padding:11px;border-radius:12px;background:#B91C1C;color:#fff;font-weight:600;border:none;cursor:pointer">Reject</button></div></div>`);
    return;
  }
  // approve — §2: advance through the snapshot flow by stageIndex
  const flow=_reqFlow(r);const si=(r.stageIndex!=null?r.stageIndex:0);const curStage=flow[si];
  const nextStage=flow[si+1];
  // Keep legacy mgr/hr decision fields populated for back-compat display.
  if(curStage&&curStage.type==='manager'){r.mgrDecision='Approved';r.mgrAt=new Date().toISOString();}
  else{r.hrDecision='Approved';r.hrAt=new Date().toISOString();}
  if(nextStage){
    r.stageIndex=si+1;r.stage=nextStage.type;
    hlog('Leave approved (stage '+(si+1)+': '+_stageLabel(curStage)+')',fullName(emp)+': '+(lt?lt.name:''));
    const pred=_stageApprover(r,si+1);
    // next-stage approvers = same "approval needed" event as submission (gated by §4)
    if(_hnp('inapp_hrm_leave_submitted'))DB.users.filter(x=>pred(x.id)&&x.id!==emp.id).forEach(a=>_hrmNotify(a.id,'📝 '+fullName(emp)+'\'s '+(lt?lt.name:'leave')+' needs your approval (stage '+(si+2)+')'));
    if(_hnpEmail('email_hrm_leave_submitted'))queueEmail('hrm_leave_submitted',emp.id,null,r.start,{type:lt?lt.name:''});
    _hrmNotify(emp.id,'✓ Your '+(lt?lt.name:'leave')+' passed '+_stageLabel(curStage)+' — pending '+_stageLabel(nextStage)+'.'); // progress note (informational)
  }else{
    r.stage='done';r.status='Approved';
    // DATA-2: touch the SAME balance row the reservation was placed on (persisted at submit).
    if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(emp,r.start));
      b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));
      b.used=_r2((b.used||0)+r.workingDays);}
    _writeLeaveAttendance(r); // mark attendance Leave/HalfDay (history written for unpaid too)
    hlog('Leave approved',fullName(emp)+': '+(lt?lt.name:''));
    if(_hnp('inapp_hrm_leave_approved'))_hrmNotify(emp.id,'✅ Your '+(lt?lt.name:'leave')+' ('+fmtD(r.start)+'→'+fmtD(r.end)+') was approved.');
    if(_hnpEmail('email_hrm_leave_approved'))queueEmail('hrm_leave_approved',emp.id,null,r.start,{type:lt?lt.name:''});
  }
  saveDB();toast('Approved ✓');rr();
};
App._doReject=(id,expectedStageIndex)=>{
  // LV-4: idempotent reject — re-read, confirm still Pending at the rendered stage.
  const r=(DB.leaveRequests||[]).find(x=>x.id===id);
  if(!r){toast('Request not found','err');return;}
  if(r.status!=='Pending'){toast('This request was already decided','warn');closeModal();rr();return;}
  const curIdx=(r.stageIndex!=null?r.stageIndex:0);
  if(expectedStageIndex!=null&&Number(expectedStageIndex)!==curIdx){toast('This request already moved to the next stage — refreshing','warn');closeModal();rr();return;}
  if(r.userId===S.uid){toast('You cannot decide your own leave request','err');return;} // M7
  if(!_canActOn(r)){toast('You are not the approver for this stage','err');return;}
  const note=($('#lv-rnote')?.value||'').trim();const emp=uById(r.userId);const lt=ltById(r.leaveTypeId);
  // §2: reject at ANY stage stops the flow and releases the reservation (unpaid-skip below unchanged).
  const curStage=_reqStage(r);
  if(curStage&&curStage.type==='manager'){r.mgrDecision='Rejected';r.mgrNote=note;r.mgrAt=new Date().toISOString();}
  else{r.hrDecision='Rejected';r.hrNote=note;r.hrAt=new Date().toISOString();}
  r.status='Rejected';
  // DATA-2: release against the SAME balance row the reservation was placed on (persisted at submit).
  if(!r.unpaid){const b=_balanceFor(r.userId,r.leaveTypeId,r.leaveYear||_leaveYearOf(emp,r.start));
    b.pending=_r2(Math.max(0,(b.pending||0)-r.workingDays));} // release reservation (skip for unpaid)
  hlog('Leave rejected',fullName(emp)+': '+(lt?lt.name:'')+(note?(' — '+note):''));
  if(_hnp('inapp_hrm_leave_rejected'))_hrmNotify(emp.id,'❌ Your '+(lt?lt.name:'leave')+' was rejected'+(note?': '+note:'.'));
  if(_hnpEmail('email_hrm_leave_rejected'))queueEmail('hrm_leave_rejected',emp.id,null,r.start,{type:lt?lt.name:'',note});
  saveDB();closeModal();toast('Rejected');rr();
};
function _writeLeaveAttendance(r){
  let d=r.start,guard=0;
  while(d<=r.end&&guard++<400){
    const u=uById(r.userId);const off=new Set(u.hrm?.schedule?.offDays||[]);
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    const prof=userProfileId(u);const isHol=(DB.holidays||[]).some(h=>h.profileId===prof&&h.date===d);
    if(!off.has(dow)&&!isHol){
      let rec=attFor(r.userId,d);
      if(!rec){
        // No prior record → write a pure leave day.
        rec={id:uid('att'),userId:r.userId,date:d,clockIn:null,clockOut:null,inMin:null,outMin:null,hours:null,status:r.halfDay?'HalfDay':'Leave',leaveType:r.leaveTypeId,flags:[],inGeo:null,autoClosed:false,note:'',createdAt:new Date().toISOString()};
        DB.attendance.push(rec);
      }else if(rec.clockIn||rec.inMin!=null||(rec.hours||0)>0){
        // M2: the employee already WORKED this day. Don't blow away worked hours.
        rec.leaveType=r.leaveTypeId;
        const fl=new Set(rec.flags||[]);
        if(r.halfDay){
          // Half-day leave on a worked day → keep hours, mark HalfDay + which session is leave.
          rec.status='HalfDay';rec.halfDaySession=rec.halfDaySession||'PM';fl.add('half-day-worked');
        }else{
          // Full-day leave on an already-worked day → keep the worked record (Present + hours),
          // just tag the overlap. Payroll excludes this date from leavesTaken (see _leaveDaysInRange).
          fl.add('leave-overlap');
        }
        rec.flags=[...fl];
      }else{
        // Existing non-worked record (e.g. a previously-written leave/off day) → set leave status.
        rec.status=r.halfDay?'HalfDay':'Leave';rec.leaveType=r.leaveTypeId;
      }
    }
    d=_isoAdd(d,1);
  }
}
/* L5/M2: working leave-days for `r` that fall inside [d1,d2] AND were not already worked.
   Clips to the overlap window and excludes full-day-on-worked overlaps from the payroll leave count. */
function _leaveDaysInRange(r,d1,d2){
  const u=uById(r.userId);if(!u)return 0;
  const off=new Set(u.hrm?.schedule?.offDays||[]);const prof=userProfileId(u);
  const hols=new Set((DB.holidays||[]).filter(h=>h.profileId===prof).map(h=>h.date));
  let d=r.start>d1?r.start:d1;const end=r.end<d2?r.end:d2;let n=0,guard=0;
  while(d<=end&&guard++<400){
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    if(!off.has(dow)&&!hols.has(d)){
      const rec=attFor(r.userId,d);
      const worked=rec&&(rec.clockIn||rec.inMin!=null||(rec.hours||0)>0);
      if(r.halfDay)n+=0.5; // half-day always counts 0.5 (hours kept separately)
      else if(!worked)n+=1; // full-day leave on a worked day is NOT counted (no double pay)
    }
    d=_isoAdd(d,1);
  }
  return _r2(n);
}

// Flush every visible .bulkbal-cell input into DB.leaveBalances. Returns the number of changed cells.
// Shared by "Save all" and by "Apply to selected" (UI-2) so manual edits are never silently dropped.
function _bulkBalFlush(){
  let n=0;
  $$('.bulkbal-cell').forEach(inp=>{
    const uId=inp.dataset.uid,ltId=inp.dataset.lt,yr=inp.dataset.yr;
    const v=Number(inp.value);if(isNaN(v))return;
    const b=_balanceFor(uId,ltId,yr);const old=b.entitled||0;
    if(_r2(v)!==_r2(old)){b.entitled=_r2(Math.max(0,v));const u=uById(uId),lt=ltById(ltId);hlog('Balance edited '+(lt?lt.name:''),fullName(u)+': '+old+' → '+b.entitled+' entitled');n++;}
  });
  return n;
}
App._bulkBalSaveAll=()=>{
  if(!can('leaveBalances','edit')){toast('Not permitted','err');return;}
  const n=_bulkBalFlush();

  saveDB();toast('Saved '+n+' balance change(s) ✓');rr();
};
App._bulkBalAdjust=(profId)=>{

  const sel=$$('.bulkbal-sel').filter(cb=>cb.checked).map(cb=>cb.dataset.uid);
  if(!sel.length){toast('Select at least one employee','err');return;}
  if(!delta||isNaN(delta)){toast('Enter a non-zero number of days','err');return;}
  if(!reason){toast('Reason required','err');return;}
  const lt=ltById(ltId);if(!lt){toast('Pick a leave type','err');return;}
  // UI-2: persist any in-progress inline cell edits BEFORE applying the delta, otherwise rr() below
  // would re-render the table from DB and wipe them. Read cells against current DB (pre-delta).
  const flushed=_bulkBalFlush();
  sel.forEach(uId=>{
    const u=uById(uId);const yr=_leaveYearOf(u,todayISO());const b=_balanceFor(uId,ltId,yr);
    b.entitled=_r2(Math.max(0,(b.entitled||0)+delta));

};

  DB.roleProfiles[nid]={id:nid,name:src.name+' (copy)',description:src.description||'',builtin:false,perms:JSON.parse(JSON.stringify(src.perms||{}))};
  saveDB();toast('Profile duplicated ✓');rr();
};
App.deleteRoleProfile=(id)=>{
  if(!isAdmin())return;
  const p=DB.roleProfiles[id];if(!p)return;
  if(p.builtin){toast('Built-in profiles cannot be deleted','err');return;}
  const n=DB.users.filter(u=>u.hrm?.roleProfileId===id).length;
  if(!confirm('Delete "'+p.name+'"?'+(n?(' '+n+' '+(n===1?'person':'people')+' will revert to their base-role access.'):'')))return;
  // Null out assignment so affected users fall back to the base-role floor.
  DB.users.forEach(u=>{if(u.hrm&&u.hrm.roleProfileId===id)u.hrm.roleProfileId=null;});
  delete DB.roleProfiles[id];
  saveDB();toast('Profile deleted');rr();
};

// §3a: comp-off grant/remove → appends to the dedicated u.hrm.compOff ledger (frontend-only).
//   Positive days = grant (honors its own expiry); negative = removal. Independent of carriedExpiry.
App.addCompOff=(userId)=>{
  const u=uById(userId);if(!u||!can('leaveBalances','grant'))return;
  _grantCompOff(u,Number($('#u-co-days')?.value),($('#u-co-reason')?.value||'').trim(),$('#u-co-exp')?.value||null);
};
function _grantCompOff(u,days,reason,exp){
  if(!u)return false;
  if(!can('leaveBalances','grant')){toast('Not permitted','err');return false;}
  days=Number(days);
  if(!days||isNaN(days)){toast('Enter a non-zero number of days','err');return false;}
  if(!reason){toast('Reason required','err');return false;}
  _ensureHrm(u);
  u.hrm.compOff.push({id:uid('co'),days:_r2(days),reason,expiry:(days>0?(exp||null):null),at:new Date().toISOString(),by:fullName(me())});
  hlog('Comp-off '+(days>0?'+':'')+days,fullName(u)+': '+reason);
  saveDB();toast((days>0?'Granted ':'Removed ')+Math.abs(days)+' comp-off day(s) ✓');
  rr();
  return true;
}

/* ════════ HRM ANALYTICS PAGE ════════ */
function hrmAnalyticsPage(){
  const f=S.filters;
  // §1.8 step 5: data scope honors the resolver's `reports` scope (mirrors attendancePage).
  // scopedUsers('reports') already implements self/team/department/location/everyone and keeps
  // other Super Admins out of HR reports for non-admins (scopeFilter line ~799). Unassigned users
  // fall through to _baseScope → today's behavior (admin all / HR all-except-super-admin / mgr team / self).
  let scope=scopedUsers('reports');
  if(!scope.length||!scope.some(u=>u.id===S.uid))scope=[me(),...scope.filter(u=>u.id!==S.uid)];
  // apply filters
  let users=scope.slice();
  if(f.haDept)users=users.filter(u=>u.department===f.haDept);
  if(f.haProf)users=users.filter(u=>userProfileId(u)===f.haProf);
  if(f.haLoc)users=users.filter(u=>u.hrm?.locationId===f.haLoc); // L6: real location filter (DB.locations)
  const d1=f.haD1||todayISO().slice(0,8)+'01';
  const d2=f.haD2||todayISO();
  const ltFilter=f.haLt||'';
  const rows=users.map(u=>{
    const att=(DB.attendance||[]).filter(a=>a.userId===u.id&&a.date>=d1&&a.date<=d2);
    const worked=_r2(att.reduce((s,a)=>s+(a.hours||0),0));
    const lates=att.filter(a=>(a.flags||[]).includes('late')).length;
    const absences=_deriveAbsences(u,d1,d2); // L4: dropped dead Absent-filter term (Absent is virtual, never persisted)
    let leaveReqs=(DB.leaveRequests||[]).filter(r=>r.userId===u.id&&r.status==='Approved'&&!(r.end<d1||r.start>d2));
    if(ltFilter)leaveReqs=leaveReqs.filter(r=>r.leaveTypeId===ltFilter);
    const leavesTaken=_r2(leaveReqs.reduce((s,r)=>s+_leaveDaysInRange(r,d1,d2),0)); // L5/M2: clip to window, exclude worked-day overlaps
    const remaining=_r2(_typesFor(userProfileId(u)).filter(t=>t.enabled).reduce((s,t)=>s+_ltRemaining(u.id,t,_leaveYearOf(u,todayISO())),0));
    return {u,worked,lates,absences,leavesTaken,remaining};
  });
  const allLts=_typesFor(userProfileId(me())||DB.hrmConfig.activeProfile);
  const canDl=can('reports','download');
  const filterBar=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <input type="date" value="${d1}" onchange="S.filters.haD1=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"/>
    <input type="date" value="${d2}" onchange="S.filters.haD2=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"/>
    <select onchange="S.filters.haDept=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"><option value="">All depts</option>${DB.departments.map(d=>`<option${f.haDept===d.name?' selected':''}>${esc(d.name)}</option>`).join('')}</select>
    <select onchange="S.filters.haProf=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"><option value="">All profiles</option>${Object.keys(DB.hrmConfig.profiles||{}).map(k=>`<option value="${k}"${f.haProf===k?' selected':''}>${esc(k)}</option>`).join('')}</select>
    <select onchange="S.filters.haLoc=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"><option value="">All locations</option>${DB.locations.map(l=>`<option value="${l.id}"${f.haLoc===l.id?' selected':''}>${esc(l.name)}</option>`).join('')}</select>
    <select onchange="S.filters.haLt=this.value;rr()" class="bg-white border border-ink-200 rounded-xl px-3 py-2 text-sm rf"><option value="">All leave types</option>${allLts.map(t=>`<option value="${t.id}"${f.haLt===t.id?' selected':''}>${esc(t.name)}</option>`).join('')}</select>
    ${canDl?btnP('Download CSV','App.downloadPayroll()','download'):''}
  </div>`;
  const tot=rows.reduce((a,r)=>({w:a.w+r.worked,l:a.l+r.lates,lv:a.lv+r.leavesTaken,ab:a.ab+r.absences}),{w:0,l:0,lv:0,ab:0});
  const stats=`<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">${statCard('Total worked hrs',_r2(tot.w),'brand')}${statCard('Late check-ins',tot.l,'amber')}${statCard('Leave days taken',_r2(tot.lv),'sky')}${statCard('Absences',tot.ab,'rose')}</div>`;
  const table=`<div style="background:#fff;border-radius:20px;border:1px solid #ECEDF0;overflow:hidden"><div style="overflow-x:auto"><table class="w-full text-sm"><thead><tr class="text-[10px] text-ink-400 uppercase tracking-wide border-b border-ink-100 text-left"><th class="px-4 py-2.5 font-semibold">Employee</th><th class="px-4 py-2.5 font-semibold">Dept</th><th class="px-4 py-2.5 font-semibold">Worked hrs</th><th class="px-4 py-2.5 font-semibold">Lates</th><th class="px-4 py-2.5 font-semibold">Leaves taken</th><th class="px-4 py-2.5 font-semibold">Remaining</th><th class="px-4 py-2.5 font-semibold">Absences</th></tr></thead><tbody class="divide-y divide-ink-50">${rows.length?rows.map(r=>`<tr class="hover:bg-ink-50/50"><td class="px-4 py-2.5"><div class="flex items-center gap-2">${avatar(r.u,'w-7 h-7','text-[10px]')}<span class="font-medium">${esc(fullName(r.u))}</span></div></td><td class="px-4 py-2.5 text-xs text-ink-500">${esc(r.u.department||'')}</td><td class="px-4 py-2.5 font-semibold">${r.worked}h</td><td class="px-4 py-2.5 ${r.lates?'text-amber-600 font-semibold':''}">${r.lates}</td><td class="px-4 py-2.5">${r.leavesTaken}</td><td class="px-4 py-2.5 text-emerald-700">${r.remaining}</td><td class="px-4 py-2.5 ${r.absences?'text-rose-600 font-semibold':''}">${r.absences}</td></tr>`).join(''):`<tr><td colspan="7">${empty('chart','No data','Adjust filters or date range.')}</td></tr>`}</tbody></table></div></div>`;
  return `<div class="fade">${hdr('HRM Analytics','Worked hours, lateness, leaves & absences'+(isAdmin()?'':isHR()?' (all staff except Super Admins)':isMgr()?' (your team)':' (you)'))}${filterBar}${stats}${table}</div>`;
}
function _deriveAbsences(u,d1,d2){
  // count past working days in range with no attendance record and no approved leave
  let d=d1,n=0,guard=0;const today=todayISO();
  const off=new Set(u.hrm?.schedule?.offDays||[]);const prof=userProfileId(u);
  const hols=new Set((DB.holidays||[]).filter(h=>h.profileId===prof).map(h=>h.date));
  // L4: never flag days before the user joined OR before HRM adoption (their first attendance record).
  // Without a first record there is no adoption baseline → don't derive absences at all (avoids huge false counts).
  const firstRec=(DB.attendance||[]).filter(a=>a.userId===u.id).reduce((m,a)=>(!m||a.date<m?a.date:m),null);
  if(!firstRec)return 0;
  let start=d1;
  if(u.hrm?.joiningDate&&u.hrm.joiningDate>start)start=u.hrm.joiningDate;
  if(firstRec>start)start=firstRec;
  d=start;
  while(d<=d2&&d<today&&guard++<400){
    const dow=DAYS3[new Date(d+'T00:00:00').getDay()];
    if(!off.has(dow)&&!hols.has(d)){
      const rec=attFor(u.id,d);
      const onLeave=(DB.leaveRequests||[]).some(r=>r.userId===u.id&&r.status==='Approved'&&r.start<=d&&r.end>=d);
      if(!rec&&!onLeave)n++;
    }
    d=_isoAdd(d,1);
  }
  return n;
}
App.downloadPayroll=()=>{
  const canDl=can('reports','download');
  if(!canDl){toast('No download permission','err');return;}
  const f=S.filters;let scope;
  if(isAdmin())scope=DB.users;else if(isHR())scope=DB.users.filter(u=>u.role!=='Admin');else if(isMgr())scope=[me(),...subTree(S.uid)];else scope=[me()];
  let users=scope.slice();
  if(f.haDept)users=users.filter(u=>u.department===f.haDept);
  if(f.haProf)users=users.filter(u=>userProfileId(u)===f.haProf);
  if(f.haLoc)users=users.filter(u=>u.hrm?.locationId===f.haLoc); // L6: real location filter (DB.locations)
  const d1=f.haD1||todayISO().slice(0,8)+'01',d2=f.haD2||todayISO();
  const rows=[['Employee','Email','Department','Location','Worked Hours','Late Check-ins','Leaves Taken','Leaves Remaining','Absences','Period']];
  users.forEach(u=>{
    const att=(DB.attendance||[]).filter(a=>a.userId===u.id&&a.date>=d1&&a.date<=d2);
    const worked=_r2(att.reduce((s,a)=>s+(a.hours||0),0));
    const lates=att.filter(a=>(a.flags||[]).includes('late')).length;
    const absences=_deriveAbsences(u,d1,d2); // L4: dropped dead Absent-filter term (Absent is virtual, never persisted)
    const leavesTaken=_r2((DB.leaveRequests||[]).filter(r=>r.userId===u.id&&r.status==='Approved'&&!(r.end<d1||r.start>d2)).reduce((s,r)=>s+_leaveDaysInRange(r,d1,d2),0)); // L5/M2
    const remaining=_r2(_typesFor(userProfileId(u)).filter(t=>t.enabled).reduce((s,t)=>s+_ltRemaining(u.id,t,_leaveYearOf(u,todayISO())),0));
    rows.push([fullName(u),u.email||'',u.department||'',userProfileId(u),worked,lates,leavesTaken,remaining,absences,d1+' to '+d2]);
  });
  const csv=rows.map(r=>r.map(v=>{let c=String(v??'');if(/^[=+\-@\t\r]/.test(c))c="'"+c;return '"'+c.replace(/"/g,'""')+'"';}).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download='shiftly_payroll_'+todayISO()+'.csv';a.click();
  hlog('Payroll exported',d1+' to '+d2+' ('+users.length+' staff)');
  toast('Exported '+users.length+' staff ✓');
};
